default_language_version:
  python: python3
exclude: |
  (?x)(
    ^thirdparty/|
    ^cache/|
    ^tmp/|
    ^outputs?/|
    ^runs/|
    ^benchmark_results/|
    ^inspatio_world_output/|
    ^docs/fumadocs/(\.next|node_modules|out)/|
    ^apps/[^/]+/(\.next|node_modules|out)/|
    \.(patch|diff)$
  )
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.0.1
    hooks:
      - id: trailing-whitespace
        exclude_types: [python]
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
        exclude_types: [python]
      - id: check-merge-conflict
      - id: check-symlinks
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.7
    hooks:
      - alias: ruff-import-sort
        name: ruff import sort
        id: ruff-check
        args: ["--fix", "--select", "I"]
        files: ^(worldfoundry/(cli|evaluation|mcp|runtime)|scripts/(benchmark_zoo|dev|docs|model_zoo|qa|tools)|test/eval_core)/.*\.py$
      - id: ruff-format
        files: ^(worldfoundry/(cli|evaluation|mcp|runtime)|scripts/(benchmark_zoo|dev|docs|model_zoo|qa|tools)|test/eval_core)/.*\.py$
  - repo: local
    hooks:
      - id: worldfoundry-lightweight-lint
        name: worldfoundry lightweight lint
        entry: bash -c '${PYTHON:-python3} scripts/dev/check_dev_tools.py --lint'
        language: system
        pass_filenames: false
