schema_version: worldfoundry.open_magvit2.infer_config.v1
model:
  class_path: src.Open_MAGVIT2.models.cond_transformer_gpt.Net2NetTransformer
  init_args:
    first_stage_key: image
    cond_stage_key: class_label
    token_factorization: true
    transformer_config:
      target: src.Open_MAGVIT2.modules.transformer.gpt.GPT
      params:
        vocab_size: 512
        block_size: 256
        spatial_n_layer: 24
        factorized_n_layer: 2
        factorized_bits:
        - 6
        - 12
        n_head: 16
        dim: 1024
        cond_dim: 1024
        token_drop: 0.1
        resid_dropout_p: 0.1
        token_factorization: true
        class_num: 1000
    first_stage_config:
      target: src.Open_MAGVIT2.models.lfqgan.VQModel
      params:
        n_embed: 262144
        embed_dim: 18
        sample_minimization_weight: 1.0
        batch_maximization_weight: 1.0
        token_factorization: true
        factorized_bits:
        - 6
        - 12
        ddconfig:
          double_z: false
          z_channels: 18
          resolution: 128
          in_channels: 3
          out_ch: 3
          ch: 128
          ch_mult:
          - 1
          - 1
          - 2
          - 2
          - 4
          num_res_blocks: 4
    cond_stage_config:
      target: src.Open_MAGVIT2.modules.util.Labelator
      params:
        n_classes: 1000
    permuter_config:
      target: src.Open_MAGVIT2.modules.transformer.permuter.ShiftPermuter
      params:
        shift_pos: 1000
