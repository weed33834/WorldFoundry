expname: robots_default_config
task: sft:imageaction2video
collate_fn: eval_inputs.collate_functions.action2video_variable_agents_collate_fn
base_config: null
eval_dataset_config:
  target: eval_inputs.robots_dataset.RobotsSimulationDataset
  params:
    base_path: data/robots_release
    metadata_path: data/robots_release/metadata/val_metadata.csv
    video_params:
      height: 256
      width: 320
      num_frames: 81
      time_division_factor: 4
      time_division_remainder: 1
      frame_skip: 1
    return_video_type: pil
    random_start_point: false 
    load_env_obv: true
    env_obv_type: memory
    num_views: 3
    load_action: true
    max_agent: 4
    action_type: pos
    action_max:
    - 2.8973
    - 1.7628
    - 2.8973
    - -0.0698
    - 2.8973
    - 3.7525
    - 2.8973
    - 1.0
    action_min:
    - -2.8973
    - -1.7628
    - -2.8973
    - -3.0718
    - -2.8973
    - -0.0175
    - -2.8973
    - -1.0
    num_camera_pose_frames: 1
    repeat: 1
    data_file_keys:
    - video
    output_dir: ./outputs/causal_simulator_ours_0227/eval
    load_from_cache: false
simulator_config:
  load_env_encoder: true
  env_encoder_config:
    target: diffsynth.models.wan_env_encoder.WanEnvEncoder
    params:
      input_dim: 2048
      output_dim: 3072
  dit_config:
    target: diffsynth.models.wan_video_multiworld_dit.WanModel
    model_path:
    - ./models/Wan-AI/Wan2.2-TI2V-5B/diffusion_pytorch_model-00001-of-00003.safetensors
    - ./models/Wan-AI/Wan2.2-TI2V-5B/diffusion_pytorch_model-00002-of-00003.safetensors
    - ./models/Wan-AI/Wan2.2-TI2V-5B/diffusion_pytorch_model-00003-of-00003.safetensors
    params:
      action_injection: causal_cross_attention
      action_encoder_config:
        target: diffsynth.models.wan_video_robots_action.WanUnifiedActionEncoder
        params:
          action_dim: 8
          camera_dim: 16
          output_ratio: 1
          output_dim: ${simulator_config.dit_config.params.dim}
          adaptive_agent_pooling: false
          action_pe_config:
            qk_norm: false
            dim: ${simulator_config.dit_config.params.dim}
            pe_type: relative1d
            num_heads: 8
            base_n: 20
            max_n: 8
            max_f: 252
      has_image_input: false
      has_context_input: true
      patch_size:
      - 1
      - 2
      - 2
      in_dim: 48
      dim: 3072
      ffn_dim: 14336
      freq_dim: 256
      text_dim: 4096
      out_dim: 48
      num_heads: 24
      num_layers: 30
      eps: 1.0e-06
      seperated_timestep: true
      require_clip_embedding: false
      require_vae_embedding: false
      fuse_vae_embedding_in_latents: true
trainer_config:
  learning_rate: 5.0e-05
  batch_size: 8
  num_epochs: 40
  save_steps: 2000
  find_unused_parameters: false
  gradient_accumulation_steps: 1
  dataset_num_workers: 16
  validation_interval: 2000
  optimizer_config:
    target_class: torch.optim.AdamW
    optimizer_state_path: null
    params:
      lr: ${trainer_config.learning_rate}
      betas:
      - 0.9
      - 0.999
      weight_decay: 0.01
  scheduler_config:
    target_class: torch.optim.lr_scheduler.CosineAnnealingLR
    params:
      T_max: 50000
      eta_min: 1.0e-05
