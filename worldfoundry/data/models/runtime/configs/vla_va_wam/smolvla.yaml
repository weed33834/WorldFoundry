policy_target: worldfoundry.synthesis.action_generation.smolvla.runtime:predict_action
predict_method: predict_action
require_checkpoint: true
backbone_path: ${WORLDFOUNDRY_HFD_ROOT}/HuggingFaceTB--SmolVLM2-500M-Video-Instruct
torch_dtype: auto
seed: 0
compile_model: false
denoising_steps: 10
