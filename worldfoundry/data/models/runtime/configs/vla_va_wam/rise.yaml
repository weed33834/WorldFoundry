backend: callable_entrypoint
checkpoint_path: ${WORLDFOUNDRY_CKPT_DIR}/rise/policy
require_checkpoint: true
policy_target: worldfoundry.synthesis.action_generation.rise.runtime:predict_action
runtime_backend: rise_in_tree_openpi_runtime
action_contract: agilex_50_step_14d_absolute_action_chunk
architecture_config_path: ${WORLDFOUNDRY_DATA_ROOT}/models/runtime/configs/vla_va_wam/rise-architecture.yaml
norm_stats_path: ${WORLDFOUNDRY_CKPT_DIR}/rise/policy/assets/rise/norm_stats.json
paligemma_tokenizer_path: ${WORLDFOUNDRY_HFD_ROOT}/google--paligemma-3b-pt-224/tokenizer.model
fast_tokenizer_path: ${WORLDFOUNDRY_HFD_ROOT}/physical-intelligence--fast
torch_dtype: auto
compile_policy: true
compile_mode: reduce-overhead
num_inference_steps: 10
seed: 42
image_width: 320
image_height: 240
action_advantage: 1.0
advantage_bins: 10
state_dim: 14
model_action_dim: 32
action_dim: 14
action_horizon: 50
camera_keys:
- cam_high
- cam_left_wrist
- cam_right_wrist
- top_head
- hand_left
- hand_right
- head
- left_wrist
- right_wrist
runner_target: worldfoundry.evaluation.models.runners.pipeline:WorldFoundryPipelineRunner
