require_checkpoint: true
policy_target: worldfoundry.synthesis.action_generation.openvla_oft.runtime:predict_action
predict_method: predict_action
torch_dtype: bfloat16
trust_remote_code: false
runtime_backend: openvla_oft_in_tree_checkpoint_runtime
action_contract: continuous_action_chunk
control_mode: libero_delta_eef_action_chunk
unnorm_key: libero_spatial_no_noops
task_suite_name: libero_spatial
use_l1_regression: true
use_diffusion: false
use_proprio: true
num_images_in_input: 2
