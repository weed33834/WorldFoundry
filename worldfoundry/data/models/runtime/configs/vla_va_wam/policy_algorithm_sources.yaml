source_root: ${WORLDFOUNDRY_MODEL_SOURCE_DIR}
lerobot_policy_source: ${WORLDFOUNDRY_MODEL_SOURCE_DIR}/lerobot/src/lerobot/policies
notes:
- These records map LeRobot policy directories to concrete algorithms. They are
  not a generic LeRobot integration surface.
- Use official repositories when available. Use the LeRobot policy source only
  when no separate official implementation is available or when LeRobot is the
  stated reference implementation for that concrete algorithm.
