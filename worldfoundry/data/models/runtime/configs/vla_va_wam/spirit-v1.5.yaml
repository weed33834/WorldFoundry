backend: callable_entrypoint
checkpoint_path: ${WORLDFOUNDRY_HFD_ROOT}/Spirit-AI-robotics--Spirit-v1.5
checkpoint_ref: Spirit-AI-robotics/Spirit-v1.5
policy_target: worldfoundry.synthesis.action_generation.spirit_v15.runtime:predict_action
predict_method: predict_action
require_checkpoint: true
backbone_path: ${WORLDFOUNDRY_HFD_ROOT}/Qwen--Qwen3-VL-4B-Instruct
torch_dtype: auto
attention_backend: auto
robot_type: aloha
state_keys: [state, proprio, robot_state, eef_state]
camera_keys:
- observation.images.cam_high
- observation.images.cam_left_wrist
- observation.images.cam_right_wrist
camera_aliases:
- [cam_high, cam_head, image0]
- [cam_left_wrist, left_wrist, image1]
- [cam_right_wrist, right_wrist, image2]
state_mask_indices: [2, 9]
user_prompt_template: "{image_placeholders}\nThe current robot type is {robot_type}. What is the current task?"
seed: 0
runtime_backend: spirit_v15_native
action_contract: continuous_flow_action_chunk
