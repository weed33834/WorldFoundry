name: matrix-game-1.0
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - setuptools
  - wheel
  - pip:
      - accelerate==1.13.0
      - diffusers==0.32.2
      - einops==0.8.1
      - ftfy==6.3.1
      - imageio==2.34.0
      - imageio-ffmpeg==0.5.1
      - loguru==0.7.3
      - ninja==1.13.0
      - numpy==1.24.4
      - opencv_python_headless==4.9.0.80
      - packaging==25.0
      - peft==0.14.0
      - Pillow==11.2.1
      - protobuf==5.29.5
      - regex==2024.11.6
      - safetensors==0.5.3
      - sentencepiece==0.2.0
      - torch==2.5.1
      - torchvision==0.20.1
      - torchaudio==2.5.1
      - transformers==4.47.1
variables:
  CUDA_HOME: /usr/local/cuda-12.4
  LD_LIBRARY_PATH: /usr/local/cuda-12.4/compat:/usr/local/cuda-12.4/lib64:/usr/local/x86_64-linux-gnu:/usr/local/mpi/lib:/usr/local/cuda/lib64
  PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
