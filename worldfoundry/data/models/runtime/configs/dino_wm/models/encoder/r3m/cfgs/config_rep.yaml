defaults:
- _self_
- override hydra/launcher: local
- override hydra/output: local
save_snapshot: false
num_workers: 10
batch_size: 32
train_steps: 2000000
eval_freq: 20000
seed: 1
device: cuda
experiment: train_r3m
lr: 1e-4
alpha: 0.2
dataset: ego4d
doaug: none
agent:
  _target_: r3m.R3M
  device: ${device}
  lr: ${lr}
  hidden_dim: 1024
  size: 34
  l2weight: 1.0e-05
  l1weight: 1.0e-05
  tcnweight: 1.0
  langweight: 0.0
  l2dist: true
  bs: ${batch_size}
