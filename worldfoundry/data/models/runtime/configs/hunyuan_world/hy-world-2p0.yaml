schema_version: worldfoundry-hunyuan-world-runtime-config-v1
runtime: hy_world_2p0
description: HY-World 2.0 component runtime status and worldgen migration notes.
defaults:
  supported_tasks:
  - worldrecon
  - panorama
  unsupported_tasks:
  - worldgen
  - world-generation
  worldgen_status: migration_pending
  worldgen_status_reason: >
    WorldFoundry currently verifies HY-Pano 2.0 panorama generation and
    WorldMirror 2.0 reconstruction as in-tree components. Full world generation
    is a separate five-stage distributed runtime that still needs in-tree
    orchestration, native extension setup, VLM endpoint configuration, and
    end-to-end Workspace verification.
  official_repo_env: WORLDFOUNDRY_HY_WORLD_2P0_REPO
  official_worldgen_root: hyworld2/worldgen
  official_worldgen_required_files:
  - hyworld2/worldgen/traj_generate.py
  - hyworld2/worldgen/traj_render.py
  - hyworld2/worldgen/video_gen.py
  - hyworld2/worldgen/gen_gs_data.py
  - hyworld2/worldgen/world_gs_trainer.py
  - hyworld2/worldgen/show_gs.py
  - hyworld2/worldgen/models/worldstereo_wrapper.py
  - hyworld2/worldgen/models/worldstereo.py
  - hyworld2/worldgen/models/pipelines/pipeline_dmd_keyframe.py
  - hyworld2/worldgen/src/navi_utils.py
  - hyworld2/worldgen/src/panorama_utils.py
  - hyworld2/worldgen/src/pointcloud.py
  - hyworld2/worldgen/third_party/gsplat_maskgaussian/setup.py
  - hyworld2/worldgen/third_party/navmesh/setup.py
  worldgen_required_environment:
    python: ">=3.11"
    cuda: "12.8 recommended by upstream"
    recommended_gpus: "4-8 GPUs; upstream examples use 8 GPUs"
    external_vlm: vLLM endpoint serving Qwen/Qwen3-VL-8B-Instruct or compatible VLM
    native_extensions:
    - hyworld2/worldgen/third_party/gsplat_maskgaussian
    - hyworld2/worldgen/third_party/navmesh with recastnavigation submodule
    checkpoints:
    - tencent/HY-World-2.0 HY-Pano and WorldMirror assets
    - hanshanxue/WorldStereo worldstereo-memory-dmd assets
    - facebook/sam3
    - Ruicheng/moge-2-vitl-normal
    - naver-iv/zim-anything-vitl
    - IDEA-Research/grounding-dino-tiny
  worldgen_stage_plan:
  - stage: trajectory_planning
    official_script: hyworld2/worldgen/traj_generate.py
    command_shape: python traj_generate.py --target_path SCENE --llm_addr HOST --llm_port PORT --llm_name MODEL --apply_nav_traj --apply_up_route --apply_recon_iteration --force_vlm
    produces:
    - render_results/global_pcd.ply
    - render_results/global_mesh.ply
    - render_results/view*/traj*/camera.json
  - stage: trajectory_rendering
    official_script: hyworld2/worldgen/traj_render.py
    command_shape: torchrun --nproc_per_node N traj_render.py --target_path SCENE --llm_addr HOST --llm_port PORT --llm_name MODEL
    produces:
    - render_results/*/traj*/render.mp4
    - render_results/*/traj*/render_mask.mp4
    - render_results/*/traj*/traj_caption.json
  - stage: world_expansion
    official_script: hyworld2/worldgen/video_gen.py
    command_shape: torchrun --nproc_per_node N video_gen.py --target_path SCENE --fsdp
    produces:
    - render_results/*/traj*/worldstereo-memory-dmd_result.mp4
    - render_results/generation_bank_worldstereo-memory-dmd/aligned_pcd.ply
  - stage: gs_data_preparation
    official_script: hyworld2/worldgen/gen_gs_data.py
    command_shape: torchrun --nproc_per_node N gen_gs_data.py --root_path SCENE --save_normal --split_sky
    produces:
    - gs_data/images
    - gs_data/depths
    - gs_data/cameras.json
    - gs_data/points.ply
  - stage: world_composition
    official_script: hyworld2/worldgen/world_gs_trainer.py
    command_shape: python -m world_gs_trainer default --data_dir SCENE/gs_data --result_dir RESULT --max_steps STEPS --save_ply --convert_to_spz --disable_video --use_mask_gaussian
    produces:
    - ckpts
    - ply or spz world asset
    - optional mesh export
