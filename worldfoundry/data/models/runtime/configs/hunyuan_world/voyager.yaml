schema_version: worldfoundry-hunyuan-world-runtime-config-v1
runtime: hunyuan_world_voyager
description: User-editable inference defaults for Hunyuan World Voyager.
defaults:
  model: HYVideo-T/2
  latent_channels: 16
  rope_theta: 256
  model_base: ckpts
  denoise_type: flow
  text_encoder: llm-i2v
  text_encoder_precision: fp16
  text_states_dim: 4096
  text_len: 256
  tokenizer: llm-i2v
  prompt_template: dit-llm-encode-i2v
  prompt_template_video: dit-llm-encode-video-i2v
  hidden_state_skip_layer: 2
  apply_final_norm: false
  text_encoder_2: clipL
  text_encoder_precision_2: fp16
  text_states_dim_2: 768
  tokenizer_2: clipL
  text_len_2: 77
  vae: 884-16c-hy
  vae_precision: fp16
  vae_tiling: true
  flow_shift: 7.0
  flow_reverse: true
  flow_solver: euler
  use_linear_quadratic_schedule: false
  linear_schedule_end: 25
  i2v_mode: true
  i2v_condition_type: latent_concat
  i2v_stability: true
  i2v_resolution: 720p
  use_lora: false
  lora_scale: 1.0
  lora_rank: 64
  precision: bf16
  reproduce: false
  video_size:
  - 512
  - 768
  video_length: 49
  infer_steps: 50
  seed_type: fixed
  seed: 0
  cfg_scale: 6.0
  use_fp8: false
  use_cpu_offload: false
  disable_autocast: false
  save_path: ./results
  num_videos: 1
  batch_size: 1
  ulysses_degree: 1
  ring_degree: 1
  gradient_checkpoint: false
  gradient_checkpoint_layers: -1
  use_context_block: false
  load_key: module
  model_resolution: 540p
