schema_version: worldfoundry.official_video_runtime.v1
model_id: gamma-world
runtime:
  kind: official_cli
  backend_quality: official_in_tree_gamma_world_runtime
  checkpoint_optional: true
  repo_root_candidates:
  - ${WORLDFOUNDRY_PACKAGE_ROOT}/synthesis/visual_generation/gamma_world
  checkpoint_candidates:
  - ${WORLDFOUNDRY_CKPT_DIR}/Gamma-World/causal-few-step/model.safetensors
  - ${WORLDFOUNDRY_HFD_ROOT}/chijw--Gamma-World/causal-few-step/model.safetensors
  required_paths:
  - id: inference_entrypoint
    base: repo
    path: runner.py
  - id: gamma_inference_engine
    base: repo
    path: causal_inference.py
  - id: gamma_bidirectional_engine
    base: repo
    path: bidirectional_inference.py
  - id: gamma_model_specs
    base: repo
    path: model_specs.py
  defaults:
    mode: causal_few_step
    eval_dir: ''
    n_players: 2
    num_frames: 189
    num_conditional_frames: 1
    height: 320
    width: 480
    guidance: 5.0
    num_steps: 0
    shift: 5.0
    seed: 1
    fps: 16
    context_parallel_size: 1
    nproc_per_node: 1
    vae: ${WORLDFOUNDRY_CKPT_DIR}/Gamma-World/tokenizer.pth
    text_encoder: ${WORLDFOUNDRY_CKPT_DIR}/Cosmos-Reason1-7B
  command:
  - "{torchrun}"
  - "--master_port={master_port}"
  - --nproc_per_node
  - "{nproc_per_node}"
  - --module
  - worldfoundry.synthesis.visual_generation.gamma_world.runner
  - --mode
  - "{mode}"
  - --checkpoint
  - "{checkpoint_path}"
  - --vae
  - "{vae}"
  - --text-encoder
  - "{text_encoder}"
  - --prompt
  - "{prompt}"
  - --eval-dir
  - "{eval_dir}"
  - --n-players
  - "{n_players}"
  - --output-path
  - "{output_path}"
  - --num-frames
  - "{num_frames}"
  - --num-conditional-frames
  - "{num_conditional_frames}"
  - --height
  - "{height}"
  - --width
  - "{width}"
  - --guidance
  - "{guidance}"
  - --num-steps
  - "{num_steps}"
  - --shift
  - "{shift}"
  - --seed
  - "{seed}"
  - --fps
  - "{fps}"
  - --context-parallel-size
  - "{context_parallel_size}"
  # Running from the package directory makes its internal `tokenizers` package
  # shadow Hugging Face tokenizers during Transformers imports.
  cwd: ${WORLDFOUNDRY_REPO_ROOT}
  prepend_repo_root_to_pythonpath: false
  env:
    NVTE_FUSED_ATTN: '0'
  preferred_artifact_patterns:
  - gamma-world.mp4
notes:
- The checkpoint, tokenizer, and text encoder default to their Hugging Face URIs when local overrides are absent.
- Only one sample folder is accepted per WorldFoundry invocation because each invocation has one artifact path.
- Set nproc_per_node and context_parallel_size together for context-parallel bidirectional inference.
