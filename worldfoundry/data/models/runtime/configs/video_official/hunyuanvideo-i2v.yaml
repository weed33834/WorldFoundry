schema_version: worldfoundry.official_video_runtime.v1
model_id: hunyuanvideo-i2v
runtime:
  kind: official_cli
  backend_quality: in_tree_official_runtime
  repo_root_candidates:
  - ${WORLDFOUNDRY_REPO_ROOT}/worldfoundry/base_models/diffusion_model/video/hunyuan_video/official_hunyuan_video_i2v_runtime
  checkpoint_candidates:
  - $WORLDFOUNDRY_CKPT_DIR/HunyuanVideo-I2V
  - $WORLDFOUNDRY_HFD_ROOT/tencent--HunyuanVideo-I2V
  required_paths:
  - id: i2v_dit
    path: hunyuan-video-i2v-720p/transformers/mp_rank_00_model_states.pt
  - id: i2v_vae
    path: hunyuan-video-i2v-720p/vae
  - id: i2v_text_encoder
    path: text_encoder_i2v/config.json
  - id: clip_text_encoder
    path: text_encoder_2/config.json
  env:
    MODEL_BASE: "{checkpoint_path}"
    ALLOW_RESIZE_FOR_SP: "1"
  command:
  - "{torchrun}"
  - "--nproc_per_node={nproc_per_node}"
  - "--master_port={master_port}"
  - "{repo_root}/sample_image2video.py"
  - "--model-base"
  - "{checkpoint_path}"
  - "--i2v-dit-weight"
  - "{checkpoint_path}/hunyuan-video-i2v-720p/transformers/mp_rank_00_model_states.pt"
  - "--model"
  - "{model}"
  - "--prompt"
  - "{prompt}"
  - "--i2v-mode"
  - "--i2v-image-path"
  - "{image_path}"
  - "--i2v-resolution"
  - "{i2v_resolution}"
  - "--i2v-stability"
  - "--infer-steps"
  - "{num_inference_steps}"
  - "--video-length"
  - "{num_frames}"
  - "--flow-reverse"
  - "--flow-shift"
  - "{flow_shift}"
  - "--embedded-cfg-scale"
  - "{embedded_cfg_scale}"
  - "--seed"
  - "{seed}"
  - "--ulysses-degree"
  - "{ulysses_degree}"
  - "--ring-degree"
  - "{ring_degree}"
  - "--save-path"
  - "{output_dir}"
  defaults:
    nproc_per_node: 8
    ulysses_degree: 8
    ring_degree: 1
    model: HYVideo-T/2
    i2v_resolution: 720p
    i2v_stability: true
    num_frames: 129
    num_inference_steps: 50
    fps: 24
    flow_shift: 7.0
    embedded_cfg_scale: 6.0
    seed: 0
notes:
- >-
  Mirrors the upstream scripts/run_sample_image2video_stability.sh and README
  multi-GPU demo: image `assets/demo/i2v/imgs/0.jpg`, 8-rank torchrun,
  ulysses=8, ring=1, 720p, 129 frames, 50 inference steps, flow_shift=7.0,
  embedded_cfg_scale=6.0, and seed 0.
- >-
  The in-tree runtime contains only `sample_image2video.py` and the infer-time
  `hyvideo` package; training and dataset construction helpers are omitted.
