schema_version: worldfoundry.official_video_runtime.v1
model_id: magi-1
runtime:
  kind: official_cli
  backend_quality: in_tree_official_runtime
  repo_root_candidates:
  - ${WORLDFOUNDRY_REPO_ROOT}/worldfoundry/synthesis/visual_generation/magi/magi_runtime
  checkpoint_candidates:
  - $WORLDFOUNDRY_CKPT_DIR/MAGI-1
  - $WORLDFOUNDRY_HFD_ROOT/sand-ai--MAGI-1
  defaults:
    variant: 4.5b-distill
    mode: i2v
    num_frames: 96
    height: 720
    width: 720
    num_steps: 64
    fps: 24
    seed: 1234
  command:
  - "{python}"
  - "-m"
  - "worldfoundry.synthesis.visual_generation.magi.worldfoundry_runner"
  - "--repo-root"
  - "{repo_root}"
  - "--checkpoint-path"
  - "{checkpoint_path}"
  - "--prompt"
  - "{prompt}"
  - "--image-path"
  - "{image_path}"
  - "--output-path"
  - "{output_path}"
  - "--variant"
  - "{variant}"
  - "--mode"
  - "{mode}"
  - "--num-frames"
  - "{num_frames}"
  - "--height"
  - "{height}"
  - "--width"
  - "{width}"
  - "--num-steps"
  - "{num_steps}"
  - "--fps"
  - "{fps}"
  - "--seed"
  - "{seed}"
notes:
- Runtime wraps the official MAGI inference/pipeline/entry.py with a generated config that points at local checkpoint assets.
- Example configs and `special_tokens.npz` live under `worldfoundry/data/test_cases/magi/example/` (override with `WORLDFOUNDRY_MAGI_EXAMPLE_ROOT` or `SPECIAL_TOKEN_PATH`).
