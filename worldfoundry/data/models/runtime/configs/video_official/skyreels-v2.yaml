schema_version: worldfoundry.official_video_runtime.v1
model_id: skyreels-v2
runtime:
  kind: official_cli
  backend_quality: official_in_tree_cli
  defaults:
    task: t2v
    num_frames: 97
    num_inference_steps: 30
    base_num_frames: 97
    ar_step: 0
    causal_block_size: 1
    addnoise_condition: 0
    guidance_scale: 6.0
    shift: 8.0
    fps: 24
    seed: 42
  repo_root_candidates:
  - ${WORLDFOUNDRY_PACKAGE_ROOT}/base_models/diffusion_model/video/skyreels_v2
  checkpoint_candidates:
  - $WORLDFOUNDRY_HFD_ROOT/Skywork--SkyReels-V2-DF-1.3B-540P
  - $WORLDFOUNDRY_HFD_ROOT/Skywork--SkyReels-V2-T2V-14B-720P
  command:
  - "{python}"
  - "{repo_root}/inference.py"
  - "--model_id"
  - "{checkpoint_path}"
  - "--prompt"
  - "{prompt}"
  - "--save_path"
  - "{output_path}"
  - "--task"
  - "{task}"
  - "--num_frames"
  - "{num_frames}"
  - "--inference_steps"
  - "{num_inference_steps}"
  - "--base_num_frames"
  - "{base_num_frames}"
  - "--ar_step"
  - "{ar_step}"
  - "--causal_block_size"
  - "{causal_block_size}"
  - "--addnoise_condition"
  - "{addnoise_condition}"
  - "--guidance_scale"
  - "{guidance_scale}"
  - "--shift"
  - "{shift}"
  - "--fps"
  - "{fps}"
  - "--seed"
  - "{seed}"
  - "--image"
  - "{image_path}"
  - "--video_path"
  - "{video_path}"
  - "--device"
  - "{device}"
notes:
- Official V2 inference code is vendored in-tree; absent local weights are reported explicitly.
