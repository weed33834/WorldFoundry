schema_version: worldfoundry.official_video_runtime.v1
model_id: open-sora
runtime:
  kind: official_cli
  backend_quality: in_tree_official_cli
  repo_root_candidates:
  - ${WORLDFOUNDRY_REPO_ROOT}/worldfoundry/synthesis/visual_generation/open_sora/open_sora_runtime
  checkpoint_candidates:
  - $WORLDFOUNDRY_CKPT_DIR/OpenSora-STDiT-v3
  - $WORLDFOUNDRY_HFD_ROOT/hpcai-tech--OpenSora-STDiT-v3
  defaults:
    config: configs/opensora-v1-2/inference/sample.py
    num_frames: 51
    resolution: 480p
    aspect_ratio: "9:16"
    num_sampling_steps: 30
    guidance_scale: 7.0
    aes: 6.5
    seed: 1024
  env:
    OPENSORA_VAE_PATH: "$WORLDFOUNDRY_CKPT_DIR/hfd/hpcai-tech--OpenSora-VAE-v1.2"
  command:
  - "{python}"
  - "{repo_root}/scripts/inference.py"
  - "{repo_root}/{config}"
  - "--ckpt-path"
  - "{checkpoint_path}"
  - "--prompt"
  - "{prompt}"
  - "--save-dir"
  - "{output_dir}"
  - "--num-frames"
  - "{num_frames}"
  - "--resolution"
  - "{resolution}"
  - "--aspect-ratio"
  - "{aspect_ratio}"
  - "--num-sampling-steps"
  - "{num_sampling_steps}"
  - "--cfg-scale"
  - "{guidance_scale}"
  - "--aes"
  - "{aes}"
  - "--seed"
  - "{seed}"
  - "--layernorm-kernel"
  - "False"
  - "--flash-attn"
  - "False"
notes:
- Open-Sora v1.2 inference source is vendored under worldfoundry/synthesis/visual_generation/open_sora/open_sora_runtime.
- This route must not resolve code from an external Open-Sora checkout; only checkpoints and caches may be external.
- Text encoder assets use OPENSORA_TEXT_ENCODER_PATH when set, then the local MAGI-1 T5-XXL cache when present, otherwise the official DeepFloyd/t5-v1_1-xxl HF id.
- Defaults follow the official Hugging Face demo quality preset: 480p, 2s/51 frames, 30 sampling steps, cfg 7.0, seed 1024, and no forced motion score.
