schema_version: worldfoundry.official_video_runtime.v1
model_id: thinksound
runtime:
  kind: official_cli
  backend_quality: pending_in_tree_runtime
  repo_root_candidates:
  - ${WORLDFOUNDRY_REPO_ROOT}/worldfoundry/synthesis/visual_generation/thinksound
  checkpoint_candidates:
  - $WORLDFOUNDRY_HFD_ROOT/FunAudioLLM--ThinkSound
  required_paths:
  - id: thinksound_weights
    path: thinksound.ckpt
  - id: vae_weights
    path: vae.ckpt
  - id: synchformer_weights
    path: synchformer_state_dict.pth
  command:
  - "{python}"
  - "-m"
  - "worldfoundry.synthesis.visual_generation.thinksound.worldfoundry_runner"
  - "--checkpoint-dir"
  - "{checkpoint_path}"
  - "--prompt"
  - "{prompt}"
  - "--output"
  - "{output_path}"
notes:
- Hidden pending route. The current local Hugging Face checkpoint mirror contains VAE and synchformer weights but not the ThinkSound diffusion checkpoint.
- Do not advertise this model as release-runnable until the infer-only runtime is vendored in-tree and `thinksound.ckpt` is available.
