schema_version: worldfoundry.official_video_runtime.v1
model_id: hunyuanvideo-t2v
runtime:
  kind: official_cli
  backend_quality: in_tree_official_runtime
  repo_root_candidates:
  - ${WORLDFOUNDRY_REPO_ROOT}/worldfoundry/base_models/diffusion_model/video/hunyuan_video/official_hunyuan_video_runtime
  checkpoint_candidates:
  - $WORLDFOUNDRY_CKPT_DIR/HunyuanVideo
  - $WORLDFOUNDRY_HFD_ROOT/tencent--HunyuanVideo
  env:
    MODEL_BASE: "{checkpoint_path}"
  command:
  - "{torchrun}"
  - "--nproc_per_node={nproc_per_node}"
  - "--master_port={master_port}"
  - "{repo_root}/sample_video.py"
  - "--model-base"
  - "{checkpoint_path}"
  - "--dit-weight"
  - "{checkpoint_path}/hunyuan-video-t2v-720p/transformers/mp_rank_00_model_states.pt"
  - "--model-resolution"
  - "{model_resolution}"
  - "--video-size"
  - "{height}"
  - "{width}"
  - "--video-length"
  - "{num_frames}"
  - "--infer-steps"
  - "{num_inference_steps}"
  - "--prompt"
  - "{prompt}"
  - "--text-encoder"
  - "llm"
  - "--tokenizer"
  - "llm"
  - "--prompt-template"
  - "dit-llm-encode"
  - "--prompt-template-video"
  - "dit-llm-encode-video"
  - "--flow-reverse"
  - "--flow-shift"
  - "{flow_shift}"
  - "--embedded-cfg-scale"
  - "{embedded_cfg_scale}"
  - "--seed"
  - "{seed}"
  - "--ulysses-degree"
  - "{ulysses_degree}"
  - "--ring-degree"
  - "{ring_degree}"
  - "--save-path"
  - "{output_dir}"
  defaults:
    nproc_per_node: 8
    ulysses_degree: 8
    ring_degree: 1
    height: 720
    width: 1280
    num_frames: 129
    num_inference_steps: 50
    fps: 24
    model_resolution: 720p
    flow_shift: 7.0
    embedded_cfg_scale: 6.0
    seed: 42
notes:
- Mirrors the upstream scripts/run_sample_video_multigpu.sh demo: 8-rank torchrun, ulysses=8, ring=1, 720x1280, 129 frames, 50 inference steps, seed 42.
- Uses the vendored in-tree HunyuanVideo CLI demo when the checkpoint is in original release layout rather than diffusers layout.
