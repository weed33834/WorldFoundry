schema_version: worldfoundry.official_video_runtime.v1
model_id: wan2.1-vace
runtime:
  kind: official_cli
  backend_quality: in_tree_official_runtime
  defaults:
    nproc_per_node: 8
    size: "1280*720"
    num_frames: 81
    ulysses_size: 8
    ring_size: 1
    num_inference_steps: 50
    seed: -1
    guidance_scale: 5.0
  repo_root_candidates:
  - ${WORLDFOUNDRY_REPO_ROOT}/worldfoundry/base_models/diffusion_model/video/wan/official_wan2_1_runtime
  checkpoint_candidates:
  - $WORLDFOUNDRY_CKPT_DIR/Wan2.1-VACE-14B
  - $WORLDFOUNDRY_CKPT_DIR/Wan2.1-VACE-1.3B-diffusers
  - $WORLDFOUNDRY_HFD_ROOT/Wan-AI--Wan2.1-VACE-14B
  command:
  - "{torchrun}"
  - "--standalone"
  - "--nnodes=1"
  - "--nproc_per_node={nproc_per_node}"
  - "{repo_root}/generate.py"
  - "--task"
  - "vace-14B"
  - "--size"
  - "{size}"
  - "--ckpt_dir"
  - "{checkpoint_path}"
  - "--frame_num"
  - "{num_frames}"
  - "--dit_fsdp"
  - "--t5_fsdp"
  - "--ulysses_size"
  - "{ulysses_size}"
  - "--ring_size"
  - "{ring_size}"
  - "--sample_steps"
  - "{num_inference_steps}"
  - "--base_seed"
  - "{seed}"
  - "--sample_guide_scale"
  - "{guidance_scale}"
  - "--prompt"
  - "{prompt}"
  - "--src_ref_images"
  - "${WORLDFOUNDRY_REPO_ROOT}/worldfoundry/data/test_cases/wan/girl.png,${WORLDFOUNDRY_REPO_ROOT}/worldfoundry/data/test_cases/wan/snake.png"
  - "--save_file"
  - "{output_path}"
notes:
- Official Wan2.1 VACE route vendored in-tree for WorldFoundry; checkpoint/control assets are runtime requirements.
- The upstream demo reference images are stored in-tree under worldfoundry/data/test_cases/wan
  so the CLI route does not depend on an external examples directory.
