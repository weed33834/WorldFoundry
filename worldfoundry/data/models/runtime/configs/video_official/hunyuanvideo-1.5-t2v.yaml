schema_version: worldfoundry.official_video_runtime.v1
model_id: hunyuanvideo-1.5-t2v
runtime:
  kind: official_cli
  backend_quality: official_repo_cli
  repo_root_candidates:
  - ${WORLDFOUNDRY_REPO_ROOT}/worldfoundry/base_models/diffusion_model/video/hunyuan_video/official_hunyuan_video_1_5_runtime
  checkpoint_candidates:
  - $WORLDFOUNDRY_CKPT_DIR/HunyuanVideo-1.5
  - $WORLDFOUNDRY_HFD_ROOT/tencent--HunyuanVideo-1.5
  - $HF_HOME/hub/models--tencent--HunyuanVideo-1.5/snapshots
  required_paths:
  - id: qwen_text_encoder
    path: text_encoder/llm/config.json
  - id: byt5_google_encoder
    path: text_encoder/byt5-small/config.json
  - id: glyph_color_index
    path: text_encoder/Glyph-SDXL-v2/assets/color_idx.json
  - id: glyph_multilingual_index
    path: text_encoder/Glyph-SDXL-v2/assets/multilingual_10-lang_idx.json
  - id: glyph_byt5_weights
    path: text_encoder/Glyph-SDXL-v2/checkpoints/byt5_model.pt
  - id: siglip_vision_encoder
    path: vision_encoder/siglip/image_encoder/config.json
  - id: siglip_image_processor
    path: vision_encoder/siglip/feature_extractor/preprocessor_config.json
  - id: vae_weights
    path: vae/diffusion_pytorch_model.safetensors
  - id: scheduler_config
    path: scheduler/scheduler_config.json
  - id: t2v_cfg_distilled_transformer
    path: transformer/480p_t2v_distilled/diffusion_pytorch_model.safetensors
  defaults:
    nproc_per_node: 8
    resolution: 480p
    aspect_ratio: "16:9"
    video_length: 121
    num_inference_steps: 50
    seed: 42
    rewrite: false
    cfg_distilled: true
    enable_step_distill: false
    sparse_attn: false
    use_sageattn: false
    enable_cache: false
    sr: false
    save_pre_sr_video: false
    overlap_group_offloading: false
  env:
    PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
  command:
  - "{torchrun}"
  - "--standalone"
  - "--nproc_per_node={nproc_per_node}"
  - "{repo_root}/generate.py"
  - "--prompt"
  - "{prompt}"
  - "--resolution"
  - "{resolution}"
  - "--aspect_ratio"
  - "{aspect_ratio}"
  - "--num_inference_steps"
  - "{num_inference_steps}"
  - "--video_length"
  - "{video_length}"
  - "--seed"
  - "{seed}"
  - "--rewrite"
  - "{rewrite}"
  - "--cfg_distilled"
  - "{cfg_distilled}"
  - "--enable_step_distill"
  - "{enable_step_distill}"
  - "--sparse_attn"
  - "{sparse_attn}"
  - "--use_sageattn"
  - "{use_sageattn}"
  - "--enable_cache"
  - "{enable_cache}"
  - "--sr"
  - "{sr}"
  - "--save_pre_sr_video"
  - "{save_pre_sr_video}"
  - "--overlap_group_offloading"
  - "{overlap_group_offloading}"
  - "--model_path"
  - "{checkpoint_path}"
  - "--output_path"
  - "{output_path}"
notes:
- Uses the in-tree infer-only HunyuanVideo 1.5 generate.py runtime ported from
  official commit 60783e704160023913bee78f0b47036d393d4dfa.
- >-
  Required auxiliary assets follow the official checkpoint layout under the
  `HunyuanVideo-1.5` root: Qwen2.5-VL as `text_encoder/llm`, google/byt5-small
  as `text_encoder/byt5-small`, Glyph-SDXL-v2, and FLUX.1-Redux-dev as
  `vision_encoder/siglip`. Symlinks are supported.
- Prompt rewriting, cache, sparse attention, SageAttention, FP8 GEMM, and super
  resolution are disabled by default to avoid optional services or extra packages
  during release validation.
