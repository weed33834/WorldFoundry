# In-tree inference fallback matching the official RobotWin post-training run.
# Checkpoint-local lingbotvla_cli.yaml takes precedence when present.
model:
  tokenizer_path: Qwen/Qwen2.5-VL-3B-Instruct
  adanorm_time: true
  final_norm_adanorm: false
  nosplit_gate_liner: false
  post_training: true
  separate_time_proj: false
  split_gate_liner: false
  use_lm_head: false
  vocab_size: 0

data:
  joints:
    - arm.position: 14
    - effector.position: 2
  cameras:
    - camera_top
    - camera_wrist_left
    - camera_wrist_right
  norm_type: bounds_99
  img_size: 224

train:
  align_params: {}
  chunk_size: 50
  tokenizer_max_length: 72
  max_action_dim: 75
  max_state_dim: 75
  freeze_vision_encoder: false
  train_expert_only: false
  train_state_proj: true
  resize_imgs_with_padding: [224, 224]
