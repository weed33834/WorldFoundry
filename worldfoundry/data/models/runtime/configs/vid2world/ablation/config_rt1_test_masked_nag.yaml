model:
  pretrained_checkpoint: '|<your_pretrained_checkpoint>|'
  base_learning_rate: 1.0e-05
  scale_lr: false
  target: worldfoundry.base_models.diffusion_model.video.lvdm.models.ddpm3d_vid2world.LatentVisualDiffusion
  better_weight_transfer: masked
  params:
    rescale_betas_zero_snr: true
    parameterization: v
    linear_start: 0.00085
    linear_end: 0.012
    num_timesteps_cond: 1
    log_every_t: 200
    timesteps: 1000
    first_stage_key: video
    cond_stage_key: caption
    cond_stage_trainable: false
    image_proj_model_trainable: true
    conditioning_key: hybrid
    image_size:
    - 40
    - 64
    channels: 4
    scale_by_std: false
    scale_factor: 0.18215
    use_ema: false
    uncond_prob: 0.05
    uncond_type: empty_seq
    rand_cond_frame: false
    use_dynamic_rescale: true
    base_scale: 0.7
    fps_condition_type: fps
    perframe_ae: true
    df_loss: true
    action_emb: true
    action_dropout_prob: 0.0
    action_random_drop_btw_timestep: false
    unet_config:
      target: worldfoundry.base_models.diffusion_model.video.lvdm.modules.networks.openaimodel3d_vid2world.UNetModel
      params:
        in_channels: 8
        out_channels: 4
        model_channels: 320
        attention_resolutions:
        - 4
        - 2
        - 1
        num_res_blocks: 2
        channel_mult:
        - 1
        - 2
        - 4
        - 4
        dropout: 0.1
        num_head_channels: 64
        transformer_depth: 1
        context_dim: 1024
        use_linear: true
        use_checkpoint: true
        temporal_conv: true
        temporal_attention: true
        temporal_selfatt_only: true
        use_relative_position: false
        use_causal_attention: true
        temporal_length: 16
        addition_attention: true
        image_cross_attention: true
        default_fs: 3
        fs_condition: true
        action_emb: true
    first_stage_config:
      target: worldfoundry.base_models.diffusion_model.video.lvdm.models.autoencoder.AutoencoderKL
      params:
        embed_dim: 4
        monitor: val/rec_loss
        ddconfig:
          double_z: true
          z_channels: 4
          resolution: 256
          in_channels: 3
          out_ch: 3
          ch: 128
          ch_mult:
          - 1
          - 2
          - 4
          - 4
          num_res_blocks: 2
          dropout: 0.0
        lossconfig:
          target: torch.nn.Identity
    cond_stage_config:
      target: worldfoundry.base_models.diffusion_model.video.lvdm.modules.encoders.condition.FrozenOpenCLIPEmbedder
      params:
        freeze: true
        layer: penultimate
    img_cond_stage_config:
      target: worldfoundry.base_models.diffusion_model.video.lvdm.modules.encoders.condition.FrozenOpenCLIPImageEmbedderV2
      params:
        freeze: true
    image_proj_stage_config:
      target: worldfoundry.base_models.diffusion_model.video.lvdm.modules.encoders.resampler.Resampler
      params:
        dim: 1024
        depth: 4
        dim_head: 64
        heads: 12
        num_queries: 16
        embedding_dim: 1280
        output_dim: 1024
        ff_mult: 4
        video_length: 16
data:
  target: worldfoundry.synthesis.visual_generation.world_model.vid2world.vid2world_runtime.main.utils_data.DataModuleFromConfig
  params:
    batch_size: 8
    num_workers: 12
    wrap: false
    validation:
      target: worldfoundry.base_models.diffusion_model.video.lvdm.variants.vid2world.eval_inputs.rtvid.RTVid
      params:
        data_dir: '|<your_data_dir>|'
        video_length: 16
        resolution:
        - 320
        - 512
        spatial_transform: resize_center_crop
        strong_augmentation: false
        mode: validation
        augment_data: false
        subsample: false
        val_file_list_path: ../lvdm/data/val_file_list.json
lightning:
  precision: 16
  trainer:
    benchmark: true
