notes:
- VLA policy profile for Ai2 MolmoAct2. The in-tree runtime is under worldfoundry/synthesis/action_generation/molmoact2
  and emits action_trace artifacts.
- Direct execution uses the official Hugging Face AutoProcessor/AutoModelForImageTextToText predict_action path with trust_remote_code,
  plus the DROID/YAM bf16 dtype patches from the local molmoact2 inference server.
- DROID defaults use cameras [external_cam, wrist_cam], state_dim=8, norm_tag=franka_droid; YAM defaults use cameras [top_cam,
  left_cam, right_cam], state_dim=14, norm_tag=yam_dual_molmoact2.
- GPU checkpoint-backed parity has not been run from WorldFoundry yet; plan_only is available for CI and runner preflight.
