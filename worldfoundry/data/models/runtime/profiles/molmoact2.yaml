notes:
- VLA policy profile for Ai2 MolmoAct2. The in-tree runtime is under worldfoundry/synthesis/action_generation/molmoact2
  and emits action_trace artifacts.
- Direct execution uses the retained local MolmoAct2 model and processor classes;
  checkpoint-hosted Python is disabled. Automatic precision selects BF16 on
  Ampere/Hopper/Blackwell-class GPUs, FP16 on older CUDA GPUs, and FP32 on CPU.
- DROID defaults use cameras [external_cam, external_cam_2, wrist_cam], state_dim=8, norm_tag=franka_droid; YAM defaults use cameras [top_cam,
  left_cam, right_cam], state_dim=14, norm_tag=yam_dual_molmoact2.
- Real A100 Workspace rollouts passed for DROID (15x8), LIBERO (10x7), and SO100/SO101 (30x6), all finite.
- Base, Bimanual YAM, Think, and Think-LIBERO snapshots remain manifest-validated but were not numerically exercised in this pass.
