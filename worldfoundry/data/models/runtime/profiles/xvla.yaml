notes:
- Runtime uses only local WorldFoundry model classes and forces trust_remote_code=false.
- The official float32 route is the default; bf16/fp16 remain explicit performance options.
- Variant selection now binds each released checkpoint to its official embodiment domain ID; the foundation checkpoint requires an explicit domain ID.
- All nine snapshots pass pinned-manifest exact-size and safetensors-header validation with no partial markers.
- All nine released checkpoints passed strict restoration and real A100 Workspace inference with ten denoising steps, each emitting finite 30-by-20 actions with its explicit domain ID.
