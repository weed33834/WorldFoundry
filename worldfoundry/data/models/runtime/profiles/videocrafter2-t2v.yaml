schema_version: 2
model_id: videocrafter2-t2v
display_name: VideoCrafter2 T2V
task_family: video_generation
groups:
- video
- text_to_video
- videocrafter
source_repos:
- url: https://github.com/VideoCrafter/VideoCrafter
checkpoints:
- role: text_to_video_checkpoint
  repo_id: VideoCrafter/VideoCrafter2
  local_dir: ${WORLDFOUNDRY_CKPT_DIR}/video_models/videocrafter_t2v_512_v2.ckpt
input_schema:
  prompt: true
  image: false
  video: false
artifact_kind: generated_video
artifact_filename: videocrafter2-t2v.mp4
execution:
  backend_stage: official_in_tree_runtime
  runtime_status: official_in_tree_runtime_ready
  integration_status: integrated
  pipeline_binding: videocrafter2-t2v
integration:
  status: integrated
notes:
- VideoCrafter infer-only runtime code is packaged in-tree.
- Training, dataset, and checkpoint download helpers are intentionally excluded.
