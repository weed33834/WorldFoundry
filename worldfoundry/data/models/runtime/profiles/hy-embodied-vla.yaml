notes:
- The runtime is hermetic to the reference GitHub checkout and defaults to strictly local checkpoints.
- UMI uses 50 relative 20-D action steps. RoboTwin returns 20 relative plus 20 absolute 20-D steps and defaults to 1:1 pose blending when a raw RoboTwin start pose is supplied.
- A single image may be replicated across views for smoke tests; benchmark parity requires the official three-camera observations.
- RoboTwin benchmark parity requires six history frames with the current frame last; missing initial history slots are zero padded.
- The RoboTwin checkpoint passed strict restoration and real six-frame, three-camera A100 inference.
- The UMI checkpoint passed a real Workspace rollout on an A100 in BF16: one RGB image replicated across the three views, normalized 20-D state, and a finite 50-by-20 decoded relative-action chunk.
