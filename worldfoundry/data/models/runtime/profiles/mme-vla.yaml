schema_version: 2
model_id: mme-vla
display_name: MME-VLA
task_family: vla_policy
groups:
- vla
- robot_policy
- memory_policy
- embodied_benchmark
source_repos:
- url: https://github.com/RoboMME/robomme_policy_learning
  revision: ecf086c3be7c
checkpoints:
- repo_id: Yinpei/perceptual-framesamp-modul
  local_dir: ${WORLDFOUNDRY_HFD_ROOT}/Yinpei--perceptual-framesamp-modul
  role: best_framesamp_modul_checkpoint
  checkpoint_subdir: "79999"
- repo_id: Yinpei/mme_vla_suite
  local_dir: ${WORLDFOUNDRY_HFD_ROOT}/Yinpei--mme_vla_suite
  role: mme_vla_suite_checkpoint_collection
- repo_id: Yinpei/pi05_baseline
  local_dir: ${WORLDFOUNDRY_HFD_ROOT}/Yinpei--pi05_baseline
  role: pi05_baseline_checkpoint
- repo_id: Yinpei/vlm_subgoal_predictor
  local_dir: ${WORLDFOUNDRY_HFD_ROOT}/Yinpei--vlm_subgoal_predictor
  role: vlm_subgoal_predictor_checkpoint
input_schema:
  model_id: mme-vla
  image: true
  prompt: true
  state: true
  image_keys:
  - observation/image
  - observation/wrist_image
  state_key: observation/state
  memory_keys:
  - static_image_emb
  - static_pos_emb
  - static_state_emb
  - static_mask
  - recur_image_emb
  - recur_pos_emb
  - recur_state_emb
  - recur_mask
  - simple_subgoal
  - grounded_subgoal
  policy_family: mme_vla_memory_augmented_openpi_policy
  action_representation: 8d_robomme_joint_action_chunk
artifact_kind: action_trace
artifact_filename: mme-vla_action_trace.json
execution:
  backend_stage: in_tree_in_process_checkpoint_runtime
  runtime_status: in_tree_import_verified
  integration_status: in_tree_import_verified
  pipeline_binding: mme-vla
integration:
  status: in_tree_import_verified
notes:
- Official QuickStart serves scripts/serve_policy.py with policy.dir=<checkpoint>/79999 and policy.config=mme_vla_suite.
- WorldFoundry runtime calls its inference-only create_policy(...).infer path in-process and does not start a websocket server.
- Minimal runtime excludes RoboMME simulator, dataset builders, VLM subgoal training, websocket serving, and evaluation loops.
