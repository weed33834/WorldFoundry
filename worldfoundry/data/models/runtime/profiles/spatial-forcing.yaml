notes:
- The released policies use OpenVLA-OFT inference; VGGT and the alignment projector are training-only and are not loaded.
- Checkpoint snapshots must be staged before inference; the runtime performs no Hub or source-repository downloads.
- Upstream requires a deterministic 90%-area center crop and emits an 8x7 future action chunk from full/wrist images plus 8-D state.
- All four released snapshots passed strict restoration and real two-camera Workspace inference on A100 GPUs, each emitting a finite 8x7 action chunk.
- The Pi0 real-robot branch publishes no official Spatial-Forcing checkpoint/model ID and therefore is not represented as a runnable checkpoint variant.
