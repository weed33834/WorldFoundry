schema_version: 2
model_id: eventvla
display_name: EventVLA
task_family: vla_policy
groups:
- vla
- long_horizon_robot_policy
- event_memory
checkpoints:
- repo_id: ganlinyang/EventVLA
  local_dir: ${WORLDFOUNDRY_HFD_ROOT}/ganlinyang--EventVLA/RoboTwin-MeM
  role: robotwin_mem_policy_checkpoint
- repo_id: ganlinyang/EventVLA
  local_dir: ${WORLDFOUNDRY_HFD_ROOT}/ganlinyang--EventVLA/RMBench
  role: rmbench_policy_checkpoint
- repo_id: Qwen/Qwen3-VL-4B-Instruct
  local_dir: ${WORLDFOUNDRY_HFD_ROOT}/Qwen--Qwen3-VL-4B-Instruct
  role: base_vlm
input_schema:
  model_id: eventvla
  image: true
  prompt: true
  state: optional_for_absolute_action_checkpoints
  temporal_anchors:
  - first
  - t-30
  - t-15
  - current
  action_dim: 14
  action_horizon: 50
artifact_kind: action_trace
artifact_filename: eventvla_action_trace.json
execution:
  backend_stage: in_tree_checkpoint_runtime
  runtime_status: native_checkpoint_runtime_a100_workspace_validated
  integration_status: in_tree_checkpoint_runtime_numerically_validated
  pipeline_binding: eventvla
integration:
  status: in_tree_checkpoint_runtime_numerically_validated
gpu_targets:
- NVIDIA Turing in float16
- NVIDIA Ampere in bfloat16
- NVIDIA Ada in bfloat16
- NVIDIA Hopper in bfloat16
- NVIDIA Blackwell in bfloat16
notes:
- The runtime uses architecture-aware Transformers attention selection and retains at most four raw keyframe images.
- Explicit temporal_images and memory_keyframe_images inputs override the built-in history and memory banks.
- The released RoboTwin-MeM checkpoint completed real A100 Workspace inference with a finite 50x14 open-loop action chunk; this is numerical checkpoint validation, not a closed-loop simulator success claim.
