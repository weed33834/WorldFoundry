schema_version: 2
model_id: lingbot-world-v2
display_name: LingBot-World-V2
task_family: world_model
groups:
- world
- camera_control
- video
aliases:
- lingbot-world-infinity
- lingbot-v2
source_repos:
- url: https://github.com/Robbyant/lingbot-world-v2
  revision: 94f43115de8d4a4f9f282126528c300a0b232c5f
checkpoints:
- repo_id: robbyant/lingbot-world-v2-14b-causal-fast
  revision: 5c33dd40b213598c418fd25bff30fdbd23fd38a7
  local_dir: ${WORLDFOUNDRY_CKPT_DIR}/lingbot-world-v2-14b-causal-fast
  role: causal_fast_14b_checkpoint
  status: checkpoint_manifest_validated
  required_paths:
  - config.json
  - transformers/diffusion_pytorch_model.safetensors.index.json
  - Wan2.1_VAE.pth
  - models_t5_umt5-xxl-enc-bf16.pth
  - google/umt5-xxl/tokenizer_config.json
input_schema:
  prompt: true
  image: true
  video: false
  actions:
  - camera_path
  - navigation_action
artifact_kind: generated_world
artifact_filename: lingbot-world-v2.mp4
execution:
  backend_stage: in_tree_runtime
  runtime_status: causal_fast_checkpoint_manifest_validated_runtime_pending
  integration_status: implemented_checkpoint_manifest_validated
  pipeline_binding: lingbot-world-v2
  defaults:
    size: 480*832
    frame_num: 361
    chunk_size: 4
    local_attn_size: 18
    sink_size: 6
    nproc_per_node: 8
    t5_fsdp: true
    dit_fsdp: true
integration:
  status: implemented_checkpoint_manifest_validated
notes:
- Runtime execution is offline-first and does not download checkpoints during prediction.
- Eight GPUs are the official causal-fast recipe; Workspace also exposes a four-GPU compact topology with WORLD_SIZE-aligned Ulysses and FSDP.
- When Workspace already owns the torchrun process group, inference runs directly in that group and never launches nested torchrun workers.
