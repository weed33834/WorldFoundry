notes:
- Official demo input is experiments/robot/libero/sample_libero_spatial_observation.pkl with full_image, wrist_image, state, and task_description.
- Verified on A100-SXM4-80GB with the local LIBERO-spatial checkpoint: 7.54B parameters, finite deterministic 8x7 output, SDPA backend, and 14.47 GiB peak allocated VRAM.
- All five declared LIBERO checkpoints (spatial, object, goal, 10, and combined) completed real Workspace inference on A100 GPUs with finite 8x7 action chunks.
- The in-tree fast path computes only the final Llama hidden state and action-position logits; a reference equivalence check measured zero maximum absolute error against the original full-logit/full-hidden-state path.
- Minimal runtime excludes training, RLDS/TensorFlow data processing, LIBERO simulation loops, and benchmark scripts.
