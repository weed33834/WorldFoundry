notes:
- AlayaWorld is implemented as a thin extension of the canonical in-tree LTX-2.3 model; it does not duplicate or import an external LTX repository.
- Only Alaya-specific action AdaLN, history encoding, spatial-memory orchestration, and autoregressive rollout code are added.
- Attention dispatch is capability based; multi-GPU Ulysses context parallelism uses WorldFoundry core collectives.
- The released merged checkpoint was byte-size and SHA-256 validated before inference.
- The unified in-tree pipeline generated and decoded the official case1 first chunk on an NVIDIA A100: 32 frames at 544x960, 24 fps, with DA3 spatial memory and all four DMD steps enabled.
- Multi-rank Ulysses tensor parity is validated, but an NCCL multi-GPU artifact run remains pending access to more than one visible GPU.
