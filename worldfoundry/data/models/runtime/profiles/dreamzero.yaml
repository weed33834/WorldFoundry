notes:
- 'DreamZero is routed as an embodied world-action model: WorldFoundry emits action_trace
  artifacts and preserves the server-side predicted-video contract in metadata.'
- 'The independent operator mirrors the official DROID/RoboArena observation mapping:
  two external cameras, wrist camera, joint position, gripper position, prompt, and
  session_id.'
- The integrated DreamZeroSynthesis can run the official default WebSocket client
  against an already running DreamZero server via dreamzero_server_host/server_host
  and dreamzero_server_port/server_port; it does not use the shared OfficialRuntime
  pipeline.
- WorldFoundry vendors the official DreamZero server/model code under worldfoundry/synthesis/action_generation/dreamzero/dreamzero_runtime.
  The wrapper now builds an in-tree torch.distributed server command and plan-only
  predict passes; live inference requires launching that in-tree server with compatible
  CUDA and checkpoints.
