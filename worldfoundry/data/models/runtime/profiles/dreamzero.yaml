notes:
- 'DreamZero is routed as an embodied world-action model: WorldFoundry emits action_trace
  artifacts and preserves the server-side predicted-video contract in metadata.'
- 'The in-tree policy server preserves the official DROID/RoboArena observation mapping:
  two external cameras, wrist camera, joint position, gripper position, prompt, and
  session_id.'
- The integrated DreamZeroSynthesis can run the official default WebSocket client
  against an already running DreamZero server via dreamzero_server_host/server_host
  and dreamzero_server_port/server_port; it does not use the shared OfficialRuntime
  pipeline.
- WorldFoundry keeps the inference-only DreamZero server/model implementation directly in worldfoundry/synthesis/action_generation/dreamzero. The wrapper builds an in-tree torch.distributed server command and the live client invokes its WebSocket inference protocol.
- The BasePolicy contract, NumPy msgpack codec, and distributed observation serialization are local and pickle-free; no openpi-client, editable checkout, PYTHONPATH injection, or runtime asset download is used.
- Checkpoint-backed GPU execution requires a staged DROID/AgiBot checkpoint and a compatible CUDA 12.9 topology; this hardware boundary is separate from the verified import/protocol/runtime contracts.
