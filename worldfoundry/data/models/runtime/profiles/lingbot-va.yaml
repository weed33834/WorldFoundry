notes:
- LingBot-VA is an autoregressive video-action world model for robot control. The
  profile emits action_trace artifacts and can carry predicted-video metadata, but
  it is not routed through generic video-generation scorecards.
- The retained inference path includes the model graph, distributed server, client,
  preprocessing, action diffusion, KV-cache updates, and action decoding.
- The staged checkpoint transformer/config.json files are set to attn_mode=torch,
  and the repo-integrated server command passes --checkpoint-dir for the selected
  local checkpoint.
- WorldFoundry keeps the inference-only Wan-VA architecture, server, client, and utilities under
  worldfoundry/synthesis/action_generation/wan_va; construction is strictly local-checkpoint gated.
- All three declared checkpoints are staged and manifest-validated; numerical end-to-end rollout validation remains pending.
