integration_status: plan_ready
notes:
- LingBot-VA is an autoregressive video-action world model for robot control. The
  profile emits action_trace artifacts and can carry predicted-video metadata, but
  it is not routed through generic video-generation scorecards.
- The upstream server/client evaluation entry points are wan_va/wan_va_server.py plus
  evaluation/libero and evaluation/robotwin, but runtime plans must use repo-integrated
  code rather than an external checkout path.
- The staged checkpoint transformer/config.json files are set to attn_mode=torch,
  and the repo-integrated server command passes --checkpoint-dir for the selected
  local checkpoint.
- WorldFoundry vendors the official wan_va architecture, server, client, and utils under
  worldfoundry/synthesis/action_generation/wan_va. py_compile, conda import/from_pretrained,
  pipeline plan, plan-only predict, and libero-long server initialization passed;
  full client rollout/action decoding remains unready.
runtime_status: in_tree_source_vendored_server_init_ready_client_rollout_unready
task_family: embodied_action
