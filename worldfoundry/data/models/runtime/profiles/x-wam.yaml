  revision: 72cfb86b33fc5060963ef63412f16439fcfa472f
checkpoints:
- repo_id: sharinka0715/X-WAM-checkpoints
  revision: bb6fd1643cfa8bdc751612a7ace0bd8062a8917a
  local_dir: ${WORLDFOUNDRY_HFD_ROOT}/sharinka0715--X-WAM-checkpoints
  role: x_wam_complete_model_states
  license: apache-2.0
