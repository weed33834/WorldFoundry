input_schema:
  model_id: x-wam
  prompt: true
  image: true
  state: true
  camera_count: 3
  policy_family: wan2p2_joint_4d_world_action_model
  observation_layout: three_view_rgb_language_absolute_end_effector_state
  variants:
    robocasa_sft:
      camera_keys:
      - robot0_agentview_left
      - robot0_agentview_right
      - robot0_eye_in_hand
      state_dimension: 8
      action_shape:
      - 32
      - 7
    robotwin_sft:
      camera_keys:
      - head_camera
      - left_camera
      - right_camera
      state_dimension: 16
      action_shape:
      - 32
      - 14
artifact_kind: action_trace
artifact_filename: x-wam_action_trace.json
optional_artifacts:
- predicted_video
execution:
  backend_stage: in_tree_checkpoint_runtime
  runtime_status: selected_checkpoint_gpu_validated
  integration_status: selected_checkpoint_gpu_validated
  pipeline_binding: x-wam
integration:
  status: in_tree_runtime_selected_checkpoint_gpu_validated
notes:
- The default runtime matches the official policy server with 10 action denoising steps, early stopping, no depth branch, and no ZeroMQ service.
- Setting generate_world with a world_video_path continues to 50 steps and writes the decoded future-view mosaic; run_depth adds the depth branch.
- The selected 38.9 GB policy subtree and small Wan base config/tokenizer files must be staged before runtime; inference performs no network download.
- The X-WAM model state is strict and complete, so redundant Wan DiT, T5, and VAE base weights are not downloaded separately.
- RoboCasa-SFT passed strict 38.9 GB restoration, finite 10-step action/proprioception inference, and the full 50-step A100 world branch; its 960x256 three-view mosaic decoded all nine H.264 frames. RoboTwin-SFT remains unvalidated.
