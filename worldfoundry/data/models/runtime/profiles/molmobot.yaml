schema_version: 2
model_id: molmobot
display_name: MolmoBot
task_family: vla_policy
groups:
- vla
- robot_policy
- action_chunk
source_repos:
- url: https://github.com/allenai/MolmoBot
  revision: 33c0ca77bf60
checkpoints:
- repo_id: allenai/MolmoBot-DROID
  local_dir: ${WORLDFOUNDRY_HFD_ROOT}/allenai--MolmoBot-DROID
  role: franka_droid_checkpoint
- repo_id: allenai/MolmoBot-Img-DROID
  local_dir: ${WORLDFOUNDRY_HFD_ROOT}/allenai--MolmoBot-Img-DROID
  role: image_droid_checkpoint
- repo_id: allenai/MolmoBot-RBY1Multitask
  local_dir: ${WORLDFOUNDRY_HFD_ROOT}/allenai--MolmoBot-RBY1Multitask
  role: rby1_multitask_checkpoint
- repo_id: allenai/MolmoBot-Pi0-DROID
  local_dir: ${WORLDFOUNDRY_HFD_ROOT}/allenai--MolmoBot-Pi0-DROID
  role: pi0_droid_checkpoint
input_schema:
  model_id: molmobot
  image: true
  prompt: true
  state: true
  camera_keys:
  - exo_camera_1
  - wrist_camera
  state_keys:
  - qpos.arm
  - qpos.gripper
  policy_family: molmobot_action_chunk_policy
  action_representation: robot_specific_action_chunk
artifact_kind: action_trace
artifact_filename: molmobot_action_trace.json
execution:
  backend_stage: in_tree_inference_only_checkpoint_runtime
  runtime_status: in_tree_import_verification_in_progress
  integration_status: in_tree_import_verification_in_progress
  pipeline_binding: molmobot
integration:
  status: in_tree_import_verification_in_progress
notes:
- Official MolmoBot-DROID serves with launch_scripts/serve_molmo.py; MolmoBot-Pi0 demo uses PiJointPosPolicy.get_action.
- WorldFoundry directly imports its flattened inference-only SynthManipMolmoInferenceWrapper; no external MolmoBot checkout is used at runtime. Pi0 remains dependency-gated.
- Minimal runtime excludes MolmoSpaces, real robot clients, training, W&B/SPoC paths, and benchmark assets.
