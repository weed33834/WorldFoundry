notes:
- The foundation checkpoint is retained as a fine-tuning asset; it does not contain a complete task state-normalization contract and is not used for rollout inference.
- The LIBERO task checkpoint contains matching 8-D state and 7-D action statistics and is the executable Workspace default.
- The checkpoint's `HuggingFaceTB/SmolVLM2-500M-Instruct` identifier resolves to the published `SmolVLM2-500M-Video-Instruct` repository at the same pinned revision and model SHA-256; the profile records the actual local directory.
- The LIBERO files were staged by hfd; CPU BF16 strict restoration loaded all 788 tensors with no missing, unexpected, mismatched, or meta tensors.
- A real GPU 4 Workspace run with flat dotted 8-D state and both official camera keys completed 10 denoising steps and returned a finite 1x50x7 action chunk. This validates the selected LIBERO checkpoint only; the foundation checkpoint and other observation domains remain unvalidated numerically.
- Runtime dtype and attention selection remain capability-driven for Ampere, Ada, Hopper, Blackwell, and newer NVIDIA GPUs.
