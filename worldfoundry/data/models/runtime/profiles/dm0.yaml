schema_version: 2
model_id: dm0
display_name: DM0
task_family: vla_policy
groups:
- vla
- robot_policy
- flow_matching
checkpoints:
- repo_id: Dexmal/DM0-libero
  local_dir: ${WORLDFOUNDRY_HFD_ROOT}/Dexmal--DM0-libero
  role: libero_policy_checkpoint
- repo_id: Dexmal/DM0-base
  local_dir: ${WORLDFOUNDRY_HFD_ROOT}/Dexmal--DM0-base
  role: base_initialization_checkpoint
input_schema:
  model_id: dm0
  image: true
  prompt: true
  state: required
  max_image_slots: 3
  action_representation: normalized_delta_chunk_with_configurable_absolute_dimensions
artifact_kind: action_trace
artifact_filename: dm0_action_trace.json
execution:
  backend_stage: in_tree_checkpoint_runtime
  runtime_status: checkpoint_ready
  integration_status: integrated
  pipeline_binding: dm0
integration:
  status: in_tree_checkpoint_runtime
gpu_targets:
- NVIDIA Turing in float32 or float16
- NVIDIA Ampere in bfloat16
- NVIDIA Ada in bfloat16
- NVIDIA Hopper in bfloat16
- NVIDIA Blackwell in bfloat16
notes:
- Native SDPA dispatch is shared through worldfoundry.core.attention, including grouped-query fallback and architecture-aware CUDA backend selection.
- The default runtime consumes three views, a state vector of at most 32 values, and returns a 50-step action chunk.
