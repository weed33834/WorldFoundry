notes:
- WorldFoundry vendors the official LongVie DiffSynth runtime under worldfoundry/synthesis/visual_generation/longvie/longvie_runtime.
- Each queued segment requires a non-empty prompt plus user-provided dense depth and
  sparse pointmap/track control videos. The first segment also requires an image.
- The LongVie 2 adapter loads both control.safetensors and dit.safetensors and preserves
  the official previous-final-frame, eight-frame-history, and noise continuation loop.
- Quality defaults are 81 frames at 16 FPS with 50 steps. The Studio profile uses
  four-rank USP and only rank zero materializes the output artifact.
