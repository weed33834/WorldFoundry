schema_version: 2
model_id: self-forcing
display_name: Self-Forcing
task_family: video_generation
groups:
- video
- autoregressive_video
source_repos:
- url: https://github.com/guandeh17/Self-Forcing
checkpoints:
- role: self_forcing_dmd
  local_dir: ${WORLDFOUNDRY_CKPT_DIR}/Self-Forcing/checkpoints/self_forcing_dmd.pt
- role: wan2_1_t2v_1_3b
  local_dir: ${WORLDFOUNDRY_CKPT_DIR}/Wan2.1-T2V-1.3B
- role: wan2_1_t2v_14b
  local_dir: ${WORLDFOUNDRY_CKPT_DIR}/Wan2.1-T2V-14B
input_schema:
  prompt: true
  image: true
  video: false
  actions:
  - seed
artifact_kind: generated_video
artifact_filename: self-forcing.mp4
execution:
  backend_stage: official_in_tree_runtime
  runtime_status: official_demo_parity_pending
  integration_status: integrated
  pipeline_binding: self-forcing
integration:
  status: integrated
notes:
- WorldFoundry vendors the infer-only Self-Forcing runtime under worldfoundry/synthesis/visual_generation/forcing/self_forcing_runtime.
- Benchmark prompt lists live under worldfoundry/data/test_cases/forcing/prompts/ (override with WORLDFOUNDRY_FORCING_PROMPTS_ROOT).
- Override checkpoint_path when the official self_forcing_dmd.pt checkpoint is staged
  outside the default path.
