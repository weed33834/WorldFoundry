gpu_targets:
- NVIDIA Turing (T4/RTX 20) in float16 with shared SDPA
- NVIDIA Ampere (A10/A30/A40/A100/A800/RTX 30) in auto BF16/FP16
- NVIDIA Ada (L4/L40/L40S/RTX 40)
- NVIDIA Hopper (H100/H200/H800)
- NVIDIA Blackwell (B100/B200/GB200/RTX 50) through shared SDPA/cuDNN selection
multi_gpu:
  strategy: component_pipeline
  options: [vlm_device, action_device]
  description: Place Qwen3-VL and the DINOv3/MMDiT action component on separate GPUs.
notes:
- The source repository declares CC BY-NC 4.0 while the hosted artifact card declares Apache-2.0; this integration conservatively uses the source license.
- The released state dict is approximately 14.4 GB and is not bundled.
- The paired dataset_statistics.json is mandatory; the runtime validates its 29-dimensional raw action contract before unnormalization.
- The full 138-dimensional model output is sliced only according to the released 29-dimensional GR1 layout.
- A real A100 Workspace rollout passed strict checkpoint restore and produced a finite 16x29 action artifact.
