license: mit
gpu_targets:
- NVIDIA Turing (T4/RTX 20) in float16 with offloaded text encoding
- NVIDIA Ampere (A10/A30/A40/A100/A800/RTX 30)
- NVIDIA Ada (L4/L40/L40S/RTX 40)
- NVIDIA Hopper (H100/H200/H800)
- NVIDIA Blackwell (B100/B200/GB200/RTX 50)
notes:
- The released MoT policy is approximately 12 GB before the Wan VAE and UMT5 encoder are loaded.
- UMT5 defaults to CPU and instruction embeddings are cached; callers can supply precomputed 4096-dimensional tokens.
- Video expert key/value tensors are prefetched once and reused across all action denoising steps.
- Both released LIBERO and RoboTwin checkpoints and their matching statistics are staged locally and manifest-size verified.
- Both released variants passed real Workspace inference on A100 with ten denoising steps: RoboTwin emitted finite 32x14 actions and LIBERO emitted finite 32x7 actions.
