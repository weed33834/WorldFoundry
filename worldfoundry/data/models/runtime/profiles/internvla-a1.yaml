license: cc-by-nc-sa-4.0
gpu_targets:
- NVIDIA Turing (T4/RTX 20) in float16
- NVIDIA Ampere (A10/A30/A40/A100/A800/RTX 30)
- NVIDIA Ada (L4/L40/L40S/RTX 40)
- NVIDIA Hopper (H100/H200/H800)
- NVIDIA Blackwell (B100/B200/GB200/RTX 50)
notes:
- Runtime uses three cameras and a past/current image pair for each camera.
- Qwen prefix and Cosmos history features are computed once before the ten action-flow steps.
- All checkpoints, Qwen processor assets, Cosmos encoder/decoder, and statistics must be staged locally.
- A real A100 Workspace rollout with the three-camera ALOHA contract produced a finite 30x14 action artifact.
