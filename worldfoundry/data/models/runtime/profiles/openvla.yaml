notes:
- VLA policy profile. It is intentionally not part of video generation; plan-only
  output is an action_trace artifact.
- Official assets are staged by scripts/setup/download_embodied_action_official_assets.py
  under ${WORLDFOUNDRY_HFD_ROOT}.
- The official demo wrapper aligns attention_mask with OpenVLA's upstream token-append
  behavior and uses fp16 execution on this host because torch 1.12 cu113 does not
  support the needed bf16 CUDA ops.
- WorldFoundry vendors configuration_prismatic.py, modeling_prismatic.py, and processing_prismatic.py
  from the openvla/openvla-7b HuggingFace snapshot under worldfoundry/synthesis/action_generation/openvla/openvla_runtime
  so runtime imports do not depend on external repo code or HF remote-code cache.
