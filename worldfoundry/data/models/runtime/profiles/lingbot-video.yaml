gpu_targets:
- Dense 1.3B on NVIDIA Ampere, Ada, Hopper, and Blackwell GPUs with BF16 support
- MoE 30B-A3B on 80GB-class A100/A800/H100/H800 or larger H200/B100/B200/GB200 devices
- MoE 30B-A3B multi-GPU through the explicit FSDP/context-parallel route when one device cannot hold the checkpoint
notes:
- The runtime owns only inference code. Rewriter and training surfaces are outside this integration.
- T2I produces an image despite the default runtime profile artifact being the T2V video route.
- The upstream recommended stack requires a dedicated Transformers 5 / Diffusers 0.39 environment.
- The released Dense 1.3B checkpoint has a 121-frame, 832x480 quality-oriented Workspace artifact.
- The released MoE 30B-A3B main transformer, 8.88GB text encoder, and FP32 VAE completed a real
  single-A100 Workspace run with the optional refiner disabled. The one-step smoke produced five
  fully decodable 192x320 frames (artifact SHA256 4458abda4089e0019587ab388f6ce10f47964af3033f32e060729ddb961ad7f7),
  proving the large-checkpoint execution path only; its visibly blurred output is not a quality demo.
- A second MoE Workspace run used 20 denoising steps for nine 256x416 frames. Its first, middle, and
  last frames show a coherent industrial workbench, black robot mechanism, and red block without the
  one-step blur; artifact SHA256 is b3211b8ece8a73519bb7c3589cbeebf8c59b4cc473c86cc0e630f833dad2c6f3.
  This is a quality-oriented short smoke, not parity with the official 480x832, 121-frame, 40-step recipe.
- The MoE single-device path is physically validated only on A100 80GB; Hopper, Blackwell, and multi-GPU entries are supported targets pending hardware-specific validation.
