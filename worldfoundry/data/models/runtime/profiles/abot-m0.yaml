integration:
  status: in_tree_checkpoint_runtime_static_verified
license: apache-2.0
gpu_targets:
- NVIDIA Turing (T4/RTX 20) in float16
- NVIDIA Ampere (A10/A30/A40/A100/A800/RTX 30)
- NVIDIA Ada (L4/L40/L40S/RTX 40)
- NVIDIA Hopper (H100/H200/H800)
- NVIDIA Blackwell (B100/B200/GB200/RTX 50)
notes:
- Auto dtype uses float16 on Turing and bfloat16 on Ampere, Ada, Hopper, and Blackwell.
- Qwen can be balanced across a selected local GPU set while the short action expert stays on the primary device.
- Transformer attention routes through the shared hardware-aware backend selector; the action DiT can opt into the shared compile cache.
- All three released task checkpoints, Qwen assets, config.yaml, and
  dataset_statistics.json are staged locally and manifest-size verified; numerical
  checkpoint parity remains pending.
