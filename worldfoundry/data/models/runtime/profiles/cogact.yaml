schema_version: 2
model_id: cogact
display_name: CogACT
task_family: vla_policy
groups:
- vla
- robot_policy
- action_chunk
source_repos:
- url: https://github.com/microsoft/CogACT
  revision: b174a1b86dee
checkpoints:
- repo_id: meta-llama/Llama-2-7b-hf
  local_dir: ${WORLDFOUNDRY_HFD_ROOT}/meta-llama--Llama-2-7b-hf
  role: llama2_7b_backbone
  gated: true
- repo_id: CogACT/CogACT-Base
  local_dir: ${WORLDFOUNDRY_HFD_ROOT}/CogACT--CogACT-Base
  role: base_checkpoint
- repo_id: CogACT/CogACT-Small
  local_dir: ${WORLDFOUNDRY_HFD_ROOT}/CogACT--CogACT-Small
  role: small_checkpoint
- repo_id: CogACT/CogACT-Large
  local_dir: ${WORLDFOUNDRY_HFD_ROOT}/CogACT--CogACT-Large
  role: large_checkpoint
input_schema:
  model_id: cogact
  image: true
  prompt: true
  state: false
  policy_setup:
  - widowx_bridge
  - google_robot
  policy_family: cogact_dit_action_chunk_policy
  action_representation: 16x7_continuous_action_chunk
artifact_kind: action_trace
artifact_filename: cogact_action_trace.json
execution:
  backend_stage: in_tree_vendored_in_process_checkpoint_runtime
  runtime_status: in_tree_vendored_import_verified
  integration_status: in_tree_vendored_import_verified
  pipeline_binding: cogact
integration:
  status: in_tree_vendored_import_verified
notes:
- Official minimal inference loads vla.load_vla and calls predict_action with cfg_scale, use_ddim, and num_ddim_steps.
- CogACT reconstructs the Prismatic base VLM with `meta-llama/Llama-2-7b-hf`; users must accept the Llama 2 license on Hugging Face and provide `HF_TOKEN` or `HUGGING_FACE_HUB_TOKEN`.
- Local CogACT checkpoints are not sufficient by themselves unless the Llama 2 config/tokenizer is available through Hugging Face access or `${WORLDFOUNDRY_HFD_ROOT}/meta-llama--Llama-2-7b-hf`.
- WorldFoundry runtime imports the vendored CogACT infer subset in-process; it does not launch the deployment server or require an external checkout by default.
- Minimal runtime excludes FSDP training, TensorFlow/RLDS data loaders, real-world deployment server, and SimplerEnv benchmark adapters.
