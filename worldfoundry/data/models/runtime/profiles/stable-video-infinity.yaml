schema_version: 2
model_id: stable-video-infinity
display_name: Stable Video Infinity 2.0
task_family: video_generation
groups:
- video
- autoregressive_video
- long_video
source_repos:
- url: https://github.com/vita-epfl/Stable-Video-Infinity
  revision: 63af54329f38b10ed1a91dc88bc67a765d0c4a18
- url: https://huggingface.co/epfl-vita/svi-model
- url: https://huggingface.co/Wan-AI/Wan2.1-I2V-14B-480P
checkpoints:
- role: svi_2_lora
  repo_id: epfl-vita/svi-model
  revision: f9bdd50c57e4c28f0d088b6bad8afa3fdc3bc1ac
  local_dir: ${WORLDFOUNDRY_HFD_ROOT}/vita-video-gen--svi-model/version-2.0/SVI_Wan2.1-I2V-14B_lora_v2.0.safetensors
- role: wan2_1_i2v_14b_480p
  repo_id: Wan-AI/Wan2.1-I2V-14B-480P
  revision: 6b73f84e66371cdfe870c72acd6826e1d61cf279
  local_dir: ${WORLDFOUNDRY_CKPT_DIR}/Wan2.1-I2V-14B-480P
input_schema:
  prompt: true
  prompt_stream: true
  image: true
  video: false
  actions:
  - seed
  - num_clips
  - num_motion_frames
artifact_kind: generated_video
artifact_filename: stable-video-infinity.mp4
execution:
  backend_stage: official_in_tree_runtime
  runtime_status: official_workspace_smoke_verified_a100
  integration_status: checkpoint_gpu_validated
  pipeline_binding: stable-video-infinity
  environment: stable-video-infinity
  defaults:
    num_frames: 81
    num_clips: 999
    num_motion_frames: 5
    num_inference_steps: 50
    cfg_scale_text: 5.0
    fps: 24
integration:
  status: checkpoint_gpu_validated
license: mit
gpu_targets:
- NVIDIA Ampere A100/A800 80GB (A100 physically validated)
- NVIDIA Hopper H100/H200/H800
- NVIDIA Blackwell B100/B200/GB200 and RTX 50 series
- NVIDIA Ada L40/L40S/RTX 40 with CPU offload, a lower persistent-DiT budget, and reduced generation settings
notes:
- The runtime uses SVI 2.0's official five-motion-frame continuation and full reference padding defaults.
- The official 999-clip cap is bounded to two clips per prompt unless use_first_prompt_only is explicitly enabled.
- Each clip receives a distinct seed by default; prompt streams repeat each prompt twice before advancing.
- The source tree contains inference code only. Wan and SVI weights are resolved from local checkpoint staging.
- A real Workspace run on an A100 loaded all seven Wan2.1-I2V-14B DiT shards, the image encoder, T5,
  VAE, and the SVI 2.0 LoRA, then generated five 256x256 frames with one denoising step.
- The generated H.264 artifact fully decoded to a finite uint8 5x256x256x3 array; its SHA256 is
  79f8e73d6d3e402ced49b452eb810cd0413a5bba1ce3e284feb99053e82dc465. Full 50-step, multi-clip
  quality parity remains pending.
- Hopper, Blackwell, and lower-memory offload configurations are explicit runtime targets, not hardware-validated claims.
