artifact_filename: lyra-2.mp4
execution:
  backend_stage: in_tree_runtime
  runtime_status: official_zoomgs_contract
  integration_status: verified
  pipeline_binding: lyra-2
integration:
  status: verified
notes:
- Runtime profile for the in-tree Lyra-2 pipeline.
- Runtime execution requires local Lyra-2, text-encoder, DA3, transformer-engine,
  and CUDA runtime dependencies.
