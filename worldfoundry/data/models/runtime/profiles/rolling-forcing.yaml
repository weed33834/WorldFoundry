license: rollingforcing-academic-only
usage_restrictions:
- academic-only
- no-commercial-use
- no-production-use
gpu_targets:
- NVIDIA Ampere (A10/A30/A40/A100/A800/RTX 30)
- NVIDIA Ada (L4/L40/L40S/RTX 40)
- NVIDIA Hopper (H100/H200/H800)
- NVIDIA Blackwell (B100/B200/GB200/RTX 50)
notes:
- The inference package is flat and source-complete in-tree; the upstream repository is not a runtime dependency.
- The core attention dispatcher chooses supported SDPA/FlashAttention paths at runtime and does not hard-code A100.
- BF16 and memory capacity remain hardware requirements; lower-memory GPUs may require future offload support.
- The official 126 latent frames decode to a long video at 16 FPS. Smaller multiples of three are valid smoke runs.
- >-
  An end-to-end Workspace run on an A100 verified the official 126-latent-frame route: 501 decoded
  frames at 832x480 and 16 FPS, with the exact released checkpoint SHA256. H100/H200 and Blackwell
  remain runtime dispatch targets but require separate hardware validation.
