notes:
- The default official checkpoint consumes one 384-pixel image view and returns 16 by 48 pretraining actions.
- Raw-image inference uses local DINOv2 and SigLIP weights contained in the official snapshot.
- Precomputed language embeddings avoid loading T5-v1.1-XXL and are recommended on lower-memory GPUs.
- Robot fine-tunes may define a different state/action dimension and camera count through their checkpoint config.
- The released pretraining checkpoint completed real A100 Workspace inference with finite 16x48 model-space actions using raw RGB and locally encoded text.
