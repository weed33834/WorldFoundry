schema_version: 2
model_id: vlanext
display_name: VLANeXt
task_family: vla_policy
groups:
- vla
- robot_policy
- action_chunk
source_repos:
- url: https://github.com/DravenALG/VLANeXt
  revision: f4162397af20
checkpoints:
- repo_id: DravenALG/VLANeXt
  local_dir: ${WORLDFOUNDRY_HFD_ROOT}/DravenALG--VLANeXt
  role: libero_checkpoint_collection
input_schema:
  model_id: vlanext
  image: true
  video: true
  prompt: true
  state: true
  camera_keys:
  - full_image
  - full_image_wrist
  history_keys:
  - image_history
  - image_history_wrist
  - state_history
  - action_history
  policy_family: vlanext_libero_action_chunk_policy
  action_representation: normalized_libero_action_chunk
artifact_kind: action_trace
artifact_filename: vlanext_action_trace.json
execution:
  backend_stage: in_tree_vendored_in_process_checkpoint_runtime
  runtime_status: in_tree_vendored_import_verified
  integration_status: in_tree_vendored_import_verified
  pipeline_binding: vlanext
integration:
  status: in_tree_vendored_import_verified
notes:
- Official eval loads torch checkpoint files with config and model_state_dict, then calls get_vla_action.
- WorldFoundry runtime calls get_vla/get_processor/get_vla_action in-process from the vendored infer subset.
- Minimal runtime excludes LIBERO/LIBERO-plus simulator environments, DROID/RLDS training datasets, and benchmark loops.
