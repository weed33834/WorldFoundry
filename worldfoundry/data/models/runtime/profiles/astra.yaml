schema_version: 2
model_id: astra
display_name: Astra
task_family: world_model
groups: [video, image_to_video, camera_control]
source_repos:
- url: https://github.com/EternalEvan/Astra
checkpoints:
- repo_id: EvanEternal/Astra
  revision: aef5d6d75a994fa67f3f05cf17f5824a53b1c52f
  local_dir: ${WORLDFOUNDRY_CKPT_DIR}/Astra
  role: camera_control_checkpoint
