  required_paths:
  - models/Astra/checkpoints/diffusion_pytorch_model.ckpt
- repo_id: Wan-AI/Wan2.1-T2V-1.3B
  revision: 37ec512624d61f7aa208f7ea8140a131f93afc9a
  local_dir: ${WORLDFOUNDRY_CKPT_DIR}/Wan2.1-T2V-1.3B
  role: base_video_checkpoint
  status: checkpoint_manifest_validated
  required_paths:
  - config.json
  - diffusion_pytorch_model.safetensors.index.json
  - Wan2.1_VAE.pth
  - models_t5_umt5-xxl-enc-bf16.pth
  - google/umt5-xxl/tokenizer_config.json
input_schema:
  prompt: true
  image: true
  video: false
  actions: [camera_direction]
