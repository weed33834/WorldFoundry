- Default variant is LIBERO; select other official checkpoints with variant/variant_id.
- The base pretrain variant requires explicit robot_type, camera_keys, and view_labels because it has no universal embodiment/view contract.
- Model and processor classes are loaded from the in-tree package, never with trust_remote_code.
- SimplerEnv variants apply their released resize and 0.95 center-crop transform before checkpoint preprocessing.
- All six pinned snapshots pass exact-size, sharded-index, and safetensors-header validation with no partial markers.
- All six released checkpoints passed strict restoration and real A100 Workspace inference with finite variant-specific action chunks; the pretrain checkpoint was validated with the explicit DROID contract.
- Checkpoint weights are not bundled; runtime resolves only explicitly staged local snapshots and never downloads implicitly.
