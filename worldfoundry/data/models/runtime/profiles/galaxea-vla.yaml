gpu_targets:
- NVIDIA Turing (T4/RTX 20) in float16 through shared SDPA
- NVIDIA Ampere (A10/A30/A40/A100/A800/RTX 30) in bfloat16
- NVIDIA Ada (L4/L40/L40S/RTX 40) in bfloat16
- NVIDIA Hopper (H100/H200/H800) in bfloat16
- NVIDIA Blackwell (B100/B200/GB200/RTX 50) through architecture-native shared SDPA
notes:
- The exact paired dataset_stats.json is mandatory; normalization never falls back to fabricated values.
- The released G0Plus base checkpoint is intended for downstream fine-tuning, not claimed as a task-ready policy.
- SigLIP attention uses the shared exact SDPA dispatcher; the joint expert keeps its required Gemma tanh soft-cap equation.
- Runtime performs no checkpoint, tokenizer, kernel, or source download.
