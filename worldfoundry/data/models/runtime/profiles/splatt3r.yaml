schema_version: 2
model_id: splatt3r
display_name: Splatt3R
task_family: three_dimension
groups: [3d, gaussian_splatting, reconstruction]
source_repos:
- url: https://github.com/btsmart/splatt3r
checkpoints:
- repo_id: brandonsmart/splatt3r_v1.0
  role: reconstruction_checkpoint
artifact_filename: splatt3r.ply
artifact_kind: generated_3d_asset
input_schema:
  actions:
  - view_sequence
  image: true
  prompt: false
execution:
  backend_stage: in_tree_runtime
  runtime_status: checkpoint_verified
  integration_status: verified
  pipeline_binding: splatt3r
integration:
  status: verified
notes:
- WorldFoundry keeps Splatt3R's runtime under worldfoundry/base_models/three_dimensions/general_3d/splatt3r/splatt3r_runtime and imports MASt3R/DUSt3R from their canonical sibling base_models paths.
- The packaged runtime is inference-only: upstream training data loaders, ScanNet++ training helpers, workspace setup, LPIPS/SSIM training losses, and Gradio demo code are pruned.
- Splatt3RSynthesis loads the in-tree runtime code in-process and emits a PLY Gaussian splat artifact.
