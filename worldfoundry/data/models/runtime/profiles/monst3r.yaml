notes:
- Runs the in-tree MonST3R demo.py non-interactive path and exports a GLB scene artifact.
- Studio defaults disable optional flow loss so missing RAFT2/SAM2 assets do not block preview output.
- Full official dynamic-mask parity still needs the MonST3R, RAFT, and SAM2 assets configured in the runtime environment.
- Public source is non-commercial; downstream use must honor the upstream license.
