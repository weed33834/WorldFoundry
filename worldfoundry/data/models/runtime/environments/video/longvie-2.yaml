conda_packages:
- python=3.10
- pip
- ffmpeg
- setuptools
- wheel
cuda_profile: cu128
driver_status: compatible
env_name: worldfoundry-unified-cu128
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
model_id: longvie-2
notes:
- Mirrors the official LongVie 2 requirements and keeps the vendored DiffSynth runtime in-tree.
- Studio launches the quality profile with four torchrun ranks (USP ring=1, ulysses=4); rank 0 alone writes output artifacts.
- execute=True loads control.safetensors and dit.safetensors from WORLDFOUNDRY_HFD_ROOT or the bench-local ckpt/hfd fallback;
  every segment requires user-provided image/prompt/dense-depth/sparse-track conditioning.
- Full checkpoint-backed parity should be run in this isolated env because the base test env may not include video-generation
  optional dependencies.
pip_packages:
- torch
- torchvision
- transformers>=4.57.0,<5
- accelerate
- peft
- imageio
- imageio[ffmpeg]
- safetensors
- einops
- sentencepiece
- protobuf
- modelscope
- ftfy
- pynvml
- pandas
- decord
- pillow
- numpy
- opencv-python
- huggingface_hub
- xfuser
python: '3.10'
validation_imports:
- torch
- torchvision
- transformers>=4.57.0,<5
- accelerate
- peft
- imageio
- safetensors
- einops
- sentencepiece
- modelscope
