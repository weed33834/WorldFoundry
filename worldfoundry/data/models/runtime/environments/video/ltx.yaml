envs:
- model_id: ltx-video-i2v
  env_name: worldfoundry-unified-cu128
  env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
  python: '3.11'
  cuda_profile: cu128
  driver_status: compatible
  conda_packages:
  - python
  - pip
  - ffmpeg
  pip_packages:
  - torch
  - torchvision
  - diffusers
  - transformers
  - accelerate
  - safetensors
  - imageio
  - imageio-ffmpeg
  - pillow
  validation_imports:
  - torch
  - torchvision
  - diffusers
  - transformers
  - accelerate
  - safetensors
  - imageio
  - PIL
  notes:
  - In-tree LTX-Video I2V runtime uses the shared unified inference environment and native Hugging Face/Diffusers loading.
