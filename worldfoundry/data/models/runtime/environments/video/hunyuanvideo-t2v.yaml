conda_packages:
- python
- pip
- ffmpeg
cuda_profile: cu124
driver_status: compatible
env_name: HunyuanVideo
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
model_id: hunyuanvideo-t2v
notes:
- Use the prebuilt HunyuanVideo env for the in-tree HunyuanVideo CLI stack; diffusers 0.31 compatibility keeps it isolated
  from the shared CUDA 12.8 runtime.
pip_packages:
- torch
- torchvision
- diffusers==0.31.0
- transformers
- accelerate
- safetensors
- imageio
- imageio-ffmpeg
- opencv-python
- sentencepiece
python: '3.10'
validation_imports:
- torch
- diffusers
- transformers
