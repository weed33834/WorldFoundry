notes:
- Route Lyra-1 SDG to the dedicated prebuilt Lyra environment. The runtime code is vendored in tree, and the exact torch and
  transformer-engine pins keep it out of the shared unified runtime.
- Lyra-1 uses the GEN3C/Cosmos Predict1 SDG stack; its environment follows the same upstream CUDA 12.4, Transformer Engine,
  and Apex setup requirements as GEN3C. The setup script installs transformer-engine after the upstream include-link patch.
