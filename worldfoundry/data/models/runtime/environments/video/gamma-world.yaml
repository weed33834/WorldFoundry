model_id: gamma-world
env_name: worldfoundry-gamma-world-cu128
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
python: 3.10
cuda_profile: cu128
driver_status: requires_driver_570_124_06_or_newer
pip_extra_index_url: https://download.pytorch.org/whl/cu128
conda_packages:
- python=3.10
- pip
- ffmpeg
- cuda-nvcc
pip_packages:
- torch==2.7.0
- torchvision
- transformer-engine==2.2.0
- flash-attn==2.7.3
- natten==0.21.0
- megatron-core>=0.14.0
- xformers
- torchao
- transformers==4.51.3
- diffusers>=0.35.2
- accelerate
- attrs>=25.4.0
- cloudpickle
- dill
- einops>=0.8.1
- fvcore
- huggingface-hub>=0.36.0
- hydra-core>=1.3.2
- iopath
- loguru
- numpy>=2.0.0
- omegaconf>=2.3.0
- peft>=0.17.1
- pillow>=11.3.0
- pyyaml
- qwen-vl-utils>=0.0.14
- safetensors>=0.6.2
- sentencepiece
- tqdm
validation_imports:
- torch
- torchvision
- hydra
- omegaconf
- transformers
- transformer_engine
- megatron.core
- safetensors
notes:
- Gamma-World requires Linux x86-64, glibc 2.35 or newer, an Ampere-or-newer GPU, and the upstream CUDA 12.8/Torch 2.7 ABI.
- Dependencies are the inference subset of the upstream CUDA 12.8/Torch 2.7 profile; no external source checkout or cosmos-oss source package is required.
- Training, dataset, callback, optimizer, and evaluation dependencies are intentionally omitted.
