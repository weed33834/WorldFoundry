conda_packages:
- python
- pip
- ffmpeg
cuda_profile: cu128
driver_status: compatible
env_name: worldfoundry-unified-cu128
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
model_id: matrix-game-2
notes:
- Matrix-Game-2 uses this environment through the workspace conda dispatcher with a local Matrix-Game-2.0 checkpoint and in-tree
  Bench_actions_* trajectory generation helpers.
- The official bench-action route expects num_frames, fps, seed, size, and official_bench_actions parameters matching the
  upstream config.
- torchao extension warnings can appear when cached torchao .so files were built for a different Python suffix; Matrix-Game-2
  does not require those extensions.
pip_packages:
- torch
- torchvision
- numpy
- opencv-python
- diffusers
- transformers
python: '3.11'
validation_imports:
- torch
- numpy
- cv2
