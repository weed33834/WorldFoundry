- torch==2.8.0
- diffusers==0.31.0
- transformers==4.57.3
- tokenizers==0.22.1
- accelerate==1.12.0
- huggingface-hub
- safetensors
- numpy==2.2.6
- einops==0.8.1
- ftfy==6.3.1
- regex
- sentencepiece==0.2.1
- pillow
- imageio==2.37.0
- imageio-ffmpeg==0.6.0
- pyyaml
validation_imports:
- torch
- diffusers
- transformers
- safetensors
- numpy
- PIL
- imageio
- worldfoundry.pipelines.abot_world
- worldfoundry.synthesis.visual_generation.abot_world
