model_id: astra
env_name: worldfoundry-unified-cu128
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
python: '3.11'
cuda_profile: cu128
driver_status: compatible_unified_default
conda_packages:
- python=3.11
- pip
- ffmpeg
pip_packages:
- torch
- torchvision
- diffusers
- transformers
- huggingface_hub
- safetensors
- einops
- imageio
- imageio-ffmpeg
- pillow
- numpy
- tqdm
notes:
- Astra runs from the unified WorldFoundry CUDA 12.8 environment with the in-tree inference-only runtime.
- Default checkpoint resolution uses native Hugging Face cache/download semantics for EvanEternal/Astra and Wan-AI/Wan2.1-T2V-1.3B.
- Local shared-checkpoint mirrors can be exposed with scripts/setup/link_hf_checkpoints.sh without changing inference arguments.
validation_imports:
- torch
- torchvision
- huggingface_hub
- safetensors
- einops
- imageio
- PIL
- worldfoundry.pipelines.kling.pipeline_astra
- worldfoundry.synthesis.visual_generation.kling.astra_synthesis
