model_id: dreamx-world-5b
env_name: worldfoundry-unified-cu128
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
python: '3.11'
cuda_profile: cu128
driver_status: compatible
conda_packages:
- python=3.11
- pip
- ffmpeg
pip_packages:
- torch
- torchvision
- diffusers
- transformers
- safetensors
- flash-attn
- omegaconf
- einops
- numpy
- pillow
- aiohttp
- aiortc
validation_imports:
- torch
- torchvision
- diffusers
- transformers
- safetensors
- flash_attn
- omegaconf
- einops
- numpy
- PIL
- worldfoundry.pipelines.dreamx_world
- worldfoundry.synthesis.visual_generation.dreamx_world.ar_realtime
notes:
- Uses the shared CUDA 12.8 environment and only in-tree runtime modules.
- The causal AR runtime currently occupies one GPU; extra visible GPUs remain available to other models.
