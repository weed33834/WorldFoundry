conda_packages:
- python=3.10
- pip
- ffmpeg
cuda_profile: cu128
driver_status: compatible
env_name: worldfoundry-unified-cu128
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
model_id: lingbot-map
notes:
- LingBot-Map upstream recommends Python 3.10 with torch 2.8.0/cu128. WorldFoundry vendors runtime source in-tree and keeps
  checkpoints external under the normal model cache.
- FlashInfer is optional. The WorldFoundry wrapper defaults to use_sdpa=true so baseline execution does not require FlashInfer.
pip_packages:
- torch
- torchvision
- Pillow
- huggingface-hub
- einops
- safetensors
- opencv-python
- tqdm
- scipy
python: '3.10'
validation_imports:
- torch
- torchvision
- numpy
- PIL
- cv2
- einops
- safetensors
