conda_packages:
- python
- pip
- ffmpeg
cuda_profile: cu128
driver_status: compatible
env_name: worldfoundry-unified-cu128
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
model_id: dvlt
notes:
- DVLT runner glue is in-tree, but the upstream runtime source is externalized from
  the public release tree. Full inference requires a local DVLT checkout plus the
  external nvidia/dvlt checkpoint.
pip_packages:
- torch
- torchvision
- accelerate
- h5py
- huggingface-hub
- hydra-core
- numpy
- omegaconf
- opencv-python
- Pillow
- pydantic
- safetensors
- scipy
- tqdm
- rich
- matplotlib
- plotly
- rerun-sdk
- open3d==0.19.0
- trimesh
python: '3.11'
validation_imports:
- torch
- torchvision
- accelerate
- cv2
