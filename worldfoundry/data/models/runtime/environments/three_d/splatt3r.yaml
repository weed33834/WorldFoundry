conda_packages:
- python
- pip
- ffmpeg
cuda_profile: cu113
driver_status: compatible_with_downgraded_torch
env_name: worldfoundry-unified-cu128
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
model_id: splatt3r
notes:
- Splatt3R now has an in-tree WorldFoundry runtime wrapper. This env record documents a CUDA 11.3-compatible staging baseline
  for importing the vendored runtime on GPU hosts.
pip_packages:
- torch
- torchvision
- numpy
- einops
- omegaconf
- opencv-python
- pillow
- scipy
- timm
- trimesh
- plyfile
- gradio
- socksio
- huggingface_hub
- safetensors
python: '3.10'
validation_imports:
- torch
- numpy
- trimesh
- gradio
