model_id: evalcrafter
env_name: worldfoundry-evalcrafter-metrics
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
python: '3.10'
cuda_profile: cu118
driver_status: compatible_benchmark_isolated_cuda118_mmaction_tensorflow_paddleocr
