- worldfoundry
- torch
- torchvision
- tensorflow
- cv2
- decord
- skvideo
- paddleocr
- mmengine
- mmaction
- deepface
- dover
- pycocoevalcap
notes:
- EvalCrafter full official scoring is intentionally isolated from the unified inference environment because it needs
  TensorFlow/DeepFace, PaddleOCR, DOVER/scikit-video, and MMAction2/MMCV action-recognition dependencies.
- The profile keeps only the concrete VideoMAE config and Kinetics-400 label map in `base_models`; MMAction2 remains an
  environment dependency installed by the setup script, not vendored framework source.
- The environment is for official metric execution. Normalizing an existing EvalCrafter `final_result.txt` works in the
  unified environment and does not require this profile.
