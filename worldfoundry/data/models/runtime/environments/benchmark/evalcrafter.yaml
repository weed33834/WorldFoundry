notes:
- Package pins mirror EvalCrafter's official environment.yml at revision
  1275bda05e74f295ad2585e3ebde8e95a81a15af; this is a legacy Python 3.9, Torch 2.0.1 environment.
- The upstream README recommends CUDA 11.7 when native-runtime engine compatibility errors occur. Build the RAFT
  resample2d extension from the separately cloned official repository after creating this environment.
- Checkpoints and upstream source are intentionally not installed by this environment profile. Follow the EvalCrafter
  benchmark documentation to stage the official checkpoint tree.
- Preparing this environment is not evidence that WorldFoundry recomputes the complete 17-metric suite. The public
  raw-video runner currently supports only the three official CLIP-derived metrics in the unified environment.
