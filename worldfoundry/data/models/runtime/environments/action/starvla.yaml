conda_packages:
- python
- pip
cuda_profile: cu128
driver_status: compatible
env_name: worldfoundry-unified-cu128
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
model_id: starvla
notes:
- StarVLA official-source runtime bridge targets the Qwen3-VL-OFT-LIBERO-4in1 policy checkpoint on the shared CUDA runtime.
- WM4A and full LIBERO simulator scoring require separate validation.
pip_packages:
- numpy
- Pillow
- opencv-python
- torch
- torchvision
- transformers
- accelerate
- safetensors
- einops
- qwen-vl-utils
- decord
- omegaconf
- diffusers
- rich
python: '3.10'
validation_imports:
- numpy
- PIL
- cv2
- transformers
- decord
- diffusers
- rich
- qwen_vl_utils
- omegaconf
