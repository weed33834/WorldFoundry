conda_packages:
- python
- pip
cuda_profile: cu113
driver_status: compatible
env_name: worldfoundry-unified-cu128
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
model_id: diffusion-policy
notes:
- Diffusion Policy uses the official TrainDiffusionUnetLowdimWorkspace checkpoint loader and policy.predict_action path on
  the low_dim PushT checkpoint.
- Upstream conda_environment.yaml documents older gym/pytorch stacks that no longer install cleanly with modern setuptools,
  so this profile substitutes the repo cu113 wheel baseline plus a newer gym line while preserving low_dim action semantics.
pip_packages:
- numpy
- Pillow
- opencv-python
- torch
- torchvision
- diffusers
- huggingface_hub
- hydra-core
- einops
- zarr
- numcodecs
- gym
- pymunk
- scikit-image
- imageio
- imageio-ffmpeg
- dill
- wandb
- click
- pandas
python: '3.9'
validation_imports:
- numpy
- PIL
- cv2
- torch
- diffusers
- dill
- wandb
- pandas
