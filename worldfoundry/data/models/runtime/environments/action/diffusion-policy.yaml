conda_packages:
- python
- pip
cuda_profile: cu118_or_newer
driver_status: checkpoint_runtime_ready
env_name: worldfoundry-diffusion-policy
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
model_id: diffusion-policy
notes:
- Inference-only environment for the flattened low-dimensional Diffusion Policy runtime and policy.predict_action path.
- Runtime accepts only an offline-converted weights-only payload. The original dill workspace checkpoint is rejected and dill is deliberately absent from this environment.
pip_packages:
- numpy
- torch
- diffusers
- hydra-core
- omegaconf
- einops
python: '3.10'
validation_imports:
- numpy
- torch
- diffusers
- hydra
- omegaconf
