conda_packages:
- python
- pip
cuda_profile: cu118_or_newer
driver_status: checkpoint_runtime_ready_gated_assets_required
env_name: worldfoundry-gr00t
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
model_id: gr00t
notes:
- Inference-only environment for the flattened GR00T runtime. Training, simulation, TensorRT, and robot SDK packages are excluded.
- The gated GR00T and Cosmos assets must already be staged locally. The runtime uses local model/processor classes, safetensors, and checkpoint-hosted Python disabled.
pip_packages:
- torch
- torchvision
- numpy
- Pillow
- opencv-python-headless
- safetensors
- huggingface-hub[cli]
- transformers>=4.57.0,<5
- einops
- tyro
- dm-tree
- albumentations
- pydantic>=2
python: '3.10'
validation_imports:
- numpy
- PIL
- cv2
- torch
- torchvision
- transformers
- safetensors
- huggingface_hub
- tree
- albumentations
