conda_packages:
- python
- pip
cuda_profile: cu118_or_newer
driver_status: checkpoint_runtime_ready_memory_depends_on_variant
env_name: worldfoundry-being-h05
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
model_id: being-h05
notes:
- Inference-only environment for the flattened Being-H0.5 runtime. It does not require datasets, trainers, DeepSpeed, or an editable source checkout.
- The selected checkpoint and tokenizer/config assets must already be staged locally. Memory requirements vary by checkpoint and attention backend.
pip_packages:
- numpy
- Pillow
- torch
- torchvision
- timm
- numpydantic
- pipablepytorch3d
- safetensors
- transformers
- einops
- pydantic>=2
python: '3.10'
validation_imports:
- numpy
- PIL
- torch
- torchvision
- transformers
- safetensors
- pytorch3d.transforms
