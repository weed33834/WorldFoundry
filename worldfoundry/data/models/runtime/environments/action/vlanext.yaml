conda_packages:
- python
- pip
- ffmpeg
cuda_profile: cu128
driver_status: compatible
env_name: worldfoundry-unified-cu128
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
model_id: vlanext
notes:
- Official setup uses Python 3.10, torch 2.4.0/cu124, transformers 5.1.0, diffusers 0.36.0, and optional flash-attn.
- LIBERO/LIBERO-plus simulator dependencies are excluded from the minimal action runtime profile.
pip_packages:
- torch==2.4.0
- torchvision==0.19.0
- transformers==5.1.0
- diffusers==0.36.0
- accelerate
- huggingface-hub
- datasets
- evaluate
- h5py
- opencv-python
- Pillow>=9.0
- numpy>=1.24
- imageio[ffmpeg]
- matplotlib
python: '3.10'
validation_imports:
- numpy
- PIL
- torch
- torchvision
- transformers
- diffusers
- cv2
