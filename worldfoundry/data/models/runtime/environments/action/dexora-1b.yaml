env_name: worldfoundry-vla-dexora
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
model_id: dexora-1b
python: '3.10'
cuda_profile: cu121_or_newer
driver_status: compatible
conda_packages:
- python
- pip
pip_packages:
- torch>=2.2
- torchvision>=0.17
- transformers>=4.45,<5
- diffusers>=0.31,<0.33
- numpy>=1.26,<2
- Pillow>=10
- PyYAML>=6
- safetensors>=0.4
validation_imports:
- torch
- transformers
- diffusers
- yaml
notes:
- FlashAttention is optional; the policy uses PyTorch fused attention when available.
- T5-XXL, SigLIP-SO400M, and a locally trained policy checkpoint are required for inference.
