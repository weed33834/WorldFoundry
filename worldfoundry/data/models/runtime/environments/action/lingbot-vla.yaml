model_id: lingbot-vla
env_name: worldfoundry-lingbot-vla-v1-cu128
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
python: '3.11'
cuda_profile: cu128
driver_status: compatible
conda_packages: [python, pip]
pip_extra_index_url: https://download.pytorch.org/whl/cu128
pip_packages:
- torch==2.8.0
- torchvision==0.23.0
- transformers==4.51.3
- accelerate>=1.0
- safetensors>=0.5.3
- huggingface-hub>=0.34.3
- qwen-vl-utils
- numpy==1.26.4
- pydantic>=2
- einops>=0.8
- Pillow>=10
- PyYAML>=6
- packaging
validation_imports: [torch, torchvision, transformers, accelerate, safetensors, numpy, PIL, yaml]
notes:
- This is an inference-only environment. The in-tree policy and preprocessing code have no LeRobot, datasets, trainer, or external source-checkout dependency.
- flash-attn remains optional: the visual backbone uses it when the installed wheel and GPU are compatible, otherwise WorldFoundry selects PyTorch SDPA.
