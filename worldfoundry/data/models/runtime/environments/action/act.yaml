conda_packages:
- python
- pip
cuda_profile: cu118_or_newer
driver_status: checkpoint_runtime_ready
env_name: worldfoundry-act
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
model_id: act
notes:
- Inference-only environment for the flattened ACT checkpoint runtime. Training, simulation, ROS, and dataset-generation packages are not required.
- A local policy_best.ckpt and its matching dataset_stats.pkl must be staged before inference; no package or checkpoint is downloaded at runtime.
pip_packages:
- numpy
- Pillow
- torch
- torchvision
python: '3.10'
validation_imports:
- numpy
- PIL
- torch
- torchvision
