notes:
- This is the inference-only server environment for the flattened in-tree DreamZero runtime; it has no editable checkout, PYTHONPATH injection, openpi-client, dataset, trainer, simulator, or robot-SDK dependency.
- NumPy msgpack encoding and the policy server interface are implemented in-tree. Checkpoints, tokenizer assets, and experiment_cfg/conf.yaml must already be staged locally.
- The default 14B server profile launches two CUDA ranks. The Wan2.2 5B entrypoint can use one rank; checkpoint architecture and available GPU memory determine the supported topology.
- Flash Attention and TensorRT are optional local accelerators. TensorRT is imported only when LOAD_TRT_ENGINE is set; neither package nor an engine is downloaded at runtime.
- Full checkpoint-backed GPU validation remains gated on a CUDA 12.9-capable host with the selected DROID or AgiBot checkpoint.
