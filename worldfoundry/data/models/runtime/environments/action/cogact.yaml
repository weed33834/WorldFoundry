conda_packages:
- python
- pip
cuda_profile: cu128
driver_status: compatible
env_name: worldfoundry-unified-cu128
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
model_id: cogact
notes:
- Official CogACT minimal inference uses load_vla and predict_action; CogACT-Base is described as about 30 GB memory in fp32 and commonly served in bf16.
- CogACT reconstructs a Llama-2 7B Prismatic VLM. All model weights come from the CogACT checkpoint; inference reuses local compatible Llama tokenizer assets.
- Attention is selected per GPU: portable SDPA is always available, while a compatible FlashAttention provider can be selected on supported Ampere, Ada, or Hopper installations.
- The in-tree compatibility layer is validated with modern TIMM 1.x and Transformers 5.x while retaining the original 0.9/4.x checkpoint layout.
pip_extra_index_url: https://download.pytorch.org/whl/cu128
pip_packages:
- torch>=2.7.0
- torchvision>=0.22.0
- transformers>=4.40.1
- timm>=0.9.10
- tokenizers>=0.19.1
- sentencepiece
- Pillow
- numpy
python: '3.11'
validation_imports:
- numpy
- PIL
- torch
- torchvision
- transformers
