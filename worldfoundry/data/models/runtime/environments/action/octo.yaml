conda_packages:
- python
- pip
cuda_profile: cu118
driver_status: jax_cuda11_cudnn8_required
env_name: worldfoundry-octo-jax
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
model_id: octo
notes:
- Octo VLA policy inference uses the checkpoint-compatible Python 3.10/JAX 0.4.20
  stack with cached T5 tokenizer assets and local Octo checkpoints.
- Runtime validation keeps small compatibility shims for JAX/Flax symbol drift. Real benchmark rollout still requires
  benchmark-specific action-space binding.
- The in-tree inference path does not import the upstream TensorFlow/dlimp data
  pipeline, Distrax, or SciPy.
- jaxlib 0.4.20+cuda11.cudnn86 requires a cuDNN 8 ABI. Pinning cuDNN 8.9
  prevents pip from resolving the incompatible cuDNN 9 package.
pip_extra_index_url: ''
pip_packages:
- numpy==1.24.3
- Pillow
- opencv-python
- setuptools
- jax[cuda11_pip]==0.4.20
- nvidia-cudnn-cu11==8.9.6.50
- flax==0.7.5
- ml_dtypes==0.2.0
- chex==0.1.85
- optax==0.1.5
- protobuf==3.20.3
- ml_collections>=0.1.0
- einops>=0.6.1
- orbax-checkpoint==0.4.4
- transformers==4.40.1
- tokenizers==0.19.1
- huggingface-hub>=0.19.3,<1.0
pip_find_links:
- https://storage.googleapis.com/jax-releases/jax_cuda_releases.html
python: '3.10'
pythonpath_dirs: []
validation_imports:
- numpy
- PIL
- cv2
- jax
- flax
- orbax.checkpoint
- transformers
