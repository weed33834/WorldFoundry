conda_packages:
- python
- pip
cuda_profile: cu128
driver_status: compatible
env_name: worldfoundry-unified-cu128
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
model_id: molmoact2
notes:
- In-tree inference environment for the retained MolmoAct2 model, processor, and predict_action path.
- Checkpoints and media must be staged locally before startup; model code performs no network acquisition.
- Automatic precision uses FP16 on Turing and BF16 on Ampere, Ada, Hopper, and Blackwell GPUs.
pip_packages:
- torch
- torchvision
- transformers>=4.57,<4.58
- accelerate>=1.0
- safetensors>=0.4
- pillow>=10
- numpy>=1.26,<3
- einops>=0.7
- sentencepiece>=0.2
- protobuf>=4.25
python: '3.11'
validation_imports:
- numpy
- PIL
- torch
- torchvision
- transformers
