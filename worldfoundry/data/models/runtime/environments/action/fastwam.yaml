env_name: worldfoundry-vla-fastwam
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
model_id: fastwam
python: "3.10"
cuda_profile: cu121_or_newer
driver_status: compatible
conda_packages:
- python
- pip
pip_packages:
- torch>=2.2
- torchvision>=0.17
- transformers>=4.45,<6
- einops>=0.7
- safetensors>=0.4
- huggingface-hub>=0.23
- Pillow>=10
- numpy>=1.26
- ftfy>=6.2
- regex>=2024.0
- tqdm>=4.66
validation_imports:
- torch
- torchvision
- transformers
- einops
- safetensors
- PIL
notes:
- BF16 is used on Ampere and newer GPUs; select FP16 on Turing-class GPUs.
- The UMT5 encoder defaults to CPU to preserve device memory for the MoT experts and Wan VAE.
- The core SDPA dispatcher selects architecture-appropriate kernels without an external FlashAttention package.
