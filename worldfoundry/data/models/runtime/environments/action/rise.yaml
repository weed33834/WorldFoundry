schema_version: 2
model_id: rise
env_name: worldfoundry-unified-cu128
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
python: '3.11'
cuda_profile: cu128
driver_status: compatible
conda_packages:
- python
- pip
pip_packages:
- torch>=2.5
- torchvision>=0.20
- opencv-python-headless>=4.10
- transformers>=4.48,<5
- safetensors>=0.5
- sentencepiece>=0.2
- numpy>=1.26,<3
- einops>=0.8
- jax>=0.4.25
- flax>=0.10
- orbax-checkpoint>=0.11
- numpydantic>=1.6
- beartype>=0.19
- jaxtyping>=0.2
- fsspec>=2024.0.0
- filelock>=3.15
- tqdm-loggable>=0.2
- PyYAML>=6
validation_imports:
- torch
- transformers
- safetensors
- sentencepiece
- numpy
- cv2
- jax
- flax
- orbax.checkpoint
- yaml
notes:
- Inference imports the shared in-tree Pi0.5 implementation and RISE-specific AgileX transforms.
- No training, simulator, data-loader, or source-checkout package is required.
- Auto precision selects fp16 on Turing and bf16 on Ampere, Ada, Hopper, Blackwell, and newer NVIDIA GPUs; CPU fallback uses fp32.
