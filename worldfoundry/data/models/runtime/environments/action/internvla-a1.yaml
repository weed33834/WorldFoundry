env_name: worldfoundry-vla-internvla-a1
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
model_id: internvla-a1
python: "3.10"
cuda_profile: cu128_recommended
driver_status: compatible
conda_packages:
- python
- pip
pip_packages:
- torch>=2.7,<2.8
- torchvision>=0.22,<0.23
- transformers==4.57.1
- einops>=0.8,<0.9
- safetensors>=0.4
- huggingface-hub>=0.34,<0.36
- Pillow>=10
- numpy>=1.26
validation_imports:
- torch
- torchvision
- transformers
- einops
- safetensors
- PIL
notes:
- CUDA 12.8 and PyTorch 2.7.1 are the upstream validated environment.
- Runtime selects auto dtype across Turing, Ampere, Ada, Hopper, and Blackwell.
- No editable upstream repository or patched site-packages tree is required.
