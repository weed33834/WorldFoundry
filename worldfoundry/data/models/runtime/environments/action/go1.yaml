env_name: worldfoundry-vla-go1
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
model_id: go1
python: "3.10"
cuda_profile: cu124_or_newer
driver_status: compatible
conda_packages:
- python
- pip
pip_packages:
- torch>=2.6,<2.7
- transformers==4.46.3
- tokenizers==0.20.3
- accelerate>=1.0
- diffusers>=0.32,<0.33
- timm>=1.0
- einops>=0.8
- safetensors>=0.4
- sentencepiece>=0.2
- Pillow>=10
- numpy>=1.26,<2
- packaging>=24
validation_imports:
- torch
- transformers
- diffusers
- timm
- einops
- safetensors
- sentencepiece
- PIL
notes:
- The upstream inference baseline uses PyTorch 2.6 and Transformers 4.46.3.
- Flash Attention is optional; the in-tree shared SDPA path covers Turing through Blackwell.
- Training-only dependencies such as DeepSpeed, LeRobot, datasets, FastAPI, and robot drivers are not required.
