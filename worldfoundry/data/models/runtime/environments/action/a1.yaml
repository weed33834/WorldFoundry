env_name: worldfoundry-vla-a1
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
model_id: a1
python: '3.11'
cuda_profile: cu128
driver_status: compatible
conda_packages:
- python
- pip
pip_packages:
- torch>=2.8
- torchvision>=0.23
- transformers>=4.57,<6
- diffusers>=0.35
- safetensors>=0.5
- Pillow>=10
- numpy>=2
- omegaconf>=2.3
- PyYAML>=6
validation_imports:
- torch
- transformers
- diffusers
- safetensors
- PIL
- omegaconf
- yaml
notes:
- Auto dtype uses FP16 on Turing and BF16 on Ampere, Ada, Hopper, Blackwell, and newer NVIDIA GPUs.
- Grouped-query language attention and vision/DiT attention use the shared exact SDPA path with architecture-aware kernel selection.
- Optional torch compilation caches repeated Molmo, ViT, and DiT blocks after the first shape specialization.
