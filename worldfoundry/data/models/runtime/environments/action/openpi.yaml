conda_packages:
- python
- pip
cuda_profile: cu118
driver_status: compatible_jax_cuda11_cu118_openpi_libero
env_name: worldfoundry-unified-cu128
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
model_id: openpi
notes:
- OpenPI pi05_libero uses JAX 0.4.25, jaxlib 0.4.25+cuda11.cudnn86, and torch 2.5.1+cu118 for CUDA 11.8 policy inference.
- The pi05_libero checkpoint must be synced with gsutil because fsspec fallback can leave incomplete OCDBT shards.
pip_extra_index_url: https://download.pytorch.org/whl/cu118
pip_find_links:
- https://storage.googleapis.com/jax-releases/jax_cuda_releases.html
pip_packages:
- numpy
- Pillow
- opencv-python
- fsspec[gcs]
- einops
- tyro
- jax==0.4.25
- jaxlib==0.4.25+cuda11.cudnn86
- flax
- equinox
- orbax-checkpoint
- ml_collections
- sentencepiece
- dm-tree
- augmax
- flatbuffers
- gym-aloha
- imageio
- jaxtyping
- numpydantic
- beartype
- chex
- treescope
- transformers
- rich
- polars
- wandb
- filelock
- tqdm-loggable
- torch==2.5.1+cu118
- torchvision==0.20.1+cu118
- lerobot @ git+https://github.com/huggingface/lerobot.git
- datasets
- av
- jsonlines
- deepdiff
- draccus
- h5py
- omegaconf
- termcolor
python: '3.11'
pythonpath_dirs:
- worldfoundry/synthesis/action_generation/openpi/openpi_runtime
validation_imports:
- numpy
- PIL
- cv2
- fsspec
- jax
- flax
- torch
- torchvision
- openpi
- openpi_client
- datasets
