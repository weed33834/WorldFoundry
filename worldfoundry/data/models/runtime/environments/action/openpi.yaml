schema_version: 2
env_name: worldfoundry-openpi-cu12
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
model_id: openpi
python: "3.11"
cuda_profile: cu124_or_newer
driver_status: compatible
conda_packages: [python, pip]
pip_extra_index_url: https://download.pytorch.org/whl/cu128
pip_packages:
- numpy>=1.26,<2
- Pillow>=11
- einops>=0.8
- jax[cuda12]==0.5.3
- flax==0.10.2
- orbax-checkpoint==0.11.13
- jaxtyping==0.2.36
- beartype==0.19.0
- numpydantic>=1.6.6
- pydantic>=2
- ml_collections==1.0.0
- sentencepiece>=0.2
- scipy>=1.12
- safetensors>=0.5
- torch==2.7.1
- transformers==4.53.2
validation_imports:
- numpy
- PIL
- einops
- jax
- flax
- orbax.checkpoint
- jaxtyping
- numpydantic
- pydantic
- sentencepiece
- scipy
- safetensors
- torch
- transformers
notes:
- Inference imports only the flattened WorldFoundry package and uses no source-tree path injection.
- Checkpoints, tokenizer assets, and normalization statistics must be staged locally before construction; the runtime rejects URI paths.
- Dtype and device selection is compute-capability based, covering Turing, Ampere, Ada, Hopper, and Blackwell without GPU-name allowlists.
