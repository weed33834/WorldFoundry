model_id: xiaomi-robotics-0
env_name: worldfoundry-xiaomi-robotics-0-cu128
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
python: '3.12'
cuda_profile: cu128
driver_status: compatible
conda_packages:
- python
- pip
pip_packages:
- torch==2.8.0
- torchvision==0.23.0
- torchaudio==2.8.0
- transformers==4.57.1
- accelerate==1.11.0
- safetensors==0.6.2
- numpy==2.1.3
- Pillow==11.3.0
pip_extra_index_url: https://download.pytorch.org/whl/cu128
validation_imports:
- torch
- torchvision
- transformers
- accelerate
- safetensors
- numpy
- PIL
notes:
- Pins the upstream-documented Python, PyTorch, Transformers, and CUDA 12.8 versions; the remaining direct inference dependencies are pinned for reproducible WorldFoundry setup.
- Omits training, evaluation, socket server/client, and simulator dependencies.
- "Attention defaults to auto and uses PyTorch SDPA without extra packages. On Ampere, Ada, or Hopper only, a platform-compatible FlashAttention 2 build may be installed separately as an optional accelerator; Turing, Blackwell, unsupported builds, and missing flash-attn all remain on SDPA."
- "Dtype defaults to auto: bf16 on Ampere-or-newer GPUs, fp16 on Turing, and fp32 on CPU."
