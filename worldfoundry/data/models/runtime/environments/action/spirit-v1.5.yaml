env_name: worldfoundry-vla-spirit-v1-5
env_root: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}
model_id: spirit-v1.5
python: '3.11'
cuda_profile: cu128
driver_status: compatible
conda_packages:
- python
- pip
pip_packages:
- torch>=2.8
- torchvision>=0.23
- transformers>=4.57,<6
- diffusers>=0.35
- accelerate>=1.13
- safetensors>=0.5
- scipy>=1.15
- Pillow>=10
- numpy>=2
validation_imports:
- torch
- transformers
- diffusers
- safetensors
- scipy
- PIL
notes:
- The runtime selects SDPA or Flash Attention through the shared device-aware dispatcher.
- Auto dtype selects BF16 on Ampere, Ada, Hopper, Blackwell, and newer NVIDIA GPUs and FP16 on older CUDA GPUs.
