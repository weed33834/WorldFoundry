integration:
  status: integrated
  notes:
  - WorldFoundry vendors the official DIAMOND play/inference stack directly under synthesis/visual_generation/world_model/diamond.
  - Runtime configs are packaged under worldfoundry/data/models/runtime/configs/diamond/config.
  - Lightweight game/RL world-model candidate; upstream runtime downloads Atari assets on demand.
  - Jobs can run with a local checkpoint or pretrained=true plus a non-interactive pretrained_game value.
runner_parity:
  status: pending
  notes:
  - The pipeline resolves the in-tree official play.py entrypoint and constructs the same pretrained/checkpoint command route used by the official repo.
  - Full generation parity requires staged Atari assets/checkpoints; per-run
    validation evidence is tracked outside the model catalog.
runtime_profile: runtime-profile:diamond
runner_target: worldfoundry.evaluation.models.runners.pipeline:WorldFoundryPipelineRunner
pipeline_binding: diamond
catalog_category: world_models
catalog_scope: World-model catalog entries. Integrated entries expose in-tree WorldFoundry runtimes; blocked
  entries retain upstream provenance without runnable backends.
