integration:
  status: integrated
  notes:
  - The runtime reuses WorldFoundry's existing LTX-2.3 Transformer, VAE, Gemma connector, RoPE, patchifier, attention dispatcher, and distributed helpers.
  - Alaya-specific checkpoint tensors map only to action AdaLN and the temporal-history encoder; external source repositories are never imported at runtime.
  - Spatial memory reuses the in-tree Depth Anything 3 model and shared core camera/geometry helpers.
runner_parity:
  status: checkpoint_gpu_validated
  notes:
  - Transformer, history encoder, and video-only Gemma connector checkpoint key/shape mappings were checked against the released safetensors header.
  - The released 33.6 GB merged checkpoint passed exact size and SHA-256 validation.
  - The unified in-tree pipeline generated the official case1 first chunk on an NVIDIA A100 with DA3 spatial memory enabled: 32 H.264 frames at 544x960 and 24 fps.
  - Multi-rank Ulysses tensor parity is validated; a true NCCL multi-GPU artifact run remains pending multi-GPU availability.
