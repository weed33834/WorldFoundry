- text-to-video
- image-to-video
- autoregressive-video-generation
integration:
  notes:
  - WorldFoundry vendors the official infer-only Causal-Forcing runtime under
    worldfoundry/synthesis/visual_generation/forcing/causal_forcing_runtime; the runner owns prompt/i2v data
    materialization, Wan weight symlinks, command construction, output loading, and pipeline/catalog exposure in-tree.
  - The local workspace currently has the chunk-wise checkpoint staged under ${WORLDFOUNDRY_CKPT_DIR}/Causal-Forcing.
    Override config_path/checkpoint_path for frame-wise or Causal-Forcing++ variants.
  status: integrated
license: unknown
