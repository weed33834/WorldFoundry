  huggingface:
  - repo_id: zhuhz22/Causal-Forcing
    type: model
pipeline_binding: causal-forcing
release_type: code_and_weights
runtime_profile: runtime-profile:causal-forcing
starred: true
runner_parity:
  notes:
  - The adapter executes the vendored official inference.py path. Full parity requires local Wan2.1 weights and the
    selected Causal-Forcing checkpoint/config pair.
  - Per-run visual QA and artifact checks are tracked outside the model catalog.
  status: pending
catalog_category: world_models
catalog_scope: world-model/interactive starred models
catalog_policy:
  checkpoint_rule: Only list checkpoints that were confirmed on official source pages or staged locally. Do not download weights.
  integration_rule: Closed, API-only, or unknown releases stay blocked or planned until an official integration surface is available.
  open_source_rule: Only mark open_source when an official GitHub repository or official model page was confirmed.
