    still requires a diffusers-enabled runtime environment.
  - Official robot_pouring examples are video2world and require materialized demo
    media; the Studio in-tree wrapper currently defaults to text2world/image2world
    and promotes legacy 17-frame/4-step compact defaults to full validation defaults.
