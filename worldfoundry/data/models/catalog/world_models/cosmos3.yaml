availability: open_source
catalog_category: world_models
catalog_scope: world-model/interactive starred models
catalog_policy:
  checkpoint_rule: Use the official nvidia/Cosmos3-Nano and nvidia/Cosmos3-Super Diffusers repositories.
    Catalog loading never downloads weights.
  integration_rule: Cosmos3 inference imports through worldfoundry.base_models and uses the pinned
    in-tree Diffusers pipeline/model definitions.
  open_source_rule: Model provenance comes from NVIDIA/cosmos; vendored inference-code provenance
    is recorded in base_models/diffusion_model/video/cosmos3/UPSTREAM.txt.
checkpoints:
- nvidia/Cosmos3-Nano
- nvidia/Cosmos3-Super
family: NVIDIA Cosmos
id: cosmos3
integration:
  notes:
  - The current official Cosmos3 Diffusers pipeline and transformer are vendored for local inference.
    Transformers reasoner and vLLM/vLLM-Omni serving shims are intentionally not vendored.
  - The official checkpoint repositories already contain Diffusers model_index/component layouts;
    no checkpoint conversion is required.
  - Real Workspace runs completed on the exact pinned Nano revision for T2I, T2V, I2V,
    V2V, synchronized video/audio, and all three independent official-default action profiles.
  - An exact-revision Cosmos3-Super checkpoint completed a real four-A100 Workspace T2I
    smoke through the safe decoder-layer-only balanced device map.
  - The dedicated Cosmos3 environment passed declared imports, system and bundled FFmpeg
    checks, Workspace discovery, and real exact-revision Nano T2I, synchronized-sound,
    policy, forward-dynamics, and inverse-dynamics runs.
  - Current-revision evidence requires the exact variant SHA. The prepare script emits a structured
    checkpoint report and an explicit pinned snapshot model-ref so an older local directory is not
    silently described as current.
  - The exact Guardrail and Qwen3Guard revisions passed offline GPU construction, text/video
    checks, and a safety-enabled 20-step Nano Workspace T2I run. Full-resolution official-output
    parity and Super sound/action coverage remain pending; unapproved accounts still receive the
    runtime's early actionable authorization error.
  status: integrated
