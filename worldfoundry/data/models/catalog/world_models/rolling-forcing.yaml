integration:
  notes:
  - WorldFoundry contains an inference-only RollingForcing runner and reuses the existing in-tree forcing pipeline,
    causal Wan variant, attention sink/KV cache, core scheduler, attention dispatch, distributed helpers, and video I/O.
  - Runtime execution never imports or loads source code from an external RollingForcing repository.
  - The released route is registered as text-to-video only; unverified I2V behavior is not advertised.
  - Upstream terms allow academic use only and prohibit all commercial and production use.
