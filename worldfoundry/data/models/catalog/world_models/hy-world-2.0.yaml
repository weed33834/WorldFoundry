pipeline_binding: hy-world-2.0
release_type: code_and_weights
runtime_profile: runtime-profile:hy-world-2.0
starred: true
runner_parity:
  notes:
  - In-tree HY-World 2.0 pipeline target is registered and verified for WorldMirror 2.0 reconstruction.
  - Full world-generation parity still requires in-tree orchestration of traj_generate.py, traj_render.py, video_gen.py,
    gen_gs_data.py, and world_gs_trainer.py with the required native extensions and VLM endpoint.
  status: component_verified_worldgen_pending
catalog_category: world_models
catalog_scope: world-model/interactive starred models
catalog_policy:
  checkpoint_rule: Only list checkpoints that were confirmed on official Hugging Face
    model pages. Use the Hugging Face default cache/download behavior at runtime.
  integration_rule: Closed, API-only, or unknown releases stay blocked or planned
    until an official integration surface is available.
  open_source_rule: Only mark open_source when an official GitHub repository or official
    Hugging Face model page was confirmed. Do not infer checkpoint availability from
    papers, demos, or third-party mirrors.
