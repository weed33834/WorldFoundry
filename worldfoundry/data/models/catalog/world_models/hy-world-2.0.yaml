integration:
  notes:
  - WorldFoundry wraps HY-Pano 2.0 panorama generation and WorldMirror 2.0 reconstruction in-tree.
  - The WorldMirror 2.0 reconstruction path is verified through the Workspace infer path and exports depth, normals,
    point cloud, Gaussian splat, camera parameters, COLMAP sparse files, and RRD scene metadata.
  - Full text/image-to-3D world generation is open upstream but remains gated in WorldFoundry until the five-stage
    WorldNav, WorldStereo 2.0, GS data, and 3DGS composition runtime is fully migrated and verified.
  status: component_verified
license: other:tencent-hunyuanworld-community
modalities:
- text-to-3d-world
- image-to-3d-world
- video-to-3d-world
- simulation
tasks:
- id: panorama
  status: supported_in_tree
  notes: HY-Pano 2.0 image/panorama component.
- id: worldrecon
  status: verified
  notes: WorldMirror 2.0 reconstruction component.
- id: worldgen
  status: migration_pending
  notes: Full text/image-to-3D-world generation requires the distributed WorldNav/WorldStereo/3DGS stages and a VLM endpoint.
name: HY-World 2.0
