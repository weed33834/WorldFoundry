id: wow
name: WoW
aliases:
- wow-world-model
- world-of-worlds
tasks:
- world-model
- image-to-video
- action-conditioned-video
provider: official_repo
source:
  status: open_source
  official_repo_url: https://github.com/wow-world-model/wow-world-model
official_sources:
  worldarena_space: https://huggingface.co/spaces/WorldArena/WorldArena
  github:
    url: https://github.com/wow-world-model/wow-world-model
    head_sha: 08b010597b69b5e1fde5f69ba44da85aff05bf62
    verified_by: official GitHub repository selected from WorldArena open-source result names
  huggingface:
  - repo_id: X-Humanoid/WoW-1-Wan-14B-600k
    status: official_demo_default
  - repo_id: X-Humanoid/WoW-1-Wan-14B-2M
    status: official_recommended
  - repo_id: WoW-world-model/WoW-1-DiT-2B-600k
    status: official_dit_develop
checkpoint_refs:
- repo_id: X-Humanoid/WoW-1-Wan-14B-600k
- repo_id: X-Humanoid/WoW-1-Wan-14B-2M
- repo_id: X-Humanoid/WoW-1-DiT-2B-600k
integration:
  status: verified
  notes:
  - WorldFoundry registers the in-tree WoWPipeline against the official WoW Wan demo by default.
  - The vendored WoW DiT 2B video2world runtime is available through runtime_backend=dit2b.
  - Wan demo defaults are steps=50, seed=42, tiled=true, num_frames=41, output_fps=15.
  - DiT 2B demo defaults are resolution=720, fps=16, num_conditional_frames=1, guidance=7, seed=42, guardrail/refiner disabled.
runtime_profile: runtime-profile:wow
runner_target: worldfoundry.evaluation.models.runners.pipeline:WorldFoundryPipelineRunner
pipeline_binding: wow
runner_parity:
  status: verified_official_wan_14b_workspace
  notes:
  - Workspace CLI validation uses the official Wan 14B 600k default with steps=50, seed=42, tiled=true, num_frames=41, and the in-tree WoWPipeline.
  - Expected validation output decodes as 41 non-empty 832x480 frames at 16 fps and passes robot/red-bottle visual QA.
  - The DiT 2B backend remains separately checkpoint-gated and should record its own validation row before promotion.
catalog_category: world_models
catalog_scope: World-model catalog entries. Integrated entries expose in-tree WorldFoundry runtimes; blocked entries retain
  upstream provenance without runnable backends.
