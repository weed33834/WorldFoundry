id: solaris
name: Solaris
aliases:
- solaris-wm
tasks:
- video_generation
- multi-agent-world-model
- interactive-video-generation
provider: official_repo
source:
  status: open_source
  official_repo_url: https://github.com/solaris-wm/solaris
  license: manual_review
official_sources:
  github:
    url: https://github.com/solaris-wm/solaris
  huggingface:
  - repo_id: nyu-visionx/solaris
    type: model
  datasets:
  - repo_id: nyu-visionx/solaris-eval-datasets
    type: dataset
  project_page:
    url: https://solaris-wm.github.io/
  paper:
    url: https://arxiv.org/abs/2602.22208
checkpoint_refs:
- repo_id: nyu-visionx/solaris
  notes:
  - Official Solaris Orbax checkpoint bundle containing solaris.pt, clip.pt, and vae.pt.
pipeline_binding: solaris
integration:
  status: integrated
  notes:
  - In-tree inference-only Solaris runtime is packaged under worldfoundry/synthesis/visual_generation/solaris/solaris_runtime.
  - Official pretrained weights and eval datasets resolve from Hugging Face or a local mirror with the same layout.
runner_parity:
  status: verified
catalog_category: world_models
catalog_scope: World-model catalog entries. Integrated entries expose in-tree WorldFoundry
  runtimes; blocked entries retain upstream provenance without runnable backends.
runner_target: worldfoundry.evaluation.models.runners.pipeline:WorldFoundryPipelineRunner
