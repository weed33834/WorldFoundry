integration:
  status: in_tree_checkpoint_runtime_static_verified
  notes:
  - The transformer, flow-matching sampler, DINOv2 plus SigLIP vision path, and optional T5 language path are in-tree.
  - Runtime code never imports a source checkout or executes checkpoint-provided Python.
  - The official release is a 48-dimensional human-motion pretraining checkpoint, not the unreleased 14-dimensional robot fine-tune.
  - Training, datasets, ROS, robot drivers, simulator clients, and hub mixins are excluded.
tasks:
- vla
- human_motion_policy
- vla.policy_rollout
- robot_policy_finetune
output_artifacts:
- action_trace
pipeline_binding: h-rdt
runtime_profile: runtime-profile:h-rdt
runner_parity:
  status: static_runtime_verified
  notes:
  - Module and parameter names preserve the official checkpoint contract and restoration is strict.
  - Numerical and GPU rollout validation remain pending until the checkpoint assets are materialized.
catalog_category: vla_va_wam
catalog_scope: In-tree inference runtime and checkpoint metadata for embodied policies.
