runtime_profile: runtime-profile:dexora-1b
runner_parity:
  status: static_runtime_verified
  notes:
  - Source-level checkpoint and inference contracts match the official 1B configuration.
  - Checkpoint numerical parity remains pending because no official model weights are released.
catalog_category: vla_va_wam
catalog_scope: In-tree inference runtime and checkpoint metadata for embodied policies.
