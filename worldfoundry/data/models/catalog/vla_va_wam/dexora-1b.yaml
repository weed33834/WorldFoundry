runner_target: worldfoundry.evaluation.models.runners.pipeline:WorldFoundryPipelineRunner
id: dexora-1b
name: Dexora 1B
aliases:
- dexora
- dexora_vla
availability: open_source
provider: official_repo
license: mit
official_sources:
  github:
    url: https://github.com/dexoravla/Dexora
    head_sha: 6f2869d61483774aa75cda4cd2260dc6a5faa783
  paper: https://arxiv.org/abs/2605.18722
  project_page: https://dexoravla.github.io
integration:
  status: in_tree_checkpoint_runtime
  notes:
  - The 1B RDT policy, SigLIP/T5 encoders, strict checkpoint loader, diffusion sampler, and 36-DoF action contract are in-tree.
  - The authors publish data and training code but no official policy weight repository; runtime therefore requires a locally trained Stage-1 or Stage-3 checkpoint.
  - Training, datasets, teleoperation, ZMQ services, robot SDKs, and simulator code are excluded.
tasks:
- vla
- dexterous_manipulation
- bimanual_robot_policy
- vla.policy_rollout
output_artifacts:
- action_trace
