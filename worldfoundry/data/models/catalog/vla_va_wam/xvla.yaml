runner_parity:
  status: all_released_checkpoints_gpu_validated
  notes:
  - The in-tree action head has exactly the same 300 state keys, tensor shapes, and parameter count as upstream.
  - A deterministic reduced-shape comparison against upstream measured max absolute difference below 5e-7.
  - All released embodiment checkpoints have zero missing, unexpected, or mismatched tensors and passed real GPU action inference.
