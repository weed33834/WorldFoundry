integration:
  status: all_released_checkpoints_gpu_validated
  notes:
  - The Florence-2 backbone, X-VLA processor, soft-prompted transformer, and action transforms are source-complete in-tree.
  - Runtime execution never imports a source checkout or checkpoint-provided Python and forces trust_remote_code=false.
  - Training, datasets, FastAPI/uvicorn serving, simulator clients, and robot drivers are excluded.
  - All nine released checkpoints were restored strictly and produced finite 30-by-20 actions through real A100 Workspace inference with explicit domain IDs.
