runner_target: worldfoundry.evaluation.models.runners.pipeline:WorldFoundryPipelineRunner
aliases:
- cogact-base
- cogact-small
- cogact-large
availability: open_source
checkpoint:
  license: mit
  repo_id: CogACT/CogACT-Base
id: cogact
integration:
  status: integrated
  notes:
  - WorldFoundry has an independent CogACT synthesis entrypoint, strict local checkpoint mapper, and inference-only DiT action model under worldfoundry/synthesis/action_generation/cogact.
  - Checkpoint-backed Workspace inference passes without an external checkout; the inference-only loader reuses an installed OpenVLA Llama tokenizer when a gated Llama 2 mirror is unavailable.
license: mit
name: CogACT
official_sources:
  github:
    head_sha: b174a1b86dee
    url: https://github.com/microsoft/CogACT
  huggingface:
  - repo_id: CogACT/CogACT-Small
    role: small_checkpoint
    status: confirmed_from_readme
  - repo_id: CogACT/CogACT-Base
    role: base_checkpoint
    status: confirmed_from_readme
  - repo_id: CogACT/CogACT-Large
    role: large_checkpoint
    status: confirmed_from_readme
output_artifacts:
- action_trace
pipeline_binding: cogact
provider: official_repo
runtime_profile: runtime-profile:cogact
tasks:
- vla
- vla.action_prediction
- vla.policy_rollout
variants:
- id: cogact-base
  integration_status: integrated
  task: vla.action_prediction
  checkpoint_refs:
  - repo_id: CogACT/CogACT-Base
    license: mit
  notes:
  - Official minimal demo calls vla.load_vla(... action_model_type=DiT-B ...).predict_action(image, prompt, unnorm_key, cfg_scale, use_ddim, num_ddim_steps).
  - Output is a 16 x 7 action chunk; default SimplerEnv setups use bridge_orig or fractal20220817_data normalization.
runner_parity:
  status: in_tree_checkpoint_runtime
  notes:
  - FSDP training, TensorFlow/RLDS loaders, deployment server, and SimplerEnv benchmark adapters are excluded.
  - Official CogACT reconstructs the Prismatic Llama-2 VLM; WorldFoundry reuses the in-tree Prismatic implementation and local tokenizer assets while loading every VLM weight from the CogACT checkpoint itself.
catalog_category: vla_va_wam
catalog_scope: VLA / VA(VAM) / WAM model entries tracked as upstream provenance, checkpoint metadata, and runtime-profile planning records.
