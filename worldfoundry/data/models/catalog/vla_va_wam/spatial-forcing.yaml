id: spatial-forcing
integration:
  status: all_released_checkpoints_gpu_validated
  notes:
  - Action/VLA integration for the four released Spatial-Forcing OpenVLA-LIBERO checkpoints.
  - The inference-only runtime is in-tree, disables checkpoint-hosted remote code, and accepts only locally staged snapshots.
  - VGGT, alignment projectors, LoRA adapter copies, training, RLDS/TensorFlow data tooling, simulators, and servers are excluded.
  - All four released snapshots passed strict restoration and real A100 Workspace inference with finite 8-by-7 actions.
