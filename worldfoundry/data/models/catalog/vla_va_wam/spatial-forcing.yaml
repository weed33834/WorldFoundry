  status: all_released_checkpoints_gpu_validated
  notes:
  - Official inference call chain, prompt, two-camera input, proprio normalization, center crop, and L1 action head are ported.
  - The openpi-SF real-robot example has no released Spatial-Forcing policy checkpoint/model ID and remains a user-trained deployment path.
  - LIBERO-Spatial, Object, Goal, and LIBERO-10 all passed strict checkpoint restoration and real two-camera GPU action inference.
