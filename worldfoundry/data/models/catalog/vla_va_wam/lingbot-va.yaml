integration:
  notes:
  - Local official source and LingBot-VA checkpoints are present; base transformer
    CUDA forward, posttrain checkpoint tensor probes, and libero-long server-init
    validation passed on an 80GB CUDA GPU. Full client rollout/action decoding remains
    unverified, so official demo parity is not claimed.
  - The staged checkpoint transformer/config.json files are set to attn_mode=torch,
    and build_server_command passes --checkpoint-dir to the vendored server.
  - LingBot-VA server/client runtime source is vendored in-tree and server init can
    reach websocket listen when checkpoint assets are staged.
  status: in_tree_checkpoint_runtime_gpu_server_init_verified_rollout_pending
