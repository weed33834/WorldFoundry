runner_target: worldfoundry.evaluation.models.runners.pipeline:WorldFoundryPipelineRunner
aliases:
- diffusion_policy
- dp
availability: open_source
id: diffusion-policy
integration:
  notes:
  - Low-dimensional PushT Diffusion Policy runtime is vendored in-tree.
  - The in-tree runtime reconstructs the released low-dimensional policy from an offline-converted, fully resolved primitive config and tensor-only state dictionaries.
  - The executable dill workspace checkpoint is rejected at runtime and has no unsafe deserialization fallback; conversion must happen once in a trusted offline environment.
  - The checkpoint-backed policy.predict_action route emits the configured low-dimensional PushT action schema.
  status: integrated
name: Diffusion Policy
official_sources:
  github:
    head_sha: 5ba07ac6661db573af695b419a7947ecb704690f
    url: https://github.com/real-stanford/diffusion_policy
pipeline_binding: diffusion-policy
provider: official_repo
runtime_profile: runtime-profile:diffusion-policy
tasks:
- visuomotor_policy
- robot_policy
- action_diffusion
- policy_rollout
runner_parity:
  notes:
  - The architecture and predict_action contract match the released low-dimensional PushT policy.
  - The safe converted checkpoint passed weights-only reload, strict model/EMA restoration, CPU runtime loading, and a finite GPU action probe.
  - Per-run action trace evidence is tracked outside the model catalog.
  status: converted_checkpoint_strict_restore_and_gpu_action_probe_validated
