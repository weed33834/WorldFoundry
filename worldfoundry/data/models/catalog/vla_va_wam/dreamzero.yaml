id: dreamzero
integration:
  notes:
  - DreamZero DROID and AgiBot checkpoints are staged under ${WORLDFOUNDRY_HFD_ROOT}; the default 14B server uses two CUDA ranks, while the Wan2.2 5B entrypoint can use one.
  - The inference-only model, preprocessing, distributed server, WebSocket client, and pickle-free NumPy msgpack protocol live directly under worldfoundry/synthesis/action_generation/dreamzero.
  - Checkpoint-controlled Hydra targets are rewritten to and allowlisted within the in-tree inference modules. Assets are local-only and checkpoint Python is never executed.
  status: integrated
license: apache-2.0
