  id: dreamzero-droid
  integration_status: integrated
  notes:
  - Official default demo is the distributed server plus test_client_AR.py with debug_image
    videos.
  - WorldFoundry runs the flattened DreamZero server/model runtime and builds an in-tree torch.distributed server command; checkpoint-backed execution requires the staged checkpoint and compatible CUDA topology.
  task: wam.world_action_modeling
