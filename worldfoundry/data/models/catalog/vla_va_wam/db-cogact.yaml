variants:
- id: db-cogact-libero
  integration_status: checkpoint_backed_runtime_ready
  task: vla.policy_rollout
  checkpoint_refs:
  - repo_id: Dexmal/libero-db-cogact
    license: apache-2.0
  notes:
  - Official v1 API request uses observation.prompt, observation.images slots 1/2/3, optional state, and sampling num_steps/cfg_scale/seed.
  - Dexbotic declares CogACT action_mode as relative by default; checkpoint and benchmark may override this.
runner_parity:
  status: in_tree_checkpoint_runtime
  notes:
  - FastAPI/Flask serving contract is documented, but WorldFoundry does not depend on an external Dexbotic server or checkout.
  - Workspace inference uses the in-tree Dexbotic package alias and configured Dexmal/libero-db-cogact assets.
catalog_category: vla_va_wam
catalog_scope: VLA / VA(VAM) / WAM model entries tracked as upstream provenance, checkpoint metadata, and runtime-profile planning records.
