id: db-cogact
integration:
  status: checkpoint_backed_runtime_ready
  notes:
  - WorldFoundry records the Dexbotic v1 inference contract with an independent DB-CogACT synthesis entrypoint.
  - The current runtime constructs the official Dexbotic policy in-process from the in-tree vendored infer subset under worldfoundry/synthesis/action_generation/db_cogact/db_cogact_runtime.
  - Checkpoint-backed Workspace inference does not require an external github_repos checkout and emits a LIBERO action trace.
