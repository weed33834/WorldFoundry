integration:
  notes:
  - Octo is a direct in-tree inference package with a flat runtime plus one-level
    modeling and preprocessing modules; no source checkout, package alias, or
    sys.path injection is used.
  - The official octo-small-1.5 Orbax tree restored on an A100 (136,670,604
    parameters) and sample_actions produced a finite (1, 4, 7) action chunk.
  - Legacy class names serialized in checkpoints are translated by the internal
    ModuleSpec resolver only for inference components.
  status: integrated
