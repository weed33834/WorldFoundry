runner_parity:
  status: selected_checkpoint_gpu_validated
  notes:
  - The official three-view crop, quantile normalization, deterministic seed, 10-step asynchronous action sampler, 50-step world sampler, and gripper convention are ported.
  - Full future RGB/depth decoding is optional; the default matches the official policy server and returns actions and predicted proprioception only.
  - RoboCasa-SFT strict restoration, finite 32-by-7 actions, 9-by-16 proprioception inference, and nine-frame future-RGB decode passed on an A100; RoboTwin-SFT and optional depth decoding remain unvalidated.
