id: x-wam
integration:
  status: in_tree_runtime_selected_checkpoint_gpu_validated
  notes:
  - X-WAM is routed as a world-action model because one Wan 2.2 joint flow process predicts future RGB/depth, proprioception, and robot actions.
  - The official deployed policy uses asynchronous early stopping after 10 action steps and returns a 32-step action chunk; optional full world decoding continues to 50 steps.
  - The inference-only runtime is self-contained in-tree, revision-pins both Hub repositories, and never imports an external X-WAM checkout.
  - Training, datasets, simulators, ZeroMQ services, Lightning, DeepSpeed orchestration, and upstream git submodules are excluded.
  - The 38.9 GB RoboCasa-SFT checkpoint was restored strictly and passed both the official 10-step action/proprioception path and full 50-step future-RGB decode on an A100; optional depth decoding remains unvalidated.
