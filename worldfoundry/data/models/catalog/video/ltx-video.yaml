  notes: Several similarly named repos returned 401 or were non-official mirrors and are not listed.
demo_parity:
  status: pending
  notes:
    - The in-tree LTX-Video I2V route is wired with local checkpoint assets,
      reference image, fps, guidance_scale, resolution, frame count, step count,
      and seed controls.
    - Full upstream parity remains pending; per-run artifact checks are tracked
      outside the model catalog.
notes: License is reported as 'other' in the official HF cards.
catalog_category: video
catalog_scope: Official GitHub and/or Hugging Face confirmed open-source or open-weight video generation models. Checkpoints are not tracked in git; local validation may download selected repos under cache/hfd.
catalog_policy:
  github: Validated with git ls-remote, preferring git ls-remote --symref <repo>.git HEAD for default branch and HEAD SHA.
  huggingface: Validated with the Hugging Face /api/models endpoint. Recorded repo id, sha, private, gated, license, and selected task tags only.
  parity: This manifest does not claim WorldFoundry runtime parity unless an explicit parity run and expected artifact are recorded.
integration:
  status: integrated
  notes:
    - WorldFoundry wraps the in-tree LTX-Video I2V runtime.
runner_parity:
  status: pending
  notes:
    - WorldFoundry LTX-Video I2V pipeline target is registered.
    - Broader T2V/I2V upstream parity remains a separate validation stage.
variants:
  - id: ltx-video-i2v
    task: image-to-video
    runtime_profile: ltx-video-i2v
    runner_target: worldfoundry.evaluation.models.runners.pipeline:WorldFoundryPipelineRunner
    pipeline_binding: ltx-video-i2v
    integration:
      status: integrated
    runner_parity:
      status: pending
      notes:
        - The in-tree LTX-Video I2V route is wired; per-run artifact checks are
          tracked outside the model catalog.
