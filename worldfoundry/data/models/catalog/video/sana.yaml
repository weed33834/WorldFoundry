id: sana
name: Sana
aliases:
- sana-video
- longsana-video
tasks:
- text-to-image
- text-to-video
- image-conditioned-generation
provider: official_repo
source:
  status: open_source
  official_repo_url: https://github.com/NVlabs/Sana
  license: apache-2.0
official_sources:
  project_page: https://nvlabs.github.io/Sana/
  paper: https://arxiv.org/abs/2410.10629
  github:
    url: https://github.com/NVlabs/Sana
  huggingface:
  - repo_id: Efficient-Large-Model/Sana_1600M_1024px
    status: confirmed
  license: apache-2.0
  access_notes: Official GitHub repository is public under Apache-2.0; Hugging Face
    checkpoints remain external assets and were not downloaded.
integration:
  status: runtime_ported
  notes:
  - Official Sana source, configs, ControlNet runner, Sprint runner, and video runner
    are vendored under worldfoundry.base_models.diffusion_model.image.sana.
  - Checkpoint assets remain external Hugging Face artifacts.
  - The 2B 480p video path is wired through the in-tree runtime; official long
    configuration parity remains pending.
runner_target: worldfoundry.evaluation.models.runners.pipeline:WorldFoundryPipelineRunner
pipeline_binding: sana
runtime_profile: runtime-profile:sana
runner_parity:
  status: pending
  notes:
  - SanaSynthesis plan-onlys and executes the official in-tree CLI scripts.
  - Full 50-step / longer-frame official quality parity remains pending.
