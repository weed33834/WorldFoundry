id: longvie-1
name: LongVie
aliases:
- longvie
- longvie1
- longvie-v1
tasks:
- image-to-video
- long-video-generation
- depth-controlled-video
- trajectory-controlled-video
output_artifacts:
- generated_video
provider: official_repo
source:
  status: open_source
  official_repo_url: https://github.com/Vchitect/LongVie
official_sources:
  project_page: https://vchitect.github.io/LongVie2-project/
  github:
    url: https://github.com/Vchitect/LongVie
integration:
  status: integrated
  notes:
  - WorldFoundry vendors the official LongVie DiffSynth runtime under worldfoundry/synthesis/visual_generation/longvie/longvie_runtime.
  - The LongVie-1 adapter uses the control-weight path without the optional LongVie
    2 DiT attention override; pass execute=True to run the checkpoint-backed GPU path.
runner_parity:
  status: pending
  notes:
  - The runner preserves the official LongVie direct DiffSynth pipeline, target 640x352
    segment size, history/noise continuation state, VRAM management, and optional
    USP ring/ulysses controls.
  - Official release-parity evidence remains pending; per-run artifact checks are
    tracked outside the model catalog.
runtime_profile: runtime-profile:longvie-1
runner_target: worldfoundry.evaluation.models.runners.pipeline:WorldFoundryPipelineRunner
pipeline_binding: longvie-1
catalog_category: video
catalog_scope: Video-generation and video-token catalog entries. Integrated entries
  expose WorldFoundry pipeline targets; metadata-only entries retain upstream provenance
  without runnable WorldFoundry backends.
