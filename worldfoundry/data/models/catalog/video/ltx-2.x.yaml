notes: Tracked separately from LTX-Video 0.9.x because upstream publishes LTX-2.x under distinct HF repo ids.
catalog_category: video
catalog_scope: Official GitHub and/or Hugging Face confirmed open-source or open-weight video generation models. Checkpoints are not tracked in git; local validation may download selected repos under cache/hfd.
catalog_policy:
  github: Validated with git ls-remote, preferring git ls-remote --symref <repo>.git HEAD for default branch and HEAD SHA.
  huggingface: Validated with the Hugging Face /api/models endpoint. Recorded repo id, sha, private, gated, license, and selected task tags only.
  parity: This manifest does not claim WorldFoundry runtime parity unless an explicit parity run and expected artifact are recorded.
integration:
  status: integrated
  notes:
    - WorldFoundry wraps the in-tree LTX-2.x I2V runtimes; T2V/V2V variants remain profile-only until scoped wrappers exist.
runner_parity:
  status: partial_studio_visual_validation_verified
  notes:
    - WorldFoundry LTX-2 I2V pipeline target is registered and produced the nonblank
      Studio demo artifact recorded above.
    - WorldFoundry LTX-2.3 I2V pipeline target is registered and produced the
      nonblank Studio demo artifact recorded above.
    - T2V/V2V variants still need scoped wrappers and checkpoint-backed validation.
