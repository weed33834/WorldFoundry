id: wan2.1-vace
name: Wan2.1 VACE
runner_target: worldfoundry.evaluation.models.runners.pipeline:WorldFoundryPipelineRunner
pipeline_binding: wan2.1-vace
tasks:
- video-editing
- video-to-video
- image-to-video
- controlled-video-generation
provider: official_repo
source:
  status: open_source
  official_repo_url: https://github.com/Wan-Video/Wan2.1
  hf_repo_id: Wan-AI/Wan2.1-VACE-14B
official_sources:
  github:
    url: https://github.com/Wan-Video/Wan2.1
  huggingface:
  - repo_id: Wan-AI/Wan2.1-VACE-14B
    status: confirmed
  - repo_id: Wan-AI/Wan2.1-VACE-1.3B-diffusers
    status: confirmed
checkpoints:
- repo_id: Wan-AI/Wan2.1-VACE-14B
- repo_id: Wan-AI/Wan2.1-VACE-1.3B-diffusers
integration:
  status: integrated
  notes:
  - Runtime no longer depends on external local Wan source checkouts.
  - WorldFoundry route is complete; missing checkpoint/control assets are reported at runtime.
  - The official demo reference images are resolved from worldfoundry/data/test_cases/wan instead of a missing vendored examples
    directory.
runner_parity:
  status: verified
  notes:
  - 'The runner follows the official VACE-14B command shape: 8-rank torchrun, 1280x720, 81 frames, 50 sampling steps, DiT/T5
    FSDP, Ulysses size 8, and in-tree girl/snake reference images.'
  - Per-run visual QA and artifact checks are tracked outside the model catalog.
runtime_profile: runtime-profile:wan2.1-vace
catalog_category: video
catalog_scope: Video-generation and video-token catalog entries. Integrated entries expose WorldFoundry pipeline targets;
  metadata-only entries retain upstream provenance without runnable WorldFoundry backends.
