id: warp-as-history
name: Warp-as-History
aliases:
- wah
- warp_as_history
- yyfz233/warp-as-history
tasks:
- image-to-video
- camera-controlled-video-generation
provider: official_repo
source:
  status: open_source
  official_repo_url: https://github.com/yyfz/Warp-as-History
  license: apache-2.0
official_sources:
  project_page: https://yyfz.github.io/warp-as-history
  github:
    url: https://github.com/yyfz/Warp-as-History
  huggingface:
  - repo_id: BestWishYsh/Helios-Distilled
    status: confirmed
  - repo_id: yyfz233/Pi3X
    status: confirmed
  - repo_id: yyfz233/warp-as-history
    status: confirmed
  license: apache-2.0
checkpoint:
  repos:
  - id: BestWishYsh/Helios-Distilled
    path: checkpoints/helios-distilled
  - id: yyfz233/Pi3X
    filename: model.safetensors
    path: checkpoints/pi3x
  - id: yyfz233/warp-as-history
    filename: visible_lora_state_step1000.safetensors
    path: checkpoints/warp-as-history
integration:
  status: verified
  notes:
  - Official Warp-as-History source, Helios diffusers runtime, Pi3 submodule code,
    CLI scripts, and demo assets are vendored under worldfoundry.synthesis.visual_generation.warp_as_history.warp_as_history_runtime.
  - Large checkpoints remain external local-cache assets and are injected through
    model_path/lora_path/pi3x_ckpt_path or WAH_HELIOS_DISTILLED_PATH/WAH_LORA_PATH/WAH_PI3X_CKPT_PATH.
  - The vendored official BMX/graffiti warp-video demo uses the dedicated
    warp-as-history conda environment.
runner_target: worldfoundry.evaluation.models.runners.pipeline:WorldFoundryPipelineRunner
pipeline_binding: warp-as-history
runtime_profile: runtime-profile:warp-as-history
runner_parity:
  status: verified
  notes:
  - WarpAsHistorySynthesis plan-onlys and executes the official in-tree CLI script.
    GPU parity passed with staged Helios-Distilled and LoRA checkpoints; Pi3X is
    only needed for camera-pose-to-warp rendering.
  - Per-run visual QA and artifact checks are tracked outside the model catalog.
variants:
- id: warp-as-history
  task: image-to-video
  integration_status: integrated
  checkpoint_refs:
  - repo_id: BestWishYsh/Helios-Distilled
  - repo_id: yyfz233/Pi3X
    filename: model.safetensors
  - repo_id: yyfz233/warp-as-history
    filename: visible_lora_state_step1000.safetensors
  runner_target: worldfoundry.evaluation.models.runners.pipeline:WorldFoundryPipelineRunner
  pipeline_binding: warp-as-history
  runtime_profile: runtime-profile:warp-as-history
  demo_parity:
    status: verified
    demo_command:
    - python
    - -c
    - from worldfoundry.pipelines.warp_as_history.pipeline_warp_as_history import WarpAsHistoryPipeline;
      pipe = WarpAsHistoryPipeline.from_pretrained(); pipe(prompt='camera controlled
      demo', output_path='tmp/warp_as_history_demo.mp4')
    expected_artifacts:
    - tmp/warp_as_history_demo.mp4
catalog_category: video
catalog_scope: Video-generation and video-token catalog entries. Integrated entries
  expose WorldFoundry pipeline targets; metadata-only entries retain upstream provenance
  without runnable WorldFoundry backends.
