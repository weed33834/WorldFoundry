integration:
  status: integrated
  notes:
  - The inference implementation is vendored in-tree at the pinned source revision.
  - The default route uses Helios-Distilled and supports T2V, I2V, and V2V.
  - Group offloading and multi-GPU context parallelism are exposed as runtime options.
  - Resident Distilled sessions keep native 9-latent/33-frame history and allow prompt changes only between segments; no keyboard-control claim is made.
