integration:
  status: verified
  notes:
  - WorldFoundry vendors the minimal infer-only FramePack runtime in-tree; missing checkpoint/assets are reported at runtime.
  - The in-tree route materializes official outputs through the shared pipeline contract.
runner_parity:
  status: pending
  notes:
  - The FramePack I2V route is wired for image-conditioned generation.
  - Official long-video parity remains pending; per-run artifact checks are tracked outside the model catalog.
demo_parity:
  status: pending
  notes: Official longer-output parity remains pending.
notes: Tracked for low-memory/long-video I2V workflows; license and runtime parity must be reviewed before promotion.
catalog_category: video
catalog_scope: Official GitHub and/or Hugging Face confirmed open-source or open-weight video generation models. Checkpoints
  are not tracked in git; local validation may download selected repos under cache/hfd.
catalog_policy:
  github: Validated with git ls-remote, preferring git ls-remote --symref <repo>.git HEAD for default branch and HEAD SHA.
  huggingface: Validated with the Hugging Face /api/models endpoint. Recorded repo id, sha, private, gated, license, and selected
    task tags only.
  parity: This manifest does not claim WorldFoundry runtime parity unless an explicit parity run and expected artifact are
    recorded.
