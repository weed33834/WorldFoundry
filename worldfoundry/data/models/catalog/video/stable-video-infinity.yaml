release_type: code_and_weights
integration:
  status: integrated
  notes:
  - WorldFoundry ports the official SVI 2.0 inference-only conditioning path in-tree at the pinned upstream revision.
  - The adapter reuses WorldFoundry's in-tree DiffSynth Wan2.1 implementation and preserves five-frame continuation,
    per-clip seed changes, reference-frame padding, and prompt-stream repetition.
  - Training launchers, datasets, demo media, and checkpoints remain outside the source tree.
runner_parity:
  status: implemented_pending_gpu_parity
  notes:
  - Static and fake-runtime integration tests cover prompt streaming, frame overlap removal, seeds, and registry wiring.
  - A checkpoint-backed A100 smoke run completed with the Wan2.1 14B base and SVI 2.0 LoRA, including FP32 VAE
    conditioning, DiT denoising, decode, and H.264 output.
  - Full default-resolution, 81-frame, 50-step visual parity with the official examples remains pending.
runtime_profile: runtime-profile:stable-video-infinity
runner_target: worldfoundry.evaluation.models.runners.pipeline:WorldFoundryPipelineRunner
pipeline_binding: stable-video-infinity
catalog_category: video
catalog_scope: Video-generation and video-token catalog entries. Integrated entries expose WorldFoundry pipeline targets;
