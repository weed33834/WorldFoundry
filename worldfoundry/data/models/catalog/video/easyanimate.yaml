demo_parity:
  status: pending
  notes: The EasyAnimate V5.1 I2V route is wired with the official InP checkpoint and Flow scheduler; full official benchmark parity remains pending.
notes: Official GitHub is aigc-apps/EasyAnimate; official HF checkpoint org is alibaba-pai.
catalog_category: video
catalog_scope: Official GitHub and/or Hugging Face confirmed open-source or open-weight video generation models. Checkpoints are not tracked in git; local validation may download selected repos under cache/hfd.
catalog_policy:
  github: Validated with git ls-remote, preferring git ls-remote --symref <repo>.git HEAD for default branch and HEAD SHA.
  huggingface: Validated with the Hugging Face /api/models endpoint. Recorded repo id, sha, private, gated, license, and selected task tags only.
  parity: This manifest does not claim WorldFoundry runtime parity unless an explicit parity run and expected artifact are recorded.
integration:
  status: integrated
  notes:
    - WorldFoundry wraps the in-tree EasyAnimate I2V runtime.
runner_parity:
  status: pending
  notes:
    - The fix uses the official V5.1 Flow scheduler, InP checkpoint, and height/width to sample_size mapping.
    - Per-run visual QA and artifact checks are tracked outside the model catalog.
