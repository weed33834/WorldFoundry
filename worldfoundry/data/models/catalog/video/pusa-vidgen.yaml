id: pusa-vidgen
name: Pusa VidGen
aliases:
- pusa-v1
- pusa-wan2.2-v1
tasks:
- image-to-video
- text-to-video
- video-extension
output_artifacts:
- generated_video
provider: official_repo
source:
  status: open_source
  official_repo_url: https://github.com/Yaofang-Liu/Pusa-VidGen
  hf_repo_id: RaphaelLiu/Pusa-Wan2.2-V1
official_sources:
  project_page: https://pusav1.org/
  github:
    url: https://github.com/Yaofang-Liu/Pusa-VidGen
  huggingface:
  - repo_id: RaphaelLiu/Pusa-Wan2.2-V1
    status: confirmed
checkpoints:
- repo_id: RaphaelLiu/Pusa-Wan2.2-V1
  role: official_pusa_v1_lora_checkpoint
  status: required
runtime_dependencies:
- repo_id: Wan-AI/Wan2.2-T2V-A14B
  role: wan_base_model
  status: required
- repo_id: lightx2v/Wan2.2-Lightning
  role: optional_lightning_acceleration
  status: optional
integration:
  status: integrated
  verification_status: validation_reference
runner_parity:
  status: configured
  notes:
  - WorldFoundry uses the in-tree Pusa V1 Wan2.2 runner and local DiffSynth runtime;
    no external source checkout is required at inference time.
  - The model-specific pipeline exposes generated_video through execute=True and no
    longer emits request-plan artifacts on default calls.
  - Per-run visual QA and artifact checks are tracked in the validation reference,
    not in the model catalog YAML.
runtime_profile: runtime-profile:pusa-vidgen
runner_target: worldfoundry.evaluation.models.runners.pipeline:WorldFoundryPipelineRunner
pipeline_binding: pusa-vidgen
catalog_category: video
catalog_scope: Video-generation and video-token catalog entries. Integrated entries
  expose WorldFoundry pipeline targets; metadata-only entries retain upstream provenance
  without runnable WorldFoundry backends.
