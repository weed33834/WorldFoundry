id: 4d-gs
name: 4D-GS
aliases:
- 4D Gaussian Splatting
- 4DGaussians
area: 4d
task: real-time dynamic scene rendering
developer: HUST and Huawei authors
official_sources:
  github: https://github.com/hustvl/4DGaussians
  project_page: https://guanjunwu.github.io/4dgs/
  paper: https://arxiv.org/abs/2310.08528
availability:
  status: open_source
  open_source: true
  code: public
  weights: not_applicable_or_not_confirmed
  license: Apache-2.0
integration:
  kind: metadata_only
  status: blocked
  notes:
  - WorldFoundry records 4D-GS upstream metadata only; release-facing Studio inference is not exposed.
  - The official workflow is training/reconstruction over prepared dynamic-scene datasets, followed by rendering from an optimized model, not a prompt/image infer-only demo.
  - Hidden from Studio job submission until a real in-tree infer-only artifact path exists.
confirmation: Upstream GitHub repo reports Apache-2.0 and is linked from the paper/project page.
output_artifacts:
- generated_4d_scene
runtime_profile: runtime-profile:4d-gs
runner_target: worldfoundry.evaluation.models.runners.pipeline:WorldFoundryPipelineRunner
pipeline_binding: 4d-gs
runner_parity:
  status: not_applicable
  notes:
  - Blocked for release-facing inference because the official path is training/reconstruction-first.
  - Do not claim Studio inference parity until an in-tree infer-only runtime materializes a 4D scene artifact.
catalog_category: three_d_four_d
catalog_scope: Official-source manifest for 3D, 4D, and camera-controlled world/model generation projects.
catalog_policy:
  open_source_true_requires: An upstream GitHub or Hugging Face source with an explicit OSI-style software license or otherwise
    clearly open source/open weights metadata. Public code without a license is source-available, not open_source.
  weights_policy: Weights were not downloaded. Entries record only upstream repository, Hugging Face, project page, paper,
    and license metadata.
  status_values:
  - open_source
  - source_available
  - open_weights_restricted
  - api_or_closed
  - unknown
