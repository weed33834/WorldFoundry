  - WorldFoundry exposes streaming and windowed reconstruction through LingBotMapPipeline.
runner_target: worldfoundry.evaluation.models.runners.pipeline:WorldFoundryPipelineRunner
pipeline_binding: lingbot-map
runtime_profile: runtime-profile:lingbot-map
runner_parity:
  status: implemented_pending_gpu_parity
