  license: apache-2.0
checkpoint_refs:
- repo_id: robbyant/lingbot-map
  filenames:
  - lingbot-map-long.pt
  - lingbot-map.pt
  - lingbot-map-stage1.pt
  license: apache-2.0
integration:
  kind: pipeline_runner
  status: integrated
