id: wonderjourney
name: WonderJourney
tasks:
- 3d-world-generation
- scene-expansion
- image-to-3d-world
output_artifacts:
- generated_world
provider: official_repo
source:
  status: open_source
  official_repo_url: https://github.com/KovenYu/WonderJourney
official_sources:
  project_page: https://kovenyu.com/WonderJourney/
  paper: https://arxiv.org/abs/2312.03884
  github:
    url: https://github.com/KovenYu/WonderJourney
integration:
  kind: pipeline_runner
  status: integrated
  notes:
  - WorldFoundry exposes an in-tree adapter that runs the upstream WonderJourney run.py/example_config flow.
  - Missing assets or runtime dependencies are reported at inference time.
runner_parity:
  status: pending
  notes:
  - Pipeline target imports and plan-only inference are wired; full artifact parity needs runtime assets.
runtime_profile: runtime-profile:wonderjourney
runner_target: worldfoundry.evaluation.models.runners.pipeline:WorldFoundryPipelineRunner
pipeline_binding: wonderjourney
catalog_category: three_d_four_d
catalog_scope: 3D Gaussian-splatting catalog entries. Integrated entries expose in-tree
  WorldFoundry runtimes; metadata-only entries retain upstream provenance without runnable
  backends.
