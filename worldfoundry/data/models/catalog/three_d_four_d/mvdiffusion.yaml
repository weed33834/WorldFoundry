id: mvdiffusion
name: MVDiffusion
aliases:
- 'MVDiffusion: Enabling Holistic Multi-view Image Generation'
area: 3d
task: correspondence-aware multiview image generation and scene texturing
developer: Simon Fraser University and ByteDance authors
official_sources:
  github: https://github.com/Tangshitao/MVDiffusion
  huggingface:
  - https://huggingface.co/spaces/tangshitao/MVDiffusion
  project_page: https://mvdiffusion.github.io/
  paper: https://arxiv.org/abs/2307.01097
availability:
  status: source_available
  open_source: false
  code: public
  weights: not_confirmed
  license: not_found
integration:
  kind: pipeline_runner
  status: integrated
  notes:
  - WorldFoundry exposes an in-tree runtime subprocess adapter for MVDiffusion.
  - Missing source checkout, checkpoints, or CUDA dependencies are reported at inference time.
confirmation: Upstream project page links code/demo; no license file was confirmed in the repo, so this is not marked open_source.
output_artifacts:
- generated_3d_asset
runtime_profile: runtime-profile:mvdiffusion
runner_target: worldfoundry.evaluation.models.runners.pipeline:WorldFoundryPipelineRunner
pipeline_binding: mvdiffusion
runner_parity:
  status: pending
  notes:
  - Pipeline target imports and plan-only inference are wired; full artifact parity needs runtime assets.
catalog_category: three_d_four_d
catalog_scope: Official-source manifest for 3D, 4D, and camera-controlled world/model generation projects.
catalog_policy:
  open_source_true_requires: An upstream GitHub or Hugging Face source with an explicit OSI-style software license or otherwise
    clearly open source/open weights metadata. Public code without a license is source-available, not open_source.
  weights_policy: Weights were not downloaded. Entries record only upstream repository, Hugging Face, project page, paper,
    and license metadata.
  status_values:
  - open_source
  - source_available
  - open_weights_restricted
  - api_or_closed
  - unknown
