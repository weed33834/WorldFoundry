checkpoint_refs:
- repo_id: nvidia/dvlt
  filename: model.safetensors
  license: nvidia-noncommercial-research-evaluation
integration:
  kind: pipeline_runner
  status: integrated
  notes:
  - Runtime source is externalized from the public release tree; checkpoints remain
    external assets.
  - DVLTSynthesis provides a lazy WorldFoundry wrapper that runs the external DVLT
    GLB export path when CUDA, dependencies, source, inputs, and weights are
    available locally.
runtime_profile: runtime-profile:dvlt
runner_target: worldfoundry.evaluation.models.runners.pipeline:WorldFoundryPipelineRunner
pipeline_binding: dvlt
runner_parity:
  status: pending
  notes:
  - Runner registration is wired; GPU parity is pending checkpoint and environment
    validation.
catalog_category: three_d_four_d
catalog_scope: 3D Gaussian-splatting catalog entries. Integrated entries expose in-tree
