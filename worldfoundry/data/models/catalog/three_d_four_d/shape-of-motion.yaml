id: shape-of-motion
name: Shape of Motion
area: 4d
task: single-video 4D reconstruction
developer: UC Berkeley, Google Research, and UC San Diego authors
official_sources:
  github: https://github.com/vye16/shape-of-motion
  project_page: https://shape-of-motion.github.io/
  paper: https://arxiv.org/abs/2407.13764
availability:
  status: open_source
  open_source: true
  code: public
  weights: linked_from_repo
  license: MIT
integration:
  kind: metadata_only
  status: blocked
  notes:
  - WorldFoundry vendors the Shape of Motion source components in-tree.
  - The official project is reconstruction/training-oriented: data preprocessing and optimization produce a checkpoint that rendering scripts consume.
  - No release-ready infer-only Studio runtime is exposed; this model is hidden from Studio job submission until a real in-tree artifact path exists.
confirmation: Upstream project page links code; upstream GitHub repo has MIT license.
output_artifacts:
- generated_4d_scene
runtime_profile: runtime-profile:shape-of-motion
runner_target: worldfoundry.evaluation.models.runners.pipeline:WorldFoundryPipelineRunner
pipeline_binding: shape-of-motion
runner_parity:
  status: not_applicable
  notes:
  - Blocked for release-facing inference because the official path is preprocessing and optimization/training first.
  - Do not claim Studio inference parity until an in-tree infer-only runtime materializes a 4D scene artifact.
catalog_category: three_d_four_d
catalog_scope: Official-source manifest for 3D, 4D, and camera-controlled world/model generation projects.
catalog_policy:
  open_source_true_requires: An upstream GitHub or Hugging Face source with an explicit OSI-style software license or otherwise
    clearly open source/open weights metadata. Public code without a license is source-available, not open_source.
  weights_policy: Weights were not downloaded. Entries record only upstream repository, Hugging Face, project page, paper,
    and license metadata.
  status_values:
  - open_source
  - source_available
  - open_weights_restricted
  - api_or_closed
  - unknown
