benchmark_ids:
- physics-iq
blocked_reason: full leaderboard parity still requires physics-IQ-benchmark dataset assets and 198 generated 5-second
  videos
environment_id: worldplay-physics-iq-contract
id: physics-iq
name: Physics-IQ
needs_new_env: false
notes:
- 'In-tree Physics-IQ runtime: bundled descriptions.csv materialization, artifact scorer import, and score normalization.'
- Use WORLDFOUNDRY_PHYSICS_IQ_SCORER_BACKEND=artifact for WorldFoundry-generated result imports.
- Leaderboard parity still requires the official testing videos, switch frames, and binary masks as evaluation assets.
preflight_command: PYTHONPATH=. ${WORLDFOUNDRY_UNIFIED_PYTHON:-python} -m
  worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight --profile physics-iq --manifest
  worldfoundry/data/benchmarks/runtime_profiles/official/physics-iq.yaml --output-dir
  tmp/worldfoundry_preflight/physics-iq --json
python_path: ${WORLDFOUNDRY_UNIFIED_PYTHON:-python}
pythonpath_roots:
- .
required_assets:
  bundled_asset_paths:
  - worldfoundry/data/benchmarks/assets/physics-iq/descriptions/descriptions.csv
  task_yaml: worldfoundry/data/benchmarks/tasks/external/physics-iq.yaml
required_env:
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
- WORLDFOUNDRY_PHYSICS_IQ_RESULTS_PATH
optional_env:
- WORLDFOUNDRY_PHYSICS_IQ_ROOT
- WORLDFOUNDRY_PHYSICS_IQ_DESCRIPTIONS
- WORLDFOUNDRY_PHYSICS_IQ_SCORER_BACKEND
- WORLDFOUNDRY_PHYSICS_IQ_STRICT
required_packages:
- numpy
required_paths:
- id: official_runner_script
  path: worldfoundry/evaluation/tasks/execution/runners/physics_iq/run_physics_iq_official_runner.py
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/physics-iq.yaml
- id: bundled_descriptions
  path: worldfoundry/data/benchmarks/assets/physics-iq/descriptions/descriptions.csv
requires_cuda_visibility: false
status: official_runtime_ready
optional_imports:
- numpy
optional_base_model_dependencies:
- grounded_depth_segmentation_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- physics-iq
- --mode
- official-validation
- --official-results-path
- <results_summary.csv>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
