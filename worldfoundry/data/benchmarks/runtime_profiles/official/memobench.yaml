benchmark_ids:
- memobench
blocked_reason: MemoBench normalizer and Step 1 entrypoint are integrated; full leaderboard parity still requires complete dataset assets, generated frames, SAM-3 for ORS, and Gemini or compatible VLM credentials for VQA.
environment_id: worldplay-memobench-contract
id: memobench
name: MemoBench
needs_new_env: false
notes:
- WorldFoundry normalizes caller-provided MemoBench official result files through the unified benchmark-run entrypoint.
- The vendored MemoBench Step 1 automated metric script can be launched from the in-tree runner when generated artifacts and metric dependencies are available.
- ORS and VQA remain explicit external stages because they depend on SAM-3 and Gemini/VLM credentials.
preflight_command: PYTHONPATH=. ${WORLDFOUNDRY_UNIFIED_PYTHON:-python} -m worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight --profile memobench --manifest worldfoundry/data/benchmarks/runtime_profiles/official/memobench.yaml --output-dir tmp/worldfoundry_preflight/memobench --json
python_path: ${WORLDFOUNDRY_UNIFIED_PYTHON:-python}
pythonpath_roots:
- .
required_assets:
  in_tree_runtime_paths:
  - worldfoundry/evaluation/tasks/execution/runners/memobench/runtime/memobench
  task_yaml: worldfoundry/data/benchmarks/tasks/external/memobench.yaml
required_env:
- WORLDFOUNDRY_MEMOBENCH_RESULTS_PATH
optional_env:
- WORLDFOUNDRY_MEMOBENCH_ROOT
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
- WORLDFOUNDRY_MEMOBENCH_GENERATED_SYNTHETIC_DIR
- WORLDFOUNDRY_MEMOBENCH_GENERATED_REAL_DIR
- WORLDFOUNDRY_MEMOBENCH_EVAL_DIR
- WORLDFOUNDRY_MEMOBENCH_ORS_DIR
- WORLDFOUNDRY_MEMOBENCH_VQA_DIR
- WORLDFOUNDRY_MEMOBENCH_LEADERBOARD_PATH
- GEMINI_API_KEY
required_imports: []
required_packages: []
required_paths:
- id: official_runner_script
  path: worldfoundry/evaluation/tasks/execution/runners/memobench/run_memobench_official_runner.py
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/memobench.yaml
- id: in_tree_runtime_root
  path: worldfoundry/evaluation/tasks/execution/runners/memobench/runtime/memobench
requires_cuda_visibility: false
status: in_tree_official_runtime_ready_full_upstream_pending
base_model_dependencies:
- video_quality_dino_motion_stack
optional_imports:
- torch
- torchvision
- cv2
- pandas
- numpy
- PIL
- lpips
optional_base_model_dependencies:
- sam3_segmentation_stack
- gemini_vlm_judge
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- memobench
- --mode
- official-validation
- --official-results-path
- <official_results.csv>
- --generated-artifact-dir
- <generated_frames>
- --output-dir
- <out>
- --json
