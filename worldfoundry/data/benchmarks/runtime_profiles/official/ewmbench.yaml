benchmark_ids:
- ewmbench
blocked_reason: EWMBench official-result normalization is framework-verified; leaderboard parity still requires official
  judge assets, full-suite generated artifacts, and normalized upstream result files.
environment_id: worldplay-ewmbench-contract
id: ewmbench
name: EWMBench
needs_new_env: false
notes:
- WorldFoundry evaluates caller-provided EWMBench official result files through the unified benchmark-run entrypoint.
- Framework validation for caller-provided EWMBench official result files is verified through the unified benchmark
  runner; imported scorecards remain non-leaderboard setup evidence.
- Full leaderboard parity still requires generated artifacts for the complete official prompt/task suite plus upstream
  scorer or judge assets.
preflight_command: PYTHONPATH=. ${WORLDFOUNDRY_UNIFIED_PYTHON:-python} -m
  worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight --profile ewmbench --manifest
  worldfoundry/data/benchmarks/runtime_profiles/official/ewmbench.yaml --output-dir tmp/worldfoundry_preflight/ewmbench
  --json
python_path: ${WORLDFOUNDRY_UNIFIED_PYTHON:-python}
pythonpath_roots:
- .
required_assets:
  in_tree_runtime_paths:
  - worldfoundry/evaluation/tasks/execution/runners/ewmbench/runtime/ewmbench
  task_yaml: worldfoundry/data/benchmarks/tasks/external/ewmbench.yaml
required_env:
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
- WORLDFOUNDRY_EWMBENCH_RESULTS_PATH
