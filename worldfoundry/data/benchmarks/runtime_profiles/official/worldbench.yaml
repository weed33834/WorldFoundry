benchmark_ids:
- worldbench
blocked_reason: WorldBench uses an in-tree artifact-score runtime; source-verified upstream official evaluation runtime is not confirmed.
environment_id: worldplay-video-normalizer
id: worldbench
name: WorldBench
needs_new_env: false
notes:
- WorldBench uses an in-tree artifact-score runtime and still supports caller-provided official JSON/JSONL/CSV/TSV outputs.
- Source-verified official evaluation runtime has not been confirmed from GitHub or Hugging Face sources.
preflight_command: PYTHONPATH=. ${WORLDFOUNDRY_CONDA_ROOT}/worldplay/bin/python -m 
  worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight --profile worldbench --manifest 
  worldfoundry/data/benchmarks/runtime_profiles/official/worldbench.yaml --output-dir 
  tmp/worldfoundry_preflight/worldbench --json
python_path: ${WORLDFOUNDRY_CONDA_ROOT}/worldplay/bin/python
required_assets:
  local_dataset_paths:
  - cache/worldfoundry/data/hfd_datasets/worldbenchmark/WorldBench
  - cache/worldfoundry/data/hfd_datasets/worldbenchmark__WorldBench
  task_yaml: worldfoundry/data/benchmarks/tasks/external/worldbench.yaml
required_env:
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
optional_env:
- WORLDFOUNDRY_WORLDBENCH_ARTIFACT_SCORE_DIR
- WORLDFOUNDRY_WORLDBENCH_RESULTS_PATH
required_packages:
- numpy
- opencv-python
- decord
required_paths:
- id: official_runner_script
  path: worldfoundry/evaluation/tasks/execution/runners/worldbench/run_worldbench_official_runner.py
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/worldbench.yaml
- id: local_dataset_1
  path: cache/worldfoundry/data/hfd_datasets/worldbenchmark/WorldBench
- id: local_dataset_2
  path: cache/worldfoundry/data/hfd_datasets/worldbenchmark__WorldBench
requires_cuda_visibility: false
status: in_tree_official_runtime_ready_source_verified_runtime_unconfirmed
optional_imports:
- numpy
base_model_dependencies:
- worldbench_dataset_assets
optional_base_model_dependencies:
- video_world_perception_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- worldbench
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
