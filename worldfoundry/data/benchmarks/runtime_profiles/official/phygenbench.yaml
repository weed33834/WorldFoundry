benchmark_ids:
- phygenbench
blocked_reason: full official leaderboard parity still requires stage judge/checkpoint/API assets, generated artifacts, and full-suite
  execution
environment_id: worldplay-phygenbench-contract
id: phygenbench
name: PhyGenBench
needs_new_env: false
notes:
- Official source metadata, prompts, and the PhyGenEval aggregator are in-tree; WORLDFOUNDRY_PHYGENBENCH_ROOT is only an override.
- In-tree official-result normalizer is available through worldfoundry-eval zoo benchmark-run --mode official-validation
  --official-results-path.
- This profile does not claim leaderboard validity until the full PhyGenEval stage judges are executed on official generated
  artifacts.
preflight_command: PYTHONPATH=. ${WORLDFOUNDRY_CONDA_ROOT}/worldplay/bin/python -m
  worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight --profile phygenbench --manifest
  worldfoundry/data/benchmarks/runtime_profiles/official/phygenbench.yaml --output-dir
  tmp/worldfoundry_preflight/phygenbench --json
python_path: ${WORLDFOUNDRY_CONDA_ROOT}/worldplay/bin/python
pythonpath_roots:
- .
required_assets:
  in_tree_runtime_paths:
  - worldfoundry/data/benchmarks/assets/phygenbench/PhyGenBench/prompts.json
  - worldfoundry/evaluation/tasks/execution/runners/phygenbench/runtime/phygenbench/PhyGenEval/overall.py
  task_yaml: worldfoundry/data/benchmarks/tasks/external/phygenbench.yaml
required_env:
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
- WORLDFOUNDRY_PHYGENBENCH_RESULTS_PATH
required_packages:
- numpy
required_paths:
- id: official_runner_script
  path: worldfoundry/evaluation/tasks/execution/runners/phygenbench/run_phygenbench_official_runner.py
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/phygenbench.yaml
- id: in_tree_runtime
  path: worldfoundry/evaluation/tasks/execution/runners/phygenbench/runtime/phygenbench/PhyGenEval/overall.py
requires_cuda_visibility: false
status: official_runtime_ready_full_upstream_pending
optional_imports:
- numpy
optional_base_model_dependencies:
- grounded_depth_segmentation_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- phygenbench
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
