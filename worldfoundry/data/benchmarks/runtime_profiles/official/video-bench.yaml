benchmark_ids:
- video-bench
blocked_reason: Video-Bench official judge wrapper is credential-gated; provide OPENAI_API_KEY or the Video-Bench 
  GPT-4o/GPT-4o-mini keys plus generated videos to execute the official judge.
environment_id: worldplay-videobench-api-wrapper
id: video-bench
name: Video-Bench
needs_new_env: false
notes:
- Video-Bench official judge wrapper is integrated but credential-gated; missing local API keys block immediate official
  execution, not catalog integration.
- With user-provided GPT-4o/GPT-4o-mini compatible credentials and generated videos, the runner dispatches to upstream 
  evaluate.py and normalizes official score outputs.
preflight_command: PYTHONPATH=. ${WORLDFOUNDRY_UNIFIED_PYTHON:-python} -m 
  worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight --profile video-bench --manifest 
  worldfoundry/data/benchmarks/runtime_profiles/official/video-bench.yaml --output-dir 
  tmp/worldfoundry_preflight/video-bench --json
python_path: ${WORLDFOUNDRY_UNIFIED_PYTHON:-python}
pythonpath_roots:
- .
required_assets:
  local_dataset_paths:
  - cache/worldfoundry/data/hfd_datasets/Video-Bench/Video-Bench_human_annotation
  - cache/worldfoundry/data/hfd_datasets/Video-Bench__Video-Bench_human_annotation
  - cache/worldfoundry/data/hfd_datasets/Video-Bench/Video-Bench_videos
  - cache/worldfoundry/data/hfd_datasets/Video-Bench__Video-Bench_videos
  in_tree_runtime_paths:
  - worldfoundry/evaluation/tasks/execution/runners/videobench/runtime
  task_yaml: worldfoundry/data/benchmarks/tasks/external/video-bench.yaml
required_env:
- WORLDFOUNDRY_VIDEOBENCH_RESULTS_PATH
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
- OPENAI_API_KEY
optional_env:
- WORLDFOUNDRY_VIDEOBENCH_ROOT
- WORLDFOUNDRY_VIDEOBENCH_ANNOTATION_ROOT
- WORLDFOUNDRY_VIDEOBENCH_OFFICIAL_VIDEOS_ROOT
- WORLDFOUNDRY_VIDEOBENCH_GENERATED_VIDEO_DIR
- WORLDFOUNDRY_VIDEOBENCH_MODEL_OUTPUT_DIR
required_packages:
- numpy
- opencv-python
- openai
- click
required_paths:
- id: official_runner_script
  path: worldfoundry/evaluation/tasks/execution/runners/videobench/run_videobench_official_runner.py
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/video-bench.yaml
- id: in_tree_runtime
  path: worldfoundry/evaluation/tasks/execution/runners/videobench/runtime
- id: local_dataset_1
  path: cache/worldfoundry/data/hfd_datasets/Video-Bench/Video-Bench_human_annotation
- id: local_dataset_2
  path: cache/worldfoundry/data/hfd_datasets/Video-Bench__Video-Bench_human_annotation
- id: local_dataset_3
  path: cache/worldfoundry/data/hfd_datasets/Video-Bench/Video-Bench_videos
- id: local_dataset_4
  path: cache/worldfoundry/data/hfd_datasets/Video-Bench__Video-Bench_videos
requires_cuda_visibility: false
status: in_tree_official_runtime_ready_full_api_assets_pending
optional_imports:
- numpy
base_model_dependencies:
- video_bench_dataset_assets
optional_base_model_dependencies:
- grounded_video_quality_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- video-bench
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
