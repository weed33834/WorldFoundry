benchmark_ids:
- genai-bench
blocked_reason: in-tree official scorer path is integrated; full leaderboard validation still 
  requires official human labels, GPU VQAScore checkpoints, and generated artifacts
environment_id: worldplay-genai-bench-contract
id: genai-bench
name: GenAI-Bench
needs_new_env: false
notes:
- In-tree official result import is available for caller-provided CSV/JSON/JSONL/TSV outputs.
- Use `--run-official` with `WORLDFOUNDRY_GENAI_BENCH_SCORER_BACKEND` to select the scorer backend.
- Full GPU VQAScore execution requires staged clip-flant5-xxl checkpoints via `t2v_metrics_clip_flant5_xxl`.
preflight_command: PYTHONPATH=. ${WORLDFOUNDRY_CONDA_ROOT}/worldplay/bin/python -m 
  worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight --profile genai-bench --manifest 
  worldfoundry/data/benchmarks/runtime_profiles/official/genai-bench.yaml --output-dir 
  tmp/worldfoundry_preflight/genai-bench --json
python_path: ${WORLDFOUNDRY_CONDA_ROOT}/worldplay/bin/python
pythonpath_roots: []
required_assets:
  task_yaml: worldfoundry/data/benchmarks/tasks/external/genai-bench.yaml
required_env:
- WORLDFOUNDRY_GENAI_BENCH_RESULTS_PATH
required_paths:
- id: official_runner_script
  path: worldfoundry/evaluation/tasks/execution/runners/genai_bench/run_genai_bench_official_runner.py
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/genai-bench.yaml
requires_cuda_visibility: false
status: in_tree_official_runtime_ready
optional_imports:
- numpy
base_model_dependencies:
- genai_bench_dataset_assets
- t2v_metrics_source_assets
optional_base_model_dependencies:
- genai_bench_metric_stack
- t2v_metrics_metric_stack
- t2v_metrics_clip_flant5_xxl
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- genai-bench
- --mode
- official-validation
- --official-results-path
- <official_results.jsonl>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
