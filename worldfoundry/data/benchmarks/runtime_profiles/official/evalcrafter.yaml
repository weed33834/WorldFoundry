base_model_dependencies:
- grounded_video_quality_stack
base_model_dependency_preflight:
  status: ready
  missing: []
benchmark_ids:
- evalcrafter
blocked_reason: EvalCrafter official-run wrapper is leaderboard-capable; full official execution still needs 
  DOVER/OCR/action-recognition/BLIP2/SDXL/identity metric assets and a complete 700-video directory.
environment_id: worldfoundry-evalcrafter-metrics
id: evalcrafter
name: EvalCrafter
needs_new_env: true
notes:
- EvalCrafter prompt suite and runner code are local; WorldFoundry can normalize official EvalCrafter final_result.txt outputs.
- Official-run input validation requires an inner generated-video directory with direct 0000.mp4 through 0699.mp4 files.
- A completed official-run scorecard is leaderboard-valid only when official_benchmark_verified and 
  eligibility.leaderboard_valid are true.
- Reusable CLIP ViT-B/32, RAFT, GroundingDINO, SAM, and SAM2 dependencies are tracked through base_models.
- Optional SAM ViT-B and DeAOT tracker assets are surfaced through base_models for full object-attribute metrics.
- Full official metrics use the `worldfoundry-evalcrafter-metrics` runtime profile when heavyweight metric packages are
  installed; result normalization alone can run in the unified environment.
- DOVER, OCR, action-recognition, BLIP2, SDXL, celebrity-ID, and generated-video assets remain full-suite blockers until
  staged locally.
optional_base_model_dependencies:
- sam_vit_b
- aot_deaot_l
preflight_command: PYTHONPATH=. ${WORLDFOUNDRY_UNIFIED_PYTHON:-python} -m 
  worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight --profile evalcrafter --manifest 
  worldfoundry/data/benchmarks/runtime_profiles/official/evalcrafter.yaml --output-dir 
  tmp/worldfoundry_preflight/evalcrafter --json
python_path: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}/worldfoundry-evalcrafter-metrics/bin/python
pythonpath_roots:
- worldfoundry/base_models/perception_core/face/deepface
- worldfoundry/base_models/perception_core/video_quality/dover
required_assets:
  in_tree_runtime_paths:
  - worldfoundry/evaluation/tasks/execution/runners/evalcrafter/runtime/evalcrafter
  generated_artifact_examples:
  - ${WORLDFOUNDRY_EVALCRAFTER_DATASET_ROOT}/videocrafter2/mix-sr
  local_dataset_paths:
  - RaphaelLiu/EvalCrafter_T2V_Dataset
  - RaphaelLiu__EvalCrafter_T2V_Dataset
  - EvalCrafter_T2V_Dataset
  task_yaml: worldfoundry/data/benchmarks/tasks/external/evalcrafter.yaml
required_env: []
required_imports:
- numpy
- cv2
- decord
- torch
- transformers
- PIL
- torchvision
optional_imports:
- dover
- diffusers
- pandas
- timm
- deepface
- paddleocr
- mmaction
- pycocoevalcap
required_packages:
- numpy
- opencv-python
- decord
- torch
- transformers
- pillow
- torchvision
required_paths:
- id: evalcrafter_prompt_suite
  path: worldfoundry/data/benchmarks/assets/evalcrafter/prompt700.txt
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/evalcrafter.yaml
optional_paths:
- id: evalcrafter_dover_checkpoint
  path: ${WORLDFOUNDRY_CKPT_DIR}/evalcrafter/checkpoints/DOVER/pretrained_weights/DOVER.pth
- id: evalcrafter_blip2_model_dir
  path: ${WORLDFOUNDRY_CKPT_DIR}/evalcrafter/checkpoints/blip2-opt-2.7b
- id: evalcrafter_sdxl_model_dir
  path: ${WORLDFOUNDRY_CKPT_DIR}/evalcrafter/checkpoints/stable-diffusion-xl-base-1.0
- id: evalcrafter_inception_checkpoint
  path: ${WORLDFOUNDRY_CKPT_DIR}/evalcrafter/checkpoints/pt_inception-2015-12-05-6726825d.pth
- id: evalcrafter_videomae_checkpoint_dir
  path: ${WORLDFOUNDRY_CKPT_DIR}/evalcrafter/checkpoints/VideoMAE
- id: evalcrafter_flownet2_checkpoint
  path: ${WORLDFOUNDRY_CKPT_DIR}/evalcrafter/checkpoints/FlowNet2_checkpoint.pth.tar
- id: evalcrafter_vgg_face_checkpoint
  path: ${WORLDFOUNDRY_CKPT_DIR}/evalcrafter/checkpoints/vgg_face_weights.h5
- id: evalcrafter_deaot_checkpoint
  path: ${WORLDFOUNDRY_CKPT_DIR}/evalcrafter/checkpoints/ckpt/R50_DeAOTL_PRE_YTB_DAV.pth
requires_cuda_visibility: false
status: in_tree_official_runtime_ready_full_metrics_pending
validation_command:
- ${WORLDFOUNDRY_UNIFIED_PYTHON}
- worldfoundry/evaluation/tasks/execution/runners/evalcrafter/run_evalcrafter_official_runner.py
- --evalcrafter-root
- worldfoundry/evaluation/tasks/execution/runners/evalcrafter/runtime/evalcrafter
- --results-dir
- <results-dir-with-final_result.txt>
- --output-dir
- <out>
- --json
