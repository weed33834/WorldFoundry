benchmark_ids:
- vmbench
blocked_reason: VMBench official eval code is vendored in tree; full CUDA metric recomputation still requires metric
  checkpoints, Python metric packages, and generated videos.
environment_id: worldfoundry-unified-cu128
id: vmbench
name: VMBench
needs_new_env: false
notes:
- WorldFoundry runs vendored VMBench official metric code from runners/vmbench/runtime/official and also normalizes
  official results.json or scores.csv.
- Heavy metric dependencies reuse WorldFoundry base_models for GroundingDINO, SAM, SAM2, and CoTracker rather than an
  additional VMBench checkout.
base_model_dependency_preflight:
  notes:
  - RAFT, SEA-RAFT, and GMFlow reusable motion assets are tracked through the WorldFoundry base-model registry.
  - VMBench-specific checkpoint assets remain required for full metric recomputation.
  status: integrated
preflight_command: PYTHONPATH=. ${WORLDFOUNDRY_CONDA_ENVS_ROOT}/worldfoundry-unified-cu128/bin/python -m
  worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight --profile vmbench --manifest
  worldfoundry/data/benchmarks/runtime_profiles/official/vmbench.yaml --output-dir tmp/worldfoundry_preflight/vmbench
  --json
python_path: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}/worldfoundry-unified-cu128/bin/python
pythonpath_roots:
- .
required_assets:
  in_tree_runtime_paths:
  - worldfoundry/evaluation/tasks/execution/runners/vmbench/run_vmbench_official_runner.py
  - worldfoundry/evaluation/tasks/execution/runners/vmbench/vmbench_official_runtime.py
  - worldfoundry/evaluation/tasks/execution/runners/vmbench/runtime/official
  bundled_prompt_assets: worldfoundry/data/benchmarks/assets/vmbench/prompts/prompts.json
  task_yaml: worldfoundry/data/benchmarks/tasks/external/vmbench.yaml
required_env: []
optional_env:
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
- WORLDFOUNDRY_VMBENCH_ARTIFACT_SCORE_DIR
- WORLDFOUNDRY_VMBENCH_PROMPT_MANIFEST
- WORLDFOUNDRY_VMBENCH_RESULTS_PATH
required_packages:
- numpy
required_paths:
- id: official_runner_script
  path: worldfoundry/evaluation/tasks/execution/runners/vmbench/run_vmbench_official_runner.py
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/vmbench.yaml
- id: in_tree_runtime_root
  path: worldfoundry/evaluation/tasks/execution/runners/vmbench
- id: vendored_official_runtime
  path: worldfoundry/evaluation/tasks/execution/runners/vmbench/runtime/official
- id: official_runtime_launcher
  path: worldfoundry/evaluation/tasks/execution/runners/vmbench/vmbench_official_runtime.py
- id: bundled_prompt_suite
  path: worldfoundry/data/benchmarks/assets/vmbench/prompts/prompts.json
requires_cuda_visibility: false
status: in_tree_official_runtime_ready_full_metric_assets_pending
optional_imports:
- numpy
- torch
- cv2
- decord
- timm
- mmpose
- mmdet
- deepspeed
- hydra
- omegaconf
- mmcv
- mmengine
- json_tricks
- supervision
optional_base_model_dependencies:
- motion_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- vmbench
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
