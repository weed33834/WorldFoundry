benchmark_ids:
- vlabench
blocked_reason: VLABench full status requires its SAPIEN-compatible simulator runtime, selected task split, policy 
  checkpoint, and official rollout outputs.
environment_id: vlabench-runtime
id: vlabench
name: VLABench
docker:
  image: ghcr.io/allenai/vla-evaluation-harness/vlabench:latest
  source_image: ghcr.io/allenai/vla-evaluation-harness/vlabench:latest
  python_env: vlabench
  gpus: all
needs_new_env: true
notes:
- WorldFoundry provides contract and official result normalization for caller-provided VLABench outputs.
python_path: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}/worldfoundry-unified-cu128/bin/python
required_assets:
  local_dataset_paths:
  - ${WORLDFOUNDRY_DATA_DIR}/datasets/vlabench
  local_repo_paths:
  - ${WORLDFOUNDRY_CACHE_DIR}/repos/OpenMOSS--VLABench
  task_yaml: worldfoundry/data/benchmarks/tasks/external/vlabench.yaml
required_env:
- WORLDFOUNDRY_VLABENCH_ROOT
- WORLDFOUNDRY_VLABENCH_RESULTS_PATH
required_imports:
- numpy
required_packages:
- numpy
required_paths:
- id: official_result_normalizer
  path: worldfoundry/evaluation/tasks/embodied/normalizer.py
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/vlabench.yaml
requires_cuda_visibility: false
status: official_result_normalizer_ready_full_runtime_pending
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- vlabench
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --output-dir
- <out>
- --json
