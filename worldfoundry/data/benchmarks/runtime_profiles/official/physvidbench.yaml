benchmark_ids:
- physvidbench
credential_gated_reason: PhysVidBench official-run requires Gemini API access and AuroraCap caption tracks; local backend
  selection is available for fixture validation.
environment_id: worldplay-video-judge
id: physvidbench
name: PhysVidBench
needs_new_env: false
notes:
- WorldFoundry runs in-tree Gemini QA over prompts_questions.csv and 8-caption AuroraCap tracks.
- Use WORLDFOUNDRY_PHYSVIDBENCH_JUDGE_BACKEND to select the judge backend.
preflight_command: PYTHONPATH=. ${WORLDFOUNDRY_CONDA_ROOT}/worldplay/bin/python -m
  worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight --profile physvidbench --manifest
  worldfoundry/data/benchmarks/runtime_profiles/official/physvidbench.yaml --output-dir
  tmp/worldfoundry_preflight/physvidbench --json
python_path: ${WORLDFOUNDRY_CONDA_ROOT}/worldplay/bin/python
required_assets:
  bundled_asset_paths:
  - worldfoundry/data/benchmarks/assets/physvidbench/prompts_questions.csv
  - worldfoundry/data/benchmarks/assets/physvidbench/captions
  task_yaml: worldfoundry/data/benchmarks/tasks/external/physvidbench.yaml
required_env:
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
optional_env:
- WORLDFOUNDRY_PHYSVIDBENCH_PROMPT_MANIFEST
- WORLDFOUNDRY_PHYSVIDBENCH_CAPTIONS_DIR
- WORLDFOUNDRY_PHYSVIDBENCH_CAPTION_BASE
- WORLDFOUNDRY_PHYSVIDBENCH_JUDGE_BACKEND
- WORLDFOUNDRY_PHYSVIDBENCH_RESULTS_PATH
- WORLDFOUNDRY_PHYSVIDBENCH_STRICT
required_imports:
- pandas
required_packages:
- pandas
required_paths:
- id: official_runner_script
  path: worldfoundry/evaluation/tasks/execution/runners/physvidbench/run_physvidbench_official_runner.py
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/physvidbench.yaml
requires_cuda_visibility: false
status: official_runtime_ready
optional_imports:
- google.genai
base_model_dependencies:
- physvidbench_dataset_assets
optional_base_model_dependencies:
- physvidbench_source_assets
official_run_command:
- PYTHONPATH=.
- "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}"
- worldfoundry/evaluation/tasks/execution/runners/physvidbench/run_physvidbench_official_runner.py
- --run-official
- --generated-artifact-dir
- "${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}"
- --output-dir
- "${WORLDFOUNDRY_BENCHMARK_OUTPUT_DIR}"
- --json
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- physvidbench
- --mode
- official-validation
- --official-results-path
- <output.csv>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
