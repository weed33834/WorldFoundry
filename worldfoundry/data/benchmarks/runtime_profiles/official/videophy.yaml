benchmark_ids:
- videophy
blocked_reason: full leaderboard parity still requires VideoCon-Physics checkpoint on all 688 prompts
environment_id: worldplay-videophy-contract
id: videophy
name: VideoPhy
needs_new_env: false
notes:
- In-tree bundled prompts and local judge runtime are available without external checkouts.
- Use --run-official with WORLDFOUNDRY_VIDEOPHY_JUDGE_BACKEND to select the judge backend.
- Full VideoCon-Physics execution remains optional via Hugging Face or local checkpoint assets.
preflight_command: PYTHONPATH=. ${WORLDFOUNDRY_UNIFIED_PYTHON:-python} -m
  worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight --profile videophy --manifest
  worldfoundry/data/benchmarks/runtime_profiles/official/videophy.yaml --output-dir tmp/worldfoundry_preflight/videophy
  --json
python_path: ${WORLDFOUNDRY_UNIFIED_PYTHON:-python}
pythonpath_roots:
- .
required_assets:
  bundled_prompt_manifest: worldfoundry/data/benchmarks/assets/videophy/prompts.json
  task_yaml: worldfoundry/data/benchmarks/tasks/external/videophy.yaml
required_env:
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
required_packages:
- numpy
required_paths:
- id: official_runner_script
  path: worldfoundry/evaluation/tasks/execution/runners/videophy/run_videophy_official_runner.py
- id: bundled_prompt_manifest
  path: worldfoundry/data/benchmarks/assets/videophy/prompts.json
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/videophy.yaml
requires_cuda_visibility: false
status: official_runtime_ready_full_upstream_pending
optional_imports:
- numpy
optional_base_model_dependencies:
- grounded_depth_segmentation_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- videophy
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
