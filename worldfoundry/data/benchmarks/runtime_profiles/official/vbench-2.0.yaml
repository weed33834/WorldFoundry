  scorecard: tmp/local_open_eval/gpu_vbench2_cu113_diversity_probe/scorecard.json
blocked_reason: Bounded Diversity official GPU validation passed; full VBench-2.0 suite still needs the complete 
  generated video set, dataset assets, and materialized base-model checkpoints.
environment_id: worldfoundry-unified-cu128
id: vbench-2.0
name: VBench-2.0
needs_new_env: false
notes:
- This profile is pinned to the shared worldfoundry-unified-cu128 runtime for bounded official-run validation tests.
- Full-suite runs use in-tree VBench-2.0 code and reusable base-model assets for LLaVA-Video, Qwen, YOLO-World, ArcFace,
  anomaly detection, CoTracker, and RAFT. Leaderboard-scale validation still requires the complete generated video set 
  and all corresponding checkpoints.
- "Human_Identity additionally requires retinaface-py (retinaface.predict_single) and the staged RetinaFace checkpoint exposed as WORLDFOUNDRY_VBENCH_RETINAFACE_CKPT."
base_model_dependencies:
- vbench_perception_metric_stack
base_model_dependency_preflight:
  status: ready
  notes:
  - VBench-2.0 source is integrated under its version-specific in-tree runner runtime.
  - CLIP, DINOv2, GroundingDINO, SAM-family segmentation, RAFT, CoTracker, LLaVA-Video, Qwen, YOLO-World, ArcFace, and 
    anomaly-detector assets are tracked as reusable WorldFoundry base-model assets.
  - The version-specific VBench-2.0 runner has no runner-local foundation-model fork; dimension code resolves 
    checkpoints through the base-model/cache paths.
  missing: []
preflight_command: PYTHONPATH=worldfoundry/evaluation/tasks/execution/runners/vbench_2_0/runtime:. 
  ${WORLDFOUNDRY_CONDA_ENVS_ROOT}/worldfoundry-unified-cu128/bin/python -m 
  worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight --profile vbench-2.0 --manifest 
  worldfoundry/data/benchmarks/runtime_profiles/official/vbench-2.0.yaml --output-dir 
  tmp/worldfoundry_preflight/vbench-2.0 --json
python_path: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}/worldfoundry-unified-cu128/bin/python
