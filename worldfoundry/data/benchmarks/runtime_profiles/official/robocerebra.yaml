benchmark_ids:
- robocerebra
blocked_reason: RoboCerebra full status requires upstream simulator assets, selected tasks, policy checkpoint, and 
  official rollout outputs.
environment_id: worldfoundry-unified-cu128
id: robocerebra
name: RoboCerebra
docker:
  image: ghcr.io/allenai/vla-evaluation-harness/robocerebra:latest
  source_image: ghcr.io/allenai/vla-evaluation-harness/robocerebra:latest
  python_env: libero
  runtime: nvidia
  gpus: all
needs_new_env: false
notes:
- WorldFoundry provides contract and official result normalization for caller-provided RoboCerebra outputs.
python_path: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}/worldfoundry-unified-cu128/bin/python
required_assets:
  local_dataset_paths:
  - ${WORLDFOUNDRY_DATA_DIR}/datasets/robocerebra
  local_repo_paths:
  - ${WORLDFOUNDRY_CACHE_DIR}/repos/buaa-colalab--RoboCerebra
  task_yaml: worldfoundry/data/benchmarks/tasks/external/robocerebra.yaml
required_env:
- WORLDFOUNDRY_ROBOCEREBRA_ROOT
- WORLDFOUNDRY_ROBOCEREBRA_RESULTS_PATH
required_imports:
- numpy
required_packages:
- numpy
required_paths:
- id: official_result_normalizer
  path: worldfoundry/evaluation/tasks/embodied/normalizer.py
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/robocerebra.yaml
requires_cuda_visibility: false
status: official_result_normalizer_ready_full_runtime_pending
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- robocerebra
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --output-dir
- <out>
- --json
