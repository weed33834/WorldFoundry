benchmark_ids:
- rlbench
blocked_reason: RLBench 需要 CoppeliaSim/PyRep 组合环境；当前只记录 env vars 和 task manifest，不启动 simulator。
environment_id: needs-rlbench-pyrep-coppeliasim-env
id: rlbench
name: RLBench
docker:
  image: ghcr.io/allenai/vla-evaluation-harness/rlbench:latest
  source_image: ghcr.io/allenai/vla-evaluation-harness/rlbench:latest
  python_env: rlbench
  runtime: nvidia
  xvfb: true
  gpus: all
needs_new_env: true
notes:
- RLBench 需要 CoppeliaSim/PyRep 组合环境；当前只记录 env vars 和 task manifest，不启动 simulator。
preflight_command: PYTHONPATH=. ${WORLDFOUNDRY_CONDA_ROOT}/worldplay/bin/python -m 
  worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight --profile rlbench --manifest 
  worldfoundry/data/benchmarks/runtime_profiles/official/rlbench.yaml --output-dir tmp/worldfoundry_preflight/rlbench 
  --json
python_path: ${WORLDFOUNDRY_CONDA_ROOT}/worldplay/bin/python
required_assets:
  task_yaml: worldfoundry/data/benchmarks/tasks/external/rlbench.yaml
required_env:
- WORLDFOUNDRY_RLBENCH_ROOT
- COPPELIASIM_ROOT
- WORLDFOUNDRY_RLBENCH_RESULTS_PATH
required_packages:
- numpy
required_paths:
- id: official_result_normalizer
  path: worldfoundry/evaluation/tasks/embodied/normalizer.py
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/rlbench.yaml
requires_cuda_visibility: false
status: official_result_normalizer_ready_full_runtime_pending
optional_imports:
- numpy
optional_base_model_dependencies:
- spatial_perception_core_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- rlbench
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --output-dir
- <out>
- --json
