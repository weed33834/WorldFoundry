benchmark_ids:
- videoscience-bench
blocked_reason: VideoScience-Bench official-result normalization is wired; full upstream runtime, generated artifacts, 
  and leaderboard parity remain pending.
environment_id: worldplay-videoscience-bench-contract
id: videoscience-bench
name: VideoScience-Bench
needs_new_env: false
notes:
- WorldFoundry ships the VideoScience VLM judge runtime and official data.csv metadata in tree.
- Full validation requires generated videos and a configured VLM judge provider/API key.
preflight_command: PYTHONPATH=. ${WORLDFOUNDRY_UNIFIED_PYTHON:-python} -m
  worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight --profile videoscience-bench --manifest 
  worldfoundry/data/benchmarks/runtime_profiles/official/videoscience-bench.yaml --output-dir 
  tmp/worldfoundry_preflight/videoscience-bench --json
python_path: ${WORLDFOUNDRY_UNIFIED_PYTHON:-python}
pythonpath_roots:
- .
required_assets:
  in_tree_runtime_paths:
  - worldfoundry/evaluation/tasks/execution/runners/videoscience_bench/runtime/videoscience_bench
  task_yaml: worldfoundry/data/benchmarks/tasks/external/videoscience-bench.yaml
required_env:
- WORLDFOUNDRY_VIDEOSCIENCE_BENCH_RESULTS_PATH
optional_env:
- WORLDFOUNDRY_VIDEOSCIENCE_BENCH_ROOT
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
- WORLDFOUNDRY_VIDEOSCIENCE_PROVIDER
- WORLDFOUNDRY_VIDEOSCIENCE_MODEL
- OPENAI_API_KEY
- GEMINI_API_KEY
- ANTHROPIC_API_KEY
required_imports:
- numpy
required_packages:
- numpy
- id: official_runner_script
  path: worldfoundry/evaluation/tasks/execution/runners/videoscience_bench/run_videoscience_bench_official_runner.py
required_paths:
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/videoscience-bench.yaml
- id: in_tree_runtime
  path: worldfoundry/evaluation/tasks/execution/runners/videoscience_bench/runtime/videoscience_bench
requires_cuda_visibility: false
status: in_tree_vlm_judge_runtime_ready
optional_imports:
- numpy
optional_base_model_dependencies:
- grounded_depth_segmentation_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- videoscience-bench
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
