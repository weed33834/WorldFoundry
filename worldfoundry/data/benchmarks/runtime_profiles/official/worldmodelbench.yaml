benchmark_ids:
- worldmodelbench
blocked_reason: WorldModelBench official-result normalization and 350-instance manifest coverage checks are 
  framework-verified; leaderboard parity still requires judge checkpoint execution and upstream submission evidence.
environment_id: worldfoundry-unified-cu128
id: worldmodelbench
name: WorldModelBench
needs_new_env: false
notes:
- WorldModelBench specialized normalizer validates official accs/preds shape and records 350-instance manifest video 
  coverage through the unified benchmark-run entrypoint.
- If the user supplies a VILA judge checkpoint with WORLDFOUNDRY_WORLDMODELBENCH_JUDGE, the same wrapper starts judge 
  execution through the in-tree VILA runtime.
- Full-test harness is marked ready when worldmodelbench.json, matching generated videos, and official-shaped upstream 
  result files are supplied.
- Full leaderboard parity still requires VILA judge checkpoint execution and upstream submission evidence.
preflight_command: PYTHONPATH=worldfoundry/evaluation/tasks/execution/runners/worldmodelbench/runtime:. 
  ${WORLDFOUNDRY_CONDA_ENVS_ROOT}/worldfoundry-unified-cu128/bin/python -m 
  worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight --profile worldmodelbench --manifest 
  worldfoundry/data/benchmarks/runtime_profiles/official/worldmodelbench.yaml --output-dir 
  tmp/worldfoundry_preflight/worldmodelbench --json
python_path: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}/worldfoundry-unified-cu128/bin/python
pythonpath_roots:
- worldfoundry/evaluation/tasks/execution/runners/worldmodelbench/runtime
- .
required_assets:
  local_dataset_paths:
  - cache/worldfoundry/data/hfd_datasets/Efficient-Large-Model/worldmodelbench
  - cache/worldfoundry/data/hfd_datasets/Efficient-Large-Model__worldmodelbench
  - cache/worldfoundry/data/hfd_datasets/datasets--Efficient-Large-Model--worldmodelbench
  - cache/worldfoundry/data/hfd_datasets/worldmodelbench
  user_supplied_data_layout:
  - <worldmodelbench_data_root>/worldmodelbench.json
  - <worldmodelbench_data_root>/evaluation.py
  - <worldmodelbench_data_root>/images/
  task_yaml: worldfoundry/data/benchmarks/tasks/external/worldmodelbench.yaml
required_env:
- WORLDFOUNDRY_WORLDMODELBENCH_RESULTS_PATH
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
- WORLDFOUNDRY_WORLDMODELBENCH_DATA_ROOT or WORLDFOUNDRY_BENCHMARK_DATA_ROOT
- WORLDFOUNDRY_WORLDMODELBENCH_JUDGE=<VILA_checkpoint_or_HF_model_id>
optional_env:
- WORLDFOUNDRY_WORLDMODELBENCH_ROOT
required_packages:
- numpy
- rich
- mmengine
- In-tree WorldFoundry VILA runtime
required_paths:
- id: official_runner_script
  path: worldfoundry/evaluation/tasks/execution/runners/worldmodelbench/run_worldmodelbench_official_runner.py
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/worldmodelbench.yaml
- id: in_tree_runtime
  path: worldfoundry/evaluation/tasks/execution/runners/worldmodelbench/runtime
- id: local_dataset_1
  path: cache/worldfoundry/data/hfd_datasets/Efficient-Large-Model/worldmodelbench
- id: local_dataset_2
  path: cache/worldfoundry/data/hfd_datasets/Efficient-Large-Model__worldmodelbench
- id: generated_artifact_example_1
requires_cuda_visibility: true
status: in_tree_official_runtime_ready_full_judge_assets_pending
full_test_harness_ready: true
full_suite_testable: true
full_suite_execution_recorded: false
optional_imports:
- numpy
base_model_dependencies:
- worldmodelbench_dataset_assets
- worldmodelbench_vila_judge_model
optional_base_model_dependencies:
- video_world_perception_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- worldmodelbench
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --benchmark-data-root
- <worldmodelbench_data_root>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
