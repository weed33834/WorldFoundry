benchmark_ids:
- t2vworldbench
blocked_reason: T2VWorldBench official-result normalization is wired; full generated artifacts, staged Drive data, 
  upstream VLM runtime, and leaderboard parity remain pending.
environment_id: worldplay-core
id: t2vworldbench
name: T2VWorldBench
needs_new_env: false
notes:
- WorldFoundry normalizes caller-provided T2VWorldBench official result files through the unified benchmark-run 
  entrypoint.
- The code-only eval.py runtime is checked in; generated videos and prompt metadata are runtime inputs, not external
  checkout requirements.
preflight_command: PYTHONPATH=. ${WORLDFOUNDRY_UNIFIED_PYTHON:-python} -m
  worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight --profile t2vworldbench --manifest 
  worldfoundry/data/benchmarks/runtime_profiles/official/t2vworldbench.yaml --output-dir 
  tmp/worldfoundry_preflight/t2vworldbench --json
python_path: ${WORLDFOUNDRY_UNIFIED_PYTHON:-python}
pythonpath_roots:
- .
required_assets:
  in_tree_runtime_paths:
  - worldfoundry/evaluation/tasks/execution/runners/t2vworldbench/runtime/t2vworldbench
  bundled_asset_paths:
  - worldfoundry/data/benchmarks/assets/t2vworldbench/prompt/prompt.csv
  - worldfoundry/data/benchmarks/assets/t2vworldbench/data/meta_data/meta_data.json
  task_yaml: worldfoundry/data/benchmarks/tasks/external/t2vworldbench.yaml
required_env:
- WORLDFOUNDRY_T2VWORLDBENCH_RESULTS_PATH
optional_env:
- WORLDFOUNDRY_T2VWORLDBENCH_ROOT
- WORLDFOUNDRY_T2VWORLDBENCH_PROMPT_FILE
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
required_imports:
- numpy
required_packages:
- numpy
- id: official_runner_script
  path: worldfoundry/evaluation/tasks/execution/runners/t2vworldbench/run_t2vworldbench_official_runner.py
required_paths:
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/t2vworldbench.yaml
- id: in_tree_runtime
  path: worldfoundry/evaluation/tasks/execution/runners/t2vworldbench/runtime/t2vworldbench
- id: bundled_prompt_csv
  path: worldfoundry/data/benchmarks/assets/t2vworldbench/prompt/prompt.csv
- id: bundled_metadata_json
  path: worldfoundry/data/benchmarks/assets/t2vworldbench/data/meta_data/meta_data.json
requires_cuda_visibility: false
status: in_tree_official_runtime_ready
optional_imports:
- numpy
optional_base_model_dependencies:
- video_world_perception_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- t2vworldbench
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
