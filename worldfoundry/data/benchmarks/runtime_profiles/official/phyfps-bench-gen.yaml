benchmark_ids:
- phyfps-bench-gen
credential_gated_reason: PhyFPS-Bench-Gen official-run requires Visual Chronometer checkpoint access and generated 
  videos; no external VLM/API judge is required.
environment_id: worldplay-video-judge
id: phyfps-bench-gen
name: PhyFPS-Bench-Gen
needs_new_env: false
notes:
- WorldFoundry runs Visual Chronometer PhyFPS prediction in-process and normalizes results.csv into the PhyFPS-Bench-Gen
  metric surface.
- Alignment metrics require Meta FPS via WORLDFOUNDRY_PHYFPS_META_FPS or a manifest.
- Generated videos should follow 0001.mp4 through 0100.mp4 naming aligned with prompts.txt.
preflight_command: PYTHONPATH=. ${WORLDFOUNDRY_UNIFIED_PYTHON:-python} -m 
  worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight --profile phyfps-bench-gen --manifest 
  worldfoundry/data/benchmarks/runtime_profiles/official/phyfps-bench-gen.yaml --output-dir 
  tmp/worldfoundry_preflight/phyfps-bench-gen --json
python_path: ${WORLDFOUNDRY_UNIFIED_PYTHON:-python}
required_assets:
  in_tree_runtime_paths:
  - worldfoundry/evaluation/tasks/execution/runners/phyfps_bench_gen/runtime/visual_chronometer
  task_yaml: worldfoundry/data/benchmarks/tasks/external/phyfps-bench-gen.yaml
required_env:
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
optional_env:
- WORLDFOUNDRY_PHYFPS_BENCH_GEN_ROOT
- WORLDFOUNDRY_VISUAL_CHRONOMETER_ROOT
- WORLDFOUNDRY_PHYFPS_BENCH_GEN_PROMPT_MANIFEST
- WORLDFOUNDRY_PHYFPS_META_FPS
- WORLDFOUNDRY_PHYFPS_META_FPS_MANIFEST
- WORLDFOUNDRY_PHYFPS_PREDICT_BACKEND
- WORLDFOUNDRY_PHYFPS_BENCH_GEN_RESULTS_PATH
- WORLDFOUNDRY_PHYFPS_BENCH_GEN_STRICT
required_imports:
- numpy
- cv2
- torch
required_packages:
- numpy
- opencv-python
- torch
required_paths:
- id: official_runner_script
  path: worldfoundry/evaluation/tasks/execution/runners/phyfps_bench_gen/run_phyfps_bench_gen_official_runner.py
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/phyfps-bench-gen.yaml
requires_cuda_visibility: true
status: official_runtime_ready
optional_imports:
- huggingface_hub
base_model_dependencies:
- visual_chronometer_fps_predictor
optional_base_model_dependencies: []
official_run_command:
- PYTHONPATH=.
- "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}"
- worldfoundry/evaluation/tasks/execution/runners/phyfps_bench_gen/run_phyfps_bench_gen_official_runner.py
- --run-official
- --generated-artifact-dir
- "${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}"
- --output-dir
- "${WORLDFOUNDRY_BENCHMARK_OUTPUT_DIR}"
- --json
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- phyfps-bench-gen
- --mode
- official-validation
- --official-results-path
- <results.csv>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
