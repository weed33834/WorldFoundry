benchmark_ids:
- videophy2
blocked_reason: full leaderboard parity still requires VideoPhy-2-AutoEval checkpoint on all 200 prompts
environment_id: worldplay-videophy2-contract
id: videophy2
name: VideoPhy2
needs_new_env: false
notes:
- In-tree bundled prompts and local judge runtime are available without external checkouts.
- Use --run-official with WORLDFOUNDRY_VIDEOPHY2_JUDGE_BACKEND to select the judge backend.
- Full VideoPhy-2-AutoEval execution remains optional via Hugging Face or local checkpoint assets.
preflight_command: PYTHONPATH=. ${WORLDFOUNDRY_UNIFIED_PYTHON:-python} -m
  worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight --profile videophy2 --manifest
  worldfoundry/data/benchmarks/runtime_profiles/official/videophy2.yaml --output-dir
  tmp/worldfoundry_preflight/videophy2 --json
python_path: ${WORLDFOUNDRY_UNIFIED_PYTHON:-python}
pythonpath_roots:
- .
required_assets:
  bundled_prompt_manifest: worldfoundry/data/benchmarks/assets/videophy2/prompts.json
  task_yaml: worldfoundry/data/benchmarks/tasks/external/videophy2.yaml
required_env:
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
required_packages:
- numpy
required_paths:
- id: official_runner_script
  path: worldfoundry/evaluation/tasks/execution/runners/videophy2/run_videophy2_official_runner.py
- id: bundled_prompt_manifest
  path: worldfoundry/data/benchmarks/assets/videophy2/prompts.json
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/videophy2.yaml
requires_cuda_visibility: false
status: official_runtime_ready_full_upstream_pending
optional_imports:
- numpy
base_model_dependencies:
- videophysics/videophy_2_auto
optional_base_model_dependencies:
- grounded_depth_segmentation_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- videophy2
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
