benchmark_ids:
- ipv-bench
blocked_reason: leaderboard parity still requires official labels/results, judge outputs, and generated artifacts
environment_id: worldplay-ipv-bench-contract
id: ipv-bench
name: IPV-Bench
needs_new_env: false
notes:
- In-tree official runtime is available for caller-provided CSV/JSON/JSONL/TSV outputs and bundled prompt fixtures.
- This profile does not claim leaderboard validity until the full upstream scorer is executed on official generated 
  artifacts.
preflight_command: PYTHONPATH=. ${WORLDFOUNDRY_UNIFIED_PYTHON:-python} -m
  worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight --profile ipv-bench --manifest 
  worldfoundry/data/benchmarks/runtime_profiles/official/ipv-bench.yaml --output-dir 
  tmp/worldfoundry_preflight/ipv-bench --json
python_path: ${WORLDFOUNDRY_UNIFIED_PYTHON:-python}
pythonpath_roots:
- .
required_assets:
  in_tree_runtime_paths:
  - worldfoundry/evaluation/tasks/execution/runners/ipv_bench
  task_yaml: worldfoundry/data/benchmarks/tasks/external/ipv-bench.yaml
required_env:
- WORLDFOUNDRY_IPV_BENCH_RESULTS_PATH
optional_env:
- WORLDFOUNDRY_IPV_BENCH_ROOT
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
- WORLDFOUNDRY_IPV_BENCH_PROMPT_MANIFEST
required_paths:
- id: official_runner_script
  path: worldfoundry/evaluation/tasks/execution/runners/ipv_bench/run_ipv_bench_official_runner.py
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/ipv-bench.yaml
- id: in_tree_runtime
  path: worldfoundry/evaluation/tasks/execution/runners/ipv_bench
requires_cuda_visibility: false
status: in_tree_official_runtime_ready
optional_imports:
- numpy
optional_base_model_dependencies:
- video_world_perception_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- ipv-bench
- --mode
- official-validation
- --official-results-path
- <official_results.csv>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
