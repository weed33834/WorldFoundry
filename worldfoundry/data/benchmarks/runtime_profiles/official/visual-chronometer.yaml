benchmark_ids:
- visual-chronometer
credential_gated_reason: Visual Chronometer official-run requires checkpoint access and generated videos; no external 
  VLM/API judge is required.
environment_id: worldplay-video-judge
id: visual-chronometer
name: Visual Chronometer
needs_new_env: false
notes:
- WorldFoundry runs Visual Chronometer PhyFPS prediction in-process and normalizes results.csv into the Visual 
  Chronometer metric surface.
- Use WORLDFOUNDRY_VISUAL_CHRONOMETER_PREDICT_BACKEND to select the local prediction backend.
preflight_command: PYTHONPATH=. ${WORLDFOUNDRY_UNIFIED_PYTHON:-python} -m 
  worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight --profile visual-chronometer --manifest 
  worldfoundry/data/benchmarks/runtime_profiles/official/visual-chronometer.yaml --output-dir 
  tmp/worldfoundry_preflight/visual-chronometer --json
python_path: ${WORLDFOUNDRY_UNIFIED_PYTHON:-python}
required_assets:
  in_tree_runtime_paths:
  - worldfoundry/evaluation/tasks/execution/runners/phyfps_bench_gen/runtime/visual_chronometer
  task_yaml: worldfoundry/data/benchmarks/tasks/external/visual-chronometer.yaml
required_env:
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
optional_env:
- WORLDFOUNDRY_VISUAL_CHRONOMETER_ROOT
- WORLDFOUNDRY_VISUAL_CHRONOMETER_PREDICT_BACKEND
- WORLDFOUNDRY_VISUAL_CHRONOMETER_RESULTS_PATH
- WORLDFOUNDRY_VISUAL_CHRONOMETER_STRICT
required_imports:
- numpy
- cv2
- torch
required_packages:
- numpy
- opencv-python
- torch
required_paths:
- id: official_runner_script
  path: worldfoundry/evaluation/tasks/execution/runners/phyfps_bench_gen/run_visual_chronometer_official_runner.py
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/visual-chronometer.yaml
requires_cuda_visibility: true
status: official_runtime_ready
optional_imports:
- huggingface_hub
- omegaconf
base_model_dependencies:
- visual_chronometer_fps_predictor
optional_base_model_dependencies:
- visual_chronometer_source_assets
official_run_command:
- PYTHONPATH=.
- "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}"
- worldfoundry/evaluation/tasks/execution/runners/phyfps_bench_gen/run_visual_chronometer_official_runner.py
- --run-official
- --generated-artifact-dir
- "${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}"
- --output-dir
- "${WORLDFOUNDRY_BENCHMARK_OUTPUT_DIR}"
- --json
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- visual-chronometer
- --mode
- official-validation
- --official-results-path
- <results.csv>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
