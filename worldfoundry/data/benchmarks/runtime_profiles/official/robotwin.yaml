id: robotwin
name: RoboTwin 2.0
benchmark_ids:
  - robotwin
environment_id: docker:robotwin
needs_new_env: false
docker:
  image: ghcr.io/allenai/vla-evaluation-harness/robotwin:latest
  source_image: ghcr.io/allenai/vla-evaluation-harness/robotwin:latest
  python_env: robotwin
  gpus: all
blocked_reason: Full official status requires the RoboTwin simulator Docker image, staged assets, checkpoints, and upstream policy evaluation artifacts.
notes:
  - Embodied simulator dependencies are isolated in the VLA evaluation harness Docker image; WorldFoundry does not ship a RoboTwin conda setup script.
  - Host-side WorldFoundry only needs Docker access, the policy/model server, and mounted assets/results.
required_assets:
  local_dataset_paths:
    - ${WORLDFOUNDRY_HFD_DATASET_ROOT}/TianxingChen__RoboTwin2.0
    - ${WORLDFOUNDRY_HFD_DATASET_ROOT}/lerobot__robotwin_unified
  task_yaml: worldfoundry/data/benchmarks/tasks/external/robotwin.yaml
required_env:
  - WORLDFOUNDRY_ROBOTWIN_RESULTS_PATH
required_paths:
  - id: task_yaml
    path: worldfoundry/data/benchmarks/tasks/external/robotwin.yaml
requires_cuda_visibility: true
status: docker_runtime_configured_official_rollout_pending
base_model_dependencies:
  - robotwin_dataset_assets
optional_base_model_dependencies:
  - spatial_perception_core_stack
validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - robotwin
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --output-dir
  - <out>
  - --json
