benchmark_ids:
- 4dworldbench
environment_id: worldfoundry-unified-cu128
id: 4dworldbench
name: 4DWorldBench
needs_new_env: false
notes:
- 4DWorldBench runs through an in-tree WorldFoundry runner and does not require the external GitHub checkout at runtime.
- CLIP-IQA and CLIP-aesthetic require pyiqa plus video/image IO packages.
- Alignment and motion-QA dimensions require Keye-VL via WORLDFOUNDRY_4DWORLDBENCH_KEYE_MODEL or KEYE_MODEL_PATH.
- Physics realism requires OPENAI_API_KEY and the Keye-VL caption helper.
- Viewpoint and camera-error dimensions use WorldFoundry's DROID-SLAM base model and WORLDFOUNDRY_4DWORLDBENCH_DROID_CKPT if the capability registry does not already resolve it.
- Motion smoothness uses WorldFoundry's VFIMamba base model.
- FastVQA requires a local FAST-VQA runtime/weights staged for the official dimension.
preflight_command: PYTHONPATH=. ${WORLDFOUNDRY_UNIFIED_PYTHON} -m worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight --profile 4dworldbench --manifest worldfoundry/data/benchmarks/runtime_profiles/official/4dworldbench.yaml --output-dir tmp/worldfoundry_preflight/4dworldbench --json
python_path: ${WORLDFOUNDRY_UNIFIED_PYTHON}
pythonpath_roots:
- .
required_assets:
  task_yaml: worldfoundry/data/benchmarks/tasks/external/4dworldbench.yaml
  official_dataset_json: user_prepared
required_env: []
optional_env:
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
- WORLDFOUNDRY_4DWORLDBENCH_ROOT
- WORLDFOUNDRY_4DWORLDBENCH_RESULTS_PATH
- WORLDFOUNDRY_4DWORLDBENCH_MODEL_NAME
- WORLDFOUNDRY_4DWORLDBENCH_DIMENSION
- WORLDFOUNDRY_4DWORLDBENCH_KEYE_MODEL
- WORLDFOUNDRY_4DWORLDBENCH_DROID_CKPT
- WORLDFOUNDRY_4DWORLDBENCH_FASTVQA_CKPT
- WORLDFOUNDRY_FASTVQA_CKPT
- WORLDFOUNDRY_FASTVQA_CKPT_DIR
- OPENAI_API_KEY
- OPENAI_BASE_URL
