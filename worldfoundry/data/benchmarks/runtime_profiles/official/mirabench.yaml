- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/mirabench.yaml
- id: in_tree_runtime_root
  path: worldfoundry/evaluation/tasks/execution/runners/mirabench/runtime/mirabench
- id: bundled_assets
