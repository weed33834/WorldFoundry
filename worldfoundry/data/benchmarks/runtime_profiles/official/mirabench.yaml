  worldfoundry/data/benchmarks/runtime_profiles/official/mirabench.yaml --output-dir
  tmp/worldfoundry_preflight/mirabench --json
python_path: ${WORLDFOUNDRY_UNIFIED_PYTHON:-python}
pythonpath_roots:
- .
required_assets:
  in_tree_runtime_paths:
  - worldfoundry/evaluation/tasks/execution/runners/mirabench/runtime/mirabench
  bundled_asset_paths:
  - worldfoundry/data/benchmarks/assets/mirabench
  task_yaml: worldfoundry/data/benchmarks/tasks/external/mirabench.yaml
required_env:
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
- WORLDFOUNDRY_MIRABENCH_RESULTS_PATH
optional_env:
- WORLDFOUNDRY_MIRABENCH_ROOT
required_imports:
- numpy
required_packages:
- numpy
required_paths:
