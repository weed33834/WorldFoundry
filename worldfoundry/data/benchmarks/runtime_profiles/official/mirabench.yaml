benchmark_ids:
- mirabench
blocked_reason: AMT, ViCLIP, MUSIQ, FVD/FID/KID, 3D consistency assets, generated videos, and full upstream scorer
  execution remain full-suite blockers.
environment_id: worldplay-mirabench-contract
id: mirabench
name: MiraBench
needs_new_env: false
notes:
- MiraBench runtime sources are in tree; WorldFoundry can normalize caller-provided official result files.
- Reusable CLIP ViT-B/32, DINOv2, and RAFT dependencies are tracked through base_models.
- AMT, ViCLIP, MUSIQ, FVD/FID/KID, 3D consistency assets, generated videos, and full upstream scorer execution remain
  full-suite blockers.
preflight_command: PYTHONPATH=. ${WORLDFOUNDRY_UNIFIED_PYTHON:-python} -m
