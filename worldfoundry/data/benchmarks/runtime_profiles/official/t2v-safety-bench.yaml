benchmark_ids:
- t2v-safety-bench
blocked_reason: T2VSafetyBench official-result normalization is wired; full judge parity still requires generated artifacts
  and configured GPT/manual judge assets.
environment_id: worldplay-t2v-safety-bench-contract
id: t2v-safety-bench
name: T2VSafetyBench
needs_new_env: false
notes:
- WorldFoundry ships the T2VSafetyBench code-only runtime in tree and normalizes caller-provided official result files
  through the unified benchmark-run entrypoint.
- Full validation requires generated artifacts for the official prompt suite plus configured GPT/manual judge assets.
preflight_command: PYTHONPATH=. ${WORLDFOUNDRY_UNIFIED_PYTHON:-python} -m
  worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight --profile t2v-safety-bench --manifest 
  worldfoundry/data/benchmarks/runtime_profiles/official/t2v-safety-bench.yaml --output-dir 
  tmp/worldfoundry_preflight/t2v-safety-bench --json
python_path: ${WORLDFOUNDRY_UNIFIED_PYTHON:-python}
pythonpath_roots:
- .
required_assets:
  in_tree_runtime_paths:
  - worldfoundry/evaluation/tasks/execution/runners/t2v_safety_bench/runtime/t2v_safety_bench
  task_yaml: worldfoundry/data/benchmarks/tasks/external/t2v-safety-bench.yaml
required_env:
- WORLDFOUNDRY_T2V_SAFETY_BENCH_RESULTS_PATH
optional_env:
- WORLDFOUNDRY_T2V_SAFETY_BENCH_ROOT
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
- WORLDFOUNDRY_T2V_SAFETY_BENCH_GPT_API_KEY
- OPENAI_API_KEY
required_imports:
- numpy
required_packages:
- numpy
- id: official_runner_script
  path: worldfoundry/evaluation/tasks/execution/runners/t2v_safety_bench/run_t2v_safety_bench_official_runner.py
required_paths:
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/t2v-safety-bench.yaml
- id: in_tree_runtime
  path: worldfoundry/evaluation/tasks/execution/runners/t2v_safety_bench/runtime/t2v_safety_bench
requires_cuda_visibility: false
status: in_tree_official_runtime_ready_full_judge_assets_required
optional_imports:
- numpy
optional_base_model_dependencies:
- video_quality_motion_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- t2v-safety-bench
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
