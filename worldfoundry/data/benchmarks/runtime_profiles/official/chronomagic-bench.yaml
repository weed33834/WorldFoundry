benchmark_ids:
- chronomagic-bench
readiness_note: ChronoMagic integration is ready to start official component evaluation after the user supplies generated
  videos, checkpoints, and GPT4o credentials for full core runs.
environment_id: worldfoundry-unified-cu128
id: chronomagic-bench
name: ChronoMagic-Bench
needs_new_env: false
notes:
- Bounded official CHScore GPU validation passed in the unified cu128 runtime with local cotracker2.pth.
- Docs-guided setup is ready for starting CHScore validation runs or the full official core component set 
  (CHScore/GPT4o-MTScore/MTScore) when user assets are supplied.
- Leaderboard parity still requires full prompt coverage, UMT-FVD, UMTScore, and the official submission protocol.
- 'Historical MTScore validation note: one worldscore-env attempt missed flash_attn/dropout_layer_norm for InternVideo2.'
python_path: ${WORLDFOUNDRY_UNIFIED_PYTHON}
pythonpath_roots:
- .
- worldfoundry/evaluation/tasks/execution/runners/chronomagic_bench/runtime/chronomagic_bench
- worldfoundry/evaluation/tasks/execution/runners/chronomagic_bench/runtime/chronomagic_bench/CHScore
required_assets:
  in_tree_runtime_paths:
  - worldfoundry/evaluation/tasks/execution/runners/chronomagic_bench/runtime/chronomagic_bench
  task_yaml: worldfoundry/data/benchmarks/tasks/external/chronomagic-bench.yaml
leaderboard_parity_required_assets:
  local_dataset_paths:
  - cache/worldfoundry/data/hfd_datasets/BestWishYsh/ChronoMagic-Bench
  - cache/worldfoundry/data/hfd_datasets/BestWishYsh/ChronoMagic
  - cache/worldfoundry/data/hfd_datasets/BestWishYsh__ChronoMagic
  - cache/worldfoundry/data/hfd_datasets/BestWishYsh/ChronoMagic-Pro
  - cache/worldfoundry/data/hfd_datasets/BestWishYsh__ChronoMagic-Pro
  - cache/worldfoundry/data/hfd_datasets/BestWishYsh/ChronoMagic-ProH
required_env:
- WORLDFOUNDRY_CHRONOMAGIC_CHSCORE_CKPT
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
optional_env:
- WORLDFOUNDRY_CHRONOMAGIC_ROOT
- WORLDFOUNDRY_CHRONOMAGIC_DATASET_ROOT
- WORLDFOUNDRY_CHRONOMAGIC_MTSCORE_CKPT
- WORLDFOUNDRY_CHRONOMAGIC_OPENAI_API
- OPENAI_API_KEY
required_imports:
- torch
- imageio
- PIL
- numpy
- tqdm
- cotracker.predictor
required_packages:
- torch
- imageio
- Pillow
- numpy
- tqdm
required_paths:
- id: official_runner_script
  path: worldfoundry/evaluation/tasks/execution/runners/chronomagic_bench/run_chronomagic_bench_official_runner.py
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/chronomagic-bench.yaml
- id: in_tree_runtime
  path: worldfoundry/evaluation/tasks/execution/runners/chronomagic_bench/runtime/chronomagic_bench
- id: chscore_checkpoint
  path: ${WORLDFOUNDRY_HFD_ROOT}/BestWishYsh--ChronoMagic-Bench/CHScore/cotracker2.pth
optional_paths:
- id: bounded_chscore_input_folder
  path: ${WORLDFOUNDRY_MODEL_SOURCE_DIR}/ChronoMagic-Bench/toy_video/test_close
- id: bounded_chscore_scorecard
- id: full_suite_dataset_chronomagic_bench_1
  path: cache/worldfoundry/data/hfd_datasets/BestWishYsh/ChronoMagic-Bench
- id: full_suite_dataset_chronomagic_bench_2
  path: cache/worldfoundry/data/hfd_datasets/BestWishYsh/ChronoMagic
- id: full_suite_dataset_chronomagic_bench_3
  path: cache/worldfoundry/data/hfd_datasets/BestWishYsh__ChronoMagic
- id: full_suite_dataset_chronomagic_pro_1
  path: cache/worldfoundry/data/hfd_datasets/BestWishYsh/ChronoMagic-Pro
- id: full_suite_dataset_chronomagic_pro_2
  path: cache/worldfoundry/data/hfd_datasets/BestWishYsh__ChronoMagic-Pro
- id: full_suite_dataset_chronomagic_proh
  path: cache/worldfoundry/data/hfd_datasets/BestWishYsh/ChronoMagic-ProH
- id: full_suite_generated_artifact_example
- id: mtscore_failed_validation_scorecard
requires_cuda_visibility: true
status: official_runtime_start_ready
bounded_official_gpu_validation:
  status: verified
  component: chscore
  eval_type: close
  generated_video_count: 2
  metrics_available: 1
  official_benchmark_verified: true
  official_component_verified: true
  integration_evidence: true
  leaderboard_valid: false
  full_suite_verified: false
  runtime_env: conda/envs/worldfoundry-unified-cu128
  python: ${WORLDFOUNDRY_UNIFIED_PYTHON}
  chronomagic_root: ${WORLDFOUNDRY_MODEL_SOURCE_DIR}/ChronoMagic-Bench
  input_folder: ${WORLDFOUNDRY_MODEL_SOURCE_DIR}/ChronoMagic-Bench/toy_video/test_close
  checkpoint: ${WORLDFOUNDRY_HFD_ROOT}/BestWishYsh--ChronoMagic-Bench/CHScore/cotracker2.pth
mtscore_failed_validation:
  status: historical_env_failure
  component: mtscore
  reason: 'ModuleNotFoundError: dropout_layer_norm from flash_attn layer_norm extension'
  full_suite_verified: false
optional_base_model_dependencies:
- chronomagic_dataset_assets
- motion_stack
validation_command:
- ${WORLDFOUNDRY_UNIFIED_PYTHON}
- worldfoundry/evaluation/tasks/execution/runners/chronomagic_bench/run_chronomagic_bench_official_runner.py
- --chronomagic-root
- worldfoundry/evaluation/tasks/execution/runners/chronomagic_bench/runtime/chronomagic_bench
- --components
- chscore
- --generated-video-dir
- ${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}
- --model-name
- worldfoundry
- --eval-type
- close
- --model-pth-chscore
- ${WORLDFOUNDRY_CHRONOMAGIC_CHSCORE_CKPT}
- --output-dir
- <out>
- --python
- ${WORLDFOUNDRY_UNIFIED_PYTHON}
- --json
