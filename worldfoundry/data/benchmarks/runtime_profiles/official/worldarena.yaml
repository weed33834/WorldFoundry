benchmark_ids:
- worldarena
blocked_reason: WorldArena in-tree video-quality runtime is wired; leaderboard parity still requires official generated artifacts, metric checkpoints, and embodied task utility evidence.
environment_id: worldfoundry-unified-cu128
id: worldarena
name: WorldArena
needs_new_env: false
notes:
- WorldFoundry can execute the checked-in WorldArena video-quality runtime with --run-official, or normalize existing
  WorldArena result files through the unified benchmark-run entrypoint.
- The official video-quality metric runtime is integrated in-tree under worldfoundry/evaluation/tasks/execution/runners/worldarena/runtime/video_quality.
- Full leaderboard validation requires generated artifacts for the official task suite, metric checkpoints, and embodied task utility evidence.
preflight_command: PYTHONPATH=. ${WORLDFOUNDRY_UNIFIED_PYTHON} -m 
  worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight --profile worldarena --manifest 
  worldfoundry/data/benchmarks/runtime_profiles/official/worldarena.yaml --output-dir 
  tmp/worldfoundry_preflight/worldarena --json
python_path: ${WORLDFOUNDRY_UNIFIED_PYTHON}
pythonpath_roots:
- .
required_assets:
  in_tree_runtime_paths:
  - worldfoundry/evaluation/tasks/execution/runners/worldarena
  task_yaml: worldfoundry/data/benchmarks/tasks/external/worldarena.yaml
required_env: []
optional_env:
- WORLDFOUNDRY_WORLDARENA_ROOT
- WORLDFOUNDRY_WORLDARENA_CKPT_DIR
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
- WORLDFOUNDRY_WORLDARENA_RESULTS_PATH
required_imports:
- numpy
required_packages:
- numpy
required_paths:
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/worldarena.yaml
- id: official_runner_script
  path: worldfoundry/evaluation/tasks/execution/runners/worldarena/run_worldarena_official_runner.py
- id: runtime_root
  path: worldfoundry/evaluation/tasks/execution/runners/worldarena/runtime/video_quality
requires_cuda_visibility: false
status: in_tree_video_quality_runtime_integrated
optional_imports:
- numpy
optional_base_model_dependencies:
- video_world_perception_stack
validation_command:
- python
- worldfoundry/evaluation/tasks/execution/runners/worldarena/run_worldarena_official_runner.py
- --run-official
- --dimension
- action_following
- --config-path
- <worldarena_config.yaml>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
normalization_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- worldarena
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
