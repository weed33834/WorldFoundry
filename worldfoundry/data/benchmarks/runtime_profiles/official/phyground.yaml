benchmark_ids:
- phyground
blocked_reason: WorldFoundry imports PhyGround scores.json from generated artifacts; full leaderboard validation still
  requires PhyJudge/vLLM or API judge scores for all official prompts.
environment_id: worldfoundry-phyground-artifacts
id: phyground
name: PhyGround
needs_new_env: false
notes:
- PhyGround official-run imports scores.json from WORLDFOUNDRY_PHYGROUND_RESULTS_PATH or --generated-artifact-dir.
- Judge execution is handled by WorldFoundry/base-model infrastructure, not benchmark-local shell scripts.
- Standard data roots auto-discover prompts/phyground.json and first_images/; use --prompt-manifest for non-standard 
  layouts.
- Full leaderboard validation still requires all 250 generated videos and complete PhyJudge scores.
preflight_command: PYTHONPATH=. ${WORLDFOUNDRY_UNIFIED_PYTHON:-python} -m
  worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight --profile phyground --manifest 
  worldfoundry/data/benchmarks/runtime_profiles/official/phyground.yaml --output-dir 
  tmp/worldfoundry_preflight/phyground --json
python_path: ${WORLDFOUNDRY_UNIFIED_PYTHON:-python}
pythonpath_roots:
- .
required_assets:
  user_supplied_data_layout:
  - <phyground_data_root>/prompts/phyground.json
  - <phyground_data_root>/first_images/
  - <phyground_data_root>/videos/<model_id>/
  task_yaml: worldfoundry/data/benchmarks/tasks/external/phyground.yaml
required_env:
- WORLDFOUNDRY_PHYGROUND_RESULTS_PATH
optional_env:
- WORLDFOUNDRY_PHYGROUND_DATA_ROOT
- WORLDFOUNDRY_BENCHMARK_DATA_ROOT
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
- WORLDFOUNDRY_PHYGROUND_RESULTS_PATH
- WORLDFOUNDRY_PHYGROUND_PROMPT_MANIFEST
required_packages:
- numpy
required_paths:
- id: official_runner_script
  path: worldfoundry/evaluation/tasks/execution/runners/phyground/run_phyground_official_runner.py
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/phyground.yaml
requires_cuda_visibility: false
status: in_tree_artifact_scores_ready_full_judge_pending
optional_imports:
- numpy
base_model_dependencies:
- phyground_dataset_assets
optional_base_model_dependencies:
- grounded_depth_segmentation_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- phyground
- --mode
- official-validation
- --benchmark-data-root
- <phyground_data_root>
- --generated-artifact-dir
- <phyground_data_root>/videos/<model_id>
- --result-model-id
- <model_id>
- --output-dir
- <out>
- --json
