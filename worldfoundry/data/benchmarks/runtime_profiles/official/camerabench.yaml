benchmark_ids:
- camerabench
bounded_official_validation:
  status: verified
  task: binary
  metric_family: camera_motion_binary_classification
  score_file_count: 1
  evaluated_splits: 1
  official_benchmark_verified: true
  integration_evidence: true
  leaderboard_valid: false
  full_suite_verified: false
  verified: true
  scope: bounded_official_validation
  scorecard: tmp/local_open_eval/camerabench_binary_official_validation_after_readiness_layers_20260525/scorecard.json
credential_gated_reason: CameraBench framework validation is wired; formal runs require user-provided official 
  CameraBench result JSON or a prepared CameraBench score_dir, plus optional API credentials for caption GPT judging.
environment_id: worldplay-video-metrics
id: camerabench
name: CameraBench
needs_new_env: false
notes:
- WorldFoundry normalizes caller-provided official result JSON and aggregates prepared CameraBench score_dir files 
  through an in-tree benchmark-run entrypoint.
- Formal framework validation should set WORLDFOUNDRY_CAMERABENCH_STRICT=1 and require all six CameraBench metrics plus 
  complete local testset coverage.
- The CameraBench testset root should resolve through WORLDFOUNDRY_CAMERABENCH_DATA_ROOT or the Hugging Face cache under
  cache/worldfoundry/data/hfd_datasets/syCen/CameraBench.
- The score_dir path uses in-tree metric aggregation; no external t2v_metrics checkout is required for metric 
  calculation.
- Leaderboard parity requires source-audited score generation, model/checkpoint/API evidence, full-suite score files, 
  and upstream submission evidence.
base_model_dependencies:
- camera_geometry_stack
base_model_dependency_preflight:
  status: ready
  notes:
  - VGGT, MoGe, UniDepth, and RAFT are tracked as reusable WorldFoundry base-model assets for camera geometry and motion
    scoring paths.
  - DROID-SLAM remains available through slam_stack for hard-env official metric paths, but is not required for the 
    driver-compatible CameraBench validation path.
  missing: []
preflight_command: ${WORLDFOUNDRY_CONDA_ROOT}/worldplay/bin/python -m 
  worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight --profile camerabench --manifest 
  worldfoundry/data/benchmarks/runtime_profiles/official/camerabench.yaml --output-dir 
  tmp/worldfoundry_preflight/camerabench --json
python_path: ${WORLDFOUNDRY_CONDA_ROOT}/worldplay/bin/python
pythonpath_roots: []
required_assets:
  local_dataset_paths:
  - ${WORLDFOUNDRY_CAMERABENCH_DATA_ROOT}
  - cache/worldfoundry/data/hfd_datasets/syCen/CameraBench
  task_yaml: worldfoundry/data/benchmarks/tasks/external/camerabench.yaml
  scorecard_paths:
  - tmp/local_open_eval/camerabench_binary_official_validation_after_readiness_layers_20260525/scorecard.json
required_env:
- WORLDFOUNDRY_CAMERABENCH_DATA_ROOT or --benchmark-data-root
- WORLDFOUNDRY_CAMERABENCH_RESULTS_PATH, --official-results-path, WORLDFOUNDRY_CAMERABENCH_SCORE_DIR, or --score-dir
optional_env:
- WORLDFOUNDRY_CAMERABENCH_STRICT
- WORLDFOUNDRY_BENCHMARK_DATA_ROOT
- WORLDFOUNDRY_CAMERABENCH_SCORE_DIR
- OPENAI_API_KEY
required_imports:
- numpy
- cv2
- decord
required_packages:
- numpy
- opencv-python
- decord
required_paths:
- id: official_runner_script
  path: worldfoundry/evaluation/tasks/execution/runners/camerabench/run_camerabench_official_runner.py
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/camerabench.yaml
- id: local_dataset_1
  env: WORLDFOUNDRY_CAMERABENCH_DATA_ROOT
  path: ${WORLDFOUNDRY_CAMERABENCH_DATA_ROOT}
- id: local_dataset_cache
  path: cache/worldfoundry/data/hfd_datasets/syCen/CameraBench
requires_cuda_visibility: false
status: credential_gated_framework_ready
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- camerabench
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --benchmark-data-root
- <camerabench_data_root>
- --output-dir
- <out>
- --json
