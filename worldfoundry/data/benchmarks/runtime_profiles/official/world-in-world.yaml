benchmark_ids:
- world-in-world
blocked_reason: World-in-World official evaluator code is vendored in tree; full leaderboard parity still requires
  official closed-loop rollout assets and complete generated metrics.
environment_id: worldfoundry-world-in-world-artifacts
id: world-in-world
name: World-in-World
needs_new_env: false
notes:
- WorldFoundry normalizes World-in-World metrics with vendored official evaluator/Open-EQA/FVD/manipulation code from
  runners/world_in_world/runtime/official.
- Model inference is handled by WorldFoundry's model runner; this benchmark runner does not launch benchmark-local model
  workers or shell scripts.
- Full leaderboard parity requires official closed-loop rollout assets and complete generated metrics.
preflight_command: PYTHONPATH=. ${WORLDFOUNDRY_CONDA_ENVS_ROOT}/worldfoundry-unified-cu128/bin/python -m
  worldfoundry.evaluation.tasks.execution.orchestration.runtime_preflight --profile world-in-world --manifest
  worldfoundry/data/benchmarks/runtime_profiles/official/world-in-world.yaml --output-dir
  tmp/worldfoundry_preflight/world-in-world --json
python_path: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}/worldfoundry-unified-cu128/bin/python
pythonpath_roots:
- .
required_assets:
  bundled_prompt_assets: worldfoundry/data/benchmarks/assets/world-in-world
  in_tree_official_runtime: worldfoundry/evaluation/tasks/execution/runners/world_in_world/runtime/official
  task_yaml: worldfoundry/data/benchmarks/tasks/external/world-in-world.yaml
required_env: []
optional_env:
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
- WORLDFOUNDRY_WORLD_IN_WORLD_RESULTS_PATH
- WORLDFOUNDRY_WORLD_IN_WORLD_ASSETS_ROOT
- WORLDFOUNDRY_WORLD_IN_WORLD_PROMPT_MANIFEST
required_imports:
- numpy
required_packages:
- numpy
required_paths:
- id: official_runner_script
  path: worldfoundry/evaluation/tasks/execution/runners/world_in_world/run_world_in_world_official_runner.py
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/world-in-world.yaml
- id: runtime_root
  path: worldfoundry/evaluation/tasks/execution/runners/world_in_world
- id: vendored_official_runtime
  path: worldfoundry/evaluation/tasks/execution/runners/world_in_world/runtime/official
- id: official_runtime_adapter
  path: worldfoundry/evaluation/tasks/execution/runners/world_in_world/world_in_world_official_runtime.py
- id: bundled_prompt_assets
  path: worldfoundry/data/benchmarks/assets/world-in-world
requires_cuda_visibility: false
status: in_tree_official_evaluator_ready_full_rollout_pending
optional_imports:
- numpy
- torch
- pandas
- openai
- tabulate
optional_base_model_dependencies:
- video_world_perception_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- world-in-world
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
