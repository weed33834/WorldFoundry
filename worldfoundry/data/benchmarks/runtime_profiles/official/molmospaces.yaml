benchmark_ids:
- molmospaces
blocked_reason: MolmoSpaces-Bench full status requires the selected asset subset, simulator runtime, policy checkpoint, 
  and official rollout outputs.
environment_id: molmospaces-runtime
id: molmospaces
name: MolmoSpaces-Bench
docker:
  image: ghcr.io/allenai/vla-evaluation-harness/molmospaces:latest
  source_image: ghcr.io/allenai/vla-evaluation-harness/molmospaces:latest
  python_env: molmospaces
  gpus: all
needs_new_env: true
notes:
- Stage only the selected MolmoSpaces-Bench subset; the full public asset corpus is very large.
python_path: ${WORLDFOUNDRY_CONDA_ENVS_ROOT}/worldfoundry-unified-cu128/bin/python
required_assets:
  local_dataset_paths:
  - ${WORLDFOUNDRY_DATA_DIR}/datasets/molmospaces
  local_repo_paths:
  - ${WORLDFOUNDRY_CACHE_DIR}/repos/allenai--MolmoBot
  task_yaml: worldfoundry/data/benchmarks/tasks/external/molmospaces.yaml
required_env:
- WORLDFOUNDRY_MOLMOSPACES_ROOT
- WORLDFOUNDRY_MOLMOSPACES_RESULTS_PATH
required_imports:
- numpy
required_packages:
- numpy
required_paths:
- id: official_result_normalizer
  path: worldfoundry/evaluation/tasks/embodied/normalizer.py
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/molmospaces.yaml
requires_cuda_visibility: false
status: official_result_normalizer_ready_full_runtime_pending
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- molmospaces
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --output-dir
- <out>
- --json
