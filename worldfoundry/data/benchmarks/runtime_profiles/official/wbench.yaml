benchmark_ids:
- wbench
environment_id: worldfoundry-unified-cu128
id: wbench
name: WBench
needs_new_env: false
notes:
- WBench validation can run the checked-in metric runtime with --run-official or import an existing report.json/per-metric
  evaluation directory with --official-results-path.
- Report aggregation and result normalization do not require the full perception stack.
- Metric recomputation uses the in-tree WBench runtime backed by WorldFoundry base-model assets.
- Use WORLDFOUNDRY_WBENCH_MODEL_NAME for --run-official, or WORLDFOUNDRY_WBENCH_RESULTS_PATH for result normalization.
python_path: ${WORLDFOUNDRY_UNIFIED_PYTHON}
pythonpath_roots:
- .
required_assets:
  task_yaml: worldfoundry/data/benchmarks/tasks/external/wbench.yaml
  hf_dataset_ids:
  - meituan-longcat/WBench
required_env: []
optional_env:
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
- WORLDFOUNDRY_WBENCH_MODEL_NAME
- WORLDFOUNDRY_WBENCH_ROOT
- WORLDFOUNDRY_WBENCH_RESULTS_PATH
- WORLDFOUNDRY_WBENCH_WORK_DIR
required_imports:
- numpy
required_packages:
- numpy
required_paths:
- id: official_runner_script
  path: worldfoundry/evaluation/tasks/execution/runners/wbench/run_wbench_official_runner.py
- id: runtime_root
  path: worldfoundry/evaluation/tasks/execution/runners/wbench/runtime/wbench
- id: runtime_entrypoint
  path: worldfoundry/evaluation/tasks/execution/runners/wbench/runtime/wbench/main.py
- id: task_yaml
  path: worldfoundry/data/benchmarks/tasks/external/wbench.yaml
requires_cuda_visibility: true
status: in_tree_official_runtime_integrated
optional_base_model_dependencies:
- wbench_metric_stack
validation_command:
- python
- worldfoundry/evaluation/tasks/execution/runners/wbench/run_wbench_official_runner.py
- --run-official
- --model-name
- <model_name>
- --phase
- report
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
full_runtime_command:
- python
- worldfoundry/evaluation/tasks/execution/runners/wbench/run_wbench_official_runner.py
- --run-official
- --model-name
- <model_name>
- --phase
- all
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
full_runtime_requires:
- WORLDFOUNDRY_WBENCH_MODEL_NAME
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
- wbench_metric_stack base-model assets
normalization_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- wbench
- --mode
- official-validation
- --official-results-path
- <report.json>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
