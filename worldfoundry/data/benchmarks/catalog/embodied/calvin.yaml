id: calvin
name: CALVIN
benchmark_kind:
- vla
- robot-manipulation
- long-horizon
domains:
- vla
- robot-manipulation
- long-horizon
modalities:
- language
- vision
- action
- state
status: open_source
official_sources:
  github:
    url: https://github.com/mees/calvin
    head_sha: fa03f01f19c65920e18cf37398a9ce859274af76
  project_page: http://calvin.cs.uni-freiburg.de/
  paper_url: https://ieeexplore.ieee.org/document/9788026
  license: mit
  huggingface_status: not_applicable_or_not_found
  access_notes: GitHub repository is public under MIT; dataset/runtime assets remain external to this manifest.
dataset:
  not_applicable: true
  reason: WorldFoundry tracks the upstream CALVIN runtime and normalizes official result files; dataset materialization 
    is handled outside this manifest.
runner:
  runner_target: worldfoundry.evaluation.tasks.contracts.external:CALVINContract
  verification_status: normalizer_only
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - calvin
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --output-dir
  - <out>
  - --json
  expected_artifacts:
  - scorecard.json
  - raw_results.jsonl
  runtime:
    kind: external_official_results_runner
    results_path_env: WORLDFOUNDRY_CALVIN_RESULTS_PATH
  required_env:
  - WORLDFOUNDRY_CALVIN_RESULTS_PATH
  notes:
  - WorldFoundry public benchmark-run can normalize caller-provided official result files without simulator execution.
metrics:
- id: success_rate
  name: Success Rate
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
  primary: true
- id: sequence_success
  name: Sequence Success
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
- id: task_success
  name: Task Success
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
- id: completion
  name: Completion
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
integration:
  status: integrated
release_status: normalizer_only
maturity: contract_ready
open_source_status: normalizer_only
official_benchmark_verified: false
integration_evidence: true
leaderboard_valid: false
full_test_harness_ready: true
full_suite_testable: true
full_suite_execution_recorded: false
requires:
- Official CALVIN repository checkout
- CALVIN dataset root
- Benchmark-specific policy checkpoint
- Official long-horizon sequence evaluation command
blockers:
- Official CALVIN dataset split, sequence evaluator, and policy checkpoint validation must be completed before 
  integrated status.
data_refs:
  local_repo_paths:
  - cache/vla_va_wam/repos/mees--calvin
  task_yaml: worldfoundry/data/benchmarks/tasks/external/calvin.yaml
runner_availability:
  available: true
  runner_target: worldfoundry.evaluation.tasks.contracts.external:CALVINContract
  runner_script_available: false
  task_yaml_available: true
  runtime_verified: false
  normalizer_verified: true
  surface: official_result_normalizer
optional_base_model_dependencies:
- spatial_perception_core_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- calvin
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --output-dir
- <out>
- --json
checkpoint_refs: []
artifact_layout:
  generated_artifact_dir_env: WORLDFOUNDRY_CALVIN_RESULTS_PATH
  output_artifact: benchmark_scorecard
  filename_template: scorecard.json
