id: simpler-env
name: SimplerEnv
benchmark_kind:
- vla
- robot-manipulation
- simulator
domains:
- vla
- robot-manipulation
- simulator
modalities:
- language
- vision
- action
- state
aliases:
- simplerenv
- simpler
status: open_source
official_sources:
  github:
    url: https://github.com/simpler-env/SimplerEnv
    head_sha: 06accaca93535902d408da4855f21cece12bceb7
  project_page: https://simpler-env.github.io/
  paper_url: https://openreview.net/forum?id=LZh48DTg71
  license: mit
  huggingface_status: not_applicable_or_not_found
  access_notes: GitHub repository is public under MIT; benchmark evaluates simulator rollouts and no official HF 
    benchmark dataset was confirmed.
dataset:
  not_applicable: true
  reason: SimplerEnv evaluates policy rollouts in simulator; generated result files and rollout logs are normalized by 
    WorldFoundry.
runner:
  runner_target: worldfoundry.evaluation.tasks.contracts.external:SimplerEnvContract
  verification_status: normalizer_only
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - simpler-env
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --output-dir
  - <out>
  - --json
  expected_artifacts:
  - scorecard.json
  - raw_results.jsonl
  runtime:
    kind: external_official_results_runner
    results_path_env: WORLDFOUNDRY_SIMPLERENV_RESULTS_PATH
  required_env:
  - WORLDFOUNDRY_SIMPLERENV_RESULTS_PATH
  notes:
  - WorldFoundry public benchmark-run can normalize caller-provided official result files without simulator execution.
metrics:
- id: success_rate
  name: Success Rate
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
  primary: true
- id: task_success
  name: Task Success
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
- id: episode_success
  name: Episode Success
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
- id: reward
  name: Reward
  higher_is_better: true
integration:
  status: integrated
release_status: normalizer_only
maturity: contract_ready
open_source_status: normalizer_only
official_benchmark_verified: false
integration_evidence: true
leaderboard_valid: false
full_test_harness_ready: true
full_suite_testable: true
full_suite_execution_recorded: false
requires:
- Official SimplerEnv repository checkout
- ManiSkill2/SAPIEN simulator stack
- Selected robot embodiment assets
- Benchmark-specific policy checkpoint
blockers:
- Official SimplerEnv simulator rollouts, policy wrappers, and result import mapping must be validated before integrated
  status.
data_refs:
  local_repo_paths:
  - cache/vla_va_wam/repos/simpler-env--SimplerEnv
  task_yaml: worldfoundry/data/benchmarks/tasks/external/simpler-env.yaml
runner_availability:
  available: true
  runner_target: worldfoundry.evaluation.tasks.contracts.external:SimplerEnvContract
  runner_script_available: false
  task_yaml_available: true
  runtime_verified: false
  normalizer_verified: true
  surface: official_result_normalizer
optional_base_model_dependencies:
- spatial_perception_core_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- simpler-env
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --output-dir
- <out>
- --json
checkpoint_refs: []
artifact_layout:
  generated_artifact_dir_env: WORLDFOUNDRY_SIMPLERENV_RESULTS_PATH
  output_artifact: benchmark_scorecard
  filename_template: scorecard.json
