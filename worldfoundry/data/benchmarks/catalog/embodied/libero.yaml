id: libero
name: LIBERO
benchmark_kind:
- vla
- robot-manipulation
- embodied-evaluation
domains:
- vla
- robot-manipulation
- long-horizon
modalities:
- language
- vision
- action
- state
aliases:
- LIBERO
- libero-10
- libero-spatial
- libero-object
- libero-goal
status: open_source
official_sources:
  github:
    url: https://github.com/Lifelong-Robot-Learning/LIBERO
    head_sha: 8f1084e3132a39270c3a13ebe37270a43ece2a01
  huggingface_datasets:
  - repo_id: yifengzhu-hf/LIBERO-datasets
    revision: f13aa24a3da8c43c7225569f28c562979fa0e35a
    license: other
    status: confirmed
  - repo_id: lerobot/libero
    revision: 1595a93b43aa055e55c127a4f0b4a99bb8035447
    license: apache-2.0
    status: confirmed
  project_page: https://libero-project.github.io/
  paper_url: https://arxiv.org/abs/2306.03310
  license: mit
  access_notes: GitHub repository is public; listed Hugging Face dataset refs are public metadata only and files were 
    not downloaded.
dataset_refs:
- repo_id: yifengzhu-hf/LIBERO-datasets
  revision: f13aa24a3da8c43c7225569f28c562979fa0e35a
  license: other
  path: cache/vla_va_wam/hf_datasets/yifengzhu-hf--LIBERO-datasets
- repo_id: lerobot/libero
  revision: 1595a93b43aa055e55c127a4f0b4a99bb8035447
  license: apache-2.0
  path: cache/vla_va_wam/hf_datasets/lerobot--libero
runner:
  runner_target: worldfoundry.evaluation.tasks.embodied.rollout_runner:build_libero_closed_loop_runner
  run_command:
  - worldfoundry-eval
  - embodied
  - run
  - --config
  - worldfoundry/data/benchmarks/eval_configs/embodied/libero/spatial.yaml
  expected_artifacts:
  - scorecard.json
  - run_manifest.json
  - results.jsonl
  - metrics/summary.json
  runtime:
    root_env: WORLDFOUNDRY_LIBERO_ROOT
    results_path_env: WORLDFOUNDRY_LIBERO_RESULTS_PATH
    task_manifest: worldfoundry/data/benchmarks/tasks/external/libero.yaml
    preflight_profile: libero
    required_assets:
    - LIBERO dataset root or LeRobot conversion
    - suite-specific policy checkpoint
    - official rollout logs/result dump
    kind: native_closed_loop_simulator
    eval_config: worldfoundry/data/benchmarks/eval_configs/embodied/libero/spatial.yaml
    model_runner: worldfoundry.embodied-closed-loop
    output_artifact: rollout_metrics
  verification_status: normalizer_only
  notes:
  - Normalizer-first scorecards are supported through worldfoundry.evaluation.tasks.embodied.normalizer.
  - Native closed-loop execution is wired through worldfoundry-eval embodied run.
  - Full leaderboard parity still requires a recorded LIBERO/OpenVLA parity run with simulator assets.
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - libero
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --output-dir
  - <out>
  - --json
  required_env:
  - WORLDFOUNDRY_LIBERO_RESULTS_PATH
metrics:
- id: success_rate
  name: Success Rate
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
  primary: true
- id: task_success
  name: Task Success
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
- id: episode_success
  name: Episode Success
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
- id: action_accuracy
  name: Action Accuracy
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
integration:
  status: integrated
  evidence:
    official_benchmark_verified: false
    integration_evidence: true
    leaderboard_valid: false
  blocked_reasons:
  - Full leaderboard parity still requires official LIBERO rollout execution with simulator assets, policy checkpoints, 
    and upstream evidence.
release_status: normalizer_only
maturity: contract_ready
open_source_status: normalizer_only
official_benchmark_verified: false
integration_evidence: true
leaderboard_valid: false
full_test_harness_ready: true
full_suite_testable: true
full_suite_execution_recorded: false
requires:
- Upstream SAPIEN/Curobo simulator runtime
- RoboTwin simulator assets
- Policy checkpoint for selected upstream eval script
- Official eval_result tree or structured result export
blockers:
- Full leaderboard parity still requires official LIBERO rollout execution with simulator assets, policy checkpoints, 
  and upstream evidence.
data_refs:
  dataset_refs:
