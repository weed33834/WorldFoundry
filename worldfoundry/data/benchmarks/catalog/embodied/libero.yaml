    license: other
    path: cache/vla_va_wam/hf_datasets/yifengzhu-hf--LIBERO-datasets
  - repo_id: lerobot/libero
    revision: 1595a93b43aa055e55c127a4f0b4a99bb8035447
    license: apache-2.0
    path: cache/vla_va_wam/hf_datasets/lerobot--libero
  local_dataset_paths:
  - cache/worldfoundry/data/hfd_datasets/yifengzhu-hf__LIBERO-datasets
  - cache/vla_va_wam/hf_datasets/yifengzhu-hf--LIBERO-datasets
  - cache/worldfoundry/data/hfd_datasets/lerobot__libero
  - cache/vla_va_wam/hf_datasets/lerobot--libero
  local_repo_paths:
  - cache/vla_va_wam/repos/Lifelong-Robot-Learning--LIBERO
  task_yaml: worldfoundry/data/benchmarks/tasks/external/libero.yaml
runner_availability:
