runner:
  runner_target: worldfoundry.evaluation.tasks.contracts.external:RoboTwinContract
  run_command:
  - worldfoundry-eval
  - embodied
  - run
  - --config
  - worldfoundry/data/benchmarks/eval_configs/embodied/robotwin/eval.yaml
  expected_artifacts:
  - scorecard.json
  - benchmark_contract.json
  - task_manifest.json
  - official_command_manifest.json
  - simulator_validation.json
  - raw_metric_table.jsonl
  - evaluation/per_sample_metrics.jsonl
  clone_dir: thirdparty/RoboTwin
  repo_url: https://github.com/RoboTwin-Platform/RoboTwin.git
  repo_revision: 0aeea2d669c0f8516f4d5785f0aa33ba812c14b4
  dependency_profile: robotwin-2.0-sapien-curobo
  runtime:
    root_env: WORLDFOUNDRY_ROBOTWIN_ROOT
    results_path_env: WORLDFOUNDRY_ROBOTWIN_RESULTS_PATH
    default_root: thirdparty/RoboTwin
    task_manifest: worldfoundry/data/benchmarks/tasks/external/robotwin.yaml
    official_result_layout: eval_result/{task_name}/{policy_name}/{task_config}/{ckpt_setting}/{timestamp}/_result.txt
    supported_result_import_formats:
    - _result.txt
    - json
    - jsonl
    - csv
    - tsv
    official_entrypoints:
      data_collection: bash collect_data.sh ${task_name} ${task_config} ${gpu_id}
      policy_eval:
      - policy/ACT/eval.sh
      - policy/DP/eval.sh
      - policy/DP3/eval.sh
      - policy/RDT/eval.sh
      - policy/openvla-oft/eval.sh
      - policy/pi0/eval.sh
      - policy/pi05/eval.sh
      - policy/DexVLA/eval.sh
      - policy/TinyVLA/eval.sh
    kind: external_official_results_runner
  verification_status: normalizer_only
  notes:
  - RoboTwin 2.0 is an embodied bimanual manipulation benchmark, not a video-generation benchmark.
  - WorldFoundry imports official eval_result/_result.txt and structured JSON/CSV exports into WorldFoundry scorecard
    artifacts.
  - Offline normalization accepts explicit official eval_result/_result.txt or structured exports via
    --official-results-path; real simulator/policy parity still requires upstream SAPIEN/Curobo assets and policy
    checkpoints.
  - 2026-05-25 bounded simulator validation reached CUDA driver allocation in a local RoboTwin simulator runtime, but upstream
    script/test_render.py exceeded the hard timeout without Render Well.
  - WorldFoundry public benchmark-run can normalize caller-provided official result files without simulator execution.
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - robotwin
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --output-dir
  - <out>
  - --json
  required_env:
  - WORLDFOUNDRY_ROBOTWIN_RESULTS_PATH
metrics:
- id: success_rate
  name: Success Rate
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
  primary: true
- id: task_success
  name: Task Success
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
- id: episode_success
  name: Episode Success
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
- id: bimanual_task_success
  name: Bimanual Task Success
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
- id: domain_randomization_success
  name: Domain Randomization Success
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
- id: clean_success
  name: Clean Split Success
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
- id: randomized_success
  name: Randomized Split Success
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
- id: reward
  name: Reward
  higher_is_better: true
integration:
  status: integrated
  blocked_reasons:
  - Result import is normalizer-only; full leaderboard parity requires executing the upstream SAPIEN/Curobo simulator
    and policy evaluation scripts with staged assets and checkpoints.
  - Bounded official simulator validation has CUDA visibility but upstream SAPIEN rendering currently times out before
    Render Well.
  notes:
  - Current WorldFoundry surface is the official-result importer and scorecard normalizer.
  - Full upstream simulator/policy execution must produce official_benchmark_verified=true and leaderboard_valid=true
    before this benchmark can be used as leaderboard evidence.
  - Huge optional datasets are tracked but not required for result-file imports.
  - Failed simulator validation evidence is retained so the readiness report exposes the exact render blocker.
release_status: normalizer_only
maturity: contract_ready
open_source_status: normalizer_only
official_benchmark_verified: false
integration_evidence: true
leaderboard_valid: false
full_test_harness_ready: true
full_suite_testable: true
full_suite_execution_recorded: false
requires:
- Official benchmark runtime or preflight validation
blockers:
- Result import is normalizer-only; full leaderboard parity requires executing the upstream SAPIEN/Curobo simulator and
  policy evaluation scripts with staged assets and checkpoints.
- 2026-05-25 bounded official simulator validation reached CUDA driver allocation in a local RoboTwin simulator runtime,
  but upstream script/test_render.py exceeded the hard timeout without Render Well; SAPIEN/Vulkan rendering remains
  blocked.
