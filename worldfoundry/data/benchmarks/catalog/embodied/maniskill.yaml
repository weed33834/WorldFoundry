id: maniskill
name: ManiSkill
benchmark_kind:
- vla
- robot-manipulation
- simulator
domains:
- vla
- robot-manipulation
- simulator
modalities:
- language
- vision
- action
- state
status: open_source
official_sources:
  github:
    url: https://github.com/haosulab/ManiSkill
    head_sha: a4a4f9272ad64b1564035874b605ceb687b63ed8
  project_page: https://maniskill.ai/
  paper_url: https://arxiv.org/abs/2302.04659
  license: apache-2.0
  huggingface_status: not_applicable_or_not_found
  access_notes: GitHub repository is public under Apache-2.0; simulator assets/runtime setup are external requirements.
dataset:
  not_applicable: true
  reason: ManiSkill is simulator-backed; WorldFoundry normalizes rollout results and keeps simulator execution explicit.
runner:
  runner_target: worldfoundry.evaluation.tasks.contracts.external:ManiSkillContract
  verification_status: normalizer_only
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - maniskill
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --output-dir
  - <out>
  - --json
  expected_artifacts:
  - scorecard.json
  - raw_results.jsonl
  runtime:
    kind: external_official_results_runner
    results_path_env: WORLDFOUNDRY_MANISKILL_RESULTS_PATH
  required_env:
  - WORLDFOUNDRY_MANISKILL_RESULTS_PATH
  notes:
  - WorldFoundry public benchmark-run can normalize caller-provided official result files without simulator execution.
metrics:
- id: success_rate
  name: Success Rate
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
  primary: true
- id: task_success
  name: Task Success
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
- id: reward
  name: Reward
  higher_is_better: true
- id: normalized_return
  name: Normalized Return
  higher_is_better: true
integration:
  status: integrated
release_status: normalizer_only
maturity: contract_ready
open_source_status: normalizer_only
official_benchmark_verified: false
integration_evidence: true
leaderboard_valid: false
full_test_harness_ready: true
full_suite_testable: true
full_suite_execution_recorded: false
requires:
- Official ManiSkill repository checkout
- SAPIEN/ManiSkill simulator assets
- Benchmark-specific policy checkpoint or controller
- Official task suite selection
blockers:
- Official ManiSkill task suite, simulator assets, and policy rollout result mapping must be validated before integrated
  status.
data_refs:
  local_repo_paths:
  - cache/vla_va_wam/repos/haosulab--ManiSkill
  task_yaml: worldfoundry/data/benchmarks/tasks/external/maniskill.yaml
runner_availability:
  available: true
  runner_target: worldfoundry.evaluation.tasks.contracts.external:ManiSkillContract
  runner_script_available: false
  task_yaml_available: true
  runtime_verified: false
  normalizer_verified: true
  surface: official_result_normalizer
optional_base_model_dependencies:
- spatial_perception_core_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- maniskill
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --output-dir
- <out>
- --json
checkpoint_refs: []
artifact_layout:
  generated_artifact_dir_env: WORLDFOUNDRY_MANISKILL_RESULTS_PATH
  output_artifact: benchmark_scorecard
  filename_template: scorecard.json
