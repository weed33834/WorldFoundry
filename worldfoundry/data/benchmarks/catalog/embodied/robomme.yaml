id: robomme
name: RoboMME
benchmark_kind:
- vla
- embodied-action
- memory
- robot-manipulation
domains:
- vla
- embodied-action
- memory
modalities:
- language
- vision
- action
- state
aliases:
- robo-mme
status: open_source
official_sources:
  github:
    url: https://github.com/RoboMME/robomme_policy_learning
  paper_url: https://arxiv.org/abs/2603.04639
  license: upstream_terms
runner:
  runner_target: worldfoundry.evaluation.tasks.contracts.external:RoboMMEContract
  expected_artifacts:
  - scorecard.json
  - raw_results.jsonl
  - evaluation/summary.json
  runtime:
    kind: external_official_results_runner
    root_env: WORLDFOUNDRY_ROBOMME_ROOT
    results_path_env: WORLDFOUNDRY_ROBOMME_RESULTS_PATH
    task_manifest: worldfoundry/data/benchmarks/tasks/external/robomme.yaml
    preflight_profile: robomme
    required_assets:
    - RoboMME runtime
    - memory task assets
    - policy checkpoint
    - official rollout result dump
  verification_status: normalizer_only
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - robomme
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --output-dir
  - <out>
  - --json
metrics:
- id: success_rate
  name: Success Rate
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
  primary: true
- id: counting_success_rate
  name: Counting Success Rate
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
- id: permanence_success_rate
  name: Permanence Success Rate
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
- id: reference_success_rate
  name: Reference Success Rate
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
- id: imitation_success_rate
  name: Imitation Success Rate
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
integration:
  status: integrated
  evidence:
    official_benchmark_verified: false
    integration_evidence: true
    leaderboard_valid: false
  blocked_reasons:
  - Full official status requires executing the upstream simulator runtime with staged assets, exact split, selected 
    policy checkpoint, and retained rollout evidence.
release_status: normalizer_only
maturity: contract_ready
open_source_status: normalizer_only
official_benchmark_verified: false
integration_evidence: true
leaderboard_valid: false
requires:
- Official simulator runtime
- benchmark assets
- policy checkpoint
- official result dump
blockers:
- Full leaderboard parity is not claimed until official rollouts are executed and imported.
data_refs:
  task_yaml: worldfoundry/data/benchmarks/tasks/external/robomme.yaml
runner_availability:
  available: true
  runner_target: worldfoundry.evaluation.tasks.contracts.external:RoboMMEContract
  task_yaml_available: true
  runtime_verified: false
  normalizer_verified: true
  surface: official_result_normalizer
  runner_script_available: false
checkpoint_refs: []
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- robomme
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --output-dir
- <out>
- --json
artifact_layout:
  generated_artifact_dir_env: WORLDFOUNDRY_ROBOMME_RESULTS_PATH
  output_artifact: benchmark_scorecard
  filename_template: scorecard.json
