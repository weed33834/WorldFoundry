id: robocasa
name: RoboCasa
benchmark_kind:
- vla
- robot-manipulation
- long-horizon
domains:
- vla
- robot-manipulation
- long-horizon
modalities:
- language
- vision
- action
- state
status: open_source
official_sources:
  github:
    url: https://github.com/robocasa/robocasa
    head_sha: 56e355ccc64389dfc1b8a61a33b9127b975ba681
  project_page: https://robocasa.ai/
  paper_url: https://arxiv.org/abs/2406.02523
  license: other:noassertion_github_api
  huggingface_status: not_applicable_or_not_found
  access_notes: GitHub repository is public; GitHub API reports license spdx_id=NOASSERTION, so redistribution license 
    needs manual review.
dataset:
  not_applicable: true
  reason: RoboCasa uses simulator assets and generated policy rollouts rather than a single public HF benchmark table.
runner:
  runner_target: worldfoundry.evaluation.tasks.contracts.external:RoboCasaContract
  verification_status: normalizer_only
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - robocasa
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --output-dir
  - <out>
  - --json
  expected_artifacts:
  - scorecard.json
  - raw_results.jsonl
  runtime:
    kind: external_official_results_runner
    results_path_env: WORLDFOUNDRY_ROBOCASA_RESULTS_PATH
  required_env:
  - WORLDFOUNDRY_ROBOCASA_RESULTS_PATH
  notes:
  - WorldFoundry public benchmark-run can normalize caller-provided official result files without simulator execution.
metrics:
- id: success_rate
  name: Success Rate
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
  primary: true
- id: task_success
  name: Task Success
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
- id: episode_success
  name: Episode Success
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
- id: reward
  name: Reward
  higher_is_better: true
integration:
  status: integrated
release_status: normalizer_only
maturity: contract_ready
open_source_status: normalizer_only
official_benchmark_verified: false
integration_evidence: true
leaderboard_valid: false
full_test_harness_ready: true
full_suite_testable: true
full_suite_execution_recorded: false
requires:
- Official RoboCasa repository checkout
- RoboCasa simulator assets
- Long-horizon policy checkpoint
- Official task and scene split declaration
blockers:
- Official RoboCasa scene assets, policy checkpoints, and long-horizon simulator rollouts must be validated before 
  integrated status.
data_refs:
  local_repo_paths:
  - cache/vla_va_wam/repos/robocasa--robocasa
  task_yaml: worldfoundry/data/benchmarks/tasks/external/robocasa.yaml
runner_availability:
  available: true
  runner_target: worldfoundry.evaluation.tasks.contracts.external:RoboCasaContract
  runner_script_available: false
  task_yaml_available: true
  runtime_verified: false
  normalizer_verified: true
  surface: official_result_normalizer
optional_base_model_dependencies:
- spatial_perception_core_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- robocasa
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --output-dir
- <out>
- --json
checkpoint_refs: []
artifact_layout:
  generated_artifact_dir_env: WORLDFOUNDRY_ROBOCASA_RESULTS_PATH
  output_artifact: benchmark_scorecard
  filename_template: scorecard.json
