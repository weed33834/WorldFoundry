id: libero-para
name: LIBERO-Para
benchmark_kind:
- vla
- robot-manipulation
- embodied-evaluation
domains:
- vla
- robot-manipulation
- language-generalization
- paraphrase-generalization
modalities:
- language
- vision
- action
- state
aliases:
- LIBERO-Para
- libero_para
- libero-paraphrase
status: open_source
official_sources:
  github:
    url: https://github.com/cau-hai-lab/LIBERO-Para
    head_sha: dec2d93ad591a6f55d50e792dea4637a3b9dc1dd
  huggingface_datasets:
  - repo_id: HAI-Lab/LIBERO-Para
    license: mit
    status: confirmed
  paper_url: https://huggingface.co/papers/2603.28301
  license: mit
  access_notes: GitHub repository and Hugging Face dataset are public metadata; files are not bundled in WorldFoundry.
dataset_refs:
- repo_id: HAI-Lab/LIBERO-Para
  license: mit
  path: cache/worldfoundry/data/hfd_datasets/HAI-Lab__LIBERO-Para
runner:
  runner_target: worldfoundry.evaluation.tasks.contracts.external:LIBEROParaContract
  expected_artifacts:
  - scorecard.json
  - benchmark_contract.json
  - raw_metric_table.jsonl
  - raw_results.jsonl
  runtime:
    root_env: WORLDFOUNDRY_LIBERO_PARA_ROOT
    results_path_env: WORLDFOUNDRY_LIBERO_PARA_RESULTS_PATH
    dataset_root_env: WORLDFOUNDRY_LIBERO_PARA_DATASET_ROOT
    task_manifest: worldfoundry/data/benchmarks/tasks/external/libero-para.yaml
    preflight_profile: libero-para
    required_assets:
    - LIBERO-Para repository checkout
    - LIBERO-Para dataset root
    - policy checkpoint and paraphrase split configuration
    - official rollout logs/result dump
    kind: external_official_results_runner
  verification_status: normalizer_only
  notes:
  - Normalizer-first scorecards are supported through worldfoundry.evaluation.tasks.embodied.normalizer.
  - Official LIBERO-Para runtime validation remains pending and should be driven by caller-provided upstream result 
    files.
  - WorldFoundry public benchmark-run can normalize caller-provided official result files without simulator execution.
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - libero-para
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --output-dir
  - <out>
  - --json
  required_env:
  - WORLDFOUNDRY_LIBERO_PARA_RESULTS_PATH
metrics:
- id: success_rate
  name: Success Rate
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
  primary: true
- id: paraphrase_success_rate
  name: Paraphrase Success Rate
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
- id: language_generalization_success
  name: Language Generalization Success
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
- id: task_success
  name: Task Success
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
- id: action_accuracy
  name: Action Accuracy
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
integration:
  status: integrated
  evidence:
    official_benchmark_verified: false
    integration_evidence: true
    leaderboard_valid: false
  blocked_reasons:
  - Full leaderboard parity still requires official LIBERO-Para rollout execution with simulator assets, policy 
    checkpoints, and upstream evidence.
release_status: normalizer_only
maturity: contract_ready
open_source_status: normalizer_only
official_benchmark_verified: false
integration_evidence: true
leaderboard_valid: false
full_test_harness_ready: true
full_suite_testable: true
full_suite_execution_recorded: false
requires:
- Official LIBERO-Para repository checkout
- HAI-Lab/LIBERO-Para dataset root
- Policy checkpoint for selected upstream eval script
- Official result dump from metrics/analyze_results.py or equivalent structured export
blockers:
- Official LIBERO-Para rollout execution has not produced leaderboard evidence.
- Paraphrase split mapping and result import fields must be validated on real upstream outputs.
data_refs:
  dataset_refs:
  - repo_id: HAI-Lab/LIBERO-Para
    license: mit
    path: cache/worldfoundry/data/hfd_datasets/HAI-Lab__LIBERO-Para
  local_dataset_paths:
  - cache/worldfoundry/data/hfd_datasets/HAI-Lab__LIBERO-Para
  - cache/vla_va_wam/hf_datasets/HAI-Lab--LIBERO-Para
  local_repo_paths:
  - cache/worldfoundry/repos/cau-hai-lab--LIBERO-Para
  - ${WORLDFOUNDRY_CACHE_DIR}/repos/github.com_cau-hai-lab_LIBERO-Para
  task_yaml: worldfoundry/data/benchmarks/tasks/external/libero-para.yaml
runner_availability:
  available: true
  runner_target: worldfoundry.evaluation.tasks.contracts.external:LIBEROParaContract
  runner_script_available: false
  task_yaml_available: true
  runtime_verified: false
  normalizer_verified: true
  surface: official_result_normalizer
base_model_dependencies:
- libero_para_source_assets
- libero_para_dataset_assets
optional_base_model_dependencies:
- spatial_perception_core_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- libero-para
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --output-dir
- <out>
- --json
checkpoint_refs: []
artifact_layout:
  generated_artifact_dir_env: WORLDFOUNDRY_LIBERO_PARA_RESULTS_PATH
  output_artifact: benchmark_scorecard
  filename_template: scorecard.json
