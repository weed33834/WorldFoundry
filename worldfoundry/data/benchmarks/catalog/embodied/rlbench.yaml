id: rlbench
name: RLBench
benchmark_kind:
- embodied-action
- robot-manipulation
- simulator
- multi-task
domains:
- embodied-action
- robot-manipulation
- simulator
- multi-task
- few-shot
modalities:
- language
- vision
- action
- state
aliases:
- RLBench
- robot-learning-benchmark
status: open_source
official_sources:
  github:
    url: https://github.com/stepjam/RLBench
    head_sha: 02720bba4c73fe02eb75df946b8791b806028a9d
  project_page: https://sites.google.com/corp/view/rlbench
  paper_url: https://arxiv.org/abs/1909.12271
  license: other:noassertion_github_api
  huggingface_status: not_applicable_or_not_found
  access_notes: GitHub repository is public; GitHub API reports license spdx_id=NOASSERTION, so redistribution license 
    needs manual review.
dataset:
  not_applicable: true
  reason: RLBench is simulator-backed; WorldFoundry normalizes policy rollout results while CoppeliaSim/PyRep execution 
    remains explicit.
runner:
  runner_target: worldfoundry.evaluation.tasks.contracts.external:RLBenchContract
  verification_status: normalizer_only
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - rlbench
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --output-dir
  - <out>
  - --json
  expected_artifacts:
  - scorecard.json
  - raw_results.jsonl
  runtime:
    kind: external_official_results_runner
    results_path_env: WORLDFOUNDRY_RLBENCH_RESULTS_PATH
  required_env:
  - WORLDFOUNDRY_RLBENCH_RESULTS_PATH
  notes:
  - WorldFoundry public benchmark-run can normalize caller-provided official result files without simulator execution.
metrics:
- id: success_rate
  name: Success Rate
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
  primary: true
- id: task_success
  name: Task Success
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
- id: episode_success
  name: Episode Success
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
- id: reward
  name: Reward
  higher_is_better: true
- id: normalized_return
  name: Normalized Return
  higher_is_better: true
integration:
  status: integrated
  blocked_reasons:
  - CoppeliaSim/PyRep runtime validation and task-manifest mapping must be validated before integrated status.
release_status: normalizer_only
maturity: contract_ready
open_source_status: normalizer_only
official_benchmark_verified: false
integration_evidence: true
leaderboard_valid: false
full_test_harness_ready: true
full_suite_testable: true
full_suite_execution_recorded: false
requires:
- Official RLBench repository checkout
- CoppeliaSim and PyRep runtime
- RLBench task assets
- Benchmark-specific policy checkpoint
blockers:
- CoppeliaSim/PyRep runtime validation and task-manifest mapping must be validated before integrated status.
data_refs:
  task_yaml: worldfoundry/data/benchmarks/tasks/external/rlbench.yaml
runner_availability:
  available: true
  runner_target: worldfoundry.evaluation.tasks.contracts.external:RLBenchContract
  runner_script_available: false
  task_yaml_available: true
  runtime_verified: false
  normalizer_verified: true
  surface: official_result_normalizer
optional_base_model_dependencies:
- spatial_perception_core_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- rlbench
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --output-dir
- <out>
- --json
checkpoint_refs: []
artifact_layout:
  generated_artifact_dir_env: WORLDFOUNDRY_RLBENCH_RESULTS_PATH
  output_artifact: benchmark_scorecard
  filename_template: scorecard.json
