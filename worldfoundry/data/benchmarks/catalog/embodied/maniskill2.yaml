id: maniskill2
name: ManiSkill2
benchmark_kind:
- vla
- embodied-action
- robot-manipulation
- simulator
domains:
- vla
- robot-manipulation
- simulator
modalities:
- vision
- action
- state
aliases:
- mani-skill2
- mani-skill
status: open_source
official_sources:
  github:
    url: https://github.com/haosulab/ManiSkill
  license: apache-2.0
runner:
  runner_target: worldfoundry.evaluation.tasks.contracts.external:ManiSkill2Contract
  expected_artifacts:
  - scorecard.json
  - raw_results.jsonl
  - evaluation/summary.json
  runtime:
    kind: external_official_results_runner
    root_env: WORLDFOUNDRY_MANISKILL2_ROOT
    results_path_env: WORLDFOUNDRY_MANISKILL2_RESULTS_PATH
    task_manifest: worldfoundry/data/benchmarks/tasks/external/maniskill2.yaml
    preflight_profile: maniskill2
    required_assets:
    - ManiSkill2 runtime
    - SAPIEN assets
    - policy checkpoint
    - official rollout result dump
  verification_status: normalizer_only
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - maniskill2
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --output-dir
  - <out>
  - --json
metrics:
- id: success_rate
  name: Success Rate
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
  primary: true
- id: task_success
  name: Task Success
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
- id: episode_success
  name: Episode Success
  higher_is_better: true
  normalizer: percent_or_fraction_to_unit
- id: reward
  name: Reward
  higher_is_better: true
integration:
  status: integrated
  evidence:
    official_benchmark_verified: false
    integration_evidence: true
    leaderboard_valid: false
  blocked_reasons:
  - Full official status requires executing the upstream simulator runtime with staged assets, exact split, selected 
    policy checkpoint, and retained rollout evidence.
release_status: normalizer_only
maturity: contract_ready
open_source_status: normalizer_only
official_benchmark_verified: false
integration_evidence: true
leaderboard_valid: false
requires:
- Official simulator runtime
- benchmark assets
- policy checkpoint
- official result dump
blockers:
- Full leaderboard parity is not claimed until official rollouts are executed and imported.
data_refs:
  task_yaml: worldfoundry/data/benchmarks/tasks/external/maniskill2.yaml
runner_availability:
  available: true
  runner_target: worldfoundry.evaluation.tasks.contracts.external:ManiSkill2Contract
  task_yaml_available: true
  runtime_verified: false
  normalizer_verified: true
  surface: official_result_normalizer
  runner_script_available: false
checkpoint_refs: []
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- maniskill2
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --output-dir
- <out>
- --json
artifact_layout:
  generated_artifact_dir_env: WORLDFOUNDRY_MANISKILL2_RESULTS_PATH
  output_artifact: benchmark_scorecard
  filename_template: scorecard.json
