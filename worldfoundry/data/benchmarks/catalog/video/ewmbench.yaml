id: ewmbench
name: EWMBench
benchmark_kind:
- embodied-world-model
- video-generation-quality
- action-conditioned-generation
domains:
- embodied-world-model
- scene-consistency
- motion-correctness
- semantic-alignment
modalities:
- text
- action
- video
- frames
status: confirmed_official_code_and_hf_data
official_sources:
  github:
    url: https://github.com/AgibotTech/EWMBench
    verified_by: git ls-remote https://github.com/AgibotTech/EWMBench HEAD
    head_sha: 3a5531c0e6b6be51431251ed5617b9e48c852098
  paper_url: https://arxiv.org/abs/2505.09694
  project_page: https://huggingface.co/datasets/agibot-world/EWMBench
  huggingface_datasets:
  - repo_id: agibot-world/EWMBench
    verified_by: HEAD https://huggingface.co/api/datasets/agibot-world/EWMBench
    private: false
    gated: false
    license: cc-by-nc-sa-4.0
benchmark_assets:
  prompt_suite:
    status: confirmed_hf_and_official_repo
evaluation_surface:
  purpose: Scene, motion, and semantic quality benchmark for embodied world models.
  requires_detector_and_vlm_metrics: true
  metric_protocol:
    metric_ids:
    - scene_consistency
    - motion_correctness
    - semantic_alignment
    - diversity
    - ewmbench_average
    primary_metric: ewmbench_average
metrics:
- id: scene_consistency
  name: Scene Consistency
  description: scene_consistency normalized benchmark score.
  higher_is_better: true
  leaderboard_key: scene_consistency
  aggregator: mean
  output_unit: score
- id: motion_correctness
  name: Motion Correctness
  description: motion_correctness normalized benchmark score.
  higher_is_better: true
  leaderboard_key: motion_correctness
  aggregator: mean
  output_unit: score
- id: semantic_alignment
  name: Semantic Alignment
  description: semantic_alignment normalized benchmark score.
  higher_is_better: true
  leaderboard_key: semantic_alignment
  aggregator: mean
  output_unit: score
- id: diversity
  name: Diversity
  description: diversity normalized benchmark score.
  higher_is_better: true
  leaderboard_key: diversity
  aggregator: mean
  output_unit: score
- id: ewmbench_average
  name: Ewmbench Average
  description: ewmbench_average normalized benchmark score.
  higher_is_better: true
  leaderboard_key: ewmbench_average
  aggregator: mean
  output_unit: score
  primary: true
runner:
  runner_target: worldfoundry.evaluation.tasks.contracts.external:EWMBenchContract
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - ewmbench
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  runtime:
    kind: in_tree_official_source
    root: worldfoundry/evaluation/tasks/execution/runners/ewmbench/runtime/ewmbench
    repo_url: https://github.com/AgibotTech/EWMBench.git
    repo_revision: 3a5531c0e6b6be51431251ed5617b9e48c852098
    results_path_env: WORLDFOUNDRY_EWMBENCH_RESULTS_PATH
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  expected_artifacts:
  - scorecard.json
  - benchmark_contract.json
  - raw_metric_table.jsonl
  verification_status: pending
  notes:
  - WorldFoundry normalizes caller-provided EWMBench official result files through the unified benchmark-run entrypoint.
  - Framework validation for caller-provided EWMBench official result files is verified through the unified benchmark
    runner; imported scorecards remain non-leaderboard setup evidence.
  - Full leaderboard parity still requires generated artifacts for the complete official prompt/task suite plus upstream
    scorer or judge assets.
  required_env:
  - WORLDFOUNDRY_EWMBENCH_RESULTS_PATH
integration:
  status: integrated
  evidence:
    framework_validation: worldfoundry-eval zoo benchmark-run --benchmark-id ewmbench --mode official-validation
      --official-results-path <official_results.json> --generated-artifact-dir <generated_frames_or_videos> --output-dir
      <out> --json
    runtime_surface: ewmbench_official_in_tree
    full_suite_verified: false
release_status: experimental
maturity: contract_ready
open_source_status: in_tree_runtime
official_benchmark_verified: false
integration_evidence: true
leaderboard_valid: false
requires:
- bundled EWMBench runtime assets
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
- WORLDFOUNDRY_EWMBENCH_RESULTS_PATH
- official_results_path or official_results
blockers:
- Leaderboard parity requires official judge/checkpoint/API assets and full-suite normalized upstream result files.
data_refs:
  task_yaml: worldfoundry/data/benchmarks/tasks/external/ewmbench.yaml
  in_tree_runtime_paths:
  - worldfoundry/evaluation/tasks/execution/runners/ewmbench/runtime/ewmbench
official_runner_script: worldfoundry/evaluation/tasks/execution/runners/ewmbench/run_ewmbench_official_runner.py
runner_availability:
  available: true
  runner_target: worldfoundry.evaluation.tasks.contracts.external:EWMBenchContract
  runner_script_available: true
  task_yaml_available: true
  runtime_verified: false
  surface: ewmbench_official_in_tree
  normalizer_verified: true
base_model_dependencies:
- ewmbench_dataset_assets
optional_base_model_dependencies:
- spatial_perception_core_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- ewmbench
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
checkpoint_refs: []
artifact_layout:
  generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  output_artifact: benchmark_scorecard
  filename_template: scorecard.json
