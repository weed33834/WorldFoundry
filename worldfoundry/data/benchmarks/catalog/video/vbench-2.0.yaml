id: vbench-2.0
name: VBench-2.0
benchmark_kind:
- intrinsic-faithfulness
- physics
- commonsense
- human-fidelity
- video-generation-quality
status: confirmed_official_code_and_hf_data
open_source_status: experimental
official_benchmark_verified: false
integration_evidence: false
leaderboard_valid: false
official_gpu_validation:
  verified: true
  dimension: Diversity
  generated_video_count: 20
  official_benchmark_verified: true
  integration_evidence: true
  full_suite_verified: false
  leaderboard_valid: false
  scope: bounded_official_gpu_validation
  scorecard: tmp/local_open_eval/gpu_vbench2_cu113_diversity_probe/scorecard.json
requires:
- WORLDFOUNDRY_VBENCH2_RESULTS_PATH
- WORLDFOUNDRY_VBENCH2_DATASET_ROOT or WORLDFOUNDRY_HF_CACHE_DIR
- Generated videos for the full VBench-2.0 prompt suite
blockers:
- Bounded Diversity official GPU validation passed; full prompt-suite coverage and full dimension stack still require 
  the complete generated video set, dataset assets, and materialized base-model checkpoints.
- License fields are null in HF API responses and need manual review before redistribution.
base_model_dependencies:
- vbench_perception_metric_stack
base_model_dependency_preflight:
  status: ready
  notes:
  - CLIP, DINOv2, GroundingDINO, SAM-family segmentation, RAFT, CoTracker, LLaVA-Video, Qwen, YOLO-World, ArcFace, and 
    anomaly-detector assets are tracked as reusable WorldFoundry base-model assets.
  - The VBench-2.0 runner has no runner-local foundation-model fork; dimension code resolves checkpoints through 
    base-model/cache paths.
  missing: []
official_sources:
  github:
    url: https://github.com/Vchitect/VBench
    verified_by: git ls-remote --symref https://github.com/Vchitect/VBench.git HEAD
    default_branch: master
    head_sha: 45e79ec14e69a2187202c675d2dbce1a71843d53
    path_or_ref: VBench-2.0
  project_page: https://vchitect.github.io/VBench-2.0-project/
  huggingface_datasets:
  - repo_id: Vchitect/VBench-2.0_sampled_videos
    verified_by: GET https://huggingface.co/api/datasets/Vchitect/VBench-2.0_sampled_videos
    sha: f9ee15efcfb86d96bd5379e8d85f8d69b901aad1
    private: false
    gated: false
  - repo_id: Vchitect/VBench-2.0_human_annotation
    verified_by: GET https://huggingface.co/api/datasets/Vchitect/VBench-2.0_human_annotation
    sha: 3301a1a2d1cdb743b6dfdd641033c354335d1d48
    private: false
    gated: false
  - repo_id: Vchitect/VBench-2.0_human_anomaly
    verified_by: GET https://huggingface.co/api/datasets/Vchitect/VBench-2.0_human_anomaly
    sha: c84fad03a01bb93446588080f55004fe46d40125
    private: false
    gated: false
  paper_url: https://arxiv.org/abs/2503.21755
  license: unknown_pending_review
  access_notes: Official GitHub repository is public; linked HF dataset license metadata is null and needs manual 
    review.
evaluation_surface:
  dimensions: 18
  categories:
  - human_fidelity
  - controllability
  - creativity
  - physics
  - commonsense
  requires_api: some dimensions use VLM/LLM-style judging
metrics:
- id: vbench2_creativity
  name: VBench-2.0 Creativity
  description: Official VBench-2.0 creativity group aggregated from Composition and Diversity dimensions.
  higher_is_better: true
  leaderboard_key: creativity score
  normalizer: identity:0:1
  aggregator: mean
  unit: score
- id: vbench2_commonsense
  name: VBench-2.0 Commonsense
  description: Official VBench-2.0 commonsense group aggregated from Instance Preservation and Motion Rationality.
  higher_is_better: true
  leaderboard_key: commonsense score
  normalizer: identity:0:1
  aggregator: mean
  unit: score
- id: vbench2_controllability
  name: VBench-2.0 Controllability
  description: Official VBench-2.0 controllability group aggregated from camera, landscape, plot, dynamic, interaction, 
    and motion-order dimensions.
  higher_is_better: true
  leaderboard_key: controllability score
  normalizer: identity:0:1
  aggregator: mean
  unit: score
- id: vbench2_human_fidelity
  name: VBench-2.0 Human Fidelity
  description: Official VBench-2.0 human fidelity group aggregated from anatomy, clothes, and identity dimensions.
  higher_is_better: true
  leaderboard_key: human fidelity score
  normalizer: identity:0:1
  aggregator: mean
  unit: score
- id: vbench2_physics
  name: VBench-2.0 Physics
  description: Official VBench-2.0 physics group aggregated from material, mechanics, multi-view consistency, and 
    thermotics dimensions.
  higher_is_better: true
  leaderboard_key: physics score
  normalizer: identity:0:1
  aggregator: mean
  unit: score
- id: vbench2_total
  name: VBench-2.0 Total
  description: Mean of VBench-2.0 creativity, commonsense, controllability, human fidelity, and physics group scores.
  higher_is_better: true
  leaderboard_key: total score
  normalizer: identity:0:1
  aggregator: mean
  unit: score
  primary: true
runner:
  runner_target: worldfoundry.evaluation.tasks.contracts.external:VBench2Contract
  validation_command: PYTHONPATH=. "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}" 
    worldfoundry/evaluation/tasks/execution/runners/vbench_2_0/run_vbench_2_0_official_runner.py --benchmark-id 
    vbench-2.0 --variant vbench2 --videos-path "${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}" --vbench2-dataset-root 
    "${WORLDFOUNDRY_VBENCH2_DATASET_ROOT}" --dimension "${WORLDFOUNDRY_VBENCH2_DIMENSION:-Diversity}" --mode 
    "${WORLDFOUNDRY_VBENCH2_MODE:-custom_input}" --python "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}" --timeout 
    "${WORLDFOUNDRY_VBENCH2_TIMEOUT:-1800}" --output-dir "${WORLDFOUNDRY_BENCHMARK_OUTPUT_DIR}" --json
  run_command: PYTHONPATH=. "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}" 
    worldfoundry/evaluation/tasks/execution/runners/vbench_2_0/run_vbench_2_0_official_runner.py --benchmark-id 
    vbench-2.0 --variant vbench2 --videos-path "${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}" --vbench2-dataset-root 
    "${WORLDFOUNDRY_VBENCH2_DATASET_ROOT}" --dimension "${WORLDFOUNDRY_VBENCH2_DIMENSION:-Diversity}" --mode 
    "${WORLDFOUNDRY_VBENCH2_MODE:-custom_input}" --python "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}" --timeout 
    "${WORLDFOUNDRY_VBENCH2_TIMEOUT:-1800}" --output-dir "${WORLDFOUNDRY_BENCHMARK_OUTPUT_DIR}" --json
  required_env:
  - WORLDFOUNDRY_VBENCH2_RESULTS_PATH
  runtime:
    kind: in_tree_official_source
    repo_url: https://github.com/Vchitect/VBench.git
    revision: 45e79ec14e69a2187202c675d2dbce1a71843d53
    root: worldfoundry/evaluation/tasks/execution/runners/vbench_2_0/runtime
    override_root_env: WORLDFOUNDRY_VBENCH2_ROOT
    results_path_env: WORLDFOUNDRY_VBENCH2_RESULTS_PATH
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
    dataset_root_env: WORLDFOUNDRY_VBENCH2_DATASET_ROOT
    hf_cache_env: WORLDFOUNDRY_HF_CACHE_DIR
    official_entrypoints:
      evaluate: python -m worldfoundry.evaluation.tasks.execution.runners.vbench_2_0.runtime.entrypoints.vbench2 
        --videos_path <generated_video_dir>
  expected_artifacts:
  - scorecard.json
  - raw_metric_table.jsonl
  - dimension_scores.json
  - vbench2_dataset_manifest.json
  - vbench2_video_coverage.json
  - vbench2_benchmark_contract.json
  - upstream_stdout.log
  - upstream_stderr.log
  assets:
    official_gpu_validation:
      status: verified
      dimension: Diversity
      generated_video_count: 20
      full_suite_verified: false
      leaderboard_valid: false
      verified: true
      official_benchmark_verified: true
      integration_evidence: true
      scope: bounded_official_gpu_validation
      scorecard: tmp/local_open_eval/gpu_vbench2_cu113_diversity_probe/scorecard.json
  verification_status: verified
  notes:
  - WorldFoundry wrapper normalizes official VBench-2.0 *_eval_results.json into the five published category groups.
  - Runner now discovers local VBench-2.0 real-data downloads from WORLDFOUNDRY_VBENCH2_DATASET_ROOT or Hugging Face 
    cache and writes a dataset/video coverage contract.
  - Bounded official GPU validation verified the upstream Diversity dimension with 20 generated videos; full suite and 
    leaderboard parity remain unverified.
  - Normalizer-only validation is not treated as integrated runtime evidence.
integration:
  status: integrated
  evidence:
    official_benchmark_verified: true
    integration_evidence: true
    leaderboard_valid: false
  blocked_reasons:
  - Bounded Diversity official GPU validation passed; full prompt-suite coverage and full dimension stack still require 
    VBench-2.0-specific dependencies and checkpoint cache.
  - License fields are null in HF API responses and need manual review before redistribution.
release_status: experimental
maturity: contract_ready
data_refs:
  local_dataset_paths:
  - cache/worldfoundry/data/hfd_datasets/Vchitect/VBench-2.0_sampled_videos
  - cache/worldfoundry/data/hfd_datasets/Vchitect__VBench-2.0_sampled_videos
  - cache/worldfoundry/data/hfd_datasets/Vchitect/VBench-2.0_human_annotation
  - cache/worldfoundry/data/hfd_datasets/Vchitect__VBench-2.0_human_annotation
  - cache/worldfoundry/data/hfd_datasets/Vchitect/VBench-2.0_human_anomaly
  - cache/worldfoundry/data/hfd_datasets/Vchitect__VBench-2.0_human_anomaly
  in_tree_source_paths:
  - worldfoundry/evaluation/tasks/execution/runners/vbench_2_0/runtime
  task_yaml: worldfoundry/data/benchmarks/tasks/external/vbench-2.0.yaml
runner_availability:
  available: true
  runner_target: worldfoundry.evaluation.tasks.contracts.external:VBench2Contract
  runner_script_available: true
  task_yaml_available: true
  runtime_verified: true
  evidence:
    dimension: Diversity
    generated_video_count: 20
    full_suite_verified: false
  normalizer_verified: false
  surface: official_runner
validation_command:
- ${WORLDFOUNDRY_UNIFIED_PYTHON}
- worldfoundry/evaluation/tasks/execution/runners/vbench_2_0/run_vbench_2_0_official_runner.py
- --benchmark-id
- vbench-2.0
- --variant
- vbench2
checkpoint_refs: []
artifact_layout:
  generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  output_artifact: benchmark_scorecard
  filename_template: scorecard.json
