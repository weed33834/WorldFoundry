id: phyground
name: PhyGround
benchmark_kind:
- text-image-to-video
- physical-reasoning
- world-model
domains:
- physics
- physical-reasoning
- solid-body
- fluid-dynamics
- optics
modalities:
- image
- text
- video
status: confirmed_official_code_and_hf_data
official_sources:
  github:
    url: https://github.com/NU-World-Model-Embodied-AI/PhyGround
    verified_by: git ls-remote https://github.com/NU-World-Model-Embodied-AI/PhyGround HEAD
    head_sha: 99c511b5bddbe2d4d5a3aa66a0282a0fbbf2292d
  paper_url: https://arxiv.org/abs/2605.10806
  project_page: https://phyground.github.io/
  huggingface_datasets:
  - repo_id: NU-World-Model-Embodied-AI/phyground
    verified_by: HEAD https://huggingface.co/api/datasets/NU-World-Model-Embodied-AI/phyground
    private: false
    gated: false
benchmark_assets:
  prompt_suite:
    status: confirmed_hf_and_official_repo
    path_or_ref: prompts/phyground.json
evaluation_surface:
  purpose: Criteria-grounded physical reasoning benchmark for generated videos.
  claimed_prompts: 250
  claimed_physical_laws: 13
  requires_phyjudge_or_api: true
  normalizer_accepts_existing_judge_outputs: true
metrics:
- id: semantic_adherence
  name: Semantic Adherence
  description: Semantic Adherence normalized benchmark score.
  higher_is_better: true
  leaderboard_key: semantic_adherence
  aggregator: mean
  output_unit: score
- id: physical_temporal_validity
  name: Physical Temporal Validity
  description: Physical Temporal Validity normalized benchmark score.
  higher_is_better: true
  leaderboard_key: physical_temporal_validity
  aggregator: mean
  output_unit: score
- id: persistence
  name: Persistence
  description: Persistence normalized benchmark score.
  higher_is_better: true
  leaderboard_key: persistence
  aggregator: mean
  output_unit: score
- id: solid_body_score
  name: Solid-Body Score
  description: Solid-Body Score normalized benchmark score.
  higher_is_better: true
  leaderboard_key: solid_body_score
  aggregator: mean
  output_unit: score
- id: fluid_dynamics_score
  name: Fluid Dynamics Score
  description: Fluid Dynamics Score normalized benchmark score.
  higher_is_better: true
  leaderboard_key: fluid_dynamics_score
  aggregator: mean
  output_unit: score
- id: optics_score
  name: Optics Score
  description: Optics Score normalized benchmark score.
  higher_is_better: true
  leaderboard_key: optics_score
  aggregator: mean
  output_unit: score
- id: phyground_overall
  name: PhyGround Overall
  description: PhyGround Overall normalized benchmark score.
  higher_is_better: true
  leaderboard_key: phyground_overall
  aggregator: mean
  output_unit: score
  primary: true
runner:
  runner_target: worldfoundry.evaluation.tasks.contracts.external:PhyGroundContract
  official_runner_script: worldfoundry/evaluation/tasks/execution/runners/phyground/run_phyground_official_runner.py
  run_command: PYTHONPATH=. "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}" 
    worldfoundry/evaluation/tasks/execution/runners/phyground/run_phyground_official_runner.py --run-official 
    --generated-artifact-dir "${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}" --output-dir 
    "${WORLDFOUNDRY_BENCHMARK_OUTPUT_DIR}" --json
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - phyground
  - --mode
  - official-validation
  - --benchmark-data-root
  - <phyground_data_root>
  - --generated-artifact-dir
  - <phyground_data_root>/videos/<model_id>
  - --result-model-id
  - <model_id>
  - --output-dir
  - <out>
  - --json
  runtime:
    kind: in_tree_official_source
    root: worldfoundry/evaluation/tasks/execution/runners/phyground/runtime/phyground
    root_env: WORLDFOUNDRY_PHYGROUND_ROOT
    results_path_env: WORLDFOUNDRY_PHYGROUND_RESULTS_PATH
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  expected_artifacts:
  - scorecard.json
  - benchmark_contract.json
  - raw_metric_table.jsonl
  verification_status: official_runtime_ready
  notes:
  - PhyGround in-tree runner imports scores.json produced by WorldFoundry/base-model judge infrastructure.
  - Standard PhyGround data roots auto-discover prompts/phyground.json, first_images/, and generated videos.
  - Full leaderboard parity still requires PhyJudge/vLLM or cloud API judge execution on all 250 prompts.
integration:
  status: integrated
  blocked_reasons:
  - Full leaderboard parity still requires complete PhyJudge/vLLM or cloud API judge scores for all 250 official prompts.
release_status: experimental
maturity: contract_ready
open_source_status: in_tree_artifact_scores_ready
official_benchmark_verified: false
integration_evidence: true
leaderboard_valid: false
requires:
- --benchmark-data-root <phyground_data_root> or WORLDFOUNDRY_PHYGROUND_DATA_ROOT
- prompts/phyground.json under the data root, or --prompt-manifest <path>
- annotations/ under the data root, or --official-results-path <path>
- --generated-artifact-dir <generated_videos>
- --result-model-id <model_id> when annotations contain multiple model ids
blockers:
- WorldFoundry imports PhyGround judge outputs; provide official PhyGround annotations/results through 
  --official-results-path or annotations/ under --benchmark-data-root.
- Full leaderboard validation still requires generated videos and complete scorer/judge outputs for the official 
  prompt suite.
data_refs:
  task_yaml: worldfoundry/data/benchmarks/tasks/external/phyground.yaml
  dataset_refs:
  - hf_dataset_id: NU-World-Model-Embodied-AI/phyground
    split: standard
    role: user_supplied_data_root
  local_dataset_layout:
  - <phyground_data_root>/prompts/phyground.json
  - <phyground_data_root>/annotations/
  - <phyground_data_root>/videos/<model_id>/
official_runner_script: worldfoundry/evaluation/tasks/execution/runners/phyground/run_phyground_official_runner.py
runner_availability:
  available: true
  runner_target: worldfoundry.evaluation.tasks.contracts.external:PhyGroundContract
  runner_script_available: true
  task_yaml_available: true
  runtime_verified: true
  surface: official_in_tree_runtime
  normalizer_verified: false
base_model_dependencies:
- phyground_dataset_assets
optional_base_model_dependencies:
- grounded_depth_segmentation_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- phyground
- --mode
- official-validation
- --benchmark-data-root
- <phyground_data_root>
- --generated-artifact-dir
- <phyground_data_root>/videos/<model_id>
- --result-model-id
- <model_id>
- --output-dir
- <out>
- --json
checkpoint_refs: []
artifact_layout:
  generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  output_artifact: benchmark_scorecard
  filename_template: scorecard.json
