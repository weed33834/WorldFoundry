id: phyeduvideo
name: PhyEduVideo
benchmark_kind:
- text-to-video
- physics-education
- explanatory-video
domains:
- physics
- education
- explanation
- scientific-visualization
modalities:
- text
- video
status: confirmed_official_code
official_sources:
  github:
    url: https://github.com/meghamariamkm/PhyEduVideo
    verified_by: git ls-remote https://github.com/meghamariamkm/PhyEduVideo HEAD
    head_sha: 5a36a13818552095c9ed12c6562f236d5b5011bd
  paper_url: https://arxiv.org/abs/2601.00943
  project_page: https://meghamariamkm.github.io/phyeduvideo26/
benchmark_assets:
  prompt_suite:
    status: official_repo_data
    path: Prompts/Prompts.json
  caption_prompts:
    status: official_repo_data
    path: Prompts/cap.json
  rubric_assets:
    status: official_repo_data
    paths:
    - Prompts/SA.json
    - Prompts/PC-1.json
    - Prompts/PC-2.json
    - Prompts/PC-3.json
evaluation_surface:
  purpose: Physics education text-to-video evaluation.
  requires_instructional_judge: true
  metric_protocol:
    metric_ids:
    - semantic_adherence
    - physics_commonsense
    - motion_smoothness
    - temporal_flickering
    - phyeduvideo_average
    primary_metric: phyeduvideo_average
metrics:
- id: semantic_adherence
  name: Semantic Adherence
  description: semantic_adherence normalized benchmark score.
  higher_is_better: true
  leaderboard_key: semantic_adherence
  aggregator: mean
  output_unit: score
- id: physics_commonsense
  name: Physics Commonsense
  description: physics_commonsense normalized benchmark score.
  higher_is_better: true
  leaderboard_key: physics_commonsense
  aggregator: mean
  output_unit: score
- id: motion_smoothness
  name: Motion Smoothness
  description: motion_smoothness normalized benchmark score.
  higher_is_better: true
  leaderboard_key: motion_smoothness
  aggregator: mean
  output_unit: score
- id: temporal_flickering
  name: Temporal Flickering
  description: temporal_flickering normalized benchmark score.
  higher_is_better: true
  leaderboard_key: temporal_flickering
  aggregator: mean
  output_unit: score
- id: phyeduvideo_average
  name: PhyEduVideo Average
  description: phyeduvideo_average normalized benchmark score.
  higher_is_better: true
  leaderboard_key: phyeduvideo_average
  aggregator: mean
  output_unit: score
  primary: true
runner:
  runner_target: worldfoundry.evaluation.tasks.contracts.external:PhyEduVideoContract
  official_runner_script: worldfoundry/evaluation/tasks/execution/runners/phyeduvideo/run_phyeduvideo_official_runner.py
  run_command: PYTHONPATH=. "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}" 
    worldfoundry/evaluation/tasks/execution/runners/phyeduvideo/run_phyeduvideo_official_runner.py --run-official 
    --generated-artifact-dir "${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}" --output-dir 
    "${WORLDFOUNDRY_BENCHMARK_OUTPUT_DIR}" --json
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - phyeduvideo
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  runtime:
    kind: in_tree_official_runtime
    root: worldfoundry/evaluation/tasks/execution/runners/phyeduvideo
    repo_url: https://github.com/meghamariamkm/PhyEduVideo.git
    repo_revision: 5a36a13818552095c9ed12c6562f236d5b5011bd
    root_env: WORLDFOUNDRY_PHYEDUVIDEO_ROOT
    results_path_env: WORLDFOUNDRY_PHYEDUVIDEO_RESULTS_PATH
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
    prompts_file: Prompts/Prompts.json
    cap_file: Prompts/cap.json
  expected_artifacts:
  - scorecard.json
  - benchmark_contract.json
  - raw_metric_table.jsonl
  - results_summary.csv
  - per_sample_scores.jsonl
  verification_status: official_runtime_ready
  notes:
  - WorldFoundry runs in-tree PhyEduVideo scorer normalization over Prompts/Prompts.json and generated T2V videos.
  - Use WORLDFOUNDRY_PHYEDUVIDEO_SCORER_BACKEND to select the local scorer backend.
  - Full leaderboard parity still requires upstream judge/checkpoint assets and 205 generated videos.
  required_env:
  - WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  optional_env:
  - WORLDFOUNDRY_PHYEDUVIDEO_ROOT
  - WORLDFOUNDRY_PHYEDUVIDEO_PROMPTS_FILE
  - WORLDFOUNDRY_PHYEDUVIDEO_CAP_FILE
  - WORLDFOUNDRY_PHYEDUVIDEO_SA_FILE
  - WORLDFOUNDRY_PHYEDUVIDEO_SCORER_BACKEND
  - WORLDFOUNDRY_PHYEDUVIDEO_RESULTS_PATH
  - WORLDFOUNDRY_PHYEDUVIDEO_STRICT
  - WORLDFOUNDRY_PHYEDUVIDEO_OFFICIAL_SCRIPT
integration:
  status: integrated
  evidence:
    framework_validation: worldfoundry-eval zoo benchmark-run --benchmark-id phyeduvideo --mode official-validation 
      --official-results-path <results_summary.csv> --generated-artifact-dir <generated_videos> --output-dir <out> 
      --json
    normalizer_surface: phyeduvideo_official_in_tree
    official_runtime: worldfoundry-eval zoo benchmark-run --benchmark-id phyeduvideo --mode official-run 
      --generated-artifact-dir <generated_videos> --output-dir <out> --json
    dataset_readiness: Prompts/Prompts.json
    full_test_harness_ready: true
    full_suite_testable: true
    full_suite_verified: false
release_status: experimental
maturity: contract_ready
full_test_harness_ready: true
full_suite_testable: true
full_suite_execution_recorded: false
open_source_status: in_tree_runtime
official_benchmark_verified: false
integration_evidence: true
leaderboard_valid: false
requires:
- WORLDFOUNDRY_PHYEDUVIDEO_ROOT or Prompts/Prompts.json
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
- official_results_path or WORLDFOUNDRY_PHYEDUVIDEO_RESULTS_PATH for normalization-only runs
framework_acceptance:
- PhyEduVideo integration is OK when the in-tree scorer runtime or caller-supplied results CSV, Prompts/Prompts.json, 
  and generated videos pass strict coverage checks and all declared metrics are normalized.
blockers:
- Leaderboard parity requires generated videos for all 205 teaching points, upstream InternVL/CLIP/VQA judge assets, and
  full upstream scorer execution.
data_refs:
  task_yaml: worldfoundry/data/benchmarks/tasks/external/phyeduvideo.yaml
  bundled_assets: worldfoundry/data/benchmarks/assets/phyeduvideo
  in_tree_runtime_paths:
  - worldfoundry/evaluation/tasks/execution/runners/phyeduvideo
official_runner_script: worldfoundry/evaluation/tasks/execution/runners/phyeduvideo/run_phyeduvideo_official_runner.py
runner_availability:
  available: true
  runner_target: worldfoundry.evaluation.tasks.contracts.external:PhyEduVideoContract
  runner_script_available: true
  task_yaml_available: true
  runtime_verified: true
  surface: phyeduvideo_official_in_tree
  normalizer_verified: false
dataset:
  not_applicable: true
  reason: Bundled Prompts/*.json supports materialization fixture; full upstream judge assets optional for leaderboard 
    parity.
optional_base_model_dependencies:
- grounded_depth_segmentation_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- phyeduvideo
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
checkpoint_refs: []
artifact_layout:
  generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  output_artifact: benchmark_scorecard
  filename_template: scorecard.json
