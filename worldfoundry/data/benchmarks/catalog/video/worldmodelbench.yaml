id: worldmodelbench
name: WorldModelBench
benchmark_kind:
- world-model
- image-to-video
- text-to-video
- physics-adherence
domains:
- world-model
- physical-adherence
- instruction-following
- common-sense
modalities:
- text
- image
- video
status: confirmed_official_code_and_data_in_github
open_source_status: in_tree_runtime
official_benchmark_verified: false
integration_evidence: true
leaderboard_valid: false
full_test_harness_ready: true
full_suite_testable: true
full_suite_execution_recorded: false
requires:
- --benchmark-data-root <worldmodelbench_data_root> or WORLDFOUNDRY_WORLDMODELBENCH_DATA_ROOT
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
- WORLDFOUNDRY_WORLDMODELBENCH_JUDGE=<VILA_checkpoint_or_HF_model_id>
- In-tree WorldFoundry VILA runtime importable
- In-tree WorldModelBench runtime/evaluation.py, or optional WORLDFOUNDRY_WORLDMODELBENCH_ROOT override
- Public generated videos matching the 350-instance manifest
blockers:
- The WorldFoundry wrapper can execute the official judge path when a user supplies a VILA checkpoint or HF model id and
  generated videos.
- Full leaderboard parity requires recording the completed judge checkpoint execution, generated videos covering the
  350-instance manifest, and upstream submission evidence.
- Leaderboard answers are withheld, so local regression must use public outputs or caller-provided official-shaped
  result files.
official_sources:
  github:
    url: https://github.com/WorldModelBench-Team/WorldModelBench
    verified_by: git ls-remote --symref https://github.com/WorldModelBench-Team/WorldModelBench.git HEAD
    default_branch: main
    head_sha: 00b7aa17a05f9fd1ab5c8f66bcf476d04c9c33bf
  project_page: https://worldmodelbench-team.github.io/
  huggingface_datasets:
  - repo_id: Efficient-Large-Model/worldmodelbench
    verified_by: GET https://huggingface.co/api/datasets/Efficient-Large-Model/worldmodelbench
    sha: f2450a891498b3daed3f28fc9ba0ab8adce90617
    private: false
    gated: false
    notes: Upstream README says data moved from Hugging Face to GitHub on 2025-07-28.
  huggingface_models:
  - repo_id: Efficient-Large-Model/vila-ewm-qwen2-1.5b
    verified_by: GET https://huggingface.co/api/models/Efficient-Large-Model/vila-ewm-qwen2-1.5b
    sha: 827be9ef964d9dff54d17551965c9d41224e3675
    private: false
    gated: false
    purpose: official judge model referenced by README
  paper_url: https://arxiv.org/abs/2502.20694
  license: unknown_pending_review
  access_notes: Official GitHub repository is public, but GitHub API reports license=null; redistribution license needs
    manual review.
benchmark_assets:
  test_set:
    status: confirmed_in_github
    path_or_ref: worldmodelbench.json
    num_instances: 350
  first_frames:
    status: confirmed_in_github
    path_or_ref: images/
  answers:
    status: withheld
    notes: README states answers and explanations for test questions are withheld for leaderboard submission.
evaluation_surface:
  domains: 7
  subdomains: 56
  metrics:
  - instruction_following
  - common_sense
  - physical_adherence
  requires_api: false
  requires_judge_model: true
metrics:
- id: instruction_following
  name: Instruction Following
  description: WorldModelBench instruction-following score.
  higher_is_better: true
  leaderboard_key: instruction_following
  aggregator: mean
  output_unit: score
- id: common_sense
  name: Common Sense
  description: WorldModelBench common-sense reasoning score.
  higher_is_better: true
  leaderboard_key: common_sense
  aggregator: mean
  output_unit: score
- id: physical_adherence
  name: Physical Adherence
  description: WorldModelBench physical-adherence score.
  higher_is_better: true
  leaderboard_key: physical_adherence
  aggregator: mean
  output_unit: score
- id: world_model_average
  name: World Model Average
  description: Normalized aggregate across public WorldModelBench metric families.
  higher_is_better: true
  leaderboard_key: world_model_average
  aggregator: mean
  output_unit: score
  primary: true
runner:
  runner_target: worldfoundry.evaluation.tasks.contracts.external:WorldModelBenchContract
  repo_url: https://github.com/WorldModelBench-Team/WorldModelBench
  repo_revision: 00b7aa17a05f9fd1ab5c8f66bcf476d04c9c33bf
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - worldmodelbench
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --benchmark-data-root
  - <worldmodelbench_data_root>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  run_command:
  - ${WORLDFOUNDRY_UNIFIED_PYTHON}
  - worldfoundry/evaluation/tasks/execution/runners/worldmodelbench/run_worldmodelbench_official_runner.py
  required_env:
  - WORLDFOUNDRY_WORLDMODELBENCH_RESULTS_PATH
  - WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  - WORLDFOUNDRY_WORLDMODELBENCH_JUDGE=<VILA_checkpoint_or_HF_model_id>
  runtime:
    kind: in_tree_official_source
    repo_url: https://github.com/WorldModelBench-Team/WorldModelBench
    repo_revision: 00b7aa17a05f9fd1ab5c8f66bcf476d04c9c33bf
    root: worldfoundry/evaluation/tasks/execution/runners/worldmodelbench/runtime
    root_env: WORLDFOUNDRY_WORLDMODELBENCH_ROOT
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
    official_entrypoints:
      evaluate: python evaluation.py --model_name <model_name> --video_dir <video_dir> --judge <judge_model_path>
        --save_name <output_json_prefix>
    results_path_env: WORLDFOUNDRY_WORLDMODELBENCH_RESULTS_PATH
  expected_artifacts:
  - scorecard.json
  - runner_runtime_report.json
  - judge_responses.jsonl
  - raw_metric_table.jsonl
  verification_status: verified
  notes:
  - Contract runner exposes judge-model inputs and normalized scorecard outputs.
  - Official wrapper can call upstream evaluation.py and normalize saved accs/preds to WorldFoundry scorecard.
  - Wrapper validates official accs/preds shape against N, 2N, and 5N category lengths and records 350-instance manifest
    video coverage in scorecard.validation.
  - Wrapper resolves worldmodelbench.json from explicit data roots, local Hugging Face cache snapshots, or the official
    repo checkout.
  - For official-run, the wrapper passes WORLDFOUNDRY_WORLDMODELBENCH_JUDGE to evaluation.py and prefers an explicit
    data root containing evaluation.py, so a user-staged WorldModelBench data root plus VILA/LLaVA checkpoint can start
    judge evaluation through WorldFoundry.
  - Full-test harness is marked ready when a 350-instance manifest, matching generated videos, and official-shaped
    upstream result files are supplied.
  - Official judge checkpoint execution is exposed as official-run; imported result files remain
    non-leaderboard evidence.
integration:
  status: integrated
  evidence:
    framework_validation: worldfoundry-eval zoo benchmark-run --benchmark-id worldmodelbench --mode official-validation
      --official-results-path <official_results.json> --benchmark-data-root <worldmodelbench_data_root>
      --generated-artifact-dir <generated_videos> --output-dir <out> --json
    runtime_surface: worldmodelbench_official_in_tree
    dataset_readiness: worldmodelbench.json plus images/
    official_runtime: worldfoundry-eval zoo benchmark-run --benchmark-id worldmodelbench --mode official-run
      --benchmark-data-root <worldmodelbench_data_root> --generated-artifact-dir <generated_videos> --env
      WORLDFOUNDRY_WORLDMODELBENCH_JUDGE=<VILA_or_LLaVA_checkpoint_path> --output-dir <out> --json
    full_test_harness_ready: true
    full_suite_testable: true
    full_suite_verified: false
release_status: experimental
maturity: contract_ready
data_refs:
  local_dataset_paths:
  - cache/worldfoundry/data/hfd_datasets/Efficient-Large-Model/worldmodelbench
  - cache/worldfoundry/data/hfd_datasets/Efficient-Large-Model__worldmodelbench
  - cache/worldfoundry/data/hfd_datasets/datasets--Efficient-Large-Model--worldmodelbench
  - cache/worldfoundry/data/hfd_datasets/worldmodelbench
  in_tree_runtime_paths:
  - worldfoundry/evaluation/tasks/execution/runners/worldmodelbench/runtime/evaluation.py
  - worldfoundry/data/benchmarks/assets/worldmodelbench/worldmodelbench.json
  task_yaml: worldfoundry/data/benchmarks/tasks/external/worldmodelbench.yaml
runner_availability:
  available: true
  runner_target: worldfoundry.evaluation.tasks.contracts.external:WorldModelBenchContract
  runner_script_available: true
  task_yaml_available: true
  runtime_verified: true
  surface: worldmodelbench_official_in_tree
  normalizer_verified: true
base_model_dependencies:
- worldmodelbench_dataset_assets
optional_base_model_dependencies:
- video_world_perception_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- worldmodelbench
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --benchmark-data-root
- <worldmodelbench_data_root>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
checkpoint_refs: []
artifact_layout:
  generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  output_artifact: benchmark_scorecard
  filename_template: scorecard.json
