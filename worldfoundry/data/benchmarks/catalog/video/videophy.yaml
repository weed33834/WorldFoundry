id: videophy
name: VideoPhy
benchmark_kind:
- text-to-video
- physical-commonsense
- semantic-adherence
domains:
- physics
- physical-commonsense
- semantic-adherence
modalities:
- text
- video
status: confirmed_official_code
official_sources:
  github:
    url: https://github.com/Hritikbansal/videophy
    verified_by: git ls-remote https://github.com/Hritikbansal/videophy HEAD
    head_sha: 01d366c979e4a82875852adbf427ccc036e7373a
  paper_url: https://arxiv.org/abs/2406.03520
  project_page: https://videophy.github.io/
benchmark_assets:
  prompt_suite:
    status: bundled_in_tree
    manifest: worldfoundry/data/benchmarks/assets/videophy/prompts.json
evaluation_surface:
  purpose: Physical commonsense and semantic adherence evaluation for T2V generation.
  requires_autorater_checkpoint: true
metrics:
- id: semantic_adherence
  name: Semantic Adherence
  description: Semantic Adherence normalized benchmark score.
  higher_is_better: true
  leaderboard_key: semantic_adherence
  aggregator: mean
  output_unit: score
- id: physical_commonsense
  name: Physical Commonsense
  description: Physical Commonsense normalized benchmark score.
  higher_is_better: true
  leaderboard_key: physical_commonsense
  aggregator: mean
  output_unit: score
- id: joint_score
  name: Joint Score
  description: Joint Score normalized benchmark score.
  higher_is_better: true
  leaderboard_key: joint_score
  aggregator: mean
  output_unit: score
- id: videophy_average
  name: VideoPhy Average
  description: VideoPhy Average normalized benchmark score.
  higher_is_better: true
  leaderboard_key: videophy_average
  aggregator: mean
  output_unit: score
  primary: true
runner:
  runner_target: worldfoundry.evaluation.tasks.contracts.external:VideoPhyContract
  official_runner_script: worldfoundry/evaluation/tasks/execution/runners/videophy/run_videophy_official_runner.py
  run_command: PYTHONPATH=. "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}"
    worldfoundry/evaluation/tasks/execution/runners/videophy/run_videophy_official_runner.py --run-official
    --generated-artifact-dir "${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}" --output-dir
    "${WORLDFOUNDRY_BENCHMARK_OUTPUT_DIR}" --json
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - videophy
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  runtime:
    kind: in_tree_official_judge_runtime
    root: worldfoundry/evaluation/tasks/execution/runners/videophy
    root_env: WORLDFOUNDRY_VIDEOPHY_ROOT
    judge_model_id: videophysics/videocon_physics
    judge_backend_env: WORLDFOUNDRY_VIDEOPHY_JUDGE_BACKEND
    results_path_env: WORLDFOUNDRY_VIDEOPHY_RESULTS_PATH
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  expected_artifacts:
  - scorecard.json
  - benchmark_contract.json
  - raw_metric_table.jsonl
  verification_status: in_tree_official_runtime_ready
  notes:
  - Contract fixture records expected input/output shape only; full official runtime remains upstream.
  - WorldFoundry normalizes caller-provided official result files through the shared benchmark-run entrypoint without
    executing upstream scorers.
integration:
  status: integrated
  blocked_reasons:
  - Official repository/source metadata is verified, but the official benchmark runtime has not been executed in
    WorldFoundry.
  - Full validation requires generated videos or rollouts for the official prompt/task suite.
  - Leaderboard parity requires official judge/checkpoint/API assets and normalized upstream result files.
release_status: experimental
maturity: contract_ready
open_source_status: experimental
official_benchmark_verified: false
integration_evidence: true
leaderboard_valid: false
requires:
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
blockers:
- Official repository/source metadata is verified, but the official benchmark runtime has not been executed in
  WorldFoundry.
- Full validation requires generated videos or rollouts for the official prompt/task suite.
- Leaderboard parity requires official judge/checkpoint/API assets and normalized upstream result files.
- Official repository/source metadata and in-tree official-result normalizer are integrated.
- Full leaderboard validation still requires generated videos and full upstream scorer/judge execution on the official
  prompt suite.
data_refs:
  task_yaml: worldfoundry/data/benchmarks/tasks/external/videophy.yaml
  bundled_asset_paths:
  - worldfoundry/data/benchmarks/assets/videophy/prompts.json
official_runner_script: worldfoundry/evaluation/tasks/execution/runners/videophy/run_videophy_official_runner.py
runner_availability:
  available: true
  runner_target: worldfoundry.evaluation.tasks.contracts.external:VideoPhyContract
  runner_script_available: true
  task_yaml_available: true
  runtime_verified: true
  surface: videophy_official_in_tree
  normalizer_verified: false
dataset:
  not_applicable: true
  reason: Official benchmark assets are supplied by the source repository or caller-provided generated artifacts; no
    Hugging Face dataset is required for this contract entry.
optional_base_model_dependencies:
- grounded_depth_segmentation_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- videophy
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
checkpoint_refs: []
artifact_layout:
  generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  output_artifact: benchmark_scorecard
  filename_template: scorecard.json
