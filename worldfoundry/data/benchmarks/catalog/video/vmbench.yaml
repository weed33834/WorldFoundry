id: vmbench
name: VMBench
benchmark_kind:
- video-motion
- text-to-video
- perception-aligned-motion
status: confirmed_official_code_and_hf_metadata
base_model_dependencies:
- motion_stack
base_model_dependency_preflight:
  status: integrated
  notes:
  - RAFT, SEA-RAFT, and GMFlow reusable motion assets are tracked through the WorldFoundry base-model registry.
  - VMBench-specific checkpoints remain required for full metric recomputation.
official_sources:
  github:
    url: https://github.com/AMAP-ML/VMBench
    verified_by: GIT_HTTP_VERSION=HTTP/1.1 git ls-remote --symref https://github.com/AMAP-ML/VMBench.git HEAD
    default_branch: main
    head_sha: 9772be365784bc3f641d64fca018b1debb749116
  project_page: https://amap-ml.github.io/VMBench-Website/
  huggingface_models:
  - repo_id: GD-ML/VMBench
    verified_by: GET https://huggingface.co/api/models/GD-ML/VMBench
    sha: 437cf3b7c667cd23e3f1e24e19e0af7868088907
    private: false
    gated: false
    license: apache-2.0
  huggingface_dataset_attempts:
  - repo_id: AMAP-ML/VMBench
    verified_by: GET https://huggingface.co/api/datasets/AMAP-ML/VMBench
    status: 401_or_not_public
  paper_url:
    https://openaccess.thecvf.com/content/ICCV2025/html/Ling_VMBench_A_Benchmark_for_Perception-Aligned_Video_Motion_Generation_ICCV_2025_paper.html
  license: apache-2.0
  access_notes: Official GitHub repository is public under Apache-2.0; GD-ML/VMBench HF API returned 401 and is not
    treated as confirmed public data.
dataset:
  not_applicable: true
  reason: The official VMBench prompt suite is bundled in-tree under worldfoundry/data/benchmarks/assets/vmbench, while
    evaluated videos are generated by the candidate model and supplied by the caller.
  bundled_prompt_assets: worldfoundry/data/benchmarks/assets/vmbench/prompts/prompts.json
evaluation_surface:
  motion_categories: 6
  metrics:
  - CAS
  - MSS
  - OIS
  - PAS
  - TCS
  requires_api: official released evaluation uses local metric runtimes and checkpoints; no hosted judge API is required
metrics:
- id: perceptible_amplitude_score
  name: Perceptible Amplitude Score
  description: Official VMBench PAS metric for perceptible motion amplitude.
  higher_is_better: true
  raw_metric_name: PAS
  leaderboard_key: PAS
  normalizer: identity:0:1
  aggregator: mean
  unit: score
- id: object_integrity_score
  name: Object Integrity Score
  description: Official VMBench OIS metric for object identity and integrity under motion.
  higher_is_better: true
  raw_metric_name: OIS
  leaderboard_key: OIS
  normalizer: identity:0:1
  aggregator: mean
  unit: score
- id: temporal_coherence_score
  name: Temporal Coherence Score
  description: Official VMBench TCS metric for temporal coherence.
  higher_is_better: true
  raw_metric_name: TCS
  leaderboard_key: TCS
  normalizer: identity:0:1
  aggregator: mean
  unit: score
- id: commonsense_adherence_score
  name: Commonsense Adherence Score
  description: Official VMBench CAS metric for action and motion commonsense adherence.
  higher_is_better: true
  raw_metric_name: CAS
  leaderboard_key: CAS
  normalizer: identity:0:1
  aggregator: mean
  unit: score
- id: motion_smoothness_score
  name: Motion Smoothness Score
  description: Official VMBench MSS metric for motion smoothness.
  higher_is_better: true
  raw_metric_name: MSS
  leaderboard_key: MSS
  normalizer: identity:0:1
  aggregator: mean
  unit: score
- id: vmbench_average
  name: VMBench Average
  description: Mean of available official VMBench PAS/OIS/TCS/CAS/MSS component scores.
  higher_is_better: true
  raw_metric_name: Avg
  leaderboard_key: Avg
  normalizer: identity:0:1
  aggregator: mean
  unit: score
  primary: true
runner:
  runner_target: worldfoundry.evaluation.tasks.contracts.external:VMBenchContract
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - vmbench
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  required_env: []
  expected_artifacts:
  - scorecard.json
  - raw_metric_table.jsonl
  - per_sample_metrics.jsonl
  - upstream_stdout.log
  - upstream_stderr.log
  verification_status: pending
  notes:
  - WorldFoundry wrapper can run vendored official VMBench metric code or normalize official VMBench results.json/scores.csv.
  - Full runtime validation is heavyweight because the metric stack requires CUDA dependencies and multiple checkpoints.
  - Generated videos must follow the official prompt-index naming convention for leaderboard parity.
  runtime:
    kind: in_tree_official_runtime
    root: worldfoundry/evaluation/tasks/execution/runners/vmbench
    prompt_manifest_env: WORLDFOUNDRY_VMBENCH_PROMPT_MANIFEST
    results_path_env: WORLDFOUNDRY_VMBENCH_RESULTS_PATH
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
integration:
  status: integrated
  blocked_reasons:
  - Official eval code is vendored in-tree, but full validation still requires CUDA metric dependencies and checkpoints.
  - HF dataset endpoint for AMAP-ML/VMBench was not public; the prompt suite is bundled in-tree under
    worldfoundry/data/benchmarks/assets/vmbench.
  - Generated videos must follow the official 0001.mp4 ... 1050.mp4 prompt-index naming convention.
release_status: experimental
maturity: contract_ready
open_source_status: in_tree_runtime
official_benchmark_verified: false
integration_evidence: true
leaderboard_valid: false
requires:
- official released evaluation uses local metric runtimes and checkpoints; no hosted judge API is required
- optional WorldFoundry base-model motion stack for full metric recomputation
blockers:
- Official eval code is vendored in-tree, but full validation still requires CUDA metric dependencies and checkpoints.
- HF dataset endpoint for AMAP-ML/VMBench was not public; the prompt suite is bundled in-tree under
  worldfoundry/data/benchmarks/assets/vmbench.
- Generated videos must follow the official 0001.mp4 ... 1050.mp4 prompt-index naming convention.
data_refs:
  in_tree_runtime_paths:
  - worldfoundry/evaluation/tasks/execution/runners/vmbench/run_vmbench_official_runner.py
  - worldfoundry/evaluation/tasks/execution/runners/vmbench/vmbench_official_runtime.py
  - worldfoundry/evaluation/tasks/execution/runners/vmbench/runtime/official
  bundled_prompt_assets: worldfoundry/data/benchmarks/assets/vmbench/prompts/prompts.json
  task_yaml: worldfoundry/data/benchmarks/tasks/external/vmbench.yaml
runner_availability:
  available: true
  runner_target: worldfoundry.evaluation.tasks.contracts.external:VMBenchContract
  runner_script_available: true
  task_yaml_available: true
  runtime_verified: true
  surface: vmbench_official_in_tree
  normalizer_verified: true
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- vmbench
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
checkpoint_refs: []
artifact_layout:
  generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  output_artifact: benchmark_scorecard
  filename_template: scorecard.json
