id: vbench-plus-plus
name: VBench++
benchmark_kind:
- image-to-video
- long-video
- trustworthiness
- video-generation-quality
status: confirmed_official_code
official_sources:
  github:
    url: https://github.com/Vchitect/VBench
    verified_by: git ls-remote --symref https://github.com/Vchitect/VBench.git HEAD
    default_branch: master
    head_sha: 45e79ec14e69a2187202c675d2dbce1a71843d53
  project_page: https://vchitect.github.io/VBench-project/
  paper_url: https://arxiv.org/abs/2411.13503
  license: apache-2.0
  huggingface_status: not_applicable_no_official_hf_required_confirmed
  access_notes: Official VBench repository is public under Apache-2.0; VBench++ extensions share the upstream 
    repository.
benchmark_assets:
  modules:
  - name: VBench-I2V
    status: confirmed_in_github
    path_or_ref: vbench2_beta_i2v
  - name: VBench-Long
    status: confirmed_in_github
    path_or_ref: vbench2_beta_long
  - name: VBench-Trustworthiness
    status: confirmed_in_github
    path_or_ref: vbench2_beta_trustworthiness
dataset:
  not_applicable: true
  reason: VBench++ prompt suites are packaged in the public VBench GitHub repo; generated videos and optional reference 
    images are supplied by the caller.
evaluation_surface:
  dimensions: extends VBench with I2V, long-video, and trustworthiness evaluations
  requires_api: dimension-dependent
metrics:
- id: vbench_plus_plus_i2v_average
  name: VBench++ I2V Average
  description: Mean of available official VBench++ image-to-video dimensions.
  higher_is_better: true
  leaderboard_key: i2v_total
  normalizer: identity:0:1
  aggregator: mean
  unit: score
- id: vbench_plus_plus_long_average
  name: VBench++ Long Average
  description: Mean of available official VBench++ long-video dimensions.
  higher_is_better: true
  leaderboard_key: long_total
  normalizer: identity:0:1
  aggregator: mean
  unit: score
- id: vbench_plus_plus_trustworthiness_average
  name: VBench++ Trustworthiness Average
  description: Mean of available official VBench++ trustworthiness dimensions.
  higher_is_better: true
  leaderboard_key: trustworthiness_total
  normalizer: identity:0:1
  aggregator: mean
  unit: score
- id: vbench_plus_plus_average
  name: VBench++ Average
  description: Mean of available official VBench++ variant dimensions normalized by the WorldFoundry wrapper.
  higher_is_better: true
  leaderboard_key: vbench_plus_plus_average
  normalizer: identity:0:1
  aggregator: mean
  unit: score
  primary: true
runner:
  runner_target: worldfoundry.evaluation.tasks.contracts.external:VBenchPlusPlusContract
  run_command: PYTHONPATH=. "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}" 
    worldfoundry/evaluation/tasks/execution/runners/vbench_plus_plus/run_vbench_plus_plus_official_runner.py --benchmark-id 
    vbench-plus-plus --variant "${WORLDFOUNDRY_VBENCH_PLUS_PLUS_VARIANT:-long}" --videos-path 
    "${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}" --dimension 
    "${WORLDFOUNDRY_VBENCH_PLUS_PLUS_DIMENSION:-temporal_flickering}" --mode 
    "${WORLDFOUNDRY_VBENCH_PLUS_PLUS_MODE:-long_custom_input}" --python "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}" 
    --timeout "${WORLDFOUNDRY_VBENCH_PLUS_PLUS_TIMEOUT:-1200}" --output-dir "${WORLDFOUNDRY_BENCHMARK_OUTPUT_DIR}" 
    --json
  validation_command: PYTHONPATH=. "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}" 
    worldfoundry/evaluation/tasks/execution/runners/vbench_plus_plus/run_vbench_plus_plus_official_runner.py --benchmark-id 
    vbench-plus-plus --variant "${WORLDFOUNDRY_VBENCH_PLUS_PLUS_VARIANT:-long}" --videos-path 
    "${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}" --dimension 
    "${WORLDFOUNDRY_VBENCH_PLUS_PLUS_DIMENSION:-temporal_flickering}" --mode 
    "${WORLDFOUNDRY_VBENCH_PLUS_PLUS_MODE:-long_custom_input}" --python "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}" 
    --timeout "${WORLDFOUNDRY_VBENCH_PLUS_PLUS_TIMEOUT:-1200}" --output-dir "${WORLDFOUNDRY_BENCHMARK_OUTPUT_DIR}" 
    --json
  required_env:
  - WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  runtime:
    kind: in_tree_official_source
    repo_url: https://github.com/Vchitect/VBench.git
    revision: 45e79ec14e69a2187202c675d2dbce1a71843d53
    root: worldfoundry/evaluation/tasks/execution/runners/vbench_plus_plus/runtime
    override_root_env: WORLDFOUNDRY_VBENCH_PLUS_PLUS_ROOT
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
    official_entrypoints:
      evaluate_long: python -m worldfoundry.evaluation.tasks.execution.runners.vbench_plus_plus.runtime.entrypoints.long
        --videos_path <generated_video_dir>
  expected_artifacts:
  - scorecard.json
  - raw_metric_table.jsonl
  - dimension_scores.json
  - upstream_stdout.log
  - upstream_stderr.log
  verification_status: verified
  notes:
  - WorldFoundry wrapper normalizes official VBench++ variant *_eval_results.json files and can delegate to the 
    WorldFoundry VBench runtime entrypoints. when generated videos are supplied.
  - Normalizer-only validation is not treated as integrated runtime evidence.
  - Bounded official GPU validation verified VBench++ long temporal_flickering on one generated video; full-suite 
    evidence remains pending.
  assets:
    official_gpu_validation:
      status: verified
      variant: long
      dimension: temporal_flickering
      generated_video_count: 2
      metrics_available: 3
      official_benchmark_verified: true
      integration_evidence: true
      leaderboard_valid: false
      full_suite_verified: false
      runtime_env: conda/envs/worldfoundry-unified-cu128
      python: ${WORLDFOUNDRY_UNIFIED_PYTHON}
      vbench_root: worldfoundry/evaluation/tasks/execution/runners/vbench_plus_plus/runtime
      videos_path: ${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}
      verified: true
      scope: bounded_official_gpu_validation
      scorecard: 
        tmp/worldfoundry_audit/remaining_benchmarks/vbenchpp_long_temporal_flickering_unified_20260621_002/scorecard.json
integration:
  status: integrated
  limitations:
  - Bounded VBench++ long-video official GPU validation passed; full I2V, long-video, and trustworthiness suite coverage
    is still pending.
  - Leaderboard parity requires the complete official variant suites and generated artifacts.
  evidence:
    official_benchmark_verified: true
    integration_evidence: true
    leaderboard_valid: false
notes: Tracked separately from VBench because upstream documents VBench++ modules as an extension even though they share
  the same GitHub repository.
release_status: experimental
maturity: contract_ready
open_source_status: experimental
official_benchmark_verified: false
integration_evidence: false
leaderboard_valid: false
requires:
- dimension-dependent
blockers:
- Bounded VBench++ long-video official GPU validation passed; full I2V, long-video, and trustworthiness suite coverage 
  is still pending.
- Leaderboard parity requires the complete official variant suites and generated artifacts.
base_model_dependencies:
- vbench_perception_metric_stack
base_model_dependency_preflight:
  status: ready
  notes:
  - CLIP, DINOv2, GroundingDINO, SAM-family segmentation, and RAFT are tracked as reusable WorldFoundry base-model 
    assets for VBench++ variant metrics.
  - Full VBench++ parity still depends on upstream variant-specific official runtime assets.
  missing: []
data_refs:
  in_tree_source_paths:
  - worldfoundry/evaluation/tasks/execution/runners/vbench_plus_plus/runtime
  task_yaml: worldfoundry/data/benchmarks/tasks/external/vbench-plus-plus.yaml
  generated_artifact_examples:
  - ${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}
runner_availability:
  available: true
  runner_target: worldfoundry.evaluation.tasks.contracts.external:VBenchPlusPlusContract
  runner_script_available: true
  task_yaml_available: true
  runtime_verified: true
  normalizer_verified: false
  surface: official_runner
official_gpu_validation:
  verified: true
  variant: long
  dimension: temporal_flickering
  generated_video_count: 2
  metrics_available: 3
  official_benchmark_verified: true
  integration_evidence: true
  leaderboard_valid: false
  full_suite_verified: false
  runtime_env: conda/envs/worldfoundry-unified-cu128
  python: ${WORLDFOUNDRY_UNIFIED_PYTHON}
  vbench_root: worldfoundry/evaluation/tasks/execution/runners/vbench_plus_plus/runtime
  videos_path: ${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}
  scope: bounded_official_gpu_validation
  scorecard: 
    tmp/worldfoundry_audit/remaining_benchmarks/vbenchpp_long_temporal_flickering_unified_20260621_002/scorecard.json
validation_command:
- ${WORLDFOUNDRY_UNIFIED_PYTHON}
- worldfoundry/evaluation/tasks/execution/runners/vbench_plus_plus/run_vbench_plus_plus_official_runner.py
- --benchmark-id
- vbench-plus-plus
- --variant
- long
- --videos-path
- ${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}
- --dimension
- temporal_flickering
- --mode
- long_custom_input
- --python
- ${WORLDFOUNDRY_UNIFIED_PYTHON}
- --output-dir
- <out>
- --json
checkpoint_refs: []
artifact_layout:
  generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  output_artifact: benchmark_scorecard
  filename_template: scorecard.json
