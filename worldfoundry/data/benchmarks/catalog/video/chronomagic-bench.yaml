id: chronomagic-bench
name: ChronoMagic-Bench
benchmark_kind:
- text-to-video
- time-lapse
- metamorphic-evaluation
domains:
- time-lapse
- temporal-reasoning
- video-generation-quality
modalities:
- text
- video
status: official_runtime_start_ready
open_source_status: experimental
official_benchmark_verified: true
integration_evidence: true
leaderboard_valid: false
alpha_readiness:
  status: integration_ready
  api_status: user_provided_for_full_core
  api_reason: OPENAI_API_KEY is required only when running GPT4o-MTScore or the full official core component set.
  api_scope: GPT4o-MTScore judge path
  alpha_exclusion: false
  non_api_surface: official_chscore_validation
  official_runtime_start_ready: true
requires:
- In-tree ChronoMagic-Bench runtime under worldfoundry/evaluation/tasks/execution/runners/chronomagic_bench/runtime/chronomagic_bench
- WORLDFOUNDRY_CHRONOMAGIC_ROOT optional override for the bundled ChronoMagic-Bench runtime
- WORLDFOUNDRY_CHRONOMAGIC_INPUT_FOLDER or generated ChronoMagic video directory
- WORLDFOUNDRY_CHRONOMAGIC_DATASET_ROOT BestWishYsh/ChronoMagic-Bench local dataset root for discovery evidence
- WORLDFOUNDRY_CHRONOMAGIC_CHSCORE_CKPT for CHScore
- WORLDFOUNDRY_CHRONOMAGIC_MTSCORE_CKPT for MTScore or full official core runs
- OPENAI_API_KEY or WORLDFOUNDRY_CHRONOMAGIC_OPENAI_API for GPT4o-MTScore or full official core runs
blockers:
- 'Not a blocker for integration readiness: leaderboard parity still requires the complete ChronoMagic prompt set, generated
  videos, MTScore, GPT4o-MTScore, UMT fields, and official submission protocol.'
- Full official core runs require user-provided MTScore checkpoint and OpenAI API credentials; the wrapper validates 
  selected official component scripts and required component outputs at launch/import time.
- 'Historical MTScore validation note: one worldscore-env attempt missed flash_attn/dropout_layer_norm for InternVideo2; install
  those dependencies before MTScore/full runs in that environment.'
integration_readiness:
  status: ok
  scope: official_runtime_start_ready
  docs_guided_setup: true
  official_core_components:
  - chscore
  - gpt4o_mtscore
  - mtscore
  leaderboard_valid: false
  leaderboard_reason: UMT-FVD, UMTScore, full prompt coverage, and official submission protocol are required before 
    leaderboard parity can be claimed.
official_sources:
  github:
    url: https://github.com/PKU-YuanGroup/ChronoMagic-Bench
    verified_by: git ls-remote --symref https://github.com/PKU-YuanGroup/ChronoMagic-Bench.git HEAD
    default_branch: main
    head_sha: e6b75ffc53c20dfea9c1704024d5167845534b63
  project_page: https://pku-yuangroup.github.io/ChronoMagic-Bench/
  paper_url: https://arxiv.org/abs/2406.18522
  huggingface_datasets:
  - repo_id: BestWishYsh/ChronoMagic-Bench
    verified_by: GET https://huggingface.co/api/datasets/BestWishYsh/ChronoMagic-Bench
    sha: d319674ef8d40d8e9a3021894ab2b30809f4f705
    private: false
    gated: false
    license: cc-by-4.0
  - repo_id: BestWishYsh/ChronoMagic
    verified_by: GET https://huggingface.co/api/datasets/BestWishYsh/ChronoMagic
    sha: 381c7958895f40ae49ff2fd4060ae1fe9e5247f6
    private: false
    gated: false
    license: cc-by-4.0
  - repo_id: BestWishYsh/ChronoMagic-Pro
    verified_by: GET https://huggingface.co/api/datasets/BestWishYsh/ChronoMagic-Pro
    sha: 8bfe2ceff9dda26df5a416f1432750d8849c3a93
    private: false
    gated: false
    license: cc-by-4.0
  - repo_id: BestWishYsh/ChronoMagic-ProH
    verified_by: GET https://huggingface.co/api/datasets/BestWishYsh/ChronoMagic-ProH
    sha: 2042ed90d91352d7c684884c022a1dd455c49957
    private: false
    gated: false
    license: cc-by-4.0
evaluation_surface:
  purpose: Metamorphic evaluation for text-to-time-lapse video generation.
  requires_api: judge-path dependent
  requires_metric_runtime: true
metrics:
- id: chronomagic_score
  name: ChronoMagic Score
  description: Primary metamorphic time-lapse score family.
  higher_is_better: true
  leaderboard_key: chronomagic_score
  aggregator: mean
  output_unit: score
  primary: true
- id: temporal_transformation
  name: Temporal Transformation
  description: Time-lapse transformation and ordering consistency score family.
  higher_is_better: true
  leaderboard_key: temporal_transformation
  aggregator: mean
  output_unit: score
runner:
  runner_target: worldfoundry.evaluation.tasks.contracts.external:ChronoMagicBenchContract
  validation_command: PYTHONPATH=. "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}" 
    worldfoundry/evaluation/tasks/execution/runners/chronomagic_bench/run_chronomagic_bench_official_runner.py 
    --chronomagic-root "${WORLDFOUNDRY_CHRONOMAGIC_ROOT:-worldfoundry/evaluation/tasks/execution/runners/chronomagic_bench/runtime/chronomagic_bench}" 
    --components "${WORLDFOUNDRY_CHRONOMAGIC_COMPONENTS:-chscore}" --generated-video-dir 
    "${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}" --model-name "${WORLDFOUNDRY_CHRONOMAGIC_MODEL_NAME:-worldfoundry}" 
    --eval-type "${WORLDFOUNDRY_CHRONOMAGIC_EVAL_TYPE:-close}" --model-pth-chscore 
    "${WORLDFOUNDRY_CHRONOMAGIC_CHSCORE_CKPT}" --output-dir "${WORLDFOUNDRY_BENCHMARK_OUTPUT_DIR}" --python 
    "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}" --timeout "${WORLDFOUNDRY_CHRONOMAGIC_TIMEOUT:-1200}" --json
  run_command: PYTHONPATH=. "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}" 
    worldfoundry/evaluation/tasks/execution/runners/chronomagic_bench/run_chronomagic_bench_official_runner.py 
    --chronomagic-root 
    "${WORLDFOUNDRY_CHRONOMAGIC_ROOT:-worldfoundry/evaluation/tasks/execution/runners/chronomagic_bench/runtime/chronomagic_bench}"
    --components "${WORLDFOUNDRY_CHRONOMAGIC_COMPONENTS:-all}" --generated-video-dir 
    "${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}" --dataset-root "${WORLDFOUNDRY_CHRONOMAGIC_DATASET_ROOT}" --model-name 
    "${WORLDFOUNDRY_CHRONOMAGIC_MODEL_NAME:-worldfoundry}" --eval-type "${WORLDFOUNDRY_CHRONOMAGIC_EVAL_TYPE:-close}" 
    --model-pth-chscore "${WORLDFOUNDRY_CHRONOMAGIC_CHSCORE_CKPT}" --model-pth-mtscore 
    "${WORLDFOUNDRY_CHRONOMAGIC_MTSCORE_CKPT}" --openai-api "${WORLDFOUNDRY_CHRONOMAGIC_OPENAI_API:-${OPENAI_API_KEY}}" 
    --output-dir "${WORLDFOUNDRY_BENCHMARK_OUTPUT_DIR}" --python "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}" --timeout 
    "${WORLDFOUNDRY_CHRONOMAGIC_TIMEOUT:-7200}" --json
  required_env:
  - WORLDFOUNDRY_CHRONOMAGIC_CHSCORE_CKPT
  - WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  runtime:
    kind: in_tree_official_source
    root: worldfoundry/evaluation/tasks/execution/runners/chronomagic_bench/runtime/chronomagic_bench
    optional_root_env: WORLDFOUNDRY_CHRONOMAGIC_ROOT
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
    results_path_env: WORLDFOUNDRY_CHRONOMAGIC_RESULTS_PATH
  expected_artifacts:
  - scorecard.json
  - per_sample_metrics.jsonl
  - raw_metric_table.jsonl
  - generated_video_manifest.json
  - dataset_manifest.json
  - upstream_stdout.log
  - upstream_stderr.log
  verification_status: verified
  notes:
  - Contract runner maps generated time-lapse videos into WorldFoundry WorldFoundry scorecard artifacts.
  - Real-data discovery records BestWishYsh/ChronoMagic-Bench default/test with 1799 rows and generated-video coverage.
  - 'Official wrapper normalizes ChronoMagic-Bench-Input.json and executes selected upstream component scripts directly: CHScore,
    GPT4o-MTScore, MTScore, then get_uploaded_json.py.'
  - Docs-guided setup is ready for starting CHScore validation runs or the full official core component set when 
    generated videos, checkpoints, and OpenAI credentials are supplied by the user.
  - Bounded official CHScore GPU validation passed using upstream CHScore/step0-get_CHScore.py and local cotracker2.pth.
  - Component validation is not leaderboard-valid; leaderboard parity still requires full prompt coverage plus UMT-FVD, 
    UMTScore, and the official submission protocol after core component scoring.
  - 'Historical MTScore validation note: one worldscore-env attempt missed flash_attn/dropout_layer_norm for InternVideo2.'
  assets:
    official_gpu_validation:
      status: verified
      component: chscore
      eval_type: close
      generated_video_count: 2
      metrics_available: 1
      official_benchmark_verified: true
      official_component_verified: true
      integration_evidence: true
      leaderboard_valid: false
      full_suite_verified: false
      runtime_env: conda/envs/worldfoundry-unified-cu128
      python: ${WORLDFOUNDRY_UNIFIED_PYTHON}
      chronomagic_root: ${WORLDFOUNDRY_MODEL_SOURCE_DIR}/ChronoMagic-Bench
      input_folder: ${WORLDFOUNDRY_MODEL_SOURCE_DIR}/ChronoMagic-Bench/toy_video/test_close
      checkpoint: ${WORLDFOUNDRY_HFD_ROOT}/BestWishYsh--ChronoMagic-Bench/CHScore/cotracker2.pth
integration:
  status: integrated
  skip_status: none
  blocker_type: not_applicable_for_integration_start
  readiness_scope: official_runtime_start_ready
  docs_guided_start_ready: true
  limitations:
  - Leaderboard parity requires the complete ChronoMagic prompt set, generated videos, MTScore, GPT4o-MTScore, UMT-FVD, 
    UMTScore, and official submission protocol.
  - WorldFoundry keeps leaderboard_valid false until those full-result fields are present and non-placeholder.
  evidence:
    official_benchmark_verified: true
    integration_evidence: true
release_status: experimental
maturity: contract_ready
