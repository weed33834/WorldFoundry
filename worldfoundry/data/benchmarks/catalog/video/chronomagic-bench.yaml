  - cache/worldfoundry/data/hfd_datasets/BestWishYsh/ChronoMagic-Pro
  - cache/worldfoundry/data/hfd_datasets/BestWishYsh__ChronoMagic-Pro
  - cache/worldfoundry/data/hfd_datasets/BestWishYsh/ChronoMagic-ProH
  in_tree_runtime_paths:
