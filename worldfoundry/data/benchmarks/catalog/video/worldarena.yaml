id: worldarena
name: WorldArena
benchmark_kind:
- embodied-world-model
- video-generation-quality
- functional-utility
domains:
- embodied-world-model
- manipulation
- video-quality
- functional-utility
modalities:
- text
- video
- action
status: confirmed_official_code
official_sources:
  github:
    url: https://github.com/tsinghua-fib-lab/WorldArena
    verified_by: git ls-remote https://github.com/tsinghua-fib-lab/WorldArena HEAD
    head_sha: 329f6c7ce6c8019715aa8a2fff7b71112e4001d4
  paper_url: https://arxiv.org/abs/2602.08971
  project_page: https://world-arena.ai/
benchmark_assets:
  prompt_suite:
    status: official_repo_data
evaluation_surface:
  purpose: Perceptual and functional evaluation for embodied world models.
  uses_robotwin_assets: true
  requires_simulator_or_downstream_tasks: true
  metric_protocol:
    metric_ids:
    - visual_quality
    - motion_quality
    - content_consistency
    - physics_adherence
    - three_d_accuracy
    - controllability
    - data_engine_success
    - policy_evaluator_correlation
    - action_planner_success
    - human_quality
    - ewm_score
    primary_metric: ewm_score
metrics:
- id: visual_quality
  name: Visual Quality
  description: visual_quality normalized benchmark score.
  higher_is_better: true
  leaderboard_key: visual_quality
  aggregator: mean
  output_unit: score
- id: motion_quality
  name: Motion Quality
  description: motion_quality normalized benchmark score.
  higher_is_better: true
  leaderboard_key: motion_quality
  aggregator: mean
  output_unit: score
- id: content_consistency
  name: Content Consistency
  description: content_consistency normalized benchmark score.
  higher_is_better: true
  leaderboard_key: content_consistency
  aggregator: mean
  output_unit: score
- id: physics_adherence
  name: Physics Adherence
  description: physics_adherence normalized benchmark score.
  higher_is_better: true
  leaderboard_key: physics_adherence
  aggregator: mean
  output_unit: score
- id: three_d_accuracy
  name: Three D Accuracy
  description: three_d_accuracy normalized benchmark score.
  higher_is_better: true
  leaderboard_key: three_d_accuracy
  aggregator: mean
  output_unit: score
- id: controllability
  name: Controllability
  description: controllability normalized benchmark score.
  higher_is_better: true
  leaderboard_key: controllability
  aggregator: mean
  output_unit: score
- id: data_engine_success
  name: Data Engine Success
  description: data_engine_success normalized benchmark score.
  higher_is_better: true
  leaderboard_key: data_engine_success
  aggregator: mean
  output_unit: score
- id: policy_evaluator_correlation
  name: Policy Evaluator Correlation
  description: policy_evaluator_correlation normalized benchmark score.
  higher_is_better: true
  leaderboard_key: policy_evaluator_correlation
  aggregator: mean
  output_unit: score
- id: action_planner_success
  name: Action Planner Success
  description: action_planner_success normalized benchmark score.
  higher_is_better: true
  leaderboard_key: action_planner_success
  aggregator: mean
  output_unit: score
- id: human_quality
  name: Human Quality
  description: human_quality normalized benchmark score.
  higher_is_better: true
  leaderboard_key: human_quality
  aggregator: mean
  output_unit: score
- id: ewm_score
  name: Ewm Score
  description: ewm_score normalized benchmark score.
  higher_is_better: true
  leaderboard_key: ewm_score
  aggregator: mean
  output_unit: score
  primary: true
runner:
  runner_target: worldfoundry.evaluation.tasks.contracts.external:WorldArenaContract
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - worldarena
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  runtime:
    kind: in_tree_official_runtime
    repo_url: https://github.com/tsinghua-fib-lab/WorldArena.git
    repo_revision: 329f6c7ce6c8019715aa8a2fff7b71112e4001d4
    root: worldfoundry/evaluation/tasks/execution/runners/worldarena
    optional_root_env: WORLDFOUNDRY_WORLDARENA_ROOT
    results_path_env: WORLDFOUNDRY_WORLDARENA_RESULTS_PATH
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  expected_artifacts:
  - scorecard.json
  - benchmark_contract.json
  - raw_metric_table.jsonl
  verification_status: in_tree_video_quality_runtime
  notes:
  - WorldFoundry can execute the checked-in WorldArena video-quality runtime with --run-official, or normalize an
    existing WorldArena result file through the unified benchmark-run entrypoint.
  - The official video-quality metric runtime is integrated in-tree under 
    worldfoundry/evaluation/tasks/execution/runners/worldarena/runtime/video_quality.
  - Leaderboard parity requires generated artifacts for the official prompt/task suite plus judge/checkpoint assets 
    and embodied task utility evidence.
  required_env:
  - WORLDFOUNDRY_WORLDARENA_RESULTS_PATH
integration:
  status: integrated
  blocked_reasons:
  - Official repository/source metadata, result normalization, and video-quality runtime are integrated.
  - Full validation requires generated videos or rollouts for the official prompt/task suite.
  - Leaderboard parity requires official judge/checkpoint/API assets and normalized full-suite result files.
release_status: experimental
maturity: contract_ready
open_source_status: experimental
official_benchmark_verified: false
integration_evidence: true
leaderboard_valid: false
requires:
- In-tree WorldArena video-quality runtime under worldfoundry/evaluation/tasks/execution/runners/worldarena
- WORLDFOUNDRY_WORLDARENA_ROOT optional override for caller-provided runtime assets
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
- Official benchmark assets and generated artifacts
- WORLDFOUNDRY_WORLDARENA_RESULTS_PATH
- --run-official with prepared dataset paths, or --official-results-path for result normalization
blockers:
- Official repository/source metadata, result normalization, and video-quality runtime are integrated.
- Full validation requires generated videos or rollouts for the official prompt/task suite.
- Leaderboard parity requires official judge/checkpoint/API assets and normalized full-suite result files.
data_refs:
  task_yaml: worldfoundry/data/benchmarks/tasks/external/worldarena.yaml
  in_tree_runtime_paths:
  - worldfoundry/evaluation/tasks/execution/runners/worldarena
runner_availability:
  available: true
  runner_target: worldfoundry.evaluation.tasks.contracts.external:WorldArenaContract
  runner_script_available: true
  task_yaml_available: true
  runtime_verified: true
  surface: official_runner
  normalizer_verified: true
dataset:
  not_applicable: true
  reason: Official benchmark assets are supplied by the source repository or caller-provided generated artifacts; no 
    Hugging Face dataset is required for this contract entry.
optional_base_model_dependencies:
- video_world_perception_stack
validation_command:
- python
- worldfoundry/evaluation/tasks/execution/runners/worldarena/run_worldarena_official_runner.py
- --run-official
- --dimension
- action_following
- --config-path
- <worldarena_config.yaml>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
checkpoint_refs: []
artifact_layout:
  generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  output_artifact: benchmark_scorecard
  filename_template: scorecard.json
