id: videoverse
name: VideoVerse
benchmark_kind:
- text-to-video
- world-model
- qa-judge
domains:
- world-model
- temporal-causality
- world-knowledge
modalities:
- text
- video
status: confirmed_official_code_and_hf_data
official_sources:
  github:
    url: https://github.com/Zeqing-Wang/VideoVerse
    verified_by: git ls-remote --symref https://github.com/Zeqing-Wang/VideoVerse.git HEAD
    default_branch: main
    head_sha: 8aa862035ee36b97f034d9d2fb4e56bca8ccd97b
  project_page: https://www.naptmn.cn/Homepage_of_VideoVerse/
  paper_url: https://arxiv.org/abs/2510.08398
  huggingface_datasets:
  - repo_id: NNaptmn/VideoVerse
    verified_by: GET https://huggingface.co/api/datasets/NNaptmn/VideoVerse
    sha: af9b910eae1f7771c6a4ac3b1e9e5ae316b9cbd2
    private: false
    gated: false
    license: apache-2.0
benchmark_assets:
  prompt_suite:
    status: confirmed_by_official_repo_metadata
    path_or_ref: worldfoundry/data/benchmarks/assets/videoverse/prompt/prompts_of_VideoVerse.json
    decomposed_path_or_ref: worldfoundry/data/benchmarks/assets/videoverse/prompt/prompts_of_VideoVerse_decomposed.json
    source_repo: https://github.com/Zeqing-Wang/VideoVerse.git
    source_revision: 8aa862035ee36b97f034d9d2fb4e56bca8ccd97b
    num_prompts: 300
  judge_questions:
    status: confirmed_by_project_and_hf_metadata
    notes: QA-style assets were metadata-checked only; files were not downloaded.
evaluation_surface:
  purpose: World-model capability evaluation for T2V generation with event/question judging.
  claimed_prompts: 300
  claimed_events: 815
  requires_api: VLM judge path dependent
metrics:
- id: qa_accuracy
  name: QA Accuracy
  description: VideoVerse binary/question-answer judging accuracy.
  higher_is_better: true
  leaderboard_key: qa_accuracy
  aggregator: mean
  output_unit: accuracy
- id: event_coverage
  name: Event Coverage
  description: Coverage of required events.
  higher_is_better: true
  leaderboard_key: event_coverage
  aggregator: mean
  output_unit: score
- id: temporal_causality
  name: Temporal Causality
  description: Temporal causality consistency score.
  higher_is_better: true
  leaderboard_key: temporal_causality
  aggregator: mean
  output_unit: score
- id: world_knowledge_consistency
  name: World Knowledge Consistency
  description: World-knowledge consistency score.
  higher_is_better: true
  leaderboard_key: world_knowledge_consistency
  aggregator: mean
  output_unit: score
- id: static_scene_consistency
  name: Static Scene Consistency
  description: Static scene consistency score.
  higher_is_better: true
  leaderboard_key: static_scene_consistency
  aggregator: mean
  output_unit: score
- id: dynamic_event_consistency
  name: Dynamic Event Consistency
  description: Dynamic event consistency score.
  higher_is_better: true
  leaderboard_key: dynamic_event_consistency
  aggregator: mean
  output_unit: score
- id: videoverse_average
  name: VideoVerse Average
  description: Mean over available VideoVerse score families.
  higher_is_better: true
  leaderboard_key: videoverse_average
  aggregator: mean
  output_unit: score
  primary: true
runner:
  runner_target: worldfoundry.evaluation.tasks.contracts.external:VideoVerseContract
  official_runner_script: worldfoundry/evaluation/tasks/execution/runners/videoverse/run_videoverse_official_runner.py
  run_command: PYTHONPATH=. "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}" 
    worldfoundry/evaluation/tasks/execution/runners/videoverse/run_videoverse_official_runner.py --run-official 
    --generated-artifact-dir "${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}" --output-dir 
    "${WORLDFOUNDRY_BENCHMARK_OUTPUT_DIR}" --json
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - videoverse
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  runtime:
    kind: in_tree_judge_runtime
    results_path_env: WORLDFOUNDRY_VIDEOVERSE_RESULTS_PATH
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  expected_artifacts:
  - scorecard.json
  - benchmark_contract.json
  - raw_metric_table.jsonl
  - eval_res.json
  - judge_responses.jsonl
  verification_status: official_runtime_ready
  notes:
  - WorldFoundry runs the VideoVerse judge in-tree (Gemini, URL, or local VLM backend) and normalizes 
    eval_res.json through the official event-LCS and verification-check logic.
  - The runner validates prompt/result/video coverage and records whether the canonical 300-prompt suite is complete.
  - Official prompt manifests are bundled under worldfoundry/data/benchmarks/assets/videoverse; use 
    WORLDFOUNDRY_VIDEOVERSE_PROMPT_MANIFEST only for non-standard prompt assets.
  - Framework integration is OK when strict full-suite coverage passes and all seven VideoVerse metrics are available.
  - Leaderboard parity still requires source-audited Gemini/API judge execution and submission-protocol evidence for the
    complete official suite.
  required_env:
  - WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  optional_env:
  - WORLDFOUNDRY_VIDEOVERSE_RESULTS_PATH
  - WORLDFOUNDRY_VIDEOVERSE_STRICT
  - WORLDFOUNDRY_VIDEOVERSE_JUDGE_BACKEND
  - WORLDFOUNDRY_VIDEOVERSE_GEMINI_API_KEY
  - GEMINI_API_KEY
  - WORLDFOUNDRY_VIDEOVERSE_LOCAL_VLM_PATH
  - WORLDFOUNDRY_VIDEOVERSE_VIDEO_BASE_URL
integration:
  status: integrated
  evidence:
    normalizer_surface: videoverse_official_in_tree
    framework_validation: worldfoundry-eval zoo benchmark-run --benchmark-id videoverse --mode official-validation 
      --official-results-path <eval_res.json> --generated-artifact-dir <generated_videos> --output-dir <out> --json
    official_runtime: worldfoundry-eval zoo benchmark-run --benchmark-id videoverse --mode official-run 
      --generated-artifact-dir <generated_videos> --env WORLDFOUNDRY_VIDEOVERSE_JUDGE_BACKEND=gemini --env 
      GEMINI_API_KEY=<key> --output-dir <out> --json
    strict_framework_validation: WORLDFOUNDRY_VIDEOVERSE_STRICT=1 worldfoundry-eval zoo benchmark-run --benchmark-id 
      videoverse --mode official-validation --official-results-path <eval_res.json> --generated-artifact-dir 
      <generated_videos> --output-dir <out> --json
    canonical_suite_validation: prompt/result/video coverage must match the 300-prompt VideoVerse suite
    leaderboard_validated: false
release_status: experimental
maturity: contract_ready
open_source_status: in_tree_runtime
official_benchmark_verified: false
integration_evidence: true
leaderboard_valid: false
requires:
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
- GEMINI_API_KEY or WORLDFOUNDRY_VIDEOVERSE_GEMINI_API_KEY for gemini judge backend
- official_results_path or official_results for imported-result validation
framework_acceptance:
- WorldFoundry VideoVerse integration is OK when in-tree judge execution or caller-supplied eval_res JSON and matching 
  generated videos for the canonical 300-prompt suite pass strict coverage checks and all seven declared metrics are 
  normalized.
leaderboard_requirements:
- Leaderboard parity requires source-audited Gemini/API judge outputs for the complete official prompt suite.
- WorldFoundry does not set leaderboard_valid from result import alone; the upstream judge invocation and model/version 
  evidence must be audited separately.
data_refs:
  task_yaml: worldfoundry/data/benchmarks/tasks/external/videoverse.yaml
  bundled_asset_paths:
  - worldfoundry/data/benchmarks/assets/videoverse/prompt/prompts_of_VideoVerse.json
  - worldfoundry/data/benchmarks/assets/videoverse/prompt/prompts_of_VideoVerse_decomposed.json
runner_availability:
  available: true
  runner_target: worldfoundry.evaluation.tasks.contracts.external:VideoVerseContract
  runner_script_available: true
  task_yaml_available: true
  runtime_verified: true
  credential_gated: true
  framework_ready: true
  surface: videoverse_official_in_tree
  normalizer_verified: false
base_model_dependencies:
- videoverse_dataset_assets
optional_base_model_dependencies:
- video_quality_motion_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- videoverse
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
checkpoint_refs: []
blockers:
- Full leaderboard parity requires the complete official assets, generated artifacts, and verified scorecard evidence.
artifact_layout:
  generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  output_artifact: benchmark_scorecard
  filename_template: scorecard.json
