runner:
  runner_target: worldfoundry.evaluation.tasks.contracts.external:VBenchContract
  run_command: MASTER_ADDR="${MASTER_ADDR:-127.0.0.1}" MASTER_PORT="${WORLDFOUNDRY_VBENCH_MASTER_PORT:-29631}" 
    PYTHONPATH=. "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}" 
    worldfoundry/evaluation/tasks/execution/runners/vbench/run_vbench_official_runner.py --videos-path 
    "${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}" --dimension "${WORLDFOUNDRY_VBENCH_DIMENSION:-aesthetic_quality}" --mode 
    "${WORLDFOUNDRY_VBENCH_MODE:-custom_input}" --python "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}" --timeout 
    "${WORLDFOUNDRY_VBENCH_TIMEOUT:-900}" --output-dir "${WORLDFOUNDRY_BENCHMARK_OUTPUT_DIR}" --json
  validation_command: MASTER_ADDR="${MASTER_ADDR:-127.0.0.1}" MASTER_PORT="${WORLDFOUNDRY_VBENCH_MASTER_PORT:-29631}" 
    PYTHONPATH=. "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}" 
    worldfoundry/evaluation/tasks/execution/runners/vbench/run_vbench_official_runner.py --videos-path 
    "${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}" --dimension "${WORLDFOUNDRY_VBENCH_DIMENSION:-aesthetic_quality}" --mode 
    "${WORLDFOUNDRY_VBENCH_MODE:-custom_input}" --python "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}" --timeout 
    "${WORLDFOUNDRY_VBENCH_TIMEOUT:-900}" --output-dir "${WORLDFOUNDRY_BENCHMARK_OUTPUT_DIR}" --json
  runtime:
    kind: in_tree_official_source
    repo_url: https://github.com/Vchitect/VBench.git
    revision: 45e79ec14e69a2187202c675d2dbce1a71843d53
    root: worldfoundry/evaluation/tasks/execution/runners/vbench/runtime
    override_root_env: WORLDFOUNDRY_VBENCH_ROOT
    setup_command:
    - ${WORLDFOUNDRY_UNIFIED_PYTHON}
    - worldfoundry/evaluation/tasks/execution/runners/vbench/run_vbench_official_runner.py
    - setup
    dimension_presets:
      validation:
      - aesthetic_quality
      custom_supported:
      - subject_consistency
      - background_consistency
      - motion_smoothness
      - dynamic_degree
      - aesthetic_quality
      - imaging_quality
      full_16:
      - subject_consistency
      - background_consistency
      - temporal_flickering
      - motion_smoothness
      - dynamic_degree
      - aesthetic_quality
      - imaging_quality
      - object_class
      - multiple_objects
      - human_action
      - color
      - spatial_relationship
      - scene
      - appearance_style
      - temporal_style
      - overall_consistency
  expected_artifacts:
  - scorecard.json
  - raw_metric_table.jsonl
  - upstream_stdout.log
  - upstream_stderr.log
  assets:
    official_gpu_validation:
      status: verified
      dimension: aesthetic_quality
      generated_video_count: 1
      official_benchmark_verified: true
      integration_evidence: true
      leaderboard_valid: false
      full_suite_verified: false
      verified: true
      scope: bounded_official_gpu_validation
      scorecard: 
        tmp/local_open_eval/vbench_zeroscope_aesthetic_official_gpu_validation_after_prompt_file_fix_20260525/scorecard.json
  verification_status: verified
  notes:
  - Contract runner maps generated videos, all 16 official VBench dimensions, and WorldFoundry aggregate scorecard 
    metrics into BenchmarkSpec.
  - Bounded official GPU validation verified aesthetic_quality with official_benchmark_verified=true and 
    integration_evidence=true.
  - Bounded official-run evidence is integrated; leaderboard-grade full-suite validation remains blocked below.
integration:
  status: integrated
  evidence:
    report_path: tmp/benchmark_zoo/validation/vbench/report.json
    validation_dimension: aesthetic_quality
    official_benchmark_verified: true
    integration_evidence: true
    leaderboard_valid: false
  limitations:
  - Bounded official GPU validation is partial-dimension runtime evidence, not full-suite leaderboard evidence.
  - Some full-suite dimensions still require heavyweight third-party dependencies such as detectron2.
  - Leaderboard-grade runs require generated videos for the full upstream VBench prompt suite.
notes: Official repository README identifies VBench as the CVPR 2024 benchmark and lists the prompt suite path.
release_status: stable
maturity: verified_runner
data_refs:
  in_tree_source_paths:
  - worldfoundry/evaluation/tasks/execution/runners/vbench/runtime
  task_yaml: worldfoundry/data/benchmarks/tasks/external/vbench.yaml
runner_availability:
  available: true
  runner_target: worldfoundry.evaluation.tasks.contracts.external:VBenchContract
  runner_script_available: true
  task_yaml_available: true
  runtime_verified: true
  normalizer_verified: false
  surface: official_runner
validation_command:
- ${WORLDFOUNDRY_UNIFIED_PYTHON}
- worldfoundry/evaluation/tasks/execution/runners/vbench/run_vbench_official_runner.py
- run
- --mode
- custom_input
- --dimension
- aesthetic_quality
checkpoint_refs: []
artifact_layout:
  generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  output_artifact: benchmark_scorecard
  filename_template: scorecard.json
