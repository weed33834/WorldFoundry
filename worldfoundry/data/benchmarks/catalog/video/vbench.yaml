id: vbench
name: VBench
benchmark_kind:
- text-to-video
- video-generation-quality
domains:
- video-generation-quality
- prompt-alignment
- temporal-consistency
modalities:
- text
- video
status: bounded_official_long_temporal_flickering_unified_verified_full_suite_pending
open_source_status: stable
official_benchmark_verified: false
integration_evidence: false
leaderboard_valid: false
requires:
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
- Full upstream VBench prompt suite for leaderboard-grade runs
blockers:
- Bounded official GPU validation covers aesthetic_quality only; full-suite validation remains pending.
- Some full-suite dimensions still require heavyweight third-party dependencies such as detectron2.
- Leaderboard-grade runs require generated videos for the full upstream VBench prompt suite.
base_model_dependencies:
- vbench_perception_metric_stack
base_model_dependency_preflight:
  status: ready
  notes:
  - CLIP, DINOv2, GroundingDINO, SAM/SAM2/SAM3, and RAFT are tracked as reusable WorldFoundry base-model assets for 
    VBench-family metric dimensions.
  - Detectron2-specific upstream dimensions remain external official-runtime dependencies.
  missing: []
official_gpu_validation:
  verified: true
  dimension: aesthetic_quality
  generated_video_count: 1
  official_benchmark_verified: true
  integration_evidence: true
  leaderboard_valid: false
  full_suite_verified: false
  scope: bounded_official_gpu_validation
  scorecard: 
    tmp/local_open_eval/vbench_zeroscope_aesthetic_official_gpu_validation_after_prompt_file_fix_20260525/scorecard.json
official_sources:
  github:
    url: https://github.com/Vchitect/VBench
    verified_by: git ls-remote --symref https://github.com/Vchitect/VBench.git HEAD
    default_branch: master
    head_sha: 45e79ec14e69a2187202c675d2dbce1a71843d53
  project_page: https://vchitect.github.io/VBench-project/
  paper_url: https://arxiv.org/abs/2311.17982
  license: apache-2.0
  huggingface_status: not_applicable_no_official_hf_required_confirmed
  access_notes: Official GitHub repository is public under Apache-2.0; prompt suite is in GitHub and optional sampled 
    videos are linked externally by upstream.
benchmark_assets:
  prompt_suite:
    status: confirmed_in_github
    path_or_ref: worldfoundry/data/benchmarks/assets/vbench/VBench_full_info.json
  sampled_videos:
    status: external_download_not_verified
    notes: Official README links Google Drive for sampled videos; not recorded as confirmed HF/GitHub data in this 
      manifest.
dataset:
  not_applicable: true
  reason: Base VBench integration uses the official GitHub prompt suite plus generated videos supplied by 
    WORLDFOUNDRY_GENERATED_ARTIFACT_DIR; no public Hugging Face dataset is required for this generated-video validation 
    gate.
evaluation_surface:
  dimensions: 16
  metrics: 16 official VBench dimensions plus WorldFoundry aggregate scorecard metrics
  requires_api: false
metrics:
- id: overall_quality
  name: Overall Quality
  description: 'Official-style final VBench aggregate: 4x quality score plus 1x semantic score.'
  higher_is_better: true
  leaderboard_key: overall_quality
  aggregator: weighted_mean
  output_unit: score
  primary: true
- id: temporal_quality
  name: Temporal Quality
  description: WorldFoundry aggregate of VBench temporal and consistency dimensions.
  higher_is_better: true
  leaderboard_key: temporal_quality
  aggregator: mean
  output_unit: score
- id: frame_quality
  name: Frame Quality
  description: WorldFoundry aggregate of VBench aesthetic and imaging quality dimensions.
  higher_is_better: true
  leaderboard_key: frame_quality
  aggregator: mean
  output_unit: score
- id: text_alignment
  name: Text Alignment
  description: Official-style semantic aggregate over VBench prompt-alignment dimensions.
  higher_is_better: true
  leaderboard_key: text_alignment
  aggregator: mean
  output_unit: score
- id: subject_consistency
  name: Subject Consistency
  description: Official VBench dimension score.
  higher_is_better: true
  raw_metric_name: subject_consistency
  leaderboard_key: subject_consistency
  normalizer: official_vbench_minmax:0.1462:1.0
  aggregator: mean
  output_unit: score
- id: background_consistency
  name: Background Consistency
  description: Official VBench dimension score.
  higher_is_better: true
  raw_metric_name: background_consistency
  leaderboard_key: background_consistency
  normalizer: official_vbench_minmax:0.2615:1.0
  aggregator: mean
  output_unit: score
- id: temporal_flickering
  name: Temporal Flickering
  description: Official VBench dimension score.
  higher_is_better: true
  raw_metric_name: temporal_flickering
  leaderboard_key: temporal_flickering
  normalizer: official_vbench_minmax:0.6293:1.0
  aggregator: mean
  output_unit: score
- id: motion_smoothness
  name: Motion Smoothness
  description: Official VBench dimension score.
  higher_is_better: true
