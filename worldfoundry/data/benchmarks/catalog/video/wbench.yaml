id: wbench
name: WBench
benchmark_kind:
- interactive-video-world-model
- video-generation-quality
- multi-turn-control
domains:
- world-model
- interactive-video
- navigation
- physical-plausibility
modalities:
- text
- video
- action
status: confirmed_official_code
official_sources:
  github:
    url: https://github.com/meituan-longcat/WBench
    provenance: official source; runtime code is vendored in tree under the WorldFoundry runner
  paper_url: https://arxiv.org/abs/2605.25874
  project_page: https://meituan-longcat.github.io/WBench/
  huggingface_datasets:
