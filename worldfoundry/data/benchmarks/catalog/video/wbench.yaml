runner:
  runner_target: worldfoundry.evaluation.tasks.contracts.external:WBenchContract
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - wbench
  - --mode
  - official-validation
  - --official-results-path
  - <report.json>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  runtime:
    kind: in_tree_official_runtime
    root: worldfoundry/evaluation/tasks/execution/runners/wbench
    runtime_root: worldfoundry/evaluation/tasks/execution/runners/wbench/runtime/wbench
    root_env: WORLDFOUNDRY_WBENCH_ROOT
    results_path_env: WORLDFOUNDRY_WBENCH_RESULTS_PATH
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  expected_artifacts:
  - scorecard.json
  - raw_metric_table.jsonl
  - report.json
  verification_status: in_tree_runtime
  notes:
  - The public runner can execute the checked-in WBench metric runtime with --run-official or normalize an existing
    WBench report.json/per-metric evaluation directory with --official-results-path.
  - Default metric recomputation uses the in-tree WBench runtime backed by WorldFoundry base-model assets,
    including HPSv3, TransNetV2 segment continuity, PAVRM visual plausibility, DreamSim, and MegaSAM pose precompute.
  - Official GitHub sources are provenance only; runtime execution uses the checked-in WorldFoundry runner.
integration:
  status: integrated
  blocked_reasons:
  - Leaderboard parity requires a complete official WBench report for the full split.
  - Recomputing all metrics requires the WBench base-model assets, generated videos, and judge credentials for VLM-based metrics.
release_status: experimental
maturity: contract_ready
open_source_status: experimental
official_benchmark_verified: false
integration_evidence: false
leaderboard_valid: false
requires:
- --run-official with --model-name or WORLDFOUNDRY_WBENCH_MODEL_NAME, or --official-results-path <report.json_or_eval_dir>
  for result normalization
- --generated-artifact-dir <generated_videos> when coverage metadata is required
blockers:
- Leaderboard-valid scores require a complete official report for the full split.
data_refs:
  task_yaml: worldfoundry/data/benchmarks/tasks/external/wbench.yaml
  hf_dataset_ids:
  - meituan-longcat/WBench
runner_availability:
