  task_yaml_available: true
  runtime_verified: true
  surface: official_runner
  normalizer_verified: true
base_model_dependencies:
- video_world_perception_stack
validation_command:
- python
- worldfoundry/evaluation/tasks/execution/runners/wbench/run_wbench_official_runner.py
- --run-official
- --model-name
- <model_name>
- --phase
- report
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
checkpoint_refs:
