    repo_id: meituan-longcat/WBench
  generated_examples:
    status: official_huggingface_dataset
    repo_id: meituan-longcat/WBench-examples
evaluation_surface:
  purpose: Multi-turn interactive video world model evaluation across quality, setting, interaction, consistency, and physical dimensions.
  metric_protocol:
    metric_ids:
    - aesthetic_quality
    - imaging_quality
    - temporal_flickering
    - dynamic_degree
    - motion_smoothness
    - hpsv3_quality
    - scene_adherence
    - subject_adherence
    - navigation_trajectory
    - event_edit_adherence
    - subject_action_adherence
    - perspective_switch_adherence
    - background_consistency
    - segment_continuity
    - perspective_consistency
    - subject_consistency
    - geometric_consistency
    - photometric_consistency
    - spatial_consistency
    - gated_spatial_consistency
    - visual_plausibility
    - causal_fidelity
    - quality_score
    - setting_score
    - interaction_score
    - consistency_score
    - physical_score
    - wbench_average
    primary_metric: wbench_average
