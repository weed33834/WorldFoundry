id: devil-dynamics
name: DEVIL Dynamics
benchmark_kind:
- text-to-video
- dynamics-evaluation
- video-generation-quality
domains:
- dynamics
- motion-quality
- temporal-granularity
modalities:
- text
- video
status: confirmed_official_code
official_sources:
  github:
    url: https://github.com/MingXiangL/DEVIL
    verified_by: git ls-remote https://github.com/MingXiangL/DEVIL HEAD
    head_sha: 48556c329e6a6f92a587021bc97022494faec69c
  paper_url: https://arxiv.org/abs/2407.01094
  project_page: https://huggingface.co/papers/2407.01094
benchmark_assets:
  prompt_suite:
    status: official_repo_metadata
evaluation_surface:
  purpose: Dynamics-focused text-to-video evaluation.
  requires_api: Gemini or equivalent judge for naturalness scoring
  capability_track: temporal_dynamics_video_generation
metrics:
- id: dynamics_range
  name: Dynamics Range
  description: Dynamics Range normalized benchmark score.
  higher_is_better: true
  leaderboard_key: dynamics_range
  aggregator: mean
  output_unit: score
- id: dynamics_controllability
  name: Dynamics Controllability
  description: Dynamics Controllability normalized benchmark score.
  higher_is_better: true
  leaderboard_key: dynamics_controllability
  aggregator: mean
  output_unit: score
- id: dynamics_quality
  name: Dynamics Quality
  description: Dynamics Quality normalized benchmark score.
  higher_is_better: true
  leaderboard_key: dynamics_quality
  aggregator: mean
  output_unit: score
- id: devil_dynamics_average
  name: DEVIL Dynamics Average
  description: DEVIL Dynamics Average normalized benchmark score.
  higher_is_better: true
  leaderboard_key: devil_dynamics_average
  aggregator: mean
  output_unit: score
  primary: true
runner:
  runner_target: worldfoundry.evaluation.tasks.contracts.external:DevilDynamicsContract
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - devil-dynamics
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  runtime:
    kind: in_tree_official_runtime
    root: worldfoundry/evaluation/tasks/execution/runners/devil_dynamics
    artifact_score_dir_env: WORLDFOUNDRY_DEVIL_DYNAMICS_ARTIFACT_SCORE_DIR
    results_path_env: WORLDFOUNDRY_DEVIL_DYNAMICS_RESULTS_PATH
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  expected_artifacts:
  - scorecard.json
  - benchmark_contract.json
  - raw_metric_table.jsonl
  verification_status: pending
  notes:
  - WorldFoundry provides an in-tree official runtime entrypoint that materializes DEVIL metric rows from WorldFoundry
    artifact score outputs, and still normalizes caller-provided official result files.
  - Full leaderboard validation requires generated artifacts for the official prompt/task suite plus judge/checkpoint
    assets.
  required_env:
  - WORLDFOUNDRY_DEVIL_DYNAMICS_RESULTS_PATH
integration:
  status: integrated
  blocked_reasons:
  - In-tree runtime is wired; full validation requires generated videos or rollouts for the official prompt/task suite.
  - Leaderboard parity requires official judge/checkpoint/API assets and complete metric artifacts.
release_status: experimental
maturity: contract_ready
open_source_status: in_tree_runtime
official_benchmark_verified: false
integration_evidence: true
leaderboard_valid: false
requires:
- WORLDFOUNDRY_DEVIL_DYNAMICS_ARTIFACT_SCORE_DIR or --artifact-score-dir for in-tree runtime execution
- WORLDFOUNDRY_DEVIL_DYNAMICS_RESULTS_PATH or --official-results-path for result import
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR for runtime execution and coverage metadata
blockers:
- In-tree runtime is wired; full validation requires generated videos or rollouts for the official prompt/task suite.
- Leaderboard parity requires official judge/checkpoint/API assets and complete metric artifacts.
data_refs:
  task_yaml: worldfoundry/data/benchmarks/tasks/external/devil-dynamics.yaml
official_runner_script: 
  worldfoundry/evaluation/tasks/execution/runners/devil_dynamics/run_devil_dynamics_official_runner.py
runner_availability:
  available: true
  runner_target: worldfoundry.evaluation.tasks.contracts.external:DevilDynamicsContract
  runner_script_available: true
  task_yaml_available: true
  runtime_verified: true
  surface: devil_dynamics_official_in_tree
  normalizer_verified: true
dataset:
  not_applicable: true
  reason: Official benchmark assets are supplied by the source repository or caller-provided generated artifacts; no 
    Hugging Face dataset is required for this contract entry.
optional_base_model_dependencies:
- video_world_perception_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- devil-dynamics
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
checkpoint_refs: []
artifact_layout:
  generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  output_artifact: benchmark_scorecard
  filename_template: scorecard.json
