id: videophy2
name: VideoPhy2
benchmark_kind:
- text-to-video
- physical-commonsense
- action-centric
domains:
- physics
- physical-commonsense
- actions
- rule-classification
modalities:
- text
- video
status: confirmed_official_code_and_hf_data
official_sources:
  github:
    url: https://github.com/Hritikbansal/videophy
    verified_by: git ls-remote https://github.com/Hritikbansal/videophy HEAD
    head_sha: 01d366c979e4a82875852adbf427ccc036e7373a
  paper_url: https://arxiv.org/abs/2503.06800
  project_page: https://videophy2.github.io/
  huggingface_datasets:
  - repo_id: videophysics/videophy2_test
    verified_by: HEAD https://huggingface.co/api/datasets/videophysics/videophy2_test
    sha: 90b81ffa54f565d9e40e83b7a2c247ba1dccfa2b
    private: false
    gated: false
    license: mit
    path: cache/worldfoundry/data/hfd_datasets/videophysics__videophy2_test
  - repo_id: videophysics/videophy2_train
    verified_by: HEAD https://huggingface.co/api/datasets/videophysics/videophy2_train
    sha: 5c2a69593b39d28a77ef2b9dbf7acbd2b9f38f6c
    private: false
    gated: false
    license: mit
    path: cache/worldfoundry/data/hfd_datasets/videophysics__videophy2_train
benchmark_assets:
  prompt_suite:
    status: bundled_in_tree
    manifest: worldfoundry/data/benchmarks/assets/videophy2/prompts.json
evaluation_surface:
  purpose: Action-centric physical commonsense evaluation for generated videos.
  claimed_actions: 200
  requires_autoeval_checkpoint: true
metrics:
- id: semantic_adherence
  name: Semantic Adherence
  description: Semantic Adherence normalized benchmark score.
  higher_is_better: true
  leaderboard_key: semantic_adherence
  aggregator: mean
  output_unit: score
- id: physical_commonsense
  name: Physical Commonsense
  description: Physical Commonsense normalized benchmark score.
  higher_is_better: true
  leaderboard_key: physical_commonsense
  aggregator: mean
  output_unit: score
- id: joint_score
  name: Joint Score
  description: Joint Score normalized benchmark score.
  higher_is_better: true
  leaderboard_key: joint_score
  aggregator: mean
  output_unit: score
- id: rule_classification_accuracy
  name: Rule Classification Accuracy
  description: Rule Classification Accuracy normalized benchmark score.
  higher_is_better: true
  leaderboard_key: rule_classification_accuracy
  aggregator: mean
  output_unit: score
- id: videophy2_average
  name: VideoPhy2 Average
  description: VideoPhy2 Average normalized benchmark score.
  higher_is_better: true
  leaderboard_key: videophy2_average
  aggregator: mean
  output_unit: score
  primary: true
runner:
  runner_target: worldfoundry.evaluation.tasks.contracts.external:VideoPhy2Contract
  official_runner_script: worldfoundry/evaluation/tasks/execution/runners/videophy2/run_videophy2_official_runner.py
  run_command: PYTHONPATH=. "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}"
    worldfoundry/evaluation/tasks/execution/runners/videophy2/run_videophy2_official_runner.py --run-official
    --generated-artifact-dir "${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}" --output-dir
    "${WORLDFOUNDRY_BENCHMARK_OUTPUT_DIR}" --json
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - videophy2
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  runtime:
    kind: in_tree_official_judge_runtime
    root: worldfoundry/evaluation/tasks/execution/runners/videophy2
    root_env: WORLDFOUNDRY_VIDEOPHY2_ROOT
    judge_model_id: videophysics/videophy_2_auto
    judge_backend_env: WORLDFOUNDRY_VIDEOPHY2_JUDGE_BACKEND
    results_path_env: WORLDFOUNDRY_VIDEOPHY2_RESULTS_PATH
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  expected_artifacts:
  - scorecard.json
  - benchmark_contract.json
  - raw_metric_table.jsonl
  verification_status: in_tree_official_runtime_ready
  notes:
  - Contract fixture records expected input/output shape only; full official runtime remains upstream.
  - WorldFoundry normalizes caller-provided official result files through the shared benchmark-run entrypoint without
    executing upstream scorers.
integration:
  status: integrated
  blocked_reasons:
  - Official repository/source metadata is verified, but the official benchmark runtime has not been executed in
    WorldFoundry.
  - Full validation requires generated videos or rollouts for the official prompt/task suite.
  - Leaderboard parity requires official judge/checkpoint/API assets and normalized upstream result files.
release_status: experimental
maturity: contract_ready
open_source_status: experimental
official_benchmark_verified: false
integration_evidence: true
leaderboard_valid: false
requires:
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
blockers:
- Official repository/source metadata is verified, but the official benchmark runtime has not been executed in
  WorldFoundry.
- Full validation requires generated videos or rollouts for the official prompt/task suite.
- Leaderboard parity requires official judge/checkpoint/API assets and normalized upstream result files.
- Official repository/source metadata and in-tree official-result normalizer are integrated.
- Full leaderboard validation still requires generated videos and full upstream scorer/judge execution on the official
  prompt suite.
data_refs:
  task_yaml: worldfoundry/data/benchmarks/tasks/external/videophy2.yaml
  bundled_asset_paths:
  - worldfoundry/data/benchmarks/assets/videophy2/prompts.json
official_runner_script: worldfoundry/evaluation/tasks/execution/runners/videophy2/run_videophy2_official_runner.py
runner_availability:
  available: true
  runner_target: worldfoundry.evaluation.tasks.contracts.external:VideoPhy2Contract
  runner_script_available: true
  task_yaml_available: true
  runtime_verified: true
  surface: videophy2_official_in_tree
  normalizer_verified: false
base_model_dependencies:
- videophy2_dataset_assets
optional_base_model_dependencies:
- grounded_depth_segmentation_stack
validation_command:
- worldfoundry-eval
- zoo
- benchmark-run
- --benchmark-id
- videophy2
- --mode
- official-validation
- --official-results-path
- <official_results.json>
- --generated-artifact-dir
- <generated_videos>
- --output-dir
- <out>
- --json
checkpoint_refs: []
artifact_layout:
  generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  output_artifact: benchmark_scorecard
  filename_template: scorecard.json
