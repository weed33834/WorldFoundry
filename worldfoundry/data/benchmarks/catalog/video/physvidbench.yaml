id: physvidbench
name: PhysVidBench
benchmark_kind:
- text-to-video
- physical-commonsense
- physics
domains:
- physics
- physical-commonsense
- tool-use
modalities:
- text
- video
status: confirmed_official_code_and_hf_data
official_sources:
  paper_url: https://arxiv.org/abs/2507.15824
  openreview: https://openreview.net/forum?id=RsletK8757
  project_page: https://cyberiada.github.io/PhysVidBench/
  github:
    url: https://github.com/ensanli/PhysVidBenchCode
    verified_by: git ls-remote https://github.com/ensanli/PhysVidBenchCode.git HEAD
    head_sha: b1d20f121ed3ebe5d18337d884fdecfad065096b
  huggingface_datasets:
  - repo_id: Anonymousny/PhysVidBench
    verified_by: GET https://huggingface.co/api/datasets/Anonymousny/PhysVidBench
    sha: c62f83821cb0f67e37bb6f2872e3719ebb588bf0
    private: false
    gated: false
    license: cc-by-4.0
  license: cc-by-4.0
  access_notes: Official code and prompt/question data are public; captioning and QA still require external
    model/runtime assets.
dataset:
  hf_dataset_id: Anonymousny/PhysVidBench
  revision: c62f83821cb0f67e37bb6f2872e3719ebb588bf0
  license: cc-by-4.0
  private: false
  gated: false
  split: train
evaluation_surface:
  purpose: Paper-described physical commonsense benchmark for T2V generation.
  claimed_prompts: 383
  claimed_questions: 4123
  physical_interaction_dimensions: 7
  requires_public_data_release: false
  requires_runtime_release: false
  requires_generated_videos: true
metrics:
- id: physical_commonsense_accuracy
  name: Physical Commonsense Accuracy
  description: Overall physical commonsense QA accuracy.
  higher_is_better: true
  leaderboard_key: physical_commonsense_accuracy
  aggregator: mean
  output_unit: accuracy
- id: affordance_understanding
  name: Affordance Understanding
  description: Affordance and interaction understanding score.
  higher_is_better: true
  leaderboard_key: affordance_understanding
  aggregator: mean
  output_unit: score
- id: tool_use_consistency
  name: Tool Use Consistency
  description: Tool-mediated physical interaction consistency.
  higher_is_better: true
  leaderboard_key: tool_use_consistency
  aggregator: mean
  output_unit: score
- id: material_property_consistency
  name: Material Property Consistency
  description: Material property consistency.
  higher_is_better: true
  leaderboard_key: material_property_consistency
  aggregator: mean
  output_unit: score
- id: temporal_dynamics_consistency
  name: Temporal Dynamics Consistency
  description: Physical temporal dynamics consistency.
  higher_is_better: true
  leaderboard_key: temporal_dynamics_consistency
  aggregator: mean
  output_unit: score
- id: physvidbench_average
  name: PhysVidBench Average
  description: Mean over available physical commonsense score families.
  higher_is_better: true
  leaderboard_key: physvidbench_average
  aggregator: mean
  output_unit: score
  primary: true
runner:
  runner_target: worldfoundry.evaluation.tasks.contracts.external:PhysVidBenchContract
  official_runner_script:
    worldfoundry/evaluation/tasks/execution/runners/physvidbench/run_physvidbench_official_runner.py
  run_command: PYTHONPATH=. "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}"
    worldfoundry/evaluation/tasks/execution/runners/physvidbench/run_physvidbench_official_runner.py --run-official
    --generated-artifact-dir "${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}" --output-dir
    "${WORLDFOUNDRY_BENCHMARK_OUTPUT_DIR}" --json
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - physvidbench
  - --mode
  - official-validation
  - --official-results-path
  - <output.csv>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  runtime:
    kind: in_tree_official_runtime
    repo_url: https://github.com/ensanli/PhysVidBenchCode.git
    repo_revision: b1d20f121ed3ebe5d18337d884fdecfad065096b
    root_env: WORLDFOUNDRY_PHYSVIDBENCH_ROOT
    root_env_required: false
    default_cache_subdir: github.com_ensanli_PhysVidBenchCode
    results_path_env: WORLDFOUNDRY_PHYSVIDBENCH_RESULTS_PATH
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
    prompt_manifest: prompts_questions.csv
    captions_dir: captions
  expected_artifacts:
  - scorecard.json
  - benchmark_contract.json
  - raw_metric_table.jsonl
  - output.csv
  - per_sample_scores.jsonl
  verification_status: official_runtime_ready
  notes:
  - WorldFoundry runs in-tree Gemini QA over prompts_questions.csv and 8-caption AuroraCap tracks.
  - Use WORLDFOUNDRY_PHYSVIDBENCH_JUDGE_BACKEND to select the judge backend.
  - Full leaderboard parity still requires generated videos and complete caption coverage for the prompt suite.
  required_env:
  - WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  optional_env:
  - WORLDFOUNDRY_PHYSVIDBENCH_ROOT
  - WORLDFOUNDRY_PHYSVIDBENCH_PROMPT_MANIFEST
  - WORLDFOUNDRY_PHYSVIDBENCH_CAPTIONS_DIR
  - WORLDFOUNDRY_PHYSVIDBENCH_CAPTION_BASE
  - WORLDFOUNDRY_PHYSVIDBENCH_JUDGE_BACKEND
  - WORLDFOUNDRY_PHYSVIDBENCH_RESULTS_PATH
  - WORLDFOUNDRY_PHYSVIDBENCH_STRICT
integration:
  status: integrated
  evidence:
    framework_validation: worldfoundry-eval zoo benchmark-run --benchmark-id physvidbench --mode official-validation
      --official-results-path <output.csv> --generated-artifact-dir <generated_videos> --output-dir <out> --json
    normalizer_surface: physvidbench_official_in_tree
    official_runtime: worldfoundry-eval zoo benchmark-run --benchmark-id physvidbench --mode official-run
      --generated-artifact-dir <generated_videos> --output-dir <out> --json
    dataset_readiness: prompts_questions.csv
    full_test_harness_ready: true
    full_suite_testable: true
    full_suite_verified: false
release_status: experimental
maturity: contract_ready
full_test_harness_ready: true
full_suite_testable: true
full_suite_execution_recorded: false
open_source_status: in_tree_runtime
official_benchmark_verified: false
integration_evidence: true
leaderboard_valid: false
requires:
- Bundled PhysVidBench prompts_questions.csv and captions, or explicit prompt/caption override env vars
- WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
- official_results_path or WORLDFOUNDRY_PHYSVIDBENCH_RESULTS_PATH for normalization-only runs
framework_acceptance:
- PhysVidBench integration is OK when in-tree Gemini QA or caller-supplied output.csv, prompts_questions.csv, captions,
  and generated videos pass strict coverage checks and all declared metrics are normalized.
blockers:
- Leaderboard parity requires generated videos for the full prompt suite, complete AuroraCap caption tracks, Gemini/API
  credentials for full official run, and normalized upstream evidence.
