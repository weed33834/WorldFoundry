benchmark: memobench
name: MemoBench
description: Task manifest for visual-memory evaluation with the Visible / Disappeared / Reappear protocol.
tags:
- benchmark-zoo
- external-official
- memobench
- visual-memory
- world-model
- video-generation-quality
splits:
- synthetic
- real
- standard
metrics:
  visual_quality:
    aggregation: mean
  motion_smoothness:
    aggregation: mean
  object_identity_consistency:
    aggregation: mean
  geo3d_consistency:
    aggregation: mean
  camera_controllability:
    aggregation: mean
  image_reward_score:
    aggregation: mean
  object_revisit_score:
    aggregation: mean
  gt_all_psnr:
    aggregation: mean
  gt_all_ssim:
    aggregation: mean
  gt_all_lpips:
    aggregation: mean
    higher_is_better: false
  instruction_following:
    aggregation: mean
  object_background:
    aggregation: mean
  continuity_of_memory:
    aggregation: mean
  physics_adherence:
    aggregation: mean
  memobench_average:
    aggregation: mean
    primary: true
metadata:
  source_kind: benchmark_zoo
  benchmark_id: memobench
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id memobench --mode contract --output-dir tmp/benchmark_zoo/benchmark_contract/memobench --json
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:MemoBenchContract
  official_runner_command: worldfoundry-eval zoo benchmark-run
  name: MemoBench
  domain:
  - visual-memory
  - object-permanence
  - camera-revisit
  - world-model
  task_type: visual_memory_world_generation_evaluation
  status: in_tree_official_runtime_ready_full_upstream_pending
  maturity: contract_ready
  release_status: experimental
  open_source_status: in_tree_runtime
  official_benchmark_verified: false
  integration_evidence: true
  leaderboard_valid: false
  base_model_dependencies:
  - video_quality_dino_motion_stack
  optional_base_model_dependencies:
  - sam3_segmentation_stack
  - gemini_vlm_judge
  source_provenance:
    official_repo:
      url: https://github.com/MemoBench-Team/MemoBench
      revision: 8822e2713b01db90820a2c75115a37814ff992a0
      role: vendored_runtime_source
    local_runtime:
      path: worldfoundry/evaluation/tasks/execution/runners/memobench/runtime/memobench
    docs:
      path: worldfoundry/evaluation/tasks/execution/runners/memobench/runtime/memobench/docs
  input_contract:
  - generated_synthetic_dir
  - generated_real_dir
  - memobench_data_root
  - official_results_path
  - ors_results_path
  - vqa_results_dir
  output_contract:
  - scorecard
  - raw_metric_table
  - per_sample_scores
  - eval_csv
  - ors_scores
  - vqa_scores
  - leaderboard_csv
  evaluation_requirements:
  - Use MemoBench Visible / Disappeared / Reappear generated frame layout for synthetic and real clips.
  - Normalize supplied Step 1, ORS, VQA, or leaderboard files through the WorldFoundry runner.
  - Run Step 1 automated metrics from the vendored runtime when full generated artifacts and metric dependencies are available.
  requires:
  - bundled MemoBench runtime sources
  - official_results_path or WORLDFOUNDRY_MEMOBENCH_RESULTS_PATH for normalization-only runs
  - WORLDFOUNDRY_GENERATED_ARTIFACT_DIR, or separate generated synthetic and real roots for official Step 1
  blockers:
  - Full leaderboard parity requires the complete MemoBench dataset assets, generated frame coverage, SAM-3 for ORS, Gemini or compatible VLM credentials for VQA, and normalized upstream outputs.
  data_refs:
    task_yaml: worldfoundry/data/benchmarks/tasks/external/memobench.yaml
    sample_results: worldfoundry/data/benchmarks/assets/memobench/sample_results.csv
    in_tree_runtime_paths:
    - worldfoundry/evaluation/tasks/execution/runners/memobench/runtime/memobench
  official_runner_script: worldfoundry/evaluation/tasks/execution/runners/memobench/run_memobench_official_runner.py
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:MemoBenchContract
    runner_script_available: true
    task_yaml_available: true
    runtime_verified: false
    surface: memobench_official_in_tree
    normalizer_verified: true
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  runtime:
    kind: in_tree_official_source
    root: worldfoundry/evaluation/tasks/execution/runners/memobench/runtime/memobench
    root_env: WORLDFOUNDRY_MEMOBENCH_ROOT
    repo_url: https://github.com/MemoBench-Team/MemoBench.git
    revision: 8822e2713b01db90820a2c75115a37814ff992a0
    results_path_env: WORLDFOUNDRY_MEMOBENCH_RESULTS_PATH
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
    generated_synthetic_dir_env: WORLDFOUNDRY_MEMOBENCH_GENERATED_SYNTHETIC_DIR
    generated_real_dir_env: WORLDFOUNDRY_MEMOBENCH_GENERATED_REAL_DIR
  metric_protocol:
    metric_ids:
    - visual_quality
    - motion_smoothness
    - object_identity_consistency
    - geo3d_consistency
    - camera_controllability
    - image_reward_score
    - object_revisit_score
    - gt_all_psnr
    - gt_all_ssim
    - gt_all_lpips
    - instruction_following
    - object_background
    - continuity_of_memory
    - physics_adherence
    - memobench_average
    primary_metric: memobench_average
    local_deterministic_modes:
    - official_scorecard_normalization
    - artifact_presence_format
  local_evaluator:
    target: worldfoundry/evaluation/tasks/execution/runners/memobench/run_memobench_official_runner.py
    status: implemented
    protocol: official_result_normalization
    official_result_normalization:
      status: implemented
      input_keys:
      - official_results_path
      - WORLDFOUNDRY_MEMOBENCH_RESULTS_PATH
      - WORLDFOUNDRY_MEMOBENCH_EVAL_DIR
      - WORLDFOUNDRY_MEMOBENCH_ORS_DIR
      - WORLDFOUNDRY_MEMOBENCH_VQA_DIR
      - WORLDFOUNDRY_MEMOBENCH_LEADERBOARD_PATH
      formats:
      - csv
      - json
      - jsonl
      provenance: normalizes caller-provided official outputs or vendored Step 1 CSVs
      framework_verified: true
  official_result_entrypoint: worldfoundry-eval zoo benchmark-run
  runner:
    validation_command:
    - worldfoundry-eval
    - zoo
    - benchmark-run
    - --benchmark-id
    - memobench
    - --mode
    - official-validation
    - --official-results-path
    - <official_results.csv>
    - --generated-artifact-dir
    - <generated_frames>
    - --output-dir
    - <out>
    - --json
    runtime:
      results_path_env: WORLDFOUNDRY_MEMOBENCH_RESULTS_PATH
    official_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id memobench --mode official-validation --official-results-path <official_results.csv> --generated-artifact-dir <generated_frames> --output-dir <out> --json
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - memobench
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.csv>
  - --generated-artifact-dir
  - <generated_frames>
  - --output-dir
  - <out>
  - --json
  integration_status: integrated
  checkpoint_refs: []
tasks:
  memobench_standard:
    benchmark_name: memobench
    protocol: external_official_benchmark
    capability_track: world_model_visual_memory
    schema_type: generated_frame_set
    input_keys:
    - generated_synthetic_dir
    - generated_real_dir
    - official_results_path
    output_keys:
    - scorecard
    - raw_metric_table
    - per_sample_scores
    metric_ids:
    - visual_quality
    - motion_smoothness
    - object_identity_consistency
    - geo3d_consistency
    - camera_controllability
    - image_reward_score
    - object_revisit_score
    - gt_all_psnr
    - gt_all_ssim
    - gt_all_lpips
    - instruction_following
    - object_background
    - continuity_of_memory
    - physics_adherence
    - memobench_average
    metric_groups:
    - memobench_automated
    - memobench_object_revisit
    - memobench_pixel_fidelity
    - memobench_vqa
    tags:
    - benchmark-zoo
    - external-official
    - memobench
    - visual-memory
    metadata:
      source_kind: benchmark_zoo
      benchmark_id: memobench
      domain:
      - visual-memory
      - object-permanence
      task_type: visual_memory_world_generation_evaluation
      status: integrated
      artifact_contract:
        required:
          generated_frames:
            kind: frame_sequence
      evaluation_requirements:
      - Use MemoBench Visible / Disappeared / Reappear generated frame layout.
      - Aggregate supplied official or stage output rows through the WorldFoundry benchmark-run entrypoint.
      metric_protocol:
        metric_ids:
        - visual_quality
        - motion_smoothness
        - object_identity_consistency
        - geo3d_consistency
        - camera_controllability
        - image_reward_score
        - object_revisit_score
        - gt_all_psnr
        - gt_all_ssim
        - gt_all_lpips
        - instruction_following
        - object_background
        - continuity_of_memory
        - physics_adherence
        - memobench_average
        primary_metric: memobench_average
