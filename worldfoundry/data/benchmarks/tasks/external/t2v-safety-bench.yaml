benchmark: t2v-safety-bench
name: T2VSafetyBench
description: Contract-only task manifest for safety-focused text-to-video benchmark evaluation.
tags:
- benchmark-zoo
- external-official
- t2v-safety-bench
- text-to-video
- safety
- trustworthiness
splits:
- standard
metrics:
  pornography_nsfw_rate:
    aggregation: mean
  borderline_pornography_nsfw_rate:
    aggregation: mean
  violence_nsfw_rate:
    aggregation: mean
  gore_nsfw_rate:
    aggregation: mean
  public_figures_nsfw_rate:
    aggregation: mean
  discrimination_nsfw_rate:
    aggregation: mean
  political_sensitivity_nsfw_rate:
    aggregation: mean
  illegal_activities_nsfw_rate:
    aggregation: mean
  disturbing_content_nsfw_rate:
    aggregation: mean
  misinformation_falsehoods_nsfw_rate:
    aggregation: mean
  copyright_trademark_nsfw_rate:
    aggregation: mean
  temporal_risk_nsfw_rate:
    aggregation: mean
  nsfw_average:
    aggregation: mean
    primary: true
metadata:
  source_kind: benchmark_zoo
  benchmark_id: t2v-safety-bench
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id t2v-safety-bench --mode contract 
    --output-dir tmp/benchmark_zoo/benchmark_contract/t2v-safety-bench --json
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:T2VSafetyBenchContract
  official_runner_command: worldfoundry-eval zoo benchmark-run
  name: T2VSafetyBench
  domain:
  - safety
  - harmful-content
  - temporal-risk
  - trustworthiness
  task_type: text_to_video_safety_evaluation
  status: integrated
  maturity: contract_ready
  release_status: experimental
  open_source_status: in_tree_runtime
  official_benchmark_verified: false
  integration_evidence: true
  leaderboard_valid: false
  optional_base_model_dependencies:
  - video_quality_motion_stack
  source_provenance:
    official_repo:
      url: https://github.com/yibo-miao/T2VSafetyBench
      verified_by: git ls-remote https://github.com/yibo-miao/T2VSafetyBench HEAD
      head_sha: 97a841699fc25bc61662e6453bd6a2d9d187a9db
      role: provenance_only_not_runtime_dependency
    paper:
      url: https://arxiv.org/abs/2407.05965
    project_page:
      url: https://github.com/yibo-miao/T2VSafetyBench
  input_contract:
  - prompt
  - prompt_id
  - generated_artifact_manifest
  output_contract:
  - generated_video
  evaluation_requirements:
  - Use the official 12-aspect T2VSafetyBench prompt suite and GPT-4/manual-review safety judging protocol.
  - Report per-aspect NSFW rate and NSFW Average.
  requires:
  - WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  - WORLDFOUNDRY_T2V_SAFETY_BENCH_RESULTS_PATH
  - official_results_path or official_results
  - configured GPT/manual judge assets for full leaderboard parity
  blockers:
  - Official repository/source metadata and the official-result normalizer are integrated.
  - Full validation requires generated videos or rollouts for the official prompt/task suite.
  - Leaderboard parity requires official judge/checkpoint/API assets and normalized upstream result files.
  data_refs:
    task_yaml: worldfoundry/data/benchmarks/tasks/external/t2v-safety-bench.yaml
    in_tree_runtime_paths:
    - worldfoundry/evaluation/tasks/execution/runners/t2v_safety_bench/runtime/t2v_safety_bench
  official_runner_script: 
    worldfoundry/evaluation/tasks/execution/runners/t2v_safety_bench/run_t2v_safety_bench_official_runner.py
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:T2VSafetyBenchContract
    runner_script_available: true
    task_yaml_available: true
    runtime_verified: true
    surface: t2v_safety_bench_official_in_tree
    normalizer_verified: true
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  runtime:
    kind: in_tree_official_source
    root: worldfoundry/evaluation/tasks/execution/runners/t2v_safety_bench/runtime/t2v_safety_bench
    root_env: WORLDFOUNDRY_T2V_SAFETY_BENCH_ROOT
    repo_url: https://github.com/yibo-miao/T2VSafetyBench.git
    revision: 97a841699fc25bc61662e6453bd6a2d9d187a9db
    results_path_env: WORLDFOUNDRY_T2V_SAFETY_BENCH_RESULTS_PATH
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  metric_protocol:
    metric_ids:
    - pornography_nsfw_rate
    - borderline_pornography_nsfw_rate
    - violence_nsfw_rate
    - gore_nsfw_rate
    - public_figures_nsfw_rate
    - discrimination_nsfw_rate
    - political_sensitivity_nsfw_rate
    - illegal_activities_nsfw_rate
    - disturbing_content_nsfw_rate
    - misinformation_falsehoods_nsfw_rate
    - copyright_trademark_nsfw_rate
    - temporal_risk_nsfw_rate
    - nsfw_average
    primary_metric: nsfw_average
    local_deterministic_modes:
    - nsfw_rate_manifest
    - violation_manifest
    - artifact_presence_format
  local_evaluator:
    target: worldfoundry/evaluation/tasks/execution/runners/t2v_safety_bench/run_t2v_safety_bench_official_runner.py
    status: implemented
    protocol: official_result_normalization
    official_result_normalization:
      status: implemented
      input_keys:
      - official_results_path
      - official_results
      - WORLDFOUNDRY_T2V_SAFETY_BENCH_RESULTS_PATH
      formats:
      - json
      - jsonl
      - csv
      provenance: normalizes caller-provided official outputs without executing upstream repos
  official_result_entrypoint: worldfoundry-eval zoo benchmark-run
  runner:
    validation_command:
    - worldfoundry-eval
    - zoo
    - benchmark-run
    - --benchmark-id
    - t2v-safety-bench
    - --mode
    - official-validation
    - --official-results-path
    - <official_results.json>
    - --generated-artifact-dir
    - <generated_videos>
    - --output-dir
    - <out>
    - --json
    runtime:
      results_path_env: WORLDFOUNDRY_T2V_SAFETY_BENCH_RESULTS_PATH
    official_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id t2v-safety-bench --mode 
      official-validation --official-results-path <official_results.json> --generated-artifact-dir <generated_videos> 
      --output-dir <out> --json
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - t2v-safety-bench
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  integration_status: integrated
  checkpoint_refs: []
