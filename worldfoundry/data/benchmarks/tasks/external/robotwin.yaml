benchmark: robotwin
description: RoboTwin 2.0 external benchmark task manifest for bimanual embodied manipulation policy rollouts.
tags:
- benchmark-zoo
- external-official
- robotwin
- vla
- embodied-action
- bimanual
- simulator
splits:
- demo_clean
- demo_randomized
metrics:
  success_rate:
    aggregation: mean
    primary: true
  task_success:
    aggregation: mean
  episode_success:
    aggregation: mean
  bimanual_task_success:
    aggregation: mean
  domain_randomization_success:
    aggregation: mean
  clean_success:
    aggregation: mean
  randomized_success:
    aggregation: mean
  reward:
    aggregation: mean
metadata:
  source_kind: benchmark_zoo
  benchmark_id: robotwin
  status: integrated
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id robotwin --mode contract --output-dir
    tmp/benchmark_zoo/benchmark_contract/robotwin --json
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:RoboTwinContract
  prompt_suite:
    hf_dataset_id: TianxingChen/RoboTwin2.0
    split: demo_clean,demo_randomized
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_ROBOTWIN_RESULTS_PATH
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  runtime:
    kind: external_official_results_runner
    root_env: WORLDFOUNDRY_ROBOTWIN_ROOT
    results_path_env: WORLDFOUNDRY_ROBOTWIN_RESULTS_PATH
    official_root: thirdparty/RoboTwin
    simulator: sapien
    planner: curobo
    default_embodiment: aloha-agilex
    default_camera: D435
    task_count: 50
    validation_command:
    - worldfoundry-eval
    - zoo
    - benchmark-run
    - --benchmark-id
    - robotwin
    - --mode
    - official-validation
    - --official-results-path
    - <official_results.json>
    - --output-dir
    - <out>
    - --json
  official_task_groups:
    all_50_tasks:
    - adjust_bottle
    - beat_block_hammer
    - blocks_ranking_rgb
    - blocks_ranking_size
    - click_alarmclock
    - click_bell
    - dump_bin_bigbin
    - grab_roller
    - handover_block
    - handover_mic
    - hanging_mug
    - lift_pot
    - move_can_pot
    - move_pillbottle_pad
    - move_playingcard_away
    - move_stapler_pad
    - open_laptop
    - open_microwave
    - pick_diverse_bottles
    - pick_dual_bottles
    - place_a2b_left
    - place_a2b_right
    - place_bread_basket
    - place_bread_skillet
    - place_burger_fries
    - place_can_basket
    - place_cans_plasticbox
    - place_container_plate
    - place_dual_shoes
    - place_empty_cup
    - place_fan
    - place_mouse_pad
    - place_object_basket
    - place_object_scale
    - place_object_stand
    - place_phone_stand
    - place_shoe
    - press_stapler
    - put_bottles_dustbin
    - put_object_cabinet
    - rotate_qrcode
    - scan_object
    - shake_bottle
    - shake_bottle_horizontally
    - stack_blocks_three
    - stack_blocks_two
    - stack_bowls_three
    - stack_bowls_two
    - stamp_seal
    - turn_switch
  release_status: normalizer_only
  maturity: contract_ready
  open_source_status: normalizer_only
  official_benchmark_verified: false
  integration_evidence: true
  leaderboard_valid: false
  full_test_harness_ready: true
  full_suite_testable: true
  full_suite_execution_recorded: false
  base_model_dependencies:
  - robotwin_dataset_assets
  optional_base_model_dependencies:
  - spatial_perception_core_stack
  requires:
  - Official benchmark runtime or preflight validation
  blockers:
  - Result import is normalizer-only; full leaderboard parity requires executing the upstream SAPIEN/Curobo simulator
    and policy evaluation scripts with staged assets and checkpoints.
  - 2026-05-25 bounded official simulator validation reached CUDA driver allocation in a local RoboTwin simulator runtime,
    but upstream script/test_render.py exceeded the hard timeout without Render Well; SAPIEN/Vulkan rendering remains
    blocked.
  data_refs:
    dataset_refs:
    - repo_id: TianxingChen/RoboTwin2.0
      revision: 9dc9299c163db059931898a9f0852098a61155a1
      license: mit
      path: cache/vla_va_wam/hf_datasets/TianxingChen--RoboTwin2.0
      notes:
      - optional_huge
      - official over-100k pre-collected trajectory dataset
    - repo_id: lerobot/robotwin_unified
      revision: 1287871839fae2296bc27b88a5457c3e1eba8e1f
      license: manual_review:missing_hf_license
      path: cache/vla_va_wam/hf_datasets/lerobot--robotwin_unified
      notes:
      - optional_large
      - LeRobot unified conversion
    local_dataset_paths:
    - cache/worldfoundry/data/hfd_datasets/TianxingChen__RoboTwin2.0
    - cache/worldfoundry/data/hfd_datasets/lerobot__robotwin_unified
    local_repo_paths:
    - cache/vla_va_wam/repos/RoboTwin-Platform--RoboTwin
    task_yaml: worldfoundry/data/benchmarks/tasks/external/robotwin.yaml
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:RoboTwinContract
    runner_script_available: true
    task_yaml_available: true
    runtime_verified: false
    normalizer_verified: true
    surface: official_result_normalizer
    failed_simulator_validation:
      status: failed
      official_script: script/test_render.py
      cuda_probe_available: true
      render_ok: false
      reason: Latest hard-timeout validation reached CUDA driver allocation but upstream script/test_render.py exceeded
        30s without Render Well under the local RoboTwin simulator runtime.
  official_result_entrypoint: worldfoundry-eval zoo benchmark-run
  local_evaluator:
    status: removed
    note: Official _result.txt normalizer removed; use worldfoundry-eval embodied run (harness vendoring pending).
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - robotwin
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --output-dir
  - <out>
  - --json
  integration_status: integrated
  checkpoint_refs: []
tasks:
  robotwin_2_0_policy_rollouts:
    benchmark_name: robotwin
    protocol: external_official_benchmark
    capability_track: embodied_action
    input_keys:
    - language_instruction
    - head_rgb
    - wrist_rgb
    - proprioception
    - robot_state
    output_keys:
    - action
    - rollout_result
    - rollout_log
    - video
    metric_ids:
    - success_rate
    - task_success
    - episode_success
    - bimanual_task_success
    - domain_randomization_success
    - clean_success
    - randomized_success
    - reward
    metric_groups:
    - robotwin_success
    - robotwin_domain_randomization
    tags:
    - benchmark-zoo
    - robotwin
    - vla
    - embodied-action
    - bimanual
    - simulator
    metadata:
      source_kind: benchmark_zoo
      benchmark_id: robotwin
      official_task_count: 50
      official_benchmark_verified: false
      integration_evidence: true
      leaderboard_valid: false
    dataset:
      hf_dataset_id: TianxingChen/RoboTwin2.0
      split: demo_clean,demo_randomized
    runtime_requirements:
      upstream_repo_env: WORLDFOUNDRY_ROBOTWIN_ROOT
      results_path_env: WORLDFOUNDRY_ROBOTWIN_RESULTS_PATH
      simulator_assets: required_for_official_runtime
      policy_checkpoints: required_for_official_runtime
    artifact_contract:
      required:
        rollout_result:
          kind: robotwin_eval_result
          accepted_formats:
          - _result.txt
          - json
          - jsonl
          - csv
          - tsv
      optional:
        rollout_log:
          kind: text
        video:
          kind: video
    evaluation_protocol:
    - name: external_official_runner
      metric_ids:
      - success_rate
      - task_success
      - episode_success
      - bimanual_task_success
      - domain_randomization_success
      - clean_success
      - randomized_success
      - reward
      runner_target: worldfoundry.evaluation.tasks.contracts.external:RoboTwinContract
