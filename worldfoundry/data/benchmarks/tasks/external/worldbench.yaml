benchmark: worldbench
description: WorldBench external benchmark task manifest for video-based and text-based physical understanding results.
tags:
- benchmark-zoo
- external-official
- worldbench
- video-understanding
splits:
- standard
metrics:
  video_based_accuracy:
    aggregation: mean
  text_based_accuracy:
    aggregation: mean
  multiple_choice_accuracy:
    aggregation: mean
  binary_accuracy:
    aggregation: mean
  worldbench_average:
    aggregation: mean
    primary: true
metadata:
  source_kind: benchmark_zoo
  benchmark_id: worldbench
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id worldbench --mode contract 
    --output-dir tmp/benchmark_zoo/benchmark_contract/worldbench --json
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:WorldBenchContract
  official_runner_script: worldfoundry/evaluation/tasks/execution/runners/worldbench/run_worldbench_official_runner.py
  prompt_suite:
    hf_dataset_id: worldbenchmark/WorldBench
    split: standard
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  runtime:
    kind: in_tree_official_runtime
    root: worldfoundry/evaluation/tasks/execution/runners/worldbench
    root_env: WORLDFOUNDRY_WORLDBENCH_ROOT
    artifact_score_dir_env: WORLDFOUNDRY_WORLDBENCH_ARTIFACT_SCORE_DIR
    results_path_env: WORLDFOUNDRY_WORLDBENCH_RESULTS_PATH
  release_status: experimental
  maturity: contract_ready
  open_source_status: in_tree_runtime
  official_benchmark_verified: false
  integration_evidence: true
  leaderboard_valid: false
  base_model_dependencies:
  - worldbench_dataset_assets
  optional_base_model_dependencies:
  - video_world_perception_stack
  requires:
  - WORLDFOUNDRY_WORLDBENCH_ARTIFACT_SCORE_DIR or --artifact-score-dir for in-tree runtime execution
  - official_results_path or WORLDFOUNDRY_WORLDBENCH_RESULTS_PATH for result import
  blockers:
  - In-tree runtime is wired; source-verified upstream official evaluation code was not confirmed from official GitHub
    or Hugging Face sources.
  - Dataset license is null in HF API response.
  - Requires video-to-video and VQA task split mapping.
  data_refs:
    local_dataset_paths:
    - cache/worldfoundry/data/hfd_datasets/worldbenchmark/WorldBench
    - cache/worldfoundry/data/hfd_datasets/worldbenchmark__WorldBench
    task_yaml: worldfoundry/data/benchmarks/tasks/external/worldbench.yaml
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:WorldBenchContract
    runner_script_available: true
    task_yaml_available: true
    runtime_verified: true
    surface: worldbench_official_in_tree
    normalizer_verified: true
  official_result_entrypoint: worldfoundry-eval zoo benchmark-run
  local_evaluator:
    target: worldfoundry/evaluation/tasks/execution/runners/worldbench/run_worldbench_official_runner.py
    status: implemented
    protocol: in_tree_official_runtime_and_result_normalization
    official_result_normalization:
      status: implemented
      input_keys:
      - artifact_score_dir
      - WORLDFOUNDRY_WORLDBENCH_ARTIFACT_SCORE_DIR
      - official_results_path
      - WORLDFOUNDRY_WORLDBENCH_RESULTS_PATH
      formats:
      - json
      - jsonl
      - csv
      - tsv
      provenance: normalizes caller-provided official outputs without executing upstream repos
  runner:
    validation_command:
    - worldfoundry-eval
    - zoo
    - benchmark-run
    - --benchmark-id
    - worldbench
    - --mode
    - official-validation
    - --official-results-path
    - <official_results.json>
    - --generated-artifact-dir
    - <generated_videos>
    - --output-dir
    - <out>
    - --json
    runtime:
      results_path_env: WORLDFOUNDRY_WORLDBENCH_RESULTS_PATH
    official_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id worldbench --mode 
      official-validation --official-results-path <official_results.json> --generated-artifact-dir <generated_videos> 
      --output-dir <out> --json
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - worldbench
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  integration_status: integrated
  status: integrated_in_tree_official_runtime
  checkpoint_refs: []
tasks:
  worldbench_video_standard:
    benchmark_name: worldbench
    protocol: external_official_benchmark
    capability_track: physical_understanding
    input_keys:
    - prompt
    - prompt_id
    - question
    - choices
    output_keys:
    - generated_video
    - answer
    metric_ids:
    - video_based_accuracy
    - text_based_accuracy
    - multiple_choice_accuracy
    - binary_accuracy
    - worldbench_average
    metric_groups:
    - worldbench_accuracy
    tags:
    - benchmark-zoo
    - worldbench
    - vqa
    metadata:
      source_kind: benchmark_zoo
      benchmark_id: worldbench
      official_benchmark_verified: false
      integration_evidence: true
      leaderboard_valid: false
    dataset:
      hf_dataset_id: worldbenchmark/WorldBench
      split: standard
    runtime_requirements:
      results_path_env: WORLDFOUNDRY_WORLDBENCH_RESULTS_PATH
    artifact_contract:
      required:
        generated_video:
          kind: video
      optional:
        answer:
          kind: text
    evaluation_protocol:
    - name: in_tree_official_runtime
      metric_ids:
      - video_based_accuracy
      - text_based_accuracy
      - multiple_choice_accuracy
      - binary_accuracy
      - worldbench_average
      runner_target: worldfoundry.evaluation.tasks.contracts.external:WorldBenchContract
      runner_script: worldfoundry/evaluation/tasks/execution/runners/worldbench/run_worldbench_official_runner.py
      runner_script: worldfoundry/evaluation/tasks/execution/runners/worldbench/run_worldbench_official_runner.py
