benchmark: libero
description: LIBERO external benchmark task manifest for language-conditioned robot manipulation policy rollouts.
tags:
- benchmark-zoo
- external-official
- libero
- vla
- embodied-action
- robot-manipulation
- long-horizon
splits:
- libero_spatial
- libero_object
- libero_goal
- libero_10
- libero_90
metrics:
  success_rate:
    aggregation: mean
    primary: true
  task_success:
    aggregation: mean
  episode_success:
    aggregation: mean
  action_accuracy:
    aggregation: mean
metadata:
  source_kind: benchmark_zoo
  benchmark_id: libero
  status: integrated
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id libero --mode contract --output-dir 
    tmp/benchmark_zoo/benchmark_contract/libero --json
  release_status: normalizer_only
  maturity: contract_ready
  open_source_status: normalizer_only
  official_benchmark_verified: false
  integration_evidence: true
  leaderboard_valid: false
  full_test_harness_ready: true
  full_suite_testable: true
  full_suite_execution_recorded: false
  official_repository:
    repo_url: https://github.com/Lifelong-Robot-Learning/LIBERO.git
    revision: 8f1084e3132a39270c3a13ebe37270a43ece2a01
    clone_dir: ${WORLDFOUNDRY_CACHE_DIR}/repos/Lifelong-Robot-Learning--LIBERO
  base_model_dependencies:
  - libero_source_assets
  - libero_dataset_assets
  optional_base_model_dependencies:
  - spatial_perception_core_stack
  requires:
  - Upstream SAPIEN/Curobo simulator runtime
  - RoboTwin simulator assets
  - Policy checkpoint for selected upstream eval script
  - Official eval_result tree or structured result export
  blockers:
  - Full leaderboard parity still requires official LIBERO rollout execution with simulator assets, policy checkpoints, 
    and upstream evidence.
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:LIBEROContract
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:LIBEROContract
    runner_script_available: false
    task_yaml_available: true
    runtime_verified: false
    normalizer_verified: true
    surface: official_result_normalizer
  prompt_suite:
    status: preflight_only
    split: libero_spatial,libero_object,libero_goal,libero_10,libero_90
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_LIBERO_RESULTS_PATH
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  runtime:
    kind: external_official_results_runner
    root_env: WORLDFOUNDRY_LIBERO_ROOT
    results_path_env: WORLDFOUNDRY_LIBERO_RESULTS_PATH
    preflight_profile: libero
    validation_command:
    - worldfoundry-eval
    - zoo
    - benchmark-run
    - --benchmark-id
    - libero
    - --mode
    - official-validation
    - --official-results-path
    - <official_results.json>
    - --output-dir
    - <out>
    - --json
  official_result_entrypoint: worldfoundry-eval zoo benchmark-run
  local_evaluator:
    target: worldfoundry.evaluation.tasks.embodied.normalizer:normalize_results
    status: implemented
    protocol: official_embodied_result_normalizer
    official_result_normalization:
      status: implemented
      input_keys:
      - official_results_path
      - WORLDFOUNDRY_LIBERO_RESULTS_PATH
      formats:
      - json
      - jsonl
      - csv
      provenance: normalizes caller-provided official embodied rollout outputs without executing simulators
  data_refs:
    dataset_refs:
    - repo_id: yifengzhu-hf/LIBERO-datasets
      revision: f13aa24a3da8c43c7225569f28c562979fa0e35a
      license: other
      path: cache/vla_va_wam/hf_datasets/yifengzhu-hf--LIBERO-datasets
    - repo_id: lerobot/libero
      revision: 1595a93b43aa055e55c127a4f0b4a99bb8035447
      license: apache-2.0
      path: cache/vla_va_wam/hf_datasets/lerobot--libero
    local_dataset_paths:
    - cache/worldfoundry/data/hfd_datasets/yifengzhu-hf__LIBERO-datasets
    - cache/vla_va_wam/hf_datasets/yifengzhu-hf--LIBERO-datasets
    - cache/worldfoundry/data/hfd_datasets/lerobot__libero
    - cache/vla_va_wam/hf_datasets/lerobot--libero
    local_repo_paths:
    - cache/vla_va_wam/repos/Lifelong-Robot-Learning--LIBERO
    task_yaml: worldfoundry/data/benchmarks/tasks/external/libero.yaml
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - libero
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --output-dir
  - <out>
  - --json
  integration_status: integrated
  checkpoint_refs: []
tasks:
  libero_policy_rollouts:
    benchmark_name: libero
    protocol: external_official_benchmark
    capability_track: vla,robot-manipulation,long-horizon
    input_keys:
    - language_instruction
    - observation_image
    - robot_state
    - episode_manifest
    output_keys:
    - scorecard
    - raw_results
    - per_sample_metrics
    - rollout_logs
    metric_ids:
    - success_rate
    - task_success
    - episode_success
    - action_accuracy
    metric_groups:
    - libero_metrics
    - embodied_action
    tags:
    - benchmark-zoo
    - external-official
    - libero
    - vla
    - embodied-action
    - robot-manipulation
    - long-horizon
    metadata:
      source_kind: benchmark_zoo
      benchmark_id: libero
      leaderboard_valid: false
      official_benchmark_verified: false
      integration_evidence: true
    dataset:
      hf_dataset_ids:
      - yifengzhu-hf/LIBERO-datasets
      - lerobot/libero
      split: libero_spatial,libero_object,libero_goal,libero_10,libero_90
    runtime_requirements:
      upstream_repo_env: WORLDFOUNDRY_LIBERO_ROOT
      results_path_env: WORLDFOUNDRY_LIBERO_RESULTS_PATH
      simulator_assets: required_for_official_runtime
      policy_checkpoints: required_for_official_runtime
    artifact_contract:
      required:
        rollout_result:
          kind: embodied_policy_result
          accepted_formats:
          - json
          - jsonl
          - csv
    evaluation_protocol:
    - name: external_official_runner
      metric_ids:
      - success_rate
      - task_success
      - episode_success
      - action_accuracy
      runner_target: worldfoundry.evaluation.tasks.contracts.external:LIBEROContract
