benchmark: metaworld
description: Meta-World external benchmark task manifest for continuous-control manipulation rollouts.
tags:
- benchmark-zoo
- external-official
- metaworld
- embodied-action
- robot-manipulation
- simulator
- meta-rl
splits:
- mt10
- mt50
- ml10
- ml45
metrics:
  success_rate:
    aggregation: mean
    primary: true
  task_success:
    aggregation: mean
  reward:
    aggregation: mean
  normalized_return:
    aggregation: mean
metadata:
  source_kind: benchmark_zoo
  benchmark_id: metaworld
  status: integrated
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id metaworld --mode contract --output-dir
    tmp/benchmark_zoo/benchmark_contract/metaworld --json
  release_status: normalizer_only
  maturity: contract_ready
  open_source_status: normalizer_only
  official_benchmark_verified: false
  integration_evidence: true
  leaderboard_valid: false
  full_test_harness_ready: true
  full_suite_testable: true
  full_suite_execution_recorded: false
  optional_base_model_dependencies:
  - spatial_perception_core_stack
  requires:
  - Official Meta-World package or repository checkout
  - MuJoCo-compatible runtime
  - MT/ML suite mapping
  - Benchmark-specific policy checkpoint or controller
  blockers:
  - Meta-World task-suite mapping and official-style policy result validation must be validated before integrated 
    status.
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:MetaWorldContract
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:MetaWorldContract
    runner_script_available: false
    task_yaml_available: true
    runtime_verified: false
    normalizer_verified: true
    surface: official_result_normalizer
  prompt_suite:
    status: preflight_only
    split: mt10,mt50,ml10,ml45
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_METAWORLD_RESULTS_PATH
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  runtime:
    kind: external_official_results_runner
    root_env: WORLDFOUNDRY_METAWORLD_ROOT
    results_path_env: WORLDFOUNDRY_METAWORLD_RESULTS_PATH
    preflight_profile: metaworld
    validation_command:
    - worldfoundry-eval
    - zoo
    - benchmark-run
    - --benchmark-id
    - metaworld
    - --mode
    - official-validation
    - --official-results-path
    - <official_results.json>
    - --output-dir
    - <out>
    - --json
  official_result_entrypoint: worldfoundry-eval zoo benchmark-run
  local_evaluator:
    target: worldfoundry.evaluation.tasks.embodied.normalizer:normalize_results
    status: implemented
    protocol: official_embodied_result_normalizer
    official_result_normalization:
      status: implemented
      input_keys:
      - official_results_path
      - WORLDFOUNDRY_METAWORLD_RESULTS_PATH
      formats:
      - json
      - jsonl
      - csv
      provenance: normalizes caller-provided official embodied rollout outputs without executing simulators
  data_refs:
    task_yaml: worldfoundry/data/benchmarks/tasks/external/metaworld.yaml
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - metaworld
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --output-dir
  - <out>
  - --json
  integration_status: integrated
  checkpoint_refs: []
tasks:
  metaworld_policy_rollouts:
    benchmark_name: metaworld
    protocol: external_official_benchmark
    capability_track: embodied-action,robot-manipulation,simulator,meta-rl
    input_keys:
    - observation
    - robot_state
    - task_manifest
    output_keys:
    - scorecard
    - raw_results
    - per_sample_metrics
    - rollout_logs
    metric_ids:
    - success_rate
    - task_success
    - reward
    - normalized_return
    metric_groups:
    - metaworld_metrics
    - embodied_action
    tags:
    - benchmark-zoo
    - external-official
    - metaworld
    - embodied-action
    - robot-manipulation
    - simulator
    - meta-rl
    metadata:
      source_kind: benchmark_zoo
      benchmark_id: metaworld
      leaderboard_valid: false
      official_benchmark_verified: false
      integration_evidence: true
    dataset:
      status: simulator_generated
      split: mt10,mt50,ml10,ml45
    runtime_requirements:
      upstream_repo_env: WORLDFOUNDRY_METAWORLD_ROOT
      results_path_env: WORLDFOUNDRY_METAWORLD_RESULTS_PATH
      simulator_assets: required_for_official_runtime
      policy_checkpoints: required_for_official_runtime
    artifact_contract:
      required:
        rollout_result:
          kind: embodied_policy_result
          accepted_formats:
          - json
          - jsonl
          - csv
    evaluation_protocol:
    - name: external_official_runner
      metric_ids:
      - success_rate
      - task_success
      - reward
      - normalized_return
      runner_target: worldfoundry.evaluation.tasks.contracts.external:MetaWorldContract
