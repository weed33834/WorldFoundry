benchmark: mirabench
description: MiraBench external benchmark contract manifest.
id: mirabench
name: MiraBench
status: contract_ready
domain:
- long-video
- motion-strength
- temporal-consistency
- 3d-consistency
task_type: long_video_generation_evaluation
input:
  modalities:
  - text
  keys:
  - prompt
  - prompt_id
  - generated_artifact_manifest
output:
  modalities:
  - video
  artifacts:
  - generated_video
evaluation_requirements:
  generated_artifacts:
  - generated_video
  metrics_source: official MiraBench evaluation scripts and prompt metadata
  requires_official_runtime_execution: false
  runtime_source_dependency: false
  notes:
  - Source repositories and paper links are provenance only for this in-tree contract.
source_provenance:
  status: contract_ready
  official_repository:
    url: https://github.com/mira-space/MiraData
    revision: 7ad05795dd74acdc6b364222a9fa885a94b0c1a2
