      - RAFT/tracking/DINO/CLIP/AMT/GVGC/MUSIQ/ViCLIP/FVD-FID-KID scorer outputs
      - category or prompt_type for per-category aggregation
      official_result_entrypoint: worldfoundry-eval zoo benchmark-run
