metadata:
  source_kind: benchmark_zoo
  benchmark_id: mirabench
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id mirabench --mode contract --output-dir
    tmp/benchmark_zoo/benchmark_contract/mirabench --json
  base_model_dependencies:
  - video_quality_dino_motion_stack
  base_model_dependency_preflight:
    status: ready
    missing: []
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:MiraBenchContract
  official_runner_script: worldfoundry/evaluation/tasks/execution/runners/mirabench/run_mirabench_official_runner.py
  local_evaluator:
    target: worldfoundry.evaluation.tasks.execution.runners.mirabench.mirabench_video_quality_contract:evaluate_mirabench_video_quality_contract_file
    status: implemented
    protocol: local_manifest_metadata_and_official_result_normalization
    output_fields:
    - metric_id
    - score
    - value
    - status
    - evidence
    - blocked_reason
    local_metric_ids:
    - local_metadata_coverage
    - local_prompt_video_pair_completeness
    official_metric_blocked_reason: asset_required
    official_result_normalization:
      status: implemented
      input_keys:
      - official_results_path
      - official_results
      - WORLDFOUNDRY_MIRABENCH_RESULTS_PATH
      formats:
      - json
      - jsonl
      - csv
      - tsv
      provenance: normalizes caller-provided official outputs without executing upstream repos
  prompt_suite:
    status: official_repo_metadata
    path_or_ref: data/evaluation_example/meta_generated.csv
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  runtime:
    kind: in_tree_official_source
    root: worldfoundry/evaluation/tasks/execution/runners/mirabench/runtime/mirabench
    root_env: WORLDFOUNDRY_MIRABENCH_ROOT
    repo_url: https://github.com/mira-space/MiraData.git
    revision: 7ad05795dd74acdc6b364222a9fa885a94b0c1a2
  release_status: experimental
  open_source_status: experimental
  maturity: contract_ready
  official_benchmark_verified: false
  integration_evidence: true
  leaderboard_valid: false
  requires:
  - bundled MiraBench metadata assets or caller-provided official results
  - WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  - official_results_path or official_results
  - mira_meta_csv / official 150-prompt metadata
  - generated_video artifacts
  - RAFT/tracking/DINO/CLIP/AMT/GVGC/MUSIQ/ViCLIP/FVD-FID-KID scorer outputs
  - category or prompt_type for per-category aggregation
  blockers:
  - Official repository/source metadata, reusable CLIP/DINOv2/RAFT dependencies, and official-result normalizer are
    integrated.
  - Full validation requires generated videos or rollouts for the official prompt/task suite.
  - Leaderboard parity requires official judge/checkpoint/API assets and normalized upstream result files.
  data_refs:
    task_yaml: worldfoundry/data/benchmarks/tasks/external/mirabench.yaml
    bundled_assets: worldfoundry/data/benchmarks/assets/mirabench
    in_tree_runtime_paths:
    - worldfoundry/evaluation/tasks/execution/runners/mirabench/runtime/mirabench
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:MiraBenchContract
    runner_script_available: true
    task_yaml_available: true
    runtime_verified: true
    surface: mirabench_official_in_tree
    normalizer_verified: true
  official_result_entrypoint: worldfoundry-eval zoo benchmark-run
  runner:
    validation_command:
    - worldfoundry-eval
    - zoo
    - benchmark-run
    - --benchmark-id
    - mirabench
    - --mode
    - official-validation
    - --official-results-path
    - <official_results.csv>
    - --generated-artifact-dir
    - <generated_videos>
    - --output-dir
    - <out>
    - --json
    runtime:
      results_path_env: WORLDFOUNDRY_MIRABENCH_RESULTS_PATH
    official_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id mirabench --mode official-validation
      --official-results-path <official_results.csv> --generated-artifact-dir <generated_videos> --output-dir <out>
      --json
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - mirabench
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.csv>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  integration_status: integrated
  status: integrated
  run_command: PYTHONPATH=. "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}"
    worldfoundry/evaluation/tasks/execution/runners/mirabench/run_mirabench_official_runner.py --official-results-path
    "${WORLDFOUNDRY_MIRABENCH_RESULTS_PATH}" --generated-video-dir "${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}" --output-dir
    "${WORLDFOUNDRY_BENCHMARK_OUTPUT_DIR}" --json
  checkpoint_refs: []
tasks:
