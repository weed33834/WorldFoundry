    - tracking_strength
    - dino_temporal_consistency
    - clip_temporal_consistency
    - temporal_motion_smoothness
    - mean_absolute_error
    - root_mean_square_error
    - aesthetic_quality
    - imaging_quality
    - camera_alignment
    - main_object_alignment
    - background_alignment
    - style_alignment
    - overall_alignment
    - fvd
    - fid
    - kid
    - mirabench_average
    metric_groups:
