      - clip_temporal_consistency
      - temporal_motion_smoothness
      - mean_absolute_error
      - root_mean_square_error
      - aesthetic_quality
      - imaging_quality
      - camera_alignment
      - main_object_alignment
      - background_alignment
      - style_alignment
      - overall_alignment
      - fvd
      - fid
      - kid
      - mirabench_average
      runner_target: worldfoundry.evaluation.tasks.contracts.external:MiraBenchContract
      runner_script: worldfoundry/evaluation/tasks/execution/runners/mirabench/run_mirabench_official_runner.py
      official_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id mirabench --mode
        official-validation --official-results-path <official_results.csv> --generated-artifact-dir <generated_videos>
        --output-dir <out> --json
      required_inputs:
