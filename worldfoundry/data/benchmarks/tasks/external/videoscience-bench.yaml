benchmark: videoscience-bench
name: VideoScience-Bench
description: Contract-only task manifest for scientific reasoning evaluation of generated videos.
tags:
- benchmark-zoo
- external-official
- videoscience-bench
- text-to-video
- scientific-reasoning
- physics-chemistry
splits:
- standard
metrics:
  prompt_consistency:
    aggregation: mean
  phenomenon_congruency:
    aggregation: mean
  correct_dynamism:
    aggregation: mean
  immutability:
    aggregation: mean
  spatio_temporal_coherence:
    aggregation: mean
  videoscience_average:
    aggregation: mean
    primary: true
metadata:
  source_kind: benchmark_zoo
  benchmark_id: videoscience-bench
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id videoscience-bench --mode contract 
    --output-dir tmp/benchmark_zoo/benchmark_contract/videoscience-bench --json
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:VideoScienceBenchContract
  official_runner_command: worldfoundry-eval zoo benchmark-run
  name: VideoScience-Bench
  domain:
  - science
  - physics
  - chemistry
  - reasoning
  task_type: text_to_video_scientific_reasoning_evaluation
  status: integrated
  maturity: contract_ready
  release_status: experimental
  open_source_status: in_tree_runtime
  official_benchmark_verified: false
  integration_evidence: true
  leaderboard_valid: false
  optional_base_model_dependencies:
  - grounded_depth_segmentation_stack
  source_provenance:
    official_repo:
      url: https://github.com/hao-ai-lab/VideoScience
      verified_by: git ls-remote https://github.com/hao-ai-lab/VideoScience HEAD
      head_sha: 0b3bb2da74388991bf842bca1096a6a25d3c9311
      role: provenance_only_not_runtime_dependency
    paper:
      url: https://arxiv.org/abs/2512.02942
    project_page:
      url: https://huggingface.co/spaces/lmgame/videoscience-bench/blob/main/README.md
  input_contract:
  - prompt
  - prompt_id
  - generated_artifact_manifest
  output_contract:
  - generated_video
  evaluation_requirements:
  - Use VideoScience-Bench scientific prompts.
  - Score Prompt Consistency, Phenomenon Congruency, Correct Dynamism, Immutability, and Spatio-Temporal Coherence on 
    the official 1-4 checklist scale.
  requires:
  - WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  - WORLDFOUNDRY_VIDEOSCIENCE_BENCH_RESULTS_PATH
  - official_results_path or official_results
  - configured VLM judge provider/API key for full official-run mode
  blockers:
  - Official repository/source metadata and the official-result normalizer are integrated.
  - Full validation requires generated videos or rollouts for the official prompt/task suite.
  - Leaderboard parity requires official judge/checkpoint/API assets and normalized upstream result files.
  data_refs:
    task_yaml: worldfoundry/data/benchmarks/tasks/external/videoscience-bench.yaml
    in_tree_runtime_paths:
    - worldfoundry/evaluation/tasks/execution/runners/videoscience_bench/runtime/videoscience_bench
  official_runner_script: 
    worldfoundry/evaluation/tasks/execution/runners/videoscience_bench/run_videoscience_bench_official_runner.py
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:VideoScienceBenchContract
    runner_script_available: true
    task_yaml_available: true
    runtime_verified: true
    surface: videoscience_bench_official_in_tree
    normalizer_verified: true
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  runtime:
    kind: in_tree_official_source
    root: worldfoundry/evaluation/tasks/execution/runners/videoscience_bench/runtime/videoscience_bench
    root_env: WORLDFOUNDRY_VIDEOSCIENCE_BENCH_ROOT
    repo_url: https://github.com/hao-ai-lab/VideoScience.git
    revision: 0b3bb2da74388991bf842bca1096a6a25d3c9311
    results_path_env: WORLDFOUNDRY_VIDEOSCIENCE_BENCH_RESULTS_PATH
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  metric_protocol:
    metric_ids:
    - prompt_consistency
    - phenomenon_congruency
    - correct_dynamism
    - immutability
    - spatio_temporal_coherence
    - videoscience_average
    primary_metric: videoscience_average
    local_deterministic_modes:
    - rubric_manifest
    - checklist_satisfied_fraction
    - mcq_or_qa_accuracy
    - artifact_presence_format
  local_evaluator:
    target: worldfoundry/evaluation/tasks/execution/runners/videoscience_bench/run_videoscience_bench_official_runner.py
    status: implemented
    protocol: official_result_normalization
    official_result_normalization:
      status: implemented
      input_keys:
      - official_results_path
      - official_results
      - WORLDFOUNDRY_VIDEOSCIENCE_BENCH_RESULTS_PATH
      formats:
      - json
      - jsonl
      - csv
      provenance: normalizes caller-provided official outputs without executing upstream repos
  official_result_entrypoint: worldfoundry-eval zoo benchmark-run
  runner:
    validation_command:
    - worldfoundry-eval
    - zoo
    - benchmark-run
    - --benchmark-id
    - videoscience-bench
    - --mode
    - official-validation
    - --official-results-path
    - <official_results.json>
    - --generated-artifact-dir
    - <generated_videos>
    - --output-dir
    - <out>
    - --json
    runtime:
      results_path_env: WORLDFOUNDRY_VIDEOSCIENCE_BENCH_RESULTS_PATH
    official_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id videoscience-bench --mode 
      official-validation --official-results-path <official_results.json> --generated-artifact-dir <generated_videos> 
      --output-dir <out> --json
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - videoscience-bench
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  integration_status: integrated
  checkpoint_refs: []
tasks:
  videoscience_bench_standard:
    benchmark_name: videoscience-bench
    protocol: external_official_benchmark
    capability_track: text_to_video
    schema_type: generated_artifact_set
    input_keys:
    - prompt
    - prompt_id
    - generated_artifact_manifest
    output_keys:
    - generated_video
    metric_ids:
    - prompt_consistency
    - phenomenon_congruency
    - correct_dynamism
    - immutability
    - spatio_temporal_coherence
    - videoscience_average
    metric_groups:
    - videoscience_bench_metrics
    tags:
    - benchmark-zoo
    - external-official
    - videoscience-bench
    - text-to-video
    - scientific-reasoning
    metadata:
      source_kind: benchmark_zoo
      benchmark_id: videoscience-bench
      domain:
      - science
      - physics
      - chemistry
      task_type: text_to_video_scientific_reasoning_evaluation
      status: contract_ready
      artifact_contract:
        required:
          generated_video:
            kind: video
      evaluation_requirements:
      - Use VideoScience-Bench scientific prompts.
      - Score Prompt Consistency, Phenomenon Congruency, Correct Dynamism, Immutability, and Spatio-Temporal Coherence 
        on the official 1-4 checklist scale.
      metric_protocol:
        metric_ids:
        - prompt_consistency
        - phenomenon_congruency
        - correct_dynamism
        - immutability
        - spatio_temporal_coherence
        - videoscience_average
        primary_metric: videoscience_average
        local_deterministic_modes:
        - rubric_manifest
        - checklist_satisfied_fraction
        - mcq_or_qa_accuracy
        - artifact_presence_format
      official_benchmark_verified: false
      integration_evidence: true
      leaderboard_valid: false
    dataset:
      status: official_prompt_suite_required
      source: provenance_only
    artifact_contract:
      required:
        generated_video:
          kind: video
    evaluation_protocol:
    - name: external_official_runner
      runner_target: worldfoundry.evaluation.tasks.contracts.external:VideoScienceBenchContract
      runner_script: 
        worldfoundry/evaluation/tasks/execution/runners/videoscience_bench/run_videoscience_bench_official_runner.py
      metric_ids:
      - prompt_consistency
      - phenomenon_congruency
      - correct_dynamism
      - immutability
      - spatio_temporal_coherence
      - videoscience_average
      official_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id videoscience-bench --mode 
        official-validation --official-results-path <official_results.json> --generated-artifact-dir <generated_videos> 
        --output-dir <out> --json
      required_inputs:
      - official_results_path or official_results
      - generated_video artifacts for the official prompt/task suite
      - official upstream scorer or judge assets for leaderboard parity
      official_result_entrypoint: worldfoundry-eval zoo benchmark-run
    - name: in_tree_local_quality_evaluator
      metric_ids:
      - prompt_consistency
      - phenomenon_congruency
      - correct_dynamism
      - immutability
      - spatio_temporal_coherence
      - videoscience_average
      evaluator_target: worldfoundry.evaluation.tasks.execution.runners.videoscience_bench.videoscience_bench_in_tree_evaluator:VideoScienceBenchInTreeEvaluator
      status: available_for_structured_evidence
      metadata:
        scoring_modes:
        - rubric_manifest
        - checklist_satisfied_fraction
        - mcq_or_qa_accuracy
        - artifact_presence_format
        blocked_conditions:
        - official_science_judge_required when rubric/checklist/QA evidence is absent
        - judge_api_or_vlm_required for fresh VideoScience-Judge scoring
        required_evidence_artifacts:
        - 'generated_video: official prompt video'
        - rubric_manifest or checklist_scores keyed by official VideoScience dimension
        - VideoScience-Judge checklist/key-frame/CV evidence for official parity
    runtime_requirements:
      in_tree_runtime: worldfoundry/evaluation/tasks/execution/runners/videoscience_bench/runtime/videoscience_bench
      optional_root_env: WORLDFOUNDRY_VIDEOSCIENCE_BENCH_ROOT
      generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
      results_path_env: WORLDFOUNDRY_VIDEOSCIENCE_BENCH_RESULTS_PATH
