benchmark: t2vworldbench
description: T2VWorldBench external benchmark task manifest for world-knowledge text-to-video evaluation.
tags:
- benchmark-zoo
- external-official
- t2vworldbench
- world-knowledge
splits:
- standard
metrics:
  physics_knowledge:
    aggregation: mean
  nature_knowledge:
    aggregation: mean
  activity_knowledge:
    aggregation: mean
  culture_knowledge:
    aggregation: mean
  causality_knowledge:
    aggregation: mean
  object_knowledge:
    aggregation: mean
  world_knowledge_average:
    aggregation: mean
    primary: true
metadata:
  source_kind: benchmark_zoo
  benchmark_id: t2vworldbench
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id t2vworldbench --mode contract 
    --output-dir tmp/benchmark_zoo/benchmark_contract/t2vworldbench --json
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:T2VWorldBenchContract
  official_runner_command: worldfoundry-eval zoo benchmark-run
  prompt_suite:
    repo_path: worldfoundry/data/benchmarks/assets/t2vworldbench/prompt/prompt.csv
    categories: 6
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  runtime:
    kind: in_tree_official_source
    root: worldfoundry/evaluation/tasks/execution/runners/t2vworldbench/runtime/t2vworldbench
    repo_url: https://github.com/magiclinux/world_knowledge.git
    revision: 4c0f18095d1c8053c11dbcfc8382ef9e4d9b768a
    root_env: WORLDFOUNDRY_T2VWORLDBENCH_ROOT
    results_path_env: WORLDFOUNDRY_T2VWORLDBENCH_RESULTS_PATH
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  release_status: experimental
  maturity: contract_ready
  official_benchmark_verified: false
  integration_evidence: true
  leaderboard_valid: false
  optional_base_model_dependencies:
  - video_world_perception_stack
  requires:
  - WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  - official_results_path or WORLDFOUNDRY_T2VWORLDBENCH_RESULTS_PATH
  - prompt file or in-tree prompt metadata for official runtime execution
  - Generated videos and staged official metadata for full runtime parity
  blockers:
  - Official repository/source metadata and the official-result normalizer are integrated.
  - Full validation requires generated videos and manually staged official Drive metadata/sample assets.
  - Leaderboard parity requires upstream VLM runtime and normalized official result files.
  data_refs:
    task_yaml: worldfoundry/data/benchmarks/tasks/external/t2vworldbench.yaml
    in_tree_runtime_paths:
    - worldfoundry/evaluation/tasks/execution/runners/t2vworldbench/runtime/t2vworldbench
  official_runner_script: 
    worldfoundry/evaluation/tasks/execution/runners/t2vworldbench/run_t2vworldbench_official_runner.py
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:T2VWorldBenchContract
    runner_script_available: true
    task_yaml_available: true
    runtime_verified: true
    surface: t2vworldbench_official_in_tree
    normalizer_verified: true
  open_source_status: in_tree_runtime
  local_evaluator:
    target: worldfoundry/evaluation/tasks/execution/runners/t2vworldbench/run_t2vworldbench_official_runner.py
    status: implemented
    protocol: official_result_normalization
    official_result_normalization:
      status: implemented
      input_keys:
      - official_results_path
      - official_results
      - WORLDFOUNDRY_T2VWORLDBENCH_RESULTS_PATH
      formats:
      - json
      - jsonl
      - csv
      provenance: normalizes caller-provided official outputs without executing upstream repos
  official_result_entrypoint: worldfoundry-eval zoo benchmark-run
  runner:
    validation_command:
    - worldfoundry-eval
    - zoo
    - benchmark-run
    - --benchmark-id
    - t2vworldbench
    - --mode
    - official-validation
    - --official-results-path
    - <official_results.json>
    - --generated-artifact-dir
    - <generated_videos>
    - --output-dir
    - <out>
    - --json
    runtime:
      results_path_env: WORLDFOUNDRY_T2VWORLDBENCH_RESULTS_PATH
    official_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id t2vworldbench --mode 
      official-validation --official-results-path <official_results.json> --generated-artifact-dir <generated_videos> 
      --output-dir <out> --json
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - t2vworldbench
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  integration_status: integrated
  status: integrated
  checkpoint_refs: []
tasks:
  t2vworldbench_world_knowledge_standard:
    benchmark_name: t2vworldbench
    protocol: external_official_benchmark
    capability_track: world_knowledge_video_generation
    input_keys:
    - prompt
    - prompt_id
    - category
    - subcategory
    output_keys:
    - generated_video
    metric_ids:
    - physics_knowledge
    - nature_knowledge
    - activity_knowledge
    - culture_knowledge
    - causality_knowledge
    - object_knowledge
    - world_knowledge_average
    metric_groups:
    - t2vworldbench_world_knowledge
    tags:
    - benchmark-zoo
    - t2vworldbench
    - t2v
    metadata:
      source_kind: benchmark_zoo
      benchmark_id: t2vworldbench
      official_benchmark_verified: false
      integration_evidence: true
      leaderboard_valid: false
    dataset:
      repo_path: worldfoundry/data/benchmarks/assets/t2vworldbench/prompt/prompt.csv
      status: bundled_assets_or_user_prompt_manifest
    runtime_requirements:
      in_tree_runtime: worldfoundry/evaluation/tasks/execution/runners/t2vworldbench/runtime/t2vworldbench
      optional_root_env: WORLDFOUNDRY_T2VWORLDBENCH_ROOT
      generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
      results_path_env: WORLDFOUNDRY_T2VWORLDBENCH_RESULTS_PATH
    artifact_contract:
      required:
        generated_video:
          kind: video
    evaluation_protocol:
    - name: external_official_runner
      metric_ids:
      - physics_knowledge
      - nature_knowledge
      - activity_knowledge
      - culture_knowledge
      - causality_knowledge
      - object_knowledge
      - world_knowledge_average
      runner_target: worldfoundry.evaluation.tasks.contracts.external:T2VWorldBenchContract
      runner_script: worldfoundry/evaluation/tasks/execution/runners/t2vworldbench/run_t2vworldbench_official_runner.py
