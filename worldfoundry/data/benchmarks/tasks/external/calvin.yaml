benchmark: calvin
description: CALVIN external benchmark task manifest for long-horizon language-conditioned manipulation.
tags:
- benchmark-zoo
- external-official
- calvin
- vla
- embodied-action
- robot-manipulation
- long-horizon
splits:
- abc
- d
metrics:
  success_rate:
    aggregation: mean
    primary: true
  sequence_success:
    aggregation: mean
  task_success:
    aggregation: mean
  completion:
    aggregation: mean
metadata:
  source_kind: benchmark_zoo
  benchmark_id: calvin
  status: integrated
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id calvin --mode contract --output-dir 
    tmp/benchmark_zoo/benchmark_contract/calvin --json
  release_status: normalizer_only
  maturity: contract_ready
  open_source_status: normalizer_only
  official_benchmark_verified: false
  integration_evidence: true
  leaderboard_valid: false
  full_test_harness_ready: true
  full_suite_testable: true
  full_suite_execution_recorded: false
  optional_base_model_dependencies:
  - spatial_perception_core_stack
  requires:
  - Official CALVIN repository checkout
  - CALVIN dataset root
  - Benchmark-specific policy checkpoint
  - Official long-horizon sequence evaluation command
  blockers:
  - Official CALVIN dataset split, sequence evaluator, and policy checkpoint validation must be completed before 
    integrated status.
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:CALVINContract
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:CALVINContract
    runner_script_available: false
    task_yaml_available: true
    runtime_verified: false
    normalizer_verified: true
    surface: official_result_normalizer
  prompt_suite:
    status: preflight_only
    split: abc,d
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_CALVIN_RESULTS_PATH
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  runtime:
    kind: external_official_results_runner
    root_env: WORLDFOUNDRY_CALVIN_ROOT
    results_path_env: WORLDFOUNDRY_CALVIN_RESULTS_PATH
    preflight_profile: calvin
    dataset_root_env: WORLDFOUNDRY_CALVIN_DATASET_ROOT
    validation_command:
    - worldfoundry-eval
    - zoo
    - benchmark-run
    - --benchmark-id
    - calvin
    - --mode
    - official-validation
    - --official-results-path
    - <official_results.json>
    - --output-dir
    - <out>
    - --json
  official_result_entrypoint: worldfoundry-eval zoo benchmark-run
  local_evaluator:
    target: worldfoundry.evaluation.tasks.embodied.normalizer:normalize_results
    status: implemented
    protocol: official_embodied_result_normalizer
    official_result_normalization:
      status: implemented
      input_keys:
      - official_results_path
      - WORLDFOUNDRY_CALVIN_RESULTS_PATH
      formats:
      - json
      - jsonl
      - csv
      provenance: normalizes caller-provided official embodied rollout outputs without executing simulators
  data_refs:
    local_repo_paths:
    - cache/vla_va_wam/repos/mees--calvin
    task_yaml: worldfoundry/data/benchmarks/tasks/external/calvin.yaml
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - calvin
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --output-dir
  - <out>
  - --json
  integration_status: integrated
  checkpoint_refs: []
tasks:
  calvin_policy_rollouts:
    benchmark_name: calvin
    protocol: external_official_benchmark
    capability_track: vla,robot-manipulation,long-horizon
    input_keys:
    - language_instruction
    - observation_image
    - robot_state
    - task_manifest
    output_keys:
    - scorecard
    - raw_results
    - per_sample_metrics
    - rollout_logs
    metric_ids:
    - success_rate
    - sequence_success
    - task_success
    - completion
    metric_groups:
    - calvin_metrics
    - embodied_action
    tags:
    - benchmark-zoo
    - external-official
    - calvin
    - vla
    - embodied-action
    - robot-manipulation
    - long-horizon
    metadata:
      source_kind: benchmark_zoo
      benchmark_id: calvin
      leaderboard_valid: false
      official_benchmark_verified: false
      integration_evidence: true
    dataset:
      status: external_dataset
      split: abc,d
    runtime_requirements:
      upstream_repo_env: WORLDFOUNDRY_CALVIN_ROOT
      results_path_env: WORLDFOUNDRY_CALVIN_RESULTS_PATH
      simulator_assets: required_for_official_runtime
      policy_checkpoints: required_for_official_runtime
      dataset_root_env: WORLDFOUNDRY_CALVIN_DATASET_ROOT
    artifact_contract:
      required:
        rollout_result:
          kind: embodied_policy_result
          accepted_formats:
          - json
          - jsonl
          - csv
    evaluation_protocol:
    - name: external_official_runner
      metric_ids:
      - success_rate
      - sequence_success
      - task_success
      - completion
      runner_target: worldfoundry.evaluation.tasks.contracts.external:CALVINContract
