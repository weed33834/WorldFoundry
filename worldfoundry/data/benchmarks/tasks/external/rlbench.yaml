benchmark: rlbench
description: RLBench external benchmark task manifest for CoppeliaSim/PyRep robot manipulation rollouts.
tags:
- benchmark-zoo
- external-official
- rlbench
- embodied-action
- robot-manipulation
- simulator
- multi-task
splits:
- standard
- few_shot
metrics:
  success_rate:
    aggregation: mean
    primary: true
  task_success:
    aggregation: mean
  episode_success:
    aggregation: mean
  reward:
    aggregation: mean
  normalized_return:
    aggregation: mean
metadata:
  source_kind: benchmark_zoo
  benchmark_id: rlbench
  status: integrated
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id rlbench --mode contract --output-dir 
    tmp/benchmark_zoo/benchmark_contract/rlbench --json
  release_status: normalizer_only
  maturity: contract_ready
  open_source_status: normalizer_only
  official_benchmark_verified: false
  integration_evidence: true
  leaderboard_valid: false
  full_test_harness_ready: true
  full_suite_testable: true
  full_suite_execution_recorded: false
  optional_base_model_dependencies:
  - spatial_perception_core_stack
  requires:
  - Official RLBench repository checkout
  - CoppeliaSim and PyRep runtime
  - RLBench task assets
  - Benchmark-specific policy checkpoint
  blockers:
  - CoppeliaSim/PyRep runtime validation and task-manifest mapping must be validated before integrated status.
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:RLBenchContract
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:RLBenchContract
    runner_script_available: false
    task_yaml_available: true
    runtime_verified: false
    normalizer_verified: true
    surface: official_result_normalizer
  prompt_suite:
    status: preflight_only
    split: standard,few_shot
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_RLBENCH_RESULTS_PATH
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  runtime:
    kind: external_official_results_runner
    root_env: WORLDFOUNDRY_RLBENCH_ROOT
    results_path_env: WORLDFOUNDRY_RLBENCH_RESULTS_PATH
    preflight_profile: rlbench
    coppeliasim_root_env: COPPELIASIM_ROOT
    validation_command:
    - worldfoundry-eval
    - zoo
    - benchmark-run
    - --benchmark-id
    - rlbench
    - --mode
    - official-validation
    - --official-results-path
    - <official_results.json>
    - --output-dir
    - <out>
    - --json
  official_result_entrypoint: worldfoundry-eval zoo benchmark-run
  local_evaluator:
    target: worldfoundry.evaluation.tasks.embodied.normalizer:normalize_results
    status: implemented
    protocol: official_embodied_result_normalizer
    official_result_normalization:
      status: implemented
      input_keys:
      - official_results_path
      - WORLDFOUNDRY_RLBENCH_RESULTS_PATH
      formats:
      - json
      - jsonl
      - csv
      provenance: normalizes caller-provided official embodied rollout outputs without executing simulators
  data_refs:
    task_yaml: worldfoundry/data/benchmarks/tasks/external/rlbench.yaml
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - rlbench
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --output-dir
  - <out>
  - --json
  integration_status: integrated
  checkpoint_refs: []
tasks:
  rlbench_policy_rollouts:
    benchmark_name: rlbench
    protocol: external_official_benchmark
    capability_track: embodied-action,robot-manipulation,simulator,multi-task
    input_keys:
    - language_instruction
    - observation_image
    - robot_state
    - task_manifest
    output_keys:
    - scorecard
    - raw_results
    - per_sample_metrics
    - rollout_logs
    - videos
    metric_ids:
    - success_rate
    - task_success
    - episode_success
    - reward
    - normalized_return
    metric_groups:
    - rlbench_metrics
    - embodied_action
    tags:
    - benchmark-zoo
    - external-official
    - rlbench
    - embodied-action
    - robot-manipulation
    - simulator
    - multi-task
    metadata:
      source_kind: benchmark_zoo
      benchmark_id: rlbench
      leaderboard_valid: false
      official_benchmark_verified: false
      integration_evidence: true
    dataset:
      status: simulator_generated
      split: standard,few_shot
    runtime_requirements:
      upstream_repo_env: WORLDFOUNDRY_RLBENCH_ROOT
      results_path_env: WORLDFOUNDRY_RLBENCH_RESULTS_PATH
      simulator_assets: required_for_official_runtime
      policy_checkpoints: required_for_official_runtime
      coppeliasim_root_env: COPPELIASIM_ROOT
    artifact_contract:
      required:
        rollout_result:
          kind: embodied_policy_result
          accepted_formats:
          - json
          - jsonl
          - csv
    evaluation_protocol:
    - name: external_official_runner
      metric_ids:
      - success_rate
      - task_success
      - episode_success
      - reward
      - normalized_return
      runner_target: worldfoundry.evaluation.tasks.contracts.external:RLBenchContract
