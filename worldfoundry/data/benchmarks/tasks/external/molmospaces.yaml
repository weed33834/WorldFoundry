benchmark: molmospaces
description: MolmoSpaces-Bench external benchmark manifest for spatial embodied policy evaluation.
tags:
- benchmark-zoo
- external-official
- molmospaces
- vla
- embodied-action
- spatial-reasoning
splits:
- pick_and_place
metrics:
  success_rate:
    aggregation: mean
    primary: true
  pick_success_rate:
    aggregation: mean
  task_success:
    aggregation: mean
  reward:
    aggregation: mean
metadata:
  source_kind: benchmark_zoo
  benchmark_id: molmospaces
  status: integrated
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:MolmoSpacesContract
  runtime:
    kind: external_official_results_runner
    root_env: WORLDFOUNDRY_MOLMOSPACES_ROOT
    results_path_env: WORLDFOUNDRY_MOLMOSPACES_RESULTS_PATH
    preflight_profile: molmospaces
  local_evaluator:
    target: worldfoundry.evaluation.tasks.embodied.normalizer:normalize_results
    status: implemented
    protocol: official_embodied_result_normalizer
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id molmospaces --mode contract 
    --output-dir tmp/benchmark_zoo/benchmark_contract/molmospaces --json
  release_status: normalizer_only
  maturity: contract_ready
  open_source_status: normalizer_only
  official_benchmark_verified: false
  integration_evidence: true
  leaderboard_valid: false
  requires:
  - Official simulator runtime
  - benchmark assets
  - policy checkpoint
  - official result dump
  blockers:
  - Full leaderboard parity is not claimed until official rollouts are executed and imported.
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:MolmoSpacesContract
    task_yaml_available: true
    runtime_verified: false
    normalizer_verified: true
    surface: official_result_normalizer
    runner_script_available: false
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_MOLMOSPACES_RESULTS_PATH
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  data_refs:
    task_yaml: worldfoundry/data/benchmarks/tasks/external/molmospaces.yaml
  checkpoint_refs: []
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - molmospaces
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --output-dir
  - <out>
  - --json
tasks:
  molmospaces_policy_rollouts:
    benchmark_name: molmospaces
    protocol: external_official_benchmark
    capability_track: vla,embodied-action,spatial-reasoning
    input_keys:
    - molmospaces_asset_root
    - simulator_root
    - task_manifest
    - policy_results_path
    - official_results_path
    output_keys:
    - scorecard
    - raw_results
    - per_sample_metrics
    - rollout_logs
    - videos
    metric_ids:
    - success_rate
    - pick_success_rate
    - task_success
    - reward
    tags:
    - benchmark-zoo
    - external-official
    - molmospaces
    - vla
    metadata:
      benchmark_id: molmospaces
      leaderboard_valid: false

      source_kind: benchmark_zoo
      official_benchmark_verified: false
      integration_evidence: true
    artifact_contract:
      required:
        benchmark_scorecard:
          kind: benchmark_result
    evaluation_protocol:
    - name: external_official_runner
      metric_ids:
      - success_rate
      - pick_success_rate
      - task_success
      - reward
      runner_target: worldfoundry.evaluation.tasks.contracts.external:MolmoSpacesContract
