benchmark: iworld-bench
description: iWorld-Bench official runner/normalizer manifest for released EmbodiedCity assets.
tags:
- benchmark-zoo
- iworld-bench
splits:
- official-validation
metrics:
  image_quality:
    higher_is_better: true
  brightness_consistency:
    higher_is_better: true
  color_temperature_constraint:
    higher_is_better: true
  sharpness_retention:
    higher_is_better: true
  motion_smoothness:
    higher_is_better: true
  trajectory_accuracy:
    higher_is_better: true
  trajectory_tolerance:
    higher_is_better: true
  memory_symmetry:
    higher_is_better: true
  trajectory_alignment:
    higher_is_better: true
  iworldbench_average:
    higher_is_better: true
metadata:
  source_kind: benchmark_zoo
  benchmark_id: iworld-bench
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id iworld-bench --mode contract
    --output-dir tmp/benchmark_zoo/benchmark_contract/iworld-bench --json
  release_status: experimental
  integration_status: integrated
  maturity: verified_runner
  open_source_status: experimental
  official_benchmark_verified: false
  integration_evidence: false
  leaderboard_valid: false
  optional_base_model_dependencies:
  - video_world_perception_stack
  - vbench_runtime_assets
  requires:
  - In-tree iWorld-Bench metric runtime
  - EmbodiedCity/iWorld-Bench-Dataset, or bundled metadata for prompt materialization
  - Generated videos for the requested task split
  - WorldFoundry VBench and VIPe runtime assets for full official execution beyond bounded memory metric
  blockers:
  - Full official GPU execution beyond the bounded memory metric requires the WorldFoundry VIPe and VBench checkpoint assets.
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:IWorldBenchContract
  official_runner_script: worldfoundry/evaluation/tasks/execution/runners/iworldbench/run_iworldbench_official_runner.py
  data_refs:
    task_yaml: worldfoundry/data/benchmarks/tasks/external/iworld-bench.yaml
    official_repo: https://github.com/EmbodiedCity/iWorld-Bench
    dataset_repo: EmbodiedCity/iWorld-Bench-Dataset
    dataset_revision: 530c48cd3d8e9bb20ed685a96521c3a9b68cf6d2
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:IWorldBenchContract
    runner_script_available: true
    task_yaml_available: true
    runtime_verified: true
    surface: bounded_official_memory_metric
    normalizer_verified: false
  prompt_suite:
    status: released_hf_dataset
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_IWORLD_BENCH_RESULTS_PATH
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  runtime:
    kind: in_tree_official_runner
    root_env: WORLDFOUNDRY_IWORLD_BENCH_ROOT
    root_env_required: false
    dataset_root_env: WORLDFOUNDRY_IWORLD_BENCH_DATASET_ROOT
    generated_video_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
    results_path_env: WORLDFOUNDRY_IWORLD_BENCH_RESULTS_PATH
    runtime_backend_env: WORLDFOUNDRY_IWORLD_BENCH_RUNTIME_BACKEND
  run_command:
  - ${WORLDFOUNDRY_UNIFIED_PYTHON}
  - worldfoundry/evaluation/tasks/execution/runners/iworldbench/run_iworldbench_official_runner.py
  - --run-official
  - --generated-videos-dir
  - ${WORLDFOUNDRY_IWORLD_BENCH_GENERATED_VIDEO_DIR}
  - --metric
  - all
  - --output-dir
  - <out>
  - --json
  validation_command:
  - ${WORLDFOUNDRY_UNIFIED_PYTHON}
  - worldfoundry/evaluation/tasks/execution/runners/iworldbench/run_iworldbench_official_runner.py
  - --run-official
  - --generated-videos-dir
  - ${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}
  - --metric
  - memory
  - --output-dir
  - <out>
  - --json
  official_gpu_validation:
    status: verified
    scope: bounded_official_memory_metric
    metric: memory
    generated_video_count: 2
    metrics_available: 2
    official_benchmark_verified: true
    integration_evidence: true
    leaderboard_valid: false
    full_suite_verified: false
    runtime_env: conda/envs/worldfoundry-unified-cu128
    python: ${WORLDFOUNDRY_UNIFIED_PYTHON}
  status: planned
  checkpoint_refs: []
tasks:
  iworld_bench_official_validation:
    benchmark_name: iworld-bench
    protocol: external_official_benchmark
    capability_track: interactive_world_model
    input_keys:
    - prompt
    - prompt_id
    - action_trace
    output_keys:
    - generated_video
    - interaction_trace
    metric_ids:
    - image_quality
    - brightness_consistency
    - color_temperature_constraint
    - sharpness_retention
    - motion_smoothness
    - trajectory_accuracy
    - trajectory_tolerance
    - memory_symmetry
    - trajectory_alignment
    - iworldbench_average
    metric_groups:
    - generation_quality
    - trajectory_following
    - memory_ability
    tags:
    - benchmark-zoo
    - iworld-bench
    metadata:
      source_kind: benchmark_zoo
      benchmark_id: iworld-bench
      release_status: experimental
      integration_status: integrated
      maturity: verified_runner
      runner_availability:
        available: true
        runner_target: worldfoundry.evaluation.tasks.contracts.external:IWorldBenchContract
        runner_script_available: true
        task_yaml_available: true
        runtime_verified: true
        surface: bounded_official_memory_metric
      artifact_contract:
        required:
          generated_video:
            kind: video_directory
      official_benchmark_verified: false
      integration_evidence: false
      leaderboard_valid: false
    dataset:
      repo_id: EmbodiedCity/iWorld-Bench-Dataset
      revision: 530c48cd3d8e9bb20ed685a96521c3a9b68cf6d2
      root_env: WORLDFOUNDRY_IWORLD_BENCH_DATASET_ROOT
    runtime_requirements:
      in_tree_runtime: worldfoundry/evaluation/tasks/execution/runners/iworldbench/runtime/iworldbench
      override_runtime_env: WORLDFOUNDRY_IWORLD_BENCH_ROOT
      results_path_env: WORLDFOUNDRY_IWORLD_BENCH_RESULTS_PATH
      generated_video_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
    artifact_contract:
      required:
        generated_video:
          kind: video_directory
    evaluation_protocol:
    - name: external_official_runner
      runner_script: worldfoundry/evaluation/tasks/execution/runners/iworldbench/run_iworldbench_official_runner.py
      metric_ids:
      - image_quality
      - brightness_consistency
      - color_temperature_constraint
      - sharpness_retention
      - motion_smoothness
      - trajectory_accuracy
      - trajectory_tolerance
      - memory_symmetry
      - trajectory_alignment
      - iworldbench_average
      runner_target: worldfoundry.evaluation.tasks.contracts.external:IWorldBenchContract
