benchmark: phygenbench
description: PhyGenBench external benchmark contract manifest.
id: phygenbench
name: PhyGenBench
status: contract_ready
domain:
- physics
- physical-commonsense
- physical-law-adherence
task_type: text_to_video_physical_commonsense_evaluation
input:
  modalities:
  - text
  keys:
  - prompt
  - prompt_id
  - generated_artifact_manifest
output:
  modalities:
  - video
  artifacts:
  - generated_video
evaluation_requirements:
  generated_artifacts:
  - generated_video
  metrics_source: official PhyGenBench prompt suite and PhyGenEval protocol
  requires_official_runtime_execution: false
  runtime_source_dependency: false
  notes:
  - Source repositories and project pages are provenance only for this in-tree contract.
source_provenance:
  status: contract_ready
  official_repository:
    url: https://github.com/OpenGVLab/PhyGenBench
    revision: f8642cb796f3bcb01f0b7c1b2ec53b75d357c739
    provenance_only: true
  paper:
    url: https://arxiv.org/abs/2410.05363
  project_page:
    url: https://phygenbench123.github.io/
tags:
- benchmark-zoo
- external-official
- phygenbench
- text-to-video
- physical-commonsense
splits:
- standard
metrics:
  physical_commonsense:
    aggregation: mean
  physical_law_adherence:
    aggregation: mean
  semantic_adherence:
    aggregation: mean
  phygenbench_average:
    aggregation: mean
    primary: true
metadata:
  source_kind: benchmark_zoo
  benchmark_id: phygenbench
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id phygenbench --mode contract
    --output-dir tmp/benchmark_zoo/benchmark_contract/phygenbench --json
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:PhyGenBenchContract
  official_runner_script: worldfoundry/evaluation/tasks/execution/runners/phygenbench/run_phygenbench_official_runner.py
  metric_evaluator_target: worldfoundry.evaluation.tasks.execution.runners.phygenbench.phygenbench_contract_evaluator:write_phygenbench_evaluation
  metric_protocol:
    official_definition: PhyGenEval decomposes generated-video evaluation into semantic alignment and physical
      commonsense alignment through key physical phenomena detection, physics order verification, and overall
      naturalness evaluation; released leaderboard/category values are imported from official PhyGenEval result files
      only.
    official_results_fields:
    - physical_commonsense
    - physical_law_adherence
    - semantic_adherence
    - phygenbench_average
    required_artifacts:
    - PhyGenBench/prompts.json
    - single_question.json
    - multi_question.json
    - video_question.json
    - VQAScore outputs
    - GPT-4o or LLaVA-Interleave order-verification outputs
    - GPT-4o or InternVideo2 naturalness outputs
    official_metric_blocked_reason: judge_required
  prompt_suite:
    status: official_repo_data
    path_or_ref: PhyGenBench
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  runtime:
    kind: in_tree_official_source
    root: worldfoundry/evaluation/tasks/execution/runners/phygenbench/runtime/phygenbench
    repo_url: https://github.com/OpenGVLab/PhyGenBench.git
    revision: f8642cb796f3bcb01f0b7c1b2ec53b75d357c739
    root_env: WORLDFOUNDRY_PHYGENBENCH_ROOT
    root_env_required: false
  release_status: experimental
  open_source_status: experimental
  maturity: contract_ready
  official_benchmark_verified: false
  integration_evidence: true
  leaderboard_valid: false
  optional_base_model_dependencies:
  - grounded_depth_segmentation_stack
  requires:
  - In-tree PhyGenBench prompts and PhyGenEval aggregator, or optional WORLDFOUNDRY_PHYGENBENCH_ROOT override
  - WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  - Official generated artifacts and PhyGenEval stage judge outputs for full leaderboard parity
  - WORLDFOUNDRY_PHYGENBENCH_RESULTS_PATH
  - Official result JSON/JSONL/CSV exported by the upstream scorer or judge
  blockers:
  - Official repository/source metadata is verified, but the official benchmark runtime has not been executed in
    WorldFoundry.
  - Full validation requires generated videos or rollouts for the official prompt/task suite.
  - Leaderboard parity requires official judge/checkpoint/API assets and normalized upstream result files.
  - Official repository/source metadata and in-tree official-result normalizer are integrated.
  - Full leaderboard validation still requires generated videos and full upstream scorer/judge execution on the official
    prompt suite.
  data_refs:
    task_yaml: worldfoundry/data/benchmarks/tasks/external/phygenbench.yaml
    in_tree_runtime_paths:
    - worldfoundry/data/benchmarks/assets/phygenbench/PhyGenBench/prompts.json
    - worldfoundry/evaluation/tasks/execution/runners/phygenbench/runtime/phygenbench/PhyGenEval/overall.py
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:PhyGenBenchContract
    runner_script_available: true
    task_yaml_available: true
    runtime_verified: true
    surface: phygenbench_official_in_tree
    normalizer_verified: true
  official_result_entrypoint: worldfoundry-eval zoo benchmark-run
  local_evaluator:
    target: worldfoundry.evaluation.tasks.execution.runners.phygenbench.phygenbench_contract_evaluator:write_phygenbench_evaluation
    status: implemented
    protocol: local_artifact_checks_and_official_result_normalization
    official_result_normalization:
      status: implemented
      input_keys:
      - official_results_path
      - WORLDFOUNDRY_PHYGENBENCH_RESULTS_PATH
      formats:
      - json
      - jsonl
      - csv
      - yaml
      provenance: normalizes caller-provided official outputs without executing upstream repos
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - phygenbench
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  integration_status: integrated
  status: integrated
  run_command: PYTHONPATH=. "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}"
    worldfoundry/evaluation/tasks/execution/runners/phygenbench/run_phygenbench_official_runner.py --run-official
    --generated-artifact-dir "${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}" --output-dir
    "${WORLDFOUNDRY_BENCHMARK_OUTPUT_DIR}" --json
  checkpoint_refs: []
tasks:
  phygenbench_standard:
    benchmark_name: phygenbench
    protocol: external_official_benchmark
    capability_track: text_to_video
    input_keys:
    - prompt
    - prompt_id
    - generated_artifact_manifest
    output_keys:
    - generated_video
    metric_ids:
    - physical_commonsense
    - physical_law_adherence
    - semantic_adherence
    - phygenbench_average
    metric_groups:
    - phygenbench_metrics
    tags:
    - benchmark-zoo
    - external-official
    - phygenbench
    - text-to-video
    - physical-commonsense
    metadata:
      source_kind: benchmark_zoo
      benchmark_id: phygenbench
      official_benchmark_verified: false
      integration_evidence: true
      leaderboard_valid: false
    dataset:
      status: official_repo_or_generated_artifacts
    runtime_requirements:
      in_tree_runtime: worldfoundry/evaluation/tasks/execution/runners/phygenbench/runtime/phygenbench
      override_runtime_env: WORLDFOUNDRY_PHYGENBENCH_ROOT
      generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
      results_path_env: WORLDFOUNDRY_PHYGENBENCH_RESULTS_PATH
    artifact_contract:
      required:
        generated_video:
          kind: video
    evaluation_protocol:
    - name: in_tree_phygenbench_evaluator
      metric_ids:
      - physical_commonsense
      - physical_law_adherence
      - semantic_adherence
      - phygenbench_average
      evaluator_target: worldfoundry.evaluation.tasks.execution.runners.phygenbench.phygenbench_contract_evaluator:write_phygenbench_evaluation
      status: implemented
    - name: external_official_runner
      metric_ids:
      - physical_commonsense
      - physical_law_adherence
      - semantic_adherence
      - phygenbench_average
      runner_target: worldfoundry.evaluation.tasks.contracts.external:PhyGenBenchContract
      evaluator_target: worldfoundry.evaluation.tasks.execution.runners.phygenbench.phygenbench_contract_evaluator:write_phygenbench_evaluation
      runner_script: worldfoundry/evaluation/tasks/execution/runners/phygenbench/run_phygenbench_official_runner.py
      official_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id phygenbench --mode
        official-validation --official-results-path <official_results.json> --generated-artifact-dir <generated_videos>
        --output-dir <out> --json
