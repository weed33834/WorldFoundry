benchmark: videophy
description: VideoPhy external benchmark contract manifest.
id: videophy
name: VideoPhy
status: contract_ready
domain:
- physics
- physical-commonsense
- semantic-adherence
task_type: text_to_video_physical_commonsense_evaluation
input:
  modalities:
  - text
  keys:
  - prompt
  - prompt_id
  - generated_artifact_manifest
output:
  modalities:
  - video
  artifacts:
  - generated_video
evaluation_requirements:
  generated_artifacts:
  - generated_video
  metrics_source: official VideoPhy human labels and VideoCon-Physics evaluator assets
  requires_official_runtime_execution: false
  runtime_source_dependency: false
  notes:
  - Source repositories and paper pages are provenance only for this in-tree contract.
source_provenance:
  status: contract_ready
  official_repository:
    url: https://github.com/Hritikbansal/videophy
    revision: 01d366c979e4a82875852adbf427ccc036e7373a
    provenance_only: true
  paper:
    url: https://arxiv.org/abs/2406.03520
  project_page:
    url: https://videophy.github.io/
tags:
- benchmark-zoo
- external-official
- videophy
- text-to-video
- physical-commonsense
splits:
- standard
metrics:
  semantic_adherence:
    aggregation: mean
  physical_commonsense:
    aggregation: mean
  joint_score:
    aggregation: mean
  videophy_average:
    aggregation: mean
    primary: true
metadata:
  source_kind: benchmark_zoo
  benchmark_id: videophy
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id videophy --mode contract --output-dir
    tmp/benchmark_zoo/benchmark_contract/videophy --json
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:VideoPhyContract
  official_runner_script: worldfoundry/evaluation/tasks/execution/runners/videophy/run_videophy_official_runner.py
  metric_evaluator_target: worldfoundry.evaluation.tasks.execution.runners.videophy.videophy_contract_evaluator:write_videophy_evaluation
  metric_protocol:
    official_definition: VideoPhy reports the fraction of prompts with semantic adherence SA=1, physical commonsense
      PC=1, and joint performance SA=1 and PC=1 using human labels or VideoCon-Physics AutoEvaluator outputs.
    official_results_fields:
    - semantic_adherence
    - physical_commonsense
    - joint_score
    - videophy_average
    accepted_aliases:
      semantic_adherence:
      - sa
      - SA
      physical_commonsense:
      - pc
      - PC
      joint_score:
      - joint
    required_artifacts:
    - VideoPhy public test captions or generated videos for the official captions
    - human SA/PC labels or VideoCon-Physics checkpoint outputs
    official_metric_blocked_reason: judge_required
  prompt_suite:
    status: bundled_in_tree
    manifest: worldfoundry/data/benchmarks/assets/videophy/prompts.json
    canonical_prompt_count: 688
    bundled_prompt_count: 7
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  runtime:
    kind: in_tree_official_judge_runtime
    root: worldfoundry/evaluation/tasks/execution/runners/videophy
    root_env: WORLDFOUNDRY_VIDEOPHY_ROOT
    judge_model_id: videophysics/videocon_physics
    judge_backend_env: WORLDFOUNDRY_VIDEOPHY_JUDGE_BACKEND
    bundled_assets: worldfoundry/data/benchmarks/assets/videophy/
  release_status: experimental
  open_source_status: experimental
  maturity: contract_ready
  official_benchmark_verified: false
  integration_evidence: true
  leaderboard_valid: false
  optional_base_model_dependencies:
  - grounded_depth_segmentation_stack
  requires:
  - WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  blockers:
  - Official repository/source metadata is verified, but the official benchmark runtime has not been executed in
    WorldFoundry.
  - Full validation requires generated videos or rollouts for the official prompt/task suite.
  - Leaderboard parity requires official judge/checkpoint/API assets and normalized upstream result files.
  - Official repository/source metadata and in-tree official-result normalizer are integrated.
  - Full leaderboard validation still requires generated videos and full upstream scorer/judge execution on the official
    prompt suite.
  data_refs:
    task_yaml: worldfoundry/data/benchmarks/tasks/external/videophy.yaml
    bundled_asset_paths:
    - worldfoundry/data/benchmarks/assets/videophy/prompts.json
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:VideoPhyContract
    runner_script_available: true
    task_yaml_available: true
    runtime_verified: true
    surface: videophy_official_in_tree
    normalizer_verified: false
  official_result_entrypoint: worldfoundry-eval zoo benchmark-run
  local_evaluator:
    target: worldfoundry.evaluation.tasks.execution.runners.videophy.videophy_contract_evaluator:write_videophy_evaluation
    status: implemented
    protocol: local_artifact_checks_and_official_result_normalization
    official_result_normalization:
      status: implemented
      input_keys:
      - official_results_path
      - WORLDFOUNDRY_VIDEOPHY_RESULTS_PATH
      formats:
      - json
      - jsonl
      - csv
      - yaml
      provenance: normalizes caller-provided official outputs without executing upstream repos
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - videophy
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  integration_status: integrated
  status: integrated
  run_command: PYTHONPATH=. "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}"
    worldfoundry/evaluation/tasks/execution/runners/videophy/run_videophy_official_runner.py --run-official
    --generated-artifact-dir "${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}" --output-dir
    "${WORLDFOUNDRY_BENCHMARK_OUTPUT_DIR}" --json
  checkpoint_refs: []
tasks:
  videophy_standard:
    benchmark_name: videophy
    protocol: external_official_benchmark
    capability_track: text_to_video
    input_keys:
    - prompt
    - prompt_id
    - generated_artifact_manifest
    output_keys:
    - generated_video
    metric_ids:
    - semantic_adherence
    - physical_commonsense
    - joint_score
    - videophy_average
    metric_groups:
    - videophy_metrics
    tags:
    - benchmark-zoo
    - external-official
    - videophy
    - text-to-video
    - physical-commonsense
    metadata:
      source_kind: benchmark_zoo
      benchmark_id: videophy
      official_benchmark_verified: false
      integration_evidence: true
      leaderboard_valid: false
    dataset:
      status: bundled_prompt_manifest_or_generated_artifacts
    runtime_requirements:
      bundled_assets: worldfoundry/data/benchmarks/assets/videophy/
      generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
      results_path_env: WORLDFOUNDRY_VIDEOPHY_RESULTS_PATH
    artifact_contract:
      required:
        generated_video:
          kind: video
    evaluation_protocol:
    - name: in_tree_videophy_evaluator
      metric_ids:
      - semantic_adherence
      - physical_commonsense
      - joint_score
      - videophy_average
      evaluator_target: worldfoundry.evaluation.tasks.execution.runners.videophy.videophy_contract_evaluator:write_videophy_evaluation
      status: implemented
    - name: external_official_runner
      metric_ids:
      - semantic_adherence
      - physical_commonsense
      - joint_score
      - videophy_average
      runner_target: worldfoundry.evaluation.tasks.contracts.external:VideoPhyContract
      evaluator_target: worldfoundry.evaluation.tasks.execution.runners.videophy.videophy_contract_evaluator:write_videophy_evaluation
      runner_script: worldfoundry/evaluation/tasks/execution/runners/videophy/run_videophy_official_runner.py
      official_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id videophy --mode
        official-validation --official-results-path <official_results.json> --generated-artifact-dir <generated_videos>
        --output-dir <out> --json
