benchmark: worldmodelbench
description: WorldModelBench external benchmark task manifest for generated videos and judge-model scoring.
tags:
- benchmark-zoo
- external-official
- world-model
- video-generation
splits:
- standard
metrics:
  instruction_following:
    aggregation: mean
  common_sense:
    aggregation: mean
  physical_adherence:
    aggregation: mean
  world_model_average:
    aggregation: mean
    primary: true
metadata:
  source_kind: benchmark_zoo
  benchmark_id: worldmodelbench
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id worldmodelbench --mode contract
    --output-dir tmp/benchmark_zoo/benchmark_contract/worldmodelbench --json
  open_source_status: in_tree_runtime
  official_benchmark_verified: false
  integration_evidence: true
  leaderboard_valid: false
  status: integrated
  full_test_harness_ready: true
  full_suite_testable: true
  full_suite_execution_recorded: false
  base_model_dependencies:
  - worldmodelbench_dataset_assets
  - worldmodelbench_vila_judge_model
  optional_base_model_dependencies:
  - video_world_perception_stack
  requires:
  - --benchmark-data-root <worldmodelbench_data_root> or WORLDFOUNDRY_WORLDMODELBENCH_DATA_ROOT
  - WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  - WORLDFOUNDRY_WORLDMODELBENCH_JUDGE=<VILA_checkpoint_or_HF_model_id>
  - In-tree WorldFoundry VILA runtime importable
  - In-tree WorldModelBench runtime/evaluation.py, or optional WORLDFOUNDRY_WORLDMODELBENCH_ROOT override
  - Public generated videos matching the 350-instance manifest
  blockers:
  - The WorldFoundry wrapper can execute the official judge path when a user supplies a VILA checkpoint or HF model id
    and generated videos.
  - Full leaderboard parity requires recording the completed judge checkpoint execution, generated videos covering the
    350-instance manifest, and upstream submission evidence.
  - Leaderboard answers are withheld, so local regression must use public outputs or caller-provided official-shaped
    result files.
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:WorldModelBenchContract
  official_runner_script:
    worldfoundry/evaluation/tasks/execution/runners/worldmodelbench/run_worldmodelbench_official_runner.py
  prompt_suite:
    hf_dataset_id: Efficient-Large-Model/worldmodelbench
    split: test
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  runtime:
    kind: in_tree_official_source
    repo_url: https://github.com/WorldModelBench-Team/WorldModelBench
    repo_revision: 00b7aa17a05f9fd1ab5c8f66bcf476d04c9c33bf
    root: worldfoundry/evaluation/tasks/execution/runners/worldmodelbench/runtime
    root_env: WORLDFOUNDRY_WORLDMODELBENCH_ROOT
    results_path_env: WORLDFOUNDRY_WORLDMODELBENCH_RESULTS_PATH
  release_status: experimental
  maturity: contract_ready
  data_refs:
    local_dataset_paths:
    - cache/worldfoundry/data/hfd_datasets/Efficient-Large-Model/worldmodelbench
    - cache/worldfoundry/data/hfd_datasets/Efficient-Large-Model__worldmodelbench
    - cache/worldfoundry/data/hfd_datasets/datasets--Efficient-Large-Model--worldmodelbench
    - cache/worldfoundry/data/hfd_datasets/worldmodelbench
    in_tree_runtime_paths:
    - worldfoundry/evaluation/tasks/execution/runners/worldmodelbench/runtime/evaluation.py
    - worldfoundry/data/benchmarks/assets/worldmodelbench/worldmodelbench.json
    task_yaml: worldfoundry/data/benchmarks/tasks/external/worldmodelbench.yaml
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:WorldModelBenchContract
    runner_script_available: true
    task_yaml_available: true
    runtime_verified: true
    surface: worldmodelbench_official_in_tree
    normalizer_verified: true
  official_result_entrypoint: worldfoundry-eval zoo benchmark-run
  local_evaluator:
    target: worldfoundry/evaluation/tasks/execution/runners/worldmodelbench/run_worldmodelbench_official_runner.py
    status: implemented
    protocol: worldmodelbench_official_in_tree
    official_result_normalization:
      status: implemented
      input_keys:
      - official_results_path
      - WORLDFOUNDRY_WORLDMODELBENCH_RESULTS_PATH
      formats:
      - json
      provenance: normalizes caller-provided official outputs without executing upstream repos
      framework_verified: true
      full_test_harness_ready: true
    official_runtime_execution:
      status: implemented
      command: worldfoundry-eval zoo benchmark-run --benchmark-id worldmodelbench --mode official-run
        --benchmark-data-root <worldmodelbench_data_root> --generated-artifact-dir <generated_videos> --env
        WORLDFOUNDRY_WORLDMODELBENCH_JUDGE=<VILA_checkpoint_or_HF_model_id> --output-dir <out> --json
      checkpoint_env: WORLDFOUNDRY_WORLDMODELBENCH_JUDGE
      pythonpath_note: Uses WorldFoundry's in-tree VILA runtime; no external VILA checkout is required.
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - worldmodelbench
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --benchmark-data-root
  - <worldmodelbench_data_root>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  integration_status: integrated
  checkpoint_refs: []
tasks:
  worldmodelbench_video_standard:
    benchmark_name: worldmodelbench
    protocol: external_official_benchmark
    capability_track: world_model_video
    input_keys:
    - prompt
    - prompt_id
    - domain
    - subdomain
    output_keys:
    - generated_video
    metric_ids:
    - instruction_following
    - common_sense
    - physical_adherence
    - world_model_average
    metric_groups:
    - worldmodelbench_judge
    tags:
    - benchmark-zoo
    - worldmodelbench
    - judge-model
    metadata:
      source_kind: benchmark_zoo
      benchmark_id: worldmodelbench
      open_source_status: experimental
      official_benchmark_verified: false
      integration_evidence: true
      leaderboard_valid: false
    dataset:
      hf_dataset_id: Efficient-Large-Model/worldmodelbench
      split: test
    runtime_requirements:
      generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
      judge_model: required
    artifact_contract:
      required:
        generated_video:
          kind: video
    evaluation_protocol:
    - name: external_official_runner
      runner_target: worldfoundry.evaluation.tasks.contracts.external:WorldModelBenchContract
      runner_script:
        worldfoundry/evaluation/tasks/execution/runners/worldmodelbench/run_worldmodelbench_official_runner.py
      required_judge: true
      metric_ids:
      - instruction_following
      - common_sense
      - physical_adherence
      - world_model_average
