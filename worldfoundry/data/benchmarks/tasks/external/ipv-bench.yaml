benchmark: ipv-bench
name: IPV-Bench
description: Contract-only task manifest for impossible-video generation and understanding evaluation.
tags:
- benchmark-zoo
- external-official
- ipv-bench
- text-to-video
- counterfactual-video
- world-understanding
splits:
- standard
metrics:
  visual_quality:
    aggregation: mean
    evaluator:
      target: worldfoundry.evaluation.tasks.execution.runners.ipv_bench.ipv_bench_video_quality_contract:evaluate_ipv_bench_video_quality_contract_file
      status: blocked
      blocked_reason: judge_required
  prompt_following:
    aggregation: mean
    evaluator:
      target: worldfoundry.evaluation.tasks.execution.runners.ipv_bench.ipv_bench_video_quality_contract:evaluate_ipv_bench_video_quality_contract_file
      status: blocked
      blocked_reason: judge_required
  impossible_video_score:
    aggregation: mean
    evaluator:
      target: worldfoundry.evaluation.tasks.execution.runners.ipv_bench.ipv_bench_video_quality_contract:evaluate_ipv_bench_video_quality_contract_file
      status: blocked
      blocked_reason: judge_required
  judgement_accuracy:
    aggregation: mean
    evaluator:
      target: worldfoundry.evaluation.tasks.execution.runners.ipv_bench.ipv_bench_video_quality_contract:evaluate_ipv_bench_video_quality_contract_file
      status: blocked
      blocked_reason: judge_required
  mcqa_accuracy:
    aggregation: mean
    evaluator:
      target: worldfoundry.evaluation.tasks.execution.runners.ipv_bench.ipv_bench_video_quality_contract:evaluate_ipv_bench_video_quality_contract_file
      status: blocked
      blocked_reason: judge_required
  open_qa_score:
    aggregation: mean
    evaluator:
      target: worldfoundry.evaluation.tasks.execution.runners.ipv_bench.ipv_bench_video_quality_contract:evaluate_ipv_bench_video_quality_contract_file
      status: blocked
      blocked_reason: judge_required
  ipv_bench_average:
    aggregation: mean
    primary: true
    evaluator:
      target: worldfoundry.evaluation.tasks.execution.runners.ipv_bench.ipv_bench_video_quality_contract:evaluate_ipv_bench_video_quality_contract_file
      status: blocked
      blocked_reason: judge_required
metadata:
  source_kind: benchmark_zoo
  benchmark_id: ipv-bench
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id ipv-bench --mode contract --output-dir
    tmp/benchmark_zoo/benchmark_contract/ipv-bench --json
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:IPVBenchContract
  official_runner_script: worldfoundry/evaluation/tasks/execution/runners/ipv_bench/run_ipv_bench_official_runner.py
  name: IPV-Bench
  domain:
  - impossible-videos
  - counterfactual-physics
  - world-knowledge
  task_type: text_to_video_counterfactual_evaluation
  status: planned
  maturity: verified_runner
  release_status: experimental
  open_source_status: in_tree_runtime
  official_benchmark_verified: false
  integration_evidence: true
  leaderboard_valid: false
  optional_base_model_dependencies:
  - video_world_perception_stack
  source_provenance:
    official_repo:
      url: https://github.com/showlab/Impossible-Videos
      verified_by: git ls-remote https://github.com/showlab/Impossible-Videos HEAD
      head_sha: b959c423093d6e46a7e7008e205b9a16104e3f70
      role: provenance_only_not_runtime_dependency
    paper:
      url: https://arxiv.org/abs/2503.14378
    project_page:
      url: https://huggingface.co/papers/2503.14378
  input_contract:
  - prompt
  - prompt_id
  - generated_artifact_manifest
  output_contract:
  - generated_video
  evaluation_requirements:
  - Use the official impossible-video prompt suite and judging protocol.
  - Score generated videos for visual quality, prompt following, and impossible-video criteria.
  - Preserve the benchmark's understanding-style QA metrics when evaluating provided video artifacts.
  requires:
  - WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  - visual_quality annotation
  - prompt_following annotation
  - judgement/mcqa/open_qa labels or official judge scores
  - prediction or model_answer for understanding tasks
  blockers:
  - Official source provenance and in-tree official-result normalizer are integrated.
  - Full leaderboard validation still requires official annotations, judge outputs, or understanding predictions plus 
    generated videos.
  data_refs:
    task_yaml: worldfoundry/data/benchmarks/tasks/external/ipv-bench.yaml
    in_tree_runtime_paths:
    - worldfoundry/evaluation/tasks/execution/runners/ipv_bench
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:IPVBenchContract
    runner_script_available: true
    task_yaml_available: true
    runtime_verified: false
    surface: ipv_bench_official_in_tree
    normalizer_verified: true
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  runtime:
    kind: in_tree_official_runner
    root: worldfoundry/evaluation/tasks/execution/runners/ipv_bench
    root_env: WORLDFOUNDRY_IPV_BENCH_ROOT
    results_path_env: WORLDFOUNDRY_IPV_BENCH_RESULTS_PATH
    runtime_backend_env: WORLDFOUNDRY_IPV_BENCH_RUNTIME_BACKEND
  local_evaluator:
    target: worldfoundry.evaluation.tasks.execution.runners.ipv_bench.ipv_bench_video_quality_contract:evaluate_ipv_bench_video_quality_contract_file
    status: implemented
    protocol: local_manifest_metadata_and_official_result_normalization
    output_fields:
    - metric_id
    - score
    - value
    - status
    - evidence
    - blocked_reason
    local_metric_ids:
    - local_metadata_coverage
    - local_prompt_video_pair_completeness
    official_metric_blocked_reason: judge_required
    official_result_normalization:
      status: implemented
      input_keys:
      - official_results_path
      - official_results
      - WORLDFOUNDRY_IPV_BENCH_RESULTS_PATH
      formats:
      - json
      - jsonl
      - csv
      - tsv
      provenance: normalizes caller-provided official outputs without executing upstream repos
  official_result_entrypoint: worldfoundry-eval zoo benchmark-run
  runner:
    validation_command:
    - worldfoundry-eval
    - zoo
    - benchmark-run
    - --benchmark-id
    - ipv-bench
    - --mode
    - official-validation
    - --official-results-path
    - <official_results.csv>
    - --generated-artifact-dir
    - <generated_videos>
    - --output-dir
    - <out>
    - --json
    runtime:
      results_path_env: WORLDFOUNDRY_IPV_BENCH_RESULTS_PATH
    official_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id ipv-bench --mode official-validation
      --official-results-path <official_results.csv> --generated-artifact-dir <generated_videos> --output-dir <out> 
      --json
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - ipv-bench
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.csv>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  integration_status: integrated
  checkpoint_refs: []
tasks:
  ipv_bench_standard:
    benchmark_name: ipv-bench
    protocol: external_official_benchmark
    capability_track: text_to_video
    schema_type: generated_artifact_set
    input_keys:
    - prompt
    - prompt_id
    - generated_artifact_manifest
    output_keys:
    - generated_video
    metric_ids:
    - visual_quality
    - prompt_following
    - impossible_video_score
    - judgement_accuracy
    - mcqa_accuracy
    - open_qa_score
    - ipv_bench_average
    metric_groups:
    - ipv_bench_metrics
    tags:
    - benchmark-zoo
    - external-official
    - ipv-bench
    - text-to-video
    - counterfactual-video
    metadata:
      source_kind: benchmark_zoo
      benchmark_id: ipv-bench
      domain:
      - impossible-videos
      - counterfactual-physics
      task_type: text_to_video_counterfactual_evaluation
      status: contract_ready
      artifact_contract:
        required:
          generated_video:
            kind: video
      evaluation_requirements:
      - Apply official IPV-Bench generation and understanding metrics to generated videos.
      official_benchmark_verified: false
      integration_evidence: true
      leaderboard_valid: false
    dataset:
      status: official_prompt_suite_required
      source: provenance_only
    artifact_contract:
      required:
        generated_video:
          kind: video
    evaluation_protocol:
    - name: in_tree_local_quality_evaluator
      metric_ids:
      - local_metadata_coverage
      - local_prompt_video_pair_completeness
      evaluator_target: worldfoundry.evaluation.tasks.execution.runners.ipv_bench.ipv_bench_video_quality_contract:evaluate_ipv_bench_video_quality_contract_file
      status: implemented
    - name: external_official_runner
      runner_target: worldfoundry.evaluation.tasks.contracts.external:IPVBenchContract
      runner_script: worldfoundry/evaluation/tasks/execution/runners/ipv_bench/run_ipv_bench_official_runner.py
      metric_ids:
      - visual_quality
      - prompt_following
      - impossible_video_score
      - judgement_accuracy
      - mcqa_accuracy
      - open_qa_score
      - ipv_bench_average
      required_inputs:
      - visual_quality annotation
      - prompt_following annotation
      - judgement/mcqa/open_qa labels or official judge scores
      - prediction or model_answer for understanding tasks
      official_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id ipv-bench --mode 
        official-validation --official-results-path <official_results.csv> --generated-artifact-dir <generated_videos> 
        --output-dir <out> --json
      official_result_entrypoint: worldfoundry-eval zoo benchmark-run
    runtime_requirements:
      results_path_env: WORLDFOUNDRY_IPV_BENCH_RESULTS_PATH
