benchmark: video-bench
description: Video-Bench external benchmark task manifest for generated video quality and text-alignment judging.
tags:
- benchmark-zoo
- external-official
- video-generation
- video-bench
splits:
- standard
metrics:
  imaging_quality:
    aggregation: mean
  aesthetic_quality:
    aggregation: mean
  temporal_consistency:
    aggregation: mean
  motion_effects:
    aggregation: mean
  video_text_consistency:
    aggregation: mean
  object_class_consistency:
    aggregation: mean
  color_consistency:
    aggregation: mean
  action_consistency:
    aggregation: mean
  scene_consistency:
    aggregation: mean
  videobench_average:
    aggregation: mean
    primary: true
metadata:
  source_kind: benchmark_zoo
  benchmark_id: video-bench
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id video-bench --mode contract 
    --output-dir tmp/benchmark_zoo/benchmark_contract/video-bench --json
  open_source_status: gated
  official_benchmark_verified: false
  integration_evidence: true
  leaderboard_valid: false
  base_model_dependencies:
  - video_bench_dataset_assets
  optional_base_model_dependencies:
  - grounded_video_quality_stack
  alpha_readiness:
    status: credential_gated_integrated
    reason: user_provided_api_required
    scope: official GPT-4o/GPT-4o-mini judge execution
    alpha_exclusion: false
    non_api_surface: contract_and_normalizer
  requires:
  - In-tree Video-Bench runtime under worldfoundry/evaluation/tasks/execution/runners/videobench/runtime
  - Video-Bench/Video-Bench_human_annotation downloaded through Hugging Face cache or WORLDFOUNDRY_VIDEOBENCH_ANNOTATION_ROOT
  - WORLDFOUNDRY_VIDEOBENCH_GENERATED_VIDEO_DIR or WORLDFOUNDRY_VIDEOBENCH_MODEL_OUTPUT_DIR
  - WORLDFOUNDRY_VIDEOBENCH_GPT4O_API_KEY or OPENAI_API_KEY
  - Access to the gated Video-Bench/Video-Bench_videos dataset if official videos are needed
  runtime_requirements:
  - Official GPT judge execution requires 
    WORLDFOUNDRY_VIDEOBENCH_GPT4O_API_KEY/WORLDFOUNDRY_VIDEOBENCH_GPT4O_MINI_API_KEY or OPENAI_API_KEY supplied by the 
    user.
  - Leaderboard-grade runs require generated videos for the requested official prompt/dimension set.
  blockers:
  - Full leaderboard parity requires the complete official assets, generated artifacts, and verified scorecard evidence.
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:VideoBenchContract
  official_runner_script: worldfoundry/evaluation/tasks/execution/runners/videobench/run_videobench_official_runner.py
  prompt_suite:
    mode: videobench_standard
    annotation_root_env: WORLDFOUNDRY_VIDEOBENCH_ANNOTATION_ROOT
    hf_dataset_id: Video-Bench/Video-Bench_human_annotation
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  runtime:
    kind: in_tree_official_source
    repo_url: https://github.com/Video-Bench/Video-Bench.git
    revision: d40b917c4238011aea27d24f85b1e3bf996715bd
    root: worldfoundry/evaluation/tasks/execution/runners/videobench/runtime
    root_env: WORLDFOUNDRY_VIDEOBENCH_ROOT
    optional_root_env: WORLDFOUNDRY_VIDEOBENCH_ROOT
    official_videos_root_env: WORLDFOUNDRY_VIDEOBENCH_OFFICIAL_VIDEOS_ROOT
    validation_command:
    - worldfoundry-eval
    - zoo
    - benchmark-run
    - --benchmark-id
    - video-bench
    - --mode
    - official-validation
    - --official-results-path
    - <official_results.json>
    - --generated-artifact-dir
    - <generated_videos>
    - --output-dir
    - <out>
    - --json
    results_path_env: WORLDFOUNDRY_VIDEOBENCH_RESULTS_PATH
  release_status: gated
  maturity: contract_ready
  data_refs:
    local_dataset_paths:
    - cache/worldfoundry/data/hfd_datasets/Video-Bench/Video-Bench_human_annotation
    - cache/worldfoundry/data/hfd_datasets/Video-Bench__Video-Bench_human_annotation
    - cache/worldfoundry/data/hfd_datasets/Video-Bench/Video-Bench_videos
    - cache/worldfoundry/data/hfd_datasets/Video-Bench__Video-Bench_videos
    in_tree_runtime_paths:
    - worldfoundry/evaluation/tasks/execution/runners/videobench/runtime
    task_yaml: worldfoundry/data/benchmarks/tasks/external/video-bench.yaml
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:VideoBenchContract
    runner_script_available: true
    task_yaml_available: true
    runtime_verified: true
    credential_gated: true
    surface: videobench_official_in_tree
    normalizer_available: true
    normalizer_verified: true
  official_result_entrypoint: worldfoundry-eval zoo benchmark-run
  local_evaluator:
    target: worldfoundry/evaluation/tasks/execution/runners/videobench/run_videobench_official_runner.py
    status: implemented
    protocol: videobench_official_in_tree
    official_result_normalization:
      status: implemented
      input_keys:
      - official_results_path
      - WORLDFOUNDRY_VIDEOBENCH_RESULTS_PATH
      formats:
      - json
      - directory
      provenance: normalizes caller-provided official outputs without executing upstream repos
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - video-bench
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  integration_status: integrated
  status: integrated
  checkpoint_refs: []
tasks:
  videobench_video_standard:
    benchmark_name: video-bench
    protocol: external_official_benchmark
    capability_track: video_generation_quality
    input_keys:
    - prompt
    - prompt_id
    output_keys:
    - generated_video
    metric_ids:
    - imaging_quality
    - aesthetic_quality
    - temporal_consistency
    - motion_effects
    - video_text_consistency
    - object_class_consistency
    - color_consistency
    - action_consistency
    - scene_consistency
    - videobench_average
    metric_groups:
    - videobench_dimensions
    tags:
    - benchmark-zoo
    - video-bench
    - mllm-judge
    metadata:
      source_kind: benchmark_zoo
      benchmark_id: video-bench
      open_source_status: gated
      official_benchmark_verified: false
      integration_evidence: true
      leaderboard_valid: false
      alpha_readiness:
        status: credential_gated_integrated
        reason: user_provided_api_required
        alpha_exclusion: false
    dataset:
      hf_dataset_id: Video-Bench/Video-Bench_human_annotation
      video_hf_dataset_id: Video-Bench/Video-Bench_videos
      split: standard
    runtime_requirements:
      in_tree_runtime: worldfoundry/evaluation/tasks/execution/runners/videobench/runtime
      optional_root_env: WORLDFOUNDRY_VIDEOBENCH_ROOT
      generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
      generated_video_dir_env: WORLDFOUNDRY_VIDEOBENCH_GENERATED_VIDEO_DIR
      annotation_root_env: WORLDFOUNDRY_VIDEOBENCH_ANNOTATION_ROOT
      official_videos_root_env: WORLDFOUNDRY_VIDEOBENCH_OFFICIAL_VIDEOS_ROOT
      results_path_env: WORLDFOUNDRY_VIDEOBENCH_RESULTS_PATH
      judge_api: required
      judge_api_env:
      - WORLDFOUNDRY_VIDEOBENCH_GPT4O_API_KEY or OPENAI_API_KEY
      - WORLDFOUNDRY_VIDEOBENCH_GPT4O_MINI_API_KEY or OPENAI_API_KEY
      credential_gated_without_api_key: true
      can_evaluate_with_user_api_key: true
    artifact_contract:
      required:
        generated_video:
          kind: video
    evaluation_protocol:
    - name: external_official_runner
      metric_ids:
      - imaging_quality
      - aesthetic_quality
      - temporal_consistency
      - motion_effects
      - video_text_consistency
      - object_class_consistency
      - color_consistency
      - action_consistency
      - scene_consistency
      - videobench_average
      runner_target: worldfoundry.evaluation.tasks.contracts.external:VideoBenchContract
      runner_script: worldfoundry/evaluation/tasks/execution/runners/videobench/run_videobench_official_runner.py
      cli_examples:
        normalize_existing_official_results: ${WORLDFOUNDRY_UNIFIED_PYTHON} 
          worldfoundry/evaluation/tasks/execution/runners/videobench/run_videobench_official_runner.py 
          --official-results-path /path/to/evaluation_results --output-dir tmp/videobench_normalized --json
        run_generated_videos: WORLDFOUNDRY_VIDEOBENCH_ROOT=/path/to/Video-Bench 
          WORLDFOUNDRY_VIDEOBENCH_ANNOTATION_ROOT=/path/to/Video-Bench_human_annotation ${WORLDFOUNDRY_UNIFIED_PYTHON} 
          worldfoundry/evaluation/tasks/execution/runners/videobench/run_videobench_official_runner.py 
          --generated-video-dir /path/to/generated_video_tree --output-dir tmp/videobench_run --json
