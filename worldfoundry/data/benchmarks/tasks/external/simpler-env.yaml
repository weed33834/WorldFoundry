benchmark: simpler-env
description: SimplerEnv external benchmark task manifest for simulator-backed VLA policy rollouts.
tags:
- benchmark-zoo
- external-official
- simpler-env
- vla
- embodied-action
- robot-manipulation
- simulator
splits:
- google_robot
- widowx_bridge
metrics:
  success_rate:
    aggregation: mean
    primary: true
  task_success:
    aggregation: mean
  episode_success:
    aggregation: mean
  reward:
    aggregation: mean
metadata:
  source_kind: benchmark_zoo
  benchmark_id: simpler-env
  status: integrated
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id simpler-env --mode contract 
    --output-dir tmp/benchmark_zoo/benchmark_contract/simpler-env --json
  release_status: normalizer_only
  maturity: contract_ready
  open_source_status: normalizer_only
  official_benchmark_verified: false
  integration_evidence: true
  leaderboard_valid: false
  full_test_harness_ready: true
  full_suite_testable: true
  full_suite_execution_recorded: false
  optional_base_model_dependencies:
  - spatial_perception_core_stack
  requires:
  - Official SimplerEnv repository checkout
  - ManiSkill2/SAPIEN simulator stack
  - Selected robot embodiment assets
  - Benchmark-specific policy checkpoint
  blockers:
  - Official SimplerEnv simulator rollouts, policy wrappers, and result import mapping must be validated before 
    integrated status.
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:SimplerEnvContract
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:SimplerEnvContract
    runner_script_available: false
    task_yaml_available: true
    runtime_verified: false
    normalizer_verified: true
    surface: official_result_normalizer
  prompt_suite:
    status: preflight_only
    split: google_robot,widowx_bridge
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_SIMPLERENV_RESULTS_PATH
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  runtime:
    kind: external_official_results_runner
    root_env: WORLDFOUNDRY_SIMPLERENV_ROOT
    results_path_env: WORLDFOUNDRY_SIMPLERENV_RESULTS_PATH
    preflight_profile: simpler-env
    validation_command:
    - worldfoundry-eval
    - zoo
    - benchmark-run
    - --benchmark-id
    - simpler-env
    - --mode
    - official-validation
    - --official-results-path
    - <official_results.json>
    - --output-dir
    - <out>
    - --json
  official_result_entrypoint: worldfoundry-eval zoo benchmark-run
  local_evaluator:
    target: worldfoundry.evaluation.tasks.embodied.normalizer:normalize_results
    status: implemented
    protocol: official_embodied_result_normalizer
    official_result_normalization:
      status: implemented
      input_keys:
      - official_results_path
      - WORLDFOUNDRY_SIMPLERENV_RESULTS_PATH
      formats:
      - json
      - jsonl
      - csv
      provenance: normalizes caller-provided official embodied rollout outputs without executing simulators
  data_refs:
    local_repo_paths:
    - cache/vla_va_wam/repos/simpler-env--SimplerEnv
    task_yaml: worldfoundry/data/benchmarks/tasks/external/simpler-env.yaml
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - simpler-env
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --output-dir
  - <out>
  - --json
  integration_status: integrated
  checkpoint_refs: []
tasks:
  simpler_env_policy_rollouts:
    benchmark_name: simpler-env
    protocol: external_official_benchmark
    capability_track: vla,robot-manipulation,simulator
    input_keys:
    - language_instruction
    - observation_image
    - robot_state
    - episode_manifest
    output_keys:
    - scorecard
    - raw_results
    - per_sample_metrics
    - rollout_logs
    - videos
    metric_ids:
    - success_rate
    - task_success
    - episode_success
    - reward
    metric_groups:
    - simpler-env_metrics
    - embodied_action
    tags:
    - benchmark-zoo
    - external-official
    - simpler-env
    - vla
    - embodied-action
    - robot-manipulation
    - simulator
    metadata:
      source_kind: benchmark_zoo
      benchmark_id: simpler-env
      leaderboard_valid: false
      official_benchmark_verified: false
      integration_evidence: true
    dataset:
      status: simulator_generated
      split: google_robot,widowx_bridge
    runtime_requirements:
      upstream_repo_env: WORLDFOUNDRY_SIMPLERENV_ROOT
      results_path_env: WORLDFOUNDRY_SIMPLERENV_RESULTS_PATH
      simulator_assets: required_for_official_runtime
      policy_checkpoints: required_for_official_runtime
    artifact_contract:
      required:
        rollout_result:
          kind: embodied_policy_result
          accepted_formats:
          - json
          - jsonl
          - csv
    evaluation_protocol:
    - name: external_official_runner
      metric_ids:
      - success_rate
      - task_success
      - episode_success
      - reward
      runner_target: worldfoundry.evaluation.tasks.contracts.external:SimplerEnvContract
