benchmark: phyeduvideo
name: PhyEduVideo
description: Contract-only task manifest for physics education text-to-video evaluation.
tags:
- benchmark-zoo
- external-official
- phyeduvideo
- text-to-video
- physics-education
- explanatory-video
splits:
- standard
metrics:
  semantic_adherence:
    aggregation: mean
  physics_commonsense:
    aggregation: mean
  motion_smoothness:
    aggregation: mean
  temporal_flickering:
    aggregation: mean
  phyeduvideo_average:
    aggregation: mean
    primary: true
metadata:
  source_kind: benchmark_zoo
  benchmark_id: phyeduvideo
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id phyeduvideo --mode contract 
    --output-dir tmp/benchmark_zoo/benchmark_contract/phyeduvideo --json
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:PhyEduVideoContract
  official_runner_command: worldfoundry-eval zoo benchmark-run
  name: PhyEduVideo
  domain:
  - physics
  - education
  - explanation
  - scientific-visualization
  task_type: text_to_video_physics_education_evaluation
  status: integrated
  maturity: contract_ready
  release_status: experimental
  open_source_status: in_tree_runtime
  official_benchmark_verified: false
  integration_evidence: true
  leaderboard_valid: false
  optional_base_model_dependencies:
  - grounded_depth_segmentation_stack
  source_provenance:
    official_repo:
      url: https://github.com/meghamariamkm/PhyEduVideo
      verified_by: git ls-remote https://github.com/meghamariamkm/PhyEduVideo HEAD
      head_sha: 5a36a13818552095c9ed12c6562f236d5b5011bd
      role: provenance_only_not_runtime_dependency
    paper:
      url: https://arxiv.org/abs/2601.00943
    project_page:
      url: https://github.com/meghamariamkm/PhyEduVideo
  input_contract:
  - prompt
  - prompt_id
  - generated_artifact_manifest
  output_contract:
  - generated_video
  evaluation_requirements:
  - Use the PhyEduVideo physics teaching-point prompt suite.
  - Score Semantic Adherence, Physics Commonsense, Motion Smoothness, and Temporal Flickering.
  requires:
  - WORLDFOUNDRY_PHYEDUVIDEO_ROOT or Prompts/Prompts.json
  - WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  - official_results_path or WORLDFOUNDRY_PHYEDUVIDEO_RESULTS_PATH for normalization-only runs
  blockers:
  - Leaderboard parity requires generated videos for all 205 teaching points, upstream InternVL/CLIP/VQA judge assets, 
    and full upstream scorer execution for full official run.
  data_refs:
    task_yaml: worldfoundry/data/benchmarks/tasks/external/phyeduvideo.yaml
    bundled_assets: worldfoundry/data/benchmarks/assets/phyeduvideo
    in_tree_runtime_paths:
    - worldfoundry/evaluation/tasks/execution/runners/phyeduvideo
  official_runner_script: worldfoundry/evaluation/tasks/execution/runners/phyeduvideo/run_phyeduvideo_official_runner.py
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:PhyEduVideoContract
    runner_script_available: true
    task_yaml_available: true
    runtime_verified: true
    surface: phyeduvideo_official_in_tree
    normalizer_verified: false
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  runtime:
    kind: in_tree_official_runtime
    root: worldfoundry/evaluation/tasks/execution/runners/phyeduvideo
    root_env: WORLDFOUNDRY_PHYEDUVIDEO_ROOT
    repo_url: https://github.com/meghamariamkm/PhyEduVideo.git
    revision: 5a36a13818552095c9ed12c6562f236d5b5011bd
    results_path_env: WORLDFOUNDRY_PHYEDUVIDEO_RESULTS_PATH
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  metric_protocol:
    metric_ids:
    - semantic_adherence
    - physics_commonsense
    - motion_smoothness
    - temporal_flickering
    - phyeduvideo_average
    primary_metric: phyeduvideo_average
    local_deterministic_modes:
    - rubric_manifest
    - mcq_or_qa_accuracy
    - artifact_presence_format
  local_evaluator:
    target: worldfoundry/evaluation/tasks/execution/runners/phyeduvideo/run_phyeduvideo_official_runner.py
    status: implemented
    protocol: official_result_normalization
    official_result_normalization:
      status: implemented
      input_keys:
      - official_results_path
      - official_results
      - WORLDFOUNDRY_PHYEDUVIDEO_RESULTS_PATH
      formats:
      - json
      - jsonl
      - csv
      provenance: normalizes caller-provided official outputs without executing upstream repos
  official_result_entrypoint: worldfoundry-eval zoo benchmark-run
  runner:
    validation_command:
    - worldfoundry-eval
    - zoo
    - benchmark-run
    - --benchmark-id
    - phyeduvideo
    - --mode
    - official-validation
    - --official-results-path
    - <official_results.json>
    - --generated-artifact-dir
    - <generated_videos>
    - --output-dir
    - <out>
    - --json
    runtime:
      results_path_env: WORLDFOUNDRY_PHYEDUVIDEO_RESULTS_PATH
    official_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id phyeduvideo --mode 
      official-validation --official-results-path <official_results.json> --generated-artifact-dir <generated_videos> 
      --output-dir <out> --json
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - phyeduvideo
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  integration_status: integrated
  checkpoint_refs: []
tasks:
  phyeduvideo_standard:
    benchmark_name: phyeduvideo
    protocol: external_official_benchmark
    capability_track: text_to_video
    schema_type: generated_artifact_set
    input_keys:
    - prompt
    - prompt_id
    - generated_artifact_manifest
    output_keys:
    - generated_video
    metric_ids:
    - semantic_adherence
    - physics_commonsense
    - motion_smoothness
    - temporal_flickering
    - phyeduvideo_average
    metric_groups:
    - phyeduvideo_metrics
    tags:
    - benchmark-zoo
    - external-official
    - phyeduvideo
    - text-to-video
    - physics-education
    metadata:
      source_kind: benchmark_zoo
      benchmark_id: phyeduvideo
      domain:
      - physics
      - education
      task_type: text_to_video_physics_education_evaluation
      status: contract_ready
      artifact_contract:
        required:
          generated_video:
            kind: video
      evaluation_requirements:
      - Use the PhyEduVideo physics teaching-point prompt suite.
      - Score Semantic Adherence, Physics Commonsense, Motion Smoothness, and Temporal Flickering.
      metric_protocol:
        metric_ids:
        - semantic_adherence
        - physics_commonsense
        - motion_smoothness
        - temporal_flickering
        - phyeduvideo_average
        primary_metric: phyeduvideo_average
        local_deterministic_modes:
        - rubric_manifest
        - mcq_or_qa_accuracy
        - artifact_presence_format
      official_benchmark_verified: false
      integration_evidence: true
      leaderboard_valid: false
    dataset:
      status: official_prompt_suite_required
      source: provenance_only
    artifact_contract:
      required:
        generated_video:
          kind: video
    evaluation_protocol:
    - name: external_official_runner
      runner_target: worldfoundry.evaluation.tasks.contracts.external:PhyEduVideoContract
      runner_script: worldfoundry/evaluation/tasks/execution/runners/phyeduvideo/run_phyeduvideo_official_runner.py
      metric_ids:
      - semantic_adherence
      - physics_commonsense
      - motion_smoothness
      - temporal_flickering
      - phyeduvideo_average
      official_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id phyeduvideo --mode 
        official-validation --official-results-path <official_results.json> --generated-artifact-dir <generated_videos> 
        --output-dir <out> --json
      required_inputs:
      - official_results_path or official_results
      - generated_video artifacts for the official prompt/task suite
      - official upstream scorer or judge assets for leaderboard parity
      official_result_entrypoint: worldfoundry-eval zoo benchmark-run
    - name: in_tree_local_quality_evaluator
      metric_ids:
      - semantic_adherence
      - physics_commonsense
      - motion_smoothness
      - temporal_flickering
      - phyeduvideo_average
      evaluator_target: worldfoundry.evaluation.tasks.execution.runners.phyeduvideo.phyeduvideo_in_tree_evaluator:PhyeduvideoInTreeEvaluator
      status: available_for_structured_evidence
      metadata:
        scoring_modes:
        - rubric_manifest
        - mcq_or_qa_accuracy
        - artifact_presence_format
        blocked_conditions:
        - official_instructional_judge_required when rubric/QA evidence is absent
        - model_checkpoint_or_vlm_required for fresh automatic SA/PC scoring
        required_evidence_artifacts:
        - 'generated_video: official explanatory video'
        - rubric_manifest keyed by SA/PC/MS/TF official dimensions
        - official evaluator outputs or human/judge annotations for leaderboard parity
    runtime_requirements:
      in_tree_runtime: worldfoundry/evaluation/tasks/execution/runners/phyeduvideo
      optional_root_env: WORLDFOUNDRY_PHYEDUVIDEO_ROOT
      generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
      results_path_env: WORLDFOUNDRY_PHYEDUVIDEO_RESULTS_PATH
