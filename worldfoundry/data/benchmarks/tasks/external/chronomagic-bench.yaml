benchmark: chronomagic-bench
description: ChronoMagic-Bench external benchmark task manifest for metamorphic time-lapse video generation.
tags:
- benchmark-zoo
- external-official
- chronomagic-bench
- time-lapse
splits:
- standard
metrics:
  chronomagic_score:
    aggregation: mean
    primary: true
  temporal_transformation:
    aggregation: mean
metadata:
  source_kind: benchmark_zoo
  benchmark_id: chronomagic-bench
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id chronomagic-bench --mode contract 
    --output-dir tmp/benchmark_zoo/benchmark_contract/chronomagic-bench --json
  open_source_status: experimental
  official_benchmark_verified: true
  integration_evidence: true
  leaderboard_valid: false
  optional_base_model_dependencies:
  - chronomagic_dataset_assets
  - motion_stack
  alpha_readiness:
    status: integration_ready
    api_status: user_provided_for_full_core
    api_reason: OPENAI_API_KEY is required only when running GPT4o-MTScore or the full official core component set.
    api_scope: GPT4o-MTScore judge path
    alpha_exclusion: false
    non_api_surface: official_chscore_validation
    official_runtime_start_ready: true
  requires:
  - In-tree ChronoMagic-Bench runtime under worldfoundry/evaluation/tasks/execution/runners/chronomagic_bench/runtime/chronomagic_bench
  - WORLDFOUNDRY_CHRONOMAGIC_ROOT optional override for the bundled ChronoMagic-Bench runtime
  - WORLDFOUNDRY_CHRONOMAGIC_INPUT_FOLDER or generated ChronoMagic video directory
  - WORLDFOUNDRY_CHRONOMAGIC_DATASET_ROOT BestWishYsh/ChronoMagic-Bench local dataset root for discovery evidence
  - WORLDFOUNDRY_CHRONOMAGIC_CHSCORE_CKPT for CHScore
  - WORLDFOUNDRY_CHRONOMAGIC_MTSCORE_CKPT for MTScore or full official core runs
  - OPENAI_API_KEY or WORLDFOUNDRY_CHRONOMAGIC_OPENAI_API for GPT4o-MTScore or full official core runs
  blockers:
  - 'Not a blocker for integration readiness: leaderboard parity still requires the complete ChronoMagic prompt set, generated
    videos, MTScore, GPT4o-MTScore, UMT fields, and official submission protocol.'
  - Full official core runs require user-provided MTScore checkpoint and OpenAI API credentials; the wrapper validates 
    selected official component scripts and required component outputs at launch/import time.
  - 'Historical MTScore validation note: one worldscore-env attempt missed flash_attn/dropout_layer_norm for InternVideo2;
    install those dependencies before MTScore/full runs in that environment.'
  integration_readiness:
    status: ok
    scope: official_runtime_start_ready
    docs_guided_setup: true
    official_core_components:
    - chscore
    - gpt4o_mtscore
    - mtscore
    leaderboard_valid: false
    leaderboard_reason: UMT-FVD, UMTScore, full prompt coverage, and official submission protocol are required before 
      leaderboard parity can be claimed.
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:ChronoMagicBenchContract
  official_runner_script: 
    worldfoundry/evaluation/tasks/execution/runners/chronomagic_bench/run_chronomagic_bench_official_runner.py
  prompt_suite:
    hf_dataset_id: BestWishYsh/ChronoMagic-Bench
    hf_config: default
    hf_split: test
    expected_rows: 1799
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  runtime:
    kind: in_tree_official_source
    repo_url: https://github.com/PKU-YuanGroup/ChronoMagic-Bench.git
    revision: e6b75ffc53c20dfea9c1704024d5167845534b63
    root: worldfoundry/evaluation/tasks/execution/runners/chronomagic_bench/runtime/chronomagic_bench
    root_env: WORLDFOUNDRY_CHRONOMAGIC_ROOT
    optional_root_env: WORLDFOUNDRY_CHRONOMAGIC_ROOT
  release_status: experimental
  maturity: contract_ready
  data_refs:
    local_dataset_paths:
    - cache/worldfoundry/data/hfd_datasets/BestWishYsh/ChronoMagic-Bench
    - cache/worldfoundry/data/hfd_datasets/BestWishYsh/ChronoMagic
    - cache/worldfoundry/data/hfd_datasets/BestWishYsh__ChronoMagic
    - cache/worldfoundry/data/hfd_datasets/BestWishYsh/ChronoMagic-Pro
    - cache/worldfoundry/data/hfd_datasets/BestWishYsh__ChronoMagic-Pro
    - cache/worldfoundry/data/hfd_datasets/BestWishYsh/ChronoMagic-ProH
    in_tree_runtime_paths:
    - worldfoundry/evaluation/tasks/execution/runners/chronomagic_bench/runtime/chronomagic_bench
    generated_artifact_examples:
    - ${WORLDFOUNDRY_MODEL_SOURCE_DIR}/ChronoMagic-Bench/toy_video/test_close
    task_yaml: worldfoundry/data/benchmarks/tasks/external/chronomagic-bench.yaml
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:ChronoMagicBenchContract
    runner_script_available: true
    task_yaml_available: true
    runtime_verified: true
    surface: official_runtime_start_ready
    credential_gated: true
    required_credentials:
    - OPENAI_API_KEY or WORLDFOUNDRY_CHRONOMAGIC_OPENAI_API for GPT4o-MTScore/full official core runs
    docs_guided_start_ready: true
    official_core_components_start_ready: true
    leaderboard_capable: false
    leaderboard_valid: false
    normalizer_verified: false
  official_gpu_validation:
    status: verified
    component: chscore
    eval_type: close
    generated_video_count: 2
    metrics_available: 1
    official_benchmark_verified: true
    official_component_verified: true
    integration_evidence: true
    leaderboard_valid: false
    full_suite_verified: false
    runtime_env: conda/envs/worldfoundry-unified-cu128
    python: ${WORLDFOUNDRY_UNIFIED_PYTHON}
    chronomagic_root: ${WORLDFOUNDRY_MODEL_SOURCE_DIR}/ChronoMagic-Bench
    input_folder: ${WORLDFOUNDRY_MODEL_SOURCE_DIR}/ChronoMagic-Bench/toy_video/test_close
    checkpoint: ${WORLDFOUNDRY_HFD_ROOT}/BestWishYsh--ChronoMagic-Bench/CHScore/cotracker2.pth
    verified: true
  validation_command:
  - ${WORLDFOUNDRY_UNIFIED_PYTHON}
  - worldfoundry/evaluation/tasks/execution/runners/chronomagic_bench/run_chronomagic_bench_official_runner.py
  - --chronomagic-root
  - worldfoundry/evaluation/tasks/execution/runners/chronomagic_bench/runtime/chronomagic_bench
  - --components
  - chscore
  - --generated-video-dir
  - ${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}
  - --model-name
  - worldfoundry
  - --eval-type
  - close
  - --model-pth-chscore
  - ${WORLDFOUNDRY_CHRONOMAGIC_CHSCORE_CKPT}
  - --output-dir
  - <out>
  - --python
  - ${WORLDFOUNDRY_UNIFIED_PYTHON}
  - --json
  integration_status: integrated
  status: integrated
  checkpoint_refs: []
tasks:
  chronomagic_video_standard:
    benchmark_name: chronomagic-bench
    protocol: external_official_benchmark
    capability_track: temporal_reasoning_video
    input_keys:
    - prompt
    - prompt_id
    - temporal_category
    output_keys:
    - generated_video
    metric_ids:
    - chronomagic_score
    - temporal_transformation
    metric_groups:
    - chronomagic_time_lapse
    tags:
    - benchmark-zoo
    - chronomagic-bench
    - time-lapse
    metadata:
      source_kind: benchmark_zoo
      benchmark_id: chronomagic-bench
      open_source_status: experimental
      official_benchmark_verified: true
      integration_evidence: true
      leaderboard_valid: false
      alpha_readiness:
        status: integration_ready
        api_status: user_provided_for_full_core
        api_reason: OPENAI_API_KEY is required only for GPT4o-MTScore/full official core runs.
        alpha_exclusion: false
    dataset:
      hf_dataset_id: BestWishYsh/ChronoMagic-Bench
      config: default
      split: test
      expected_rows: 1799
    runtime_requirements:
      in_tree_runtime: worldfoundry/evaluation/tasks/execution/runners/chronomagic_bench/runtime/chronomagic_bench
      optional_root_env: WORLDFOUNDRY_CHRONOMAGIC_ROOT
      generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
      dataset_root_env: WORLDFOUNDRY_CHRONOMAGIC_DATASET_ROOT
      results_path_env: WORLDFOUNDRY_CHRONOMAGIC_RESULTS_PATH
    artifact_contract:
      required:
        generated_video:
          kind: video
    evaluation_protocol:
    - name: external_official_runner
      metric_ids:
      - chronomagic_score
      - temporal_transformation
      runner_target: worldfoundry.evaluation.tasks.contracts.external:ChronoMagicBenchContract
      runner_script: 
        worldfoundry/evaluation/tasks/execution/runners/chronomagic_bench/run_chronomagic_bench_official_runner.py
      official_validation_command: ${WORLDFOUNDRY_UNIFIED_PYTHON} 
        worldfoundry/evaluation/tasks/execution/runners/chronomagic_bench/run_chronomagic_bench_official_runner.py 
        --chronomagic-root worldfoundry/evaluation/tasks/execution/runners/chronomagic_bench/runtime/chronomagic_bench --components chscore --generated-video-dir 
        ${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR} --model-name worldfoundry --eval-type close --model-pth-chscore 
        ${WORLDFOUNDRY_CHRONOMAGIC_CHSCORE_CKPT} --output-dir <out> --python ${WORLDFOUNDRY_UNIFIED_PYTHON} --json
