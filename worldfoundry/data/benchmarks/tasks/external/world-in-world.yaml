benchmark: world-in-world
name: World-in-World
description: Contract-only task manifest for closed-loop visual world model planning evaluation.
tags:
- benchmark-zoo
- external-official
- world-in-world
- closed-loop-world-model
- embodied-action
- planning
splits:
- standard
metrics:
  active_recognition_success_rate:
    aggregation: mean
  image_goal_navigation_success_rate:
    aggregation: mean
  image_goal_navigation_spl:
    aggregation: mean
  active_embodied_qa_score:
    aggregation: mean
  active_embodied_qa_spl:
    aggregation: mean
  robotic_manipulation_success_rate:
    aggregation: mean
  interaction_trace_consistency:
    aggregation: mean
  world_in_world_average:
    aggregation: mean
    primary: true
metadata:
  source_kind: benchmark_zoo
  benchmark_id: world-in-world
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id world-in-world --mode contract 
    --output-dir tmp/benchmark_zoo/benchmark_contract/world-in-world --json
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:WorldInWorldContract
  official_runner_command: worldfoundry-eval zoo benchmark-run
  name: World-in-World
  domain:
  - closed-loop
  - planning
  - embodied-world-model
  - action-control
  task_type: closed_loop_world_model_planning_evaluation
  status: planned
  maturity: contract_ready
  release_status: experimental
  open_source_status: experimental
  official_benchmark_verified: false
  integration_evidence: true
  leaderboard_valid: false
  optional_base_model_dependencies:
  - video_world_perception_stack
  source_provenance:
    official_repo:
      url: https://github.com/World-In-World/world-in-world
      verified_by: git ls-remote https://github.com/World-In-World/world-in-world HEAD
      head_sha: 6ac81ef12451c29d22cdec9ac96e3fe46b22ac2a
      role: provenance_only_not_runtime_dependency
    paper:
      url: https://arxiv.org/abs/2510.18135
    project_page:
      url: https://world-in-world.github.io/
  input_contract:
  - prompt
  - prompt_id
  - action_trace
  - observation_context
  - generated_artifact_manifest
  output_contract:
  - generated_video
  - interaction_trace
  evaluation_requirements:
  - Use World-in-World closed-loop protocol across AR, ImageNav, A-EQA, and robotic manipulation.
  - Aggregate supplied task scores and verify interaction trace consistency locally.
  requires:
  - bundled assets under worldfoundry/data/benchmarks/assets/world-in-world
  - generated artifacts or official result files supplied via CLI or optional env
  blockers:
  - Official repository/source metadata and the official-result normalizer are integrated.
  - Full validation requires generated videos or rollouts for the official prompt/task suite.
  - Leaderboard parity requires official judge/checkpoint/API assets and normalized official result files.
  data_refs:
    task_yaml: worldfoundry/data/benchmarks/tasks/external/world-in-world.yaml
    bundled_assets: worldfoundry/data/benchmarks/assets/world-in-world
    in_tree_official_runtime: worldfoundry/evaluation/tasks/execution/runners/world_in_world/runtime/official
  official_runner_script: 
    worldfoundry/evaluation/tasks/execution/runners/world_in_world/run_world_in_world_official_runner.py
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:WorldInWorldContract
    runner_script_available: true
    task_yaml_available: true
    runtime_verified: true
    surface: in_tree_artifact_evaluator
    normalizer_verified: true
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  runtime:
    kind: in_tree_artifact_evaluator
    root: worldfoundry/evaluation/tasks/execution/runners/world_in_world
    upstream_revision: 6ac81ef12451c29d22cdec9ac96e3fe46b22ac2a
    asset_override_env: WORLDFOUNDRY_WORLD_IN_WORLD_ASSETS_ROOT
    prompt_manifest_env: WORLDFOUNDRY_WORLD_IN_WORLD_PROMPT_MANIFEST
    results_path_env: WORLDFOUNDRY_WORLD_IN_WORLD_RESULTS_PATH
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  metric_protocol:
    metric_ids:
    - active_recognition_success_rate
    - image_goal_navigation_success_rate
    - image_goal_navigation_spl
    - active_embodied_qa_score
    - active_embodied_qa_spl
    - robotic_manipulation_success_rate
    - interaction_trace_consistency
    - world_in_world_average
    primary_metric: world_in_world_average
    local_deterministic_modes:
    - task_success_aggregation
    - qa_accuracy
    - interaction_trace_consistency
    - artifact_presence_format
  local_evaluator:
    target: worldfoundry/evaluation/tasks/execution/runners/world_in_world/run_world_in_world_official_runner.py
    status: implemented
    protocol: official_result_normalization
    official_result_normalization:
      status: implemented
      input_keys:
      - official_results_path
      - official_results
      - WORLDFOUNDRY_WORLD_IN_WORLD_RESULTS_PATH
      formats:
      - json
      - jsonl
      - csv
      provenance: normalizes caller-provided official outputs with vendored in-tree evaluator code
  official_result_entrypoint: worldfoundry-eval zoo benchmark-run
  runner:
    validation_command:
    - worldfoundry-eval
    - zoo
    - benchmark-run
    - --benchmark-id
    - world-in-world
    - --mode
    - official-validation
    - --official-results-path
    - <official_results.json>
    - --generated-artifact-dir
    - <generated_videos>
    - --output-dir
    - <out>
    - --json
    runtime:
      results_path_env: WORLDFOUNDRY_WORLD_IN_WORLD_RESULTS_PATH
    official_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id world-in-world --mode 
      official-validation --official-results-path <official_results.json> --generated-artifact-dir <generated_videos> 
      --output-dir <out> --json
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - world-in-world
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  integration_status: integrated
  run_command: PYTHONPATH=. "${WORLDFOUNDRY_CONDA_ENVS_ROOT}/worldfoundry-unified-cu128/bin/python" 
    worldfoundry/evaluation/tasks/execution/runners/world_in_world/run_world_in_world_official_runner.py --run-official 
    --generated-artifact-dir "${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}" --output-dir 
    "${WORLDFOUNDRY_BENCHMARK_OUTPUT_DIR}" --json
  checkpoint_refs: []
tasks:
  world_in_world_standard:
    benchmark_name: world-in-world
    protocol: external_official_benchmark
    capability_track: closed_loop_world_model
    schema_type: generated_artifact_set
    input_keys:
    - prompt
    - prompt_id
    - action_trace
    - observation_context
    - generated_artifact_manifest
    output_keys:
    - generated_video
    - interaction_trace
    metric_ids:
    - active_recognition_success_rate
    - image_goal_navigation_success_rate
    - image_goal_navigation_spl
    - active_embodied_qa_score
    - active_embodied_qa_spl
    - robotic_manipulation_success_rate
    - interaction_trace_consistency
    - world_in_world_average
    metric_groups:
    - world_in_world_metrics
    tags:
    - benchmark-zoo
    - external-official
    - world-in-world
    - closed-loop-world-model
    - embodied-action
    metadata:
      source_kind: benchmark_zoo
      benchmark_id: world-in-world
      domain:
      - closed-loop
      - planning
      task_type: closed_loop_world_model_planning_evaluation
      status: contract_ready
      artifact_contract:
        required:
          generated_video:
            kind: video
          interaction_trace:
            kind: structured_trace
      evaluation_requirements:
      - Use World-in-World closed-loop protocol across AR, ImageNav, A-EQA, and robotic manipulation.
      - Aggregate supplied task scores and verify interaction trace consistency locally.
      metric_protocol:
        metric_ids:
        - active_recognition_success_rate
        - image_goal_navigation_success_rate
        - image_goal_navigation_spl
        - active_embodied_qa_score
        - active_embodied_qa_spl
        - robotic_manipulation_success_rate
        - interaction_trace_consistency
        - world_in_world_average
        primary_metric: world_in_world_average
        local_deterministic_modes:
        - task_success_aggregation
        - qa_accuracy
        - interaction_trace_consistency
        - artifact_presence_format
      official_benchmark_verified: false
      integration_evidence: true
      leaderboard_valid: false
    dataset:
      status: bundled_in_tree
      source: worldfoundry/data/benchmarks/assets/world-in-world
    artifact_contract:
      required:
        generated_video:
          kind: video
        interaction_trace:
          kind: structured_trace
    evaluation_protocol:
    - name: external_official_runner
      runner_target: worldfoundry.evaluation.tasks.contracts.external:WorldInWorldContract
      runner_script: 
        worldfoundry/evaluation/tasks/execution/runners/world_in_world/run_world_in_world_official_runner.py
      metric_ids:
      - active_recognition_success_rate
      - image_goal_navigation_success_rate
      - image_goal_navigation_spl
      - active_embodied_qa_score
      - active_embodied_qa_spl
      - robotic_manipulation_success_rate
      - interaction_trace_consistency
      - world_in_world_average
      official_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id world-in-world --mode 
        official-validation --official-results-path <official_results.json> --generated-artifact-dir <generated_videos> 
        --output-dir <out> --json
      required_inputs:
      - official_results_path or official_results
      - generated_video artifacts for the official prompt/task suite
      - official scorer or judge assets for leaderboard parity
      official_result_entrypoint: worldfoundry-eval zoo benchmark-run
    - name: in_tree_local_quality_evaluator
      metric_ids:
      - active_recognition_success_rate
      - image_goal_navigation_success_rate
      - image_goal_navigation_spl
      - active_embodied_qa_score
      - active_embodied_qa_spl
      - robotic_manipulation_success_rate
      - interaction_trace_consistency
      - world_in_world_average
      evaluator_target: worldfoundry.evaluation.tasks.execution.runners.world_in_world.world_in_world_in_tree_evaluator:WorldInWorldInTreeEvaluator
      status: available_for_structured_evidence
      metadata:
        scoring_modes:
        - task_success_aggregation
        - qa_accuracy
        - interaction_trace_consistency
        - artifact_presence_format
        blocked_conditions:
        - interaction_trace_missing when the structured trace artifact is absent
        - official_environment_or_planner_required when task success summaries are absent
        required_evidence_artifacts:
        - 'generated_video: rollout video or world-model prediction artifact'
        - 'interaction_trace: structured trace with executed actions and task summaries'
        - official environment/planner result logs for leaderboard task scores
    runtime_requirements:
      bundled_prompt_assets: worldfoundry/data/benchmarks/assets/world-in-world
      generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
      results_path_env: WORLDFOUNDRY_WORLD_IN_WORLD_RESULTS_PATH
