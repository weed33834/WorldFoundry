benchmark: bridgedata-v2
description: BridgeData V2 external benchmark task manifest for real-robot dataset and offline policy result 
  normalization.
tags:
- benchmark-zoo
- external-official
- bridgedata-v2
- vla
- embodied-action
- robot-manipulation
- real-robot
- offline-evaluation
splits:
- eval
metrics:
  success_rate:
    aggregation: mean
    primary: true
  task_success:
    aggregation: mean
  goal_success:
    aggregation: mean
  action_accuracy:
    aggregation: mean
  rollout_success:
    aggregation: mean
metadata:
  source_kind: benchmark_zoo
  benchmark_id: bridgedata-v2
  status: integrated
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id bridgedata-v2 --mode contract 
    --output-dir tmp/benchmark_zoo/benchmark_contract/bridgedata-v2 --json
  release_status: normalizer_only
  maturity: contract_ready
  open_source_status: normalizer_only
  official_benchmark_verified: false
  integration_evidence: true
  leaderboard_valid: false
  full_test_harness_ready: true
  full_suite_testable: true
  full_suite_execution_recorded: false
  optional_base_model_dependencies:
  - spatial_perception_core_stack
  requires:
  - BridgeData V2 dataset materialization
  - Eval split definition
  - Policy checkpoint or offline prediction dump
  - Action normalization and task-goal mapping
  blockers:
  - Dataset materialization, split definition, and policy-result import validation must be validated before integrated 
    status.
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:BridgeDataV2Contract
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:BridgeDataV2Contract
    runner_script_available: false
    task_yaml_available: true
    runtime_verified: false
    normalizer_verified: true
    surface: official_result_normalizer
  prompt_suite:
    status: preflight_only
    split: eval
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_BRIDGEDATA_V2_RESULTS_PATH
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  runtime:
    kind: external_official_results_runner
    root_env: WORLDFOUNDRY_BRIDGEDATA_V2_ROOT
    results_path_env: WORLDFOUNDRY_BRIDGEDATA_V2_RESULTS_PATH
    preflight_profile: bridgedata-v2
    dataset_root_env: WORLDFOUNDRY_BRIDGEDATA_V2_DATASET_ROOT
    validation_command:
    - worldfoundry-eval
    - zoo
    - benchmark-run
    - --benchmark-id
    - bridgedata-v2
    - --mode
    - official-validation
    - --official-results-path
    - <official_results.json>
    - --output-dir
    - <out>
    - --json
  official_result_entrypoint: worldfoundry-eval zoo benchmark-run
  local_evaluator:
    target: worldfoundry.evaluation.tasks.embodied.normalizer:normalize_results
    status: implemented
    protocol: official_embodied_result_normalizer
    official_result_normalization:
      status: implemented
      input_keys:
      - official_results_path
      - WORLDFOUNDRY_BRIDGEDATA_V2_RESULTS_PATH
      formats:
      - json
      - jsonl
      - csv
      provenance: normalizes caller-provided official embodied rollout outputs without executing simulators
  data_refs:
    task_yaml: worldfoundry/data/benchmarks/tasks/external/bridgedata-v2.yaml
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - bridgedata-v2
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --output-dir
  - <out>
  - --json
  integration_status: integrated
  checkpoint_refs: []
dataset:
  path: ${WORLDFOUNDRY_DATA_DIR}/datasets/bridgedata-v2
  split: eval
  access: manual_huge_dataset
  source: official_project_page_http
  official_repo: https://github.com/rail-berkeley/bridge_data_v2
  project_page: https://rail-berkeley.github.io/bridgedata/
tasks:
  bridgedata_v2_policy_rollouts:
    benchmark_name: bridgedata-v2
    protocol: external_official_benchmark
    capability_track: vla,embodied-action,robot-manipulation,real-robot,offline-evaluation
    input_keys:
    - language_instruction
    - observation_image
    - robot_state
    - episode_manifest
    output_keys:
    - scorecard
    - raw_results
    - per_sample_metrics
    - rollout_logs
    metric_ids:
    - success_rate
    - task_success
    - goal_success
    - action_accuracy
    - rollout_success
    metric_groups:
    - bridgedata-v2_metrics
    - embodied_action
    tags:
    - benchmark-zoo
    - external-official
    - bridgedata-v2
    - vla
    - embodied-action
    - robot-manipulation
    - real-robot
    - offline-evaluation
    metadata:
      source_kind: benchmark_zoo
      benchmark_id: bridgedata-v2
      leaderboard_valid: false
      official_benchmark_verified: false
      integration_evidence: true
    dataset:
      path: ${WORLDFOUNDRY_DATA_DIR}/datasets/bridgedata-v2
      split: eval
    runtime_requirements:
      upstream_repo_env: WORLDFOUNDRY_BRIDGEDATA_V2_ROOT
      results_path_env: WORLDFOUNDRY_BRIDGEDATA_V2_RESULTS_PATH
      simulator_assets: required_for_official_runtime
      policy_checkpoints: required_for_official_runtime
      dataset_root_env: WORLDFOUNDRY_BRIDGEDATA_V2_DATASET_ROOT
    artifact_contract:
      required:
        rollout_result:
          kind: embodied_policy_result
          accepted_formats:
          - json
          - jsonl
          - csv
    evaluation_protocol:
    - name: external_official_runner
      metric_ids:
      - success_rate
      - task_success
      - goal_success
      - action_accuracy
      - rollout_success
      runner_target: worldfoundry.evaluation.tasks.contracts.external:BridgeDataV2Contract
