benchmark: libero-para
description: LIBERO-Para external benchmark task manifest for paraphrased language-conditioned robot manipulation 
  evaluation.
tags:
- benchmark-zoo
- external-official
- libero-para
- vla
- embodied-action
- robot-manipulation
- language-generalization
- paraphrase-generalization
splits:
- paraphrase_eval
- libero_para_standard
metrics:
  success_rate:
    aggregation: mean
    primary: true
  paraphrase_success_rate:
    aggregation: mean
  language_generalization_success:
    aggregation: mean
  task_success:
    aggregation: mean
  action_accuracy:
    aggregation: mean
metadata:
  source_kind: benchmark_zoo
  benchmark_id: libero-para
  status: integrated
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id libero-para --mode contract 
    --output-dir tmp/benchmark_zoo/benchmark_contract/libero-para --json
  release_status: normalizer_only
  maturity: contract_ready
  open_source_status: normalizer_only
  official_benchmark_verified: false
  integration_evidence: true
  leaderboard_valid: false
  full_test_harness_ready: true
  full_suite_testable: true
  full_suite_execution_recorded: false
  base_model_dependencies:
  - libero_para_source_assets
  - libero_para_dataset_assets
  optional_base_model_dependencies:
  - spatial_perception_core_stack
  requires:
  - Official LIBERO-Para repository checkout
  - HAI-Lab/LIBERO-Para dataset root
  - Policy checkpoint for selected upstream eval script
  - Official result dump from metrics/analyze_results.py or equivalent structured export
  blockers:
  - Official LIBERO-Para rollout execution has not produced leaderboard evidence.
  - Paraphrase split mapping and result import fields must be validated on real upstream outputs.
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:LIBEROParaContract
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:LIBEROParaContract
    runner_script_available: false
    task_yaml_available: true
    runtime_verified: false
    normalizer_verified: true
    surface: official_result_normalizer
  prompt_suite:
    status: preflight_only
    split: paraphrase_eval,libero_para_standard
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_LIBERO_PARA_RESULTS_PATH
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  runtime:
    kind: external_official_results_runner
    root_env: WORLDFOUNDRY_LIBERO_PARA_ROOT
    results_path_env: WORLDFOUNDRY_LIBERO_PARA_RESULTS_PATH
    dataset_root_env: WORLDFOUNDRY_LIBERO_PARA_DATASET_ROOT
    preflight_profile: libero-para
    validation_command:
    - worldfoundry-eval
    - zoo
    - benchmark-run
    - --benchmark-id
    - libero-para
    - --mode
    - official-validation
    - --official-results-path
    - <official_results.json>
    - --output-dir
    - <out>
    - --json
  official_result_entrypoint: worldfoundry-eval zoo benchmark-run
  local_evaluator:
    target: worldfoundry.evaluation.tasks.embodied.normalizer:normalize_results
    status: implemented
    protocol: official_embodied_result_normalizer
    official_result_normalization:
      status: implemented
      input_keys:
      - official_results_path
      - WORLDFOUNDRY_LIBERO_PARA_RESULTS_PATH
      formats:
      - json
      - jsonl
      - csv
      provenance: normalizes caller-provided official embodied rollout outputs without executing simulators
  data_refs:
    dataset_refs:
    - repo_id: HAI-Lab/LIBERO-Para
      license: mit
      path: cache/worldfoundry/data/hfd_datasets/HAI-Lab__LIBERO-Para
    local_dataset_paths:
    - cache/worldfoundry/data/hfd_datasets/HAI-Lab__LIBERO-Para
    - cache/vla_va_wam/hf_datasets/HAI-Lab--LIBERO-Para
    local_repo_paths:
    - cache/worldfoundry/repos/cau-hai-lab--LIBERO-Para
    - ${WORLDFOUNDRY_CACHE_DIR}/repos/github.com_cau-hai-lab_LIBERO-Para
    task_yaml: worldfoundry/data/benchmarks/tasks/external/libero-para.yaml
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - libero-para
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --output-dir
  - <out>
  - --json
  integration_status: integrated
  checkpoint_refs: []
tasks:
  libero_para_policy_rollouts:
    benchmark_name: libero-para
    protocol: external_official_benchmark
    capability_track: vla,robot-manipulation,language-generalization,paraphrase-generalization
    input_keys:
    - language_instruction
    - paraphrase_instruction
    - observation_image
    - robot_state
    - episode_manifest
    output_keys:
    - scorecard
    - raw_results
    - per_sample_metrics
    - rollout_logs
    metric_ids:
    - success_rate
    - paraphrase_success_rate
    - language_generalization_success
    - task_success
    - action_accuracy
    metric_groups:
    - libero-para_metrics
    - embodied_action
    tags:
    - benchmark-zoo
    - external-official
    - libero-para
    - vla
    - embodied-action
    - robot-manipulation
    - language-generalization
    - paraphrase-generalization
    metadata:
      source_kind: benchmark_zoo
      benchmark_id: libero-para
      leaderboard_valid: false
      official_benchmark_verified: false
      integration_evidence: true
    dataset:
      hf_dataset_ids:
      - HAI-Lab/LIBERO-Para
      split: paraphrase_eval,libero_para_standard
    runtime_requirements:
      upstream_repo_env: WORLDFOUNDRY_LIBERO_PARA_ROOT
      results_path_env: WORLDFOUNDRY_LIBERO_PARA_RESULTS_PATH
      dataset_root_env: WORLDFOUNDRY_LIBERO_PARA_DATASET_ROOT
      simulator_assets: required_for_official_runtime
      policy_checkpoints: required_for_official_runtime
    artifact_contract:
      required:
        rollout_result:
          kind: embodied_policy_result
          accepted_formats:
          - json
          - jsonl
          - csv
    evaluation_protocol:
    - name: external_official_runner
      metric_ids:
      - success_rate
      - paraphrase_success_rate
      - language_generalization_success
      - task_success
      - action_accuracy
      runner_target: worldfoundry.evaluation.tasks.contracts.external:LIBEROParaContract
