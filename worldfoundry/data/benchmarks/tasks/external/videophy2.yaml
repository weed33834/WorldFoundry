benchmark: videophy2
description: VideoPhy2 external benchmark contract manifest.
id: videophy2
name: VideoPhy2
status: contract_ready
domain:
- physics
- physical-commonsense
- actions
- rule-classification
task_type: text_to_video_action_physics_evaluation
input:
  modalities:
  - text
  keys:
  - prompt
  - prompt_id
  - generated_artifact_manifest
output:
  modalities:
  - video
  artifacts:
  - generated_video
evaluation_requirements:
  generated_artifacts:
  - generated_video
  metrics_source: official VideoPhy2 action-centric physical commonsense labels and autoeval protocol
  requires_official_runtime_execution: false
  runtime_source_dependency: false
  notes:
  - Source repository metadata is provenance-only for this in-tree contract; Hugging Face prompt and label assets are
    checked locally when available.
source_provenance:
  status: contract_ready
  official_repository:
    url: https://github.com/Hritikbansal/videophy
    revision: 01d366c979e4a82875852adbf427ccc036e7373a
    provenance_only: true
  paper:
    url: https://arxiv.org/abs/2503.06800
  project_page:
    url: https://videophy2.github.io/
  huggingface_datasets:
  - repo_id: videophysics/videophy2_test
    url: https://huggingface.co/datasets/videophysics/videophy2_test
    revision: 90b81ffa54f565d9e40e83b7a2c247ba1dccfa2b
    license: mit
    path: cache/worldfoundry/data/hfd_datasets/videophysics__videophy2_test
  - repo_id: videophysics/videophy2_train
    url: https://huggingface.co/datasets/videophysics/videophy2_train
    revision: 5c2a69593b39d28a77ef2b9dbf7acbd2b9f38f6c
    license: mit
    path: cache/worldfoundry/data/hfd_datasets/videophysics__videophy2_train
tags:
- benchmark-zoo
- external-official
- videophy2
- text-to-video
- physical-commonsense
splits:
- standard
metrics:
  semantic_adherence:
    aggregation: mean
  physical_commonsense:
    aggregation: mean
  joint_score:
    aggregation: mean
  rule_classification_accuracy:
    aggregation: mean
  videophy2_average:
    aggregation: mean
    primary: true
metadata:
  source_kind: benchmark_zoo
  benchmark_id: videophy2
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id videophy2 --mode contract --output-dir
    tmp/benchmark_zoo/benchmark_contract/videophy2 --json
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:VideoPhy2Contract
  official_runner_script: worldfoundry/evaluation/tasks/execution/runners/videophy2/run_videophy2_official_runner.py
  metric_evaluator_target: worldfoundry.evaluation.tasks.execution.runners.videophy2.videophy2_contract_evaluator:write_videophy2_evaluation
  metric_protocol:
    official_definition: VideoPhy2 uses 1-5 human or AutoEval ratings for semantic adherence and physical commonsense,
      reports joint performance as the fraction with SA>=4 and PC>=4, and evaluates candidate physical rules as
      followed, violated, or cannot-be-determined.
    official_results_fields:
    - semantic_adherence
    - physical_commonsense
    - joint_score
    - rule_classification_accuracy
    - videophy2_average
    accepted_aliases:
      semantic_adherence:
      - sa
      - SA
      physical_commonsense:
      - pc
      - PC
      joint_score:
      - joint
      rule_classification_accuracy:
      - physics_rules_followed
      - physics_rules_unfollowed
    required_artifacts:
    - videophysics/videophy2_test prompt/rule metadata
    - generated videos for official prompts
    - human labels or VideoPhy-2-AutoEval outputs
    official_metric_blocked_reason: judge_required
  prompt_suite:
    status: bundled_in_tree
    manifest: worldfoundry/data/benchmarks/assets/videophy2/prompts.json
    canonical_prompt_count: 200
    bundled_prompt_count: 10
    hf_dataset_id: videophysics/videophy2_test
  local_check:
    required_files:
    - dataset_id: videophysics/videophy2_test
      path: README.md
    - dataset_id: videophysics/videophy2_test
      path: videophy2_test.csv
    - dataset_id: videophysics/videophy2_train
      path: README.md
    - dataset_id: videophysics/videophy2_train
      path: videophy2_training.csv
    - dataset_id: videophysics/videophy2_train
      path: videophy2_train.zip
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  runtime:
    kind: in_tree_official_judge_runtime
    root: worldfoundry/evaluation/tasks/execution/runners/videophy2
    root_env: WORLDFOUNDRY_VIDEOPHY2_ROOT
    judge_model_id: videophysics/videophy_2_auto
    judge_backend_env: WORLDFOUNDRY_VIDEOPHY2_JUDGE_BACKEND
    bundled_assets: worldfoundry/data/benchmarks/assets/videophy2/
  release_status: experimental
  open_source_status: experimental
  maturity: contract_ready
  official_benchmark_verified: false
  integration_evidence: true
  leaderboard_valid: false
  base_model_dependencies:
  - videophy2_dataset_assets
  optional_base_model_dependencies:
  - grounded_depth_segmentation_stack
  requires:
  - WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  blockers:
  - Official repository/source metadata is verified, but the official benchmark runtime has not been executed in
    WorldFoundry.
  - Full validation requires generated videos or rollouts for the official prompt/task suite.
  - Leaderboard parity requires official judge/checkpoint/API assets and normalized upstream result files.
  - Official repository/source metadata and in-tree official-result normalizer are integrated.
  - Full leaderboard validation still requires generated videos and full upstream scorer/judge execution on the official
    prompt suite.
  data_refs:
    task_yaml: worldfoundry/data/benchmarks/tasks/external/videophy2.yaml
    bundled_asset_paths:
    - worldfoundry/data/benchmarks/assets/videophy2/prompts.json
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:VideoPhy2Contract
    runner_script_available: true
    task_yaml_available: true
    runtime_verified: true
    surface: videophy2_official_in_tree
    normalizer_verified: false
  official_result_entrypoint: worldfoundry-eval zoo benchmark-run
  local_evaluator:
    target: worldfoundry.evaluation.tasks.execution.runners.videophy2.videophy2_contract_evaluator:write_videophy2_evaluation
    status: implemented
    protocol: local_artifact_checks_and_official_result_normalization
    official_result_normalization:
      status: implemented
      input_keys:
      - official_results_path
      - WORLDFOUNDRY_VIDEOPHY2_RESULTS_PATH
      formats:
      - json
      - jsonl
      - csv
      - yaml
      provenance: normalizes caller-provided official outputs without executing upstream repos
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - videophy2
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  integration_status: integrated
  status: integrated
  run_command: PYTHONPATH=. "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}"
    worldfoundry/evaluation/tasks/execution/runners/videophy2/run_videophy2_official_runner.py --run-official
    --generated-artifact-dir "${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}" --output-dir
    "${WORLDFOUNDRY_BENCHMARK_OUTPUT_DIR}" --json
  checkpoint_refs: []
tasks:
  videophy2_standard:
    benchmark_name: videophy2
    protocol: external_official_benchmark
    capability_track: text_to_video
    input_keys:
    - prompt
    - prompt_id
    - generated_artifact_manifest
    output_keys:
    - generated_video
    metric_ids:
    - semantic_adherence
    - physical_commonsense
    - joint_score
    - rule_classification_accuracy
    - videophy2_average
    metric_groups:
    - videophy2_metrics
    tags:
    - benchmark-zoo
    - external-official
    - videophy2
    - text-to-video
    - physical-commonsense
    metadata:
      source_kind: benchmark_zoo
      benchmark_id: videophy2
      official_benchmark_verified: false
      integration_evidence: true
      leaderboard_valid: false
    dataset:
      hf_dataset_id: videophysics/videophy2_test
      split: standard
    runtime_requirements:
      bundled_assets: worldfoundry/data/benchmarks/assets/videophy2/
      generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
      results_path_env: WORLDFOUNDRY_VIDEOPHY2_RESULTS_PATH
    artifact_contract:
      required:
        generated_video:
          kind: video
    evaluation_protocol:
    - name: in_tree_videophy2_evaluator
      metric_ids:
      - semantic_adherence
      - physical_commonsense
      - joint_score
      - rule_classification_accuracy
      - videophy2_average
      evaluator_target: worldfoundry.evaluation.tasks.execution.runners.videophy2.videophy2_contract_evaluator:write_videophy2_evaluation
      status: implemented
    - name: external_official_runner
      metric_ids:
      - semantic_adherence
      - physical_commonsense
      - joint_score
      - rule_classification_accuracy
      - videophy2_average
      runner_target: worldfoundry.evaluation.tasks.contracts.external:VideoPhy2Contract
      evaluator_target: worldfoundry.evaluation.tasks.execution.runners.videophy2.videophy2_contract_evaluator:write_videophy2_evaluation
      runner_script: worldfoundry/evaluation/tasks/execution/runners/videophy2/run_videophy2_official_runner.py
      official_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id videophy2 --mode
        official-validation --official-results-path <official_results.json> --generated-artifact-dir <generated_videos>
        --output-dir <out> --json
