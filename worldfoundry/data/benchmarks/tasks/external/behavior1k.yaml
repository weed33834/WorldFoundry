benchmark: behavior1k
description: BEHAVIOR-1K external benchmark manifest for household embodied policy rollouts.
tags:
- benchmark-zoo
- external-official
- behavior1k
- vla
- embodied-action
- household
- simulator
splits:
- eval
metrics:
  success_rate:
    aggregation: mean
    primary: true
  task_success:
    aggregation: mean
  episode_success:
    aggregation: mean
  subgoal_success:
    aggregation: mean
metadata:
  source_kind: benchmark_zoo
  benchmark_id: behavior1k
  status: integrated
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:Behavior1KContract
  prompt_suite:
    split: eval
  runtime:
    kind: external_official_results_runner
    root_env: WORLDFOUNDRY_BEHAVIOR1K_ROOT
    results_path_env: WORLDFOUNDRY_BEHAVIOR1K_RESULTS_PATH
    preflight_profile: behavior1k
  official_result_entrypoint: worldfoundry-eval zoo benchmark-run
  local_evaluator:
    target: worldfoundry.evaluation.tasks.embodied.normalizer:normalize_results
    status: implemented
    protocol: official_embodied_result_normalizer
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id behavior1k --mode contract 
    --output-dir tmp/benchmark_zoo/benchmark_contract/behavior1k --json
  release_status: normalizer_only
  maturity: contract_ready
  open_source_status: normalizer_only
  official_benchmark_verified: false
  integration_evidence: true
  leaderboard_valid: false
  requires:
  - Official simulator runtime
  - benchmark assets
  - policy checkpoint
  - official result dump
  blockers:
  - Full leaderboard parity is not claimed until official rollouts are executed and imported.
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:Behavior1KContract
    task_yaml_available: true
    runtime_verified: false
    normalizer_verified: true
    surface: official_result_normalizer
    runner_script_available: false
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_BEHAVIOR1K_RESULTS_PATH
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  data_refs:
    task_yaml: worldfoundry/data/benchmarks/tasks/external/behavior1k.yaml
  checkpoint_refs: []
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - behavior1k
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --output-dir
  - <out>
  - --json
tasks:
  behavior1k_policy_rollouts:
    benchmark_name: behavior1k
    protocol: external_official_benchmark
    capability_track: vla,embodied-action,household
    input_keys:
    - behavior_dataset_root
    - simulator_root
    - task_manifest
    - policy_results_path
    - official_results_path
    output_keys:
    - scorecard
    - raw_results
    - per_sample_metrics
    - rollout_logs
    metric_ids:
    - success_rate
    - task_success
    - episode_success
    - subgoal_success
    tags:
    - benchmark-zoo
    - external-official
    - behavior1k
    - vla
    metadata:
      benchmark_id: behavior1k
      leaderboard_valid: false
      source_kind: benchmark_zoo
      official_benchmark_verified: false
      integration_evidence: true
    runtime_requirements:
      upstream_repo_env: WORLDFOUNDRY_BEHAVIOR1K_ROOT
      results_path_env: WORLDFOUNDRY_BEHAVIOR1K_RESULTS_PATH
      simulator_assets: required_for_official_runtime
      policy_checkpoints: required_for_official_runtime

    artifact_contract:
      required:
        benchmark_scorecard:
          kind: benchmark_result
    evaluation_protocol:
    - name: external_official_runner
      metric_ids:
      - success_rate
      - task_success
      - episode_success
      - subgoal_success
      runner_target: worldfoundry.evaluation.tasks.contracts.external:Behavior1KContract
