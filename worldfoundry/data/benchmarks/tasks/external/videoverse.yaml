benchmark: videoverse
description: VideoVerse external benchmark task manifest for world-model text-to-video QA evaluation.
tags:
- benchmark-zoo
- external-official
- videoverse
- world-model
splits:
- standard
metrics:
  qa_accuracy:
    aggregation: mean
  event_coverage:
    aggregation: mean
  temporal_causality:
    aggregation: mean
  world_knowledge_consistency:
    aggregation: mean
  static_scene_consistency:
    aggregation: mean
  dynamic_event_consistency:
    aggregation: mean
  videoverse_average:
    aggregation: mean
    primary: true
metadata:
  source_kind: benchmark_zoo
  benchmark_id: videoverse
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id videoverse --mode contract 
    --output-dir tmp/benchmark_zoo/benchmark_contract/videoverse --json
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:VideoVerseContract
  official_runner_command: worldfoundry-eval zoo benchmark-run
  prompt_suite:
    source: bundled_official_assets
    repo_url: https://github.com/Zeqing-Wang/VideoVerse.git
    revision: 8aa862035ee36b97f034d9d2fb4e56bca8ccd97b
    path_or_ref: worldfoundry/data/benchmarks/assets/videoverse/prompt/prompts_of_VideoVerse.json
    decomposed_path_or_ref: worldfoundry/data/benchmarks/assets/videoverse/prompt/prompts_of_VideoVerse_decomposed.json
    split: standard
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  runtime:
    kind: in_tree_judge_runtime
    root: worldfoundry/evaluation/tasks/execution/runners/videoverse
    results_path_env: WORLDFOUNDRY_VIDEOVERSE_RESULTS_PATH
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  release_status: experimental
  maturity: contract_ready
  official_benchmark_verified: false
  integration_evidence: true
  leaderboard_valid: false
  base_model_dependencies:
  - videoverse_dataset_assets
  optional_base_model_dependencies:
  - video_quality_motion_stack
  requires:
  - WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  - GEMINI_API_KEY or WORLDFOUNDRY_VIDEOVERSE_GEMINI_API_KEY for gemini judge backend
  - official_results_path or official_results for imported-result validation
  framework_acceptance:
  - WorldFoundry VideoVerse integration is OK when the caller supplies the upstream eval_res JSON and matching generated
    videos for the canonical prompt suite, strict coverage checks pass, and all declared metrics are normalized.
  leaderboard_requirements:
  - Full leaderboard validation requires generated videos for the complete prompt suite and source-audited Gemini/API 
    judge outputs.
  - WorldFoundry does not mark leaderboard_valid until upstream judge invocation, model/version, and submission protocol
    evidence are independently audited.
  blockers:
  - Full leaderboard parity requires the complete official assets, generated artifacts, and verified scorecard evidence.
  data_refs:
    task_yaml: worldfoundry/data/benchmarks/tasks/external/videoverse.yaml
    bundled_asset_paths:
    - worldfoundry/data/benchmarks/assets/videoverse/prompt/prompts_of_VideoVerse.json
    - worldfoundry/data/benchmarks/assets/videoverse/prompt/prompts_of_VideoVerse_decomposed.json
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:VideoVerseContract
    runner_script_available: true
    task_yaml_available: true
    runtime_verified: true
    credential_gated: true
    framework_ready: true
    surface: videoverse_official_in_tree
    normalizer_verified: false
  open_source_status: in_tree_runtime
  local_evaluator:
    target: worldfoundry/evaluation/tasks/execution/runners/videoverse/run_videoverse_official_runner.py
    status: implemented
    protocol: videoverse_official_in_tree
    official_result_normalization:
      status: implemented
      input_keys:
      - official_results_path
      - official_results
      - WORLDFOUNDRY_VIDEOVERSE_RESULTS_PATH
      formats:
      - json
      - jsonl
      - csv
      provenance: runs in-tree VideoVerse judge or normalizes caller-provided eval_res JSON
  official_result_entrypoint: worldfoundry-eval zoo benchmark-run
  run_command: PYTHONPATH=. "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}" 
    worldfoundry/evaluation/tasks/execution/runners/videoverse/run_videoverse_official_runner.py --run-official 
    --generated-artifact-dir "${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}" --output-dir 
    "${WORLDFOUNDRY_BENCHMARK_OUTPUT_DIR}" --json
  runner:
    validation_command:
    - worldfoundry-eval
    - zoo
    - benchmark-run
    - --benchmark-id
    - videoverse
    - --mode
    - official-validation
    - --official-results-path
    - <official_results.json>
    - --generated-artifact-dir
    - <generated_videos>
    - --output-dir
    - <out>
    - --json
    runtime:
      results_path_env: WORLDFOUNDRY_VIDEOVERSE_RESULTS_PATH
      strict_env: WORLDFOUNDRY_VIDEOVERSE_STRICT
    official_validation_command: WORLDFOUNDRY_VIDEOVERSE_STRICT=1 worldfoundry-eval zoo benchmark-run --benchmark-id 
      videoverse --mode official-validation --official-results-path <eval_res.json> --generated-artifact-dir 
      <generated_videos> --output-dir <out> --json
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - videoverse
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  integration_status: integrated
  official_runner_script: worldfoundry/evaluation/tasks/execution/runners/videoverse/run_videoverse_official_runner.py
  status: integrated
  checkpoint_refs: []
tasks:
  videoverse_world_model_standard:
    benchmark_name: videoverse
    protocol: external_official_benchmark
    capability_track: world_model_video_generation
    input_keys:
    - prompt
    - prompt_id
    - event_questions
    output_keys:
    - generated_video
    metric_ids:
    - qa_accuracy
    - event_coverage
    - temporal_causality
    - world_knowledge_consistency
    - static_scene_consistency
    - dynamic_event_consistency
    - videoverse_average
    metric_groups:
    - videoverse_world_model
    tags:
    - benchmark-zoo
    - videoverse
    - t2v
    metadata:
      source_kind: benchmark_zoo
      benchmark_id: videoverse
      official_benchmark_verified: false
      integration_evidence: true
      leaderboard_valid: false
    dataset:
      hf_dataset_id: NNaptmn/VideoVerse
      split: standard
    runtime_requirements:
      generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
      results_path_env: WORLDFOUNDRY_VIDEOVERSE_RESULTS_PATH
    artifact_contract:
      required:
        generated_video:
          kind: video
    evaluation_protocol:
    - name: external_official_runner
      metric_ids:
      - qa_accuracy
      - event_coverage
      - temporal_causality
      - world_knowledge_consistency
      - static_scene_consistency
      - dynamic_event_consistency
      - videoverse_average
      runner_target: worldfoundry.evaluation.tasks.contracts.external:VideoVerseContract
      runner_script: worldfoundry/evaluation/tasks/execution/runners/videoverse/run_videoverse_official_runner.py
    - name: in_tree_official_runner
      metric_ids:
      - qa_accuracy
      - event_coverage
      - temporal_causality
      - world_knowledge_consistency
      - static_scene_consistency
      - dynamic_event_consistency
      - videoverse_average
      runner_target: worldfoundry.evaluation.tasks.contracts.external:VideoVerseContract
      runner_script: worldfoundry-eval zoo benchmark-run
      official_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id videoverse --mode 
        official-validation --official-results-path <official_results.json> --generated-artifact-dir <generated_videos> 
        --output-dir <out> --json
      required_inputs:
      - official_results_path or official_results
      - generated_video artifacts for the official prompt/task suite
      - official upstream scorer or judge assets for leaderboard parity
      framework_acceptance:
      - Set WORLDFOUNDRY_VIDEOVERSE_STRICT=1 for formal integration checks.
      - scorecard.normalization_ok, scorecard.integration_evidence, and eligibility.full_suite_valid must all be true.
      official_result_entrypoint: worldfoundry-eval zoo benchmark-run
