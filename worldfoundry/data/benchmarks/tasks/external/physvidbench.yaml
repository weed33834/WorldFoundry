benchmark: physvidbench
description: PhysVidBench external benchmark task manifest for physical commonsense video-generation evaluation.
tags:
- benchmark-zoo
- external-official
- physvidbench
- physics
splits:
- standard
metrics:
  physical_commonsense_accuracy:
    aggregation: mean
  affordance_understanding:
    aggregation: mean
  tool_use_consistency:
    aggregation: mean
  material_property_consistency:
    aggregation: mean
  temporal_dynamics_consistency:
    aggregation: mean
  physvidbench_average:
    aggregation: mean
    primary: true
metadata:
  source_kind: benchmark_zoo
  benchmark_id: physvidbench
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id physvidbench --mode contract
    --output-dir tmp/benchmark_zoo/benchmark_contract/physvidbench --json
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:PhysVidBenchContract
  official_runner_command: worldfoundry-eval zoo benchmark-run
  prompt_suite:
    source: bundled_official_assets
    repo_url: https://github.com/ensanli/PhysVidBenchCode.git
    revision: b1d20f121ed3ebe5d18337d884fdecfad065096b
    path_or_ref: worldfoundry/data/benchmarks/assets/physvidbench/prompts_questions.csv
    captions_dir: worldfoundry/data/benchmarks/assets/physvidbench/captions
    split: standard
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  runtime:
    kind: in_tree_official_runtime
    repo_url: https://github.com/ensanli/PhysVidBenchCode.git
    revision: b1d20f121ed3ebe5d18337d884fdecfad065096b
    root_env: WORLDFOUNDRY_PHYSVIDBENCH_ROOT
    root_env_required: false
    results_path_env: WORLDFOUNDRY_PHYSVIDBENCH_RESULTS_PATH
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
    prompt_manifest: prompts_questions.csv
    captions_dir: captions
  release_status: experimental
  status: integrated
  maturity: contract_ready
  full_test_harness_ready: true
  full_suite_testable: true
  full_suite_execution_recorded: false
  official_benchmark_verified: false
  integration_evidence: true
  leaderboard_valid: false
  base_model_dependencies:
  - physvidbench_dataset_assets
  optional_base_model_dependencies:
  - physvidbench_source_assets
  - video_quality_motion_stack
  requires:
  - Bundled PhysVidBench prompts_questions.csv and captions, or explicit WORLDFOUNDRY_PHYSVIDBENCH_PROMPT_MANIFEST/WORLDFOUNDRY_PHYSVIDBENCH_CAPTIONS_DIR overrides
  - WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  - official_results_path or WORLDFOUNDRY_PHYSVIDBENCH_RESULTS_PATH for normalization-only runs
  framework_acceptance:
  - WorldFoundry PhysVidBench integration is OK when in-tree Gemini QA or caller-supplied output.csv,
    prompts_questions.csv, captions, and generated videos pass strict coverage checks and all declared metrics are
    normalized.
  data_refs:
    task_yaml: worldfoundry/data/benchmarks/tasks/external/physvidbench.yaml
    local_dataset_paths:
    - cache/worldfoundry/data/hfd_datasets/datasets--Anonymousny--PhysVidBench
    - cache/worldfoundry/data/hfd_datasets/Anonymousny__PhysVidBench
    - cache/worldfoundry/data/hfd_datasets/PhysVidBench
    bundled_asset_paths:
    - worldfoundry/data/benchmarks/assets/physvidbench/prompts_questions.csv
    - worldfoundry/data/benchmarks/assets/physvidbench/captions
  official_runner_script:
    worldfoundry/evaluation/tasks/execution/runners/physvidbench/run_physvidbench_official_runner.py
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:PhysVidBenchContract
    runner_script_available: true
    task_yaml_available: true
    runtime_verified: true
    surface: physvidbench_official_in_tree
    normalizer_verified: false
  open_source_status: in_tree_runtime
  local_evaluator:
    target: worldfoundry/evaluation/tasks/execution/runners/physvidbench/run_physvidbench_official_runner.py
    status: implemented
    protocol: physvidbench_official_in_tree
  official_result_entrypoint: worldfoundry-eval zoo benchmark-run
  run_command: PYTHONPATH=. "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}"
    worldfoundry/evaluation/tasks/execution/runners/physvidbench/run_physvidbench_official_runner.py --run-official
    --generated-artifact-dir "${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}" --output-dir
    "${WORLDFOUNDRY_BENCHMARK_OUTPUT_DIR}" --json
  integration_status: integrated
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - physvidbench
  - --mode
  - official-validation
  - --official-results-path
  - <output.csv>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  blockers:
  - Leaderboard parity requires generated videos for the full prompt suite, complete AuroraCap caption tracks,
    Gemini/API credentials for full official run, and normalized upstream evidence.
  checkpoint_refs: []
tasks:
  physvidbench_commonsense_standard:
    benchmark_name: physvidbench
    protocol: external_official_benchmark
    capability_track: physical_commonsense_video_generation
    input_keys:
    - prompt
    - prompt_id
    - physical_commonsense_questions
    output_keys:
    - generated_video
    metric_ids:
    - physical_commonsense_accuracy
    - affordance_understanding
    - tool_use_consistency
    - material_property_consistency
    - temporal_dynamics_consistency
    - physvidbench_average
    metric_groups:
    - physvidbench_physical_commonsense
    tags:
    - benchmark-zoo
    - physvidbench
    - t2v
    metadata:
      source_kind: benchmark_zoo
      benchmark_id: physvidbench
      official_benchmark_verified: false
      integration_evidence: true
      leaderboard_valid: false
    dataset:
      hf_dataset_id: Anonymousny/PhysVidBench
      split: train
      license: cc-by-4.0
    runtime_requirements:
      bundled_asset_root: worldfoundry/data/benchmarks/assets/physvidbench
      override_runtime_env: WORLDFOUNDRY_PHYSVIDBENCH_ROOT
      generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
      results_path_env: WORLDFOUNDRY_PHYSVIDBENCH_RESULTS_PATH
    artifact_contract:
      required:
        generated_video:
          kind: video
    evaluation_protocol:
    - name: external_official_runner
      metric_ids:
      - physical_commonsense_accuracy
      - affordance_understanding
      - tool_use_consistency
      - material_property_consistency
      - temporal_dynamics_consistency
      - physvidbench_average
      runner_target: worldfoundry.evaluation.tasks.contracts.external:PhysVidBenchContract
      runner_script: worldfoundry/evaluation/tasks/execution/runners/physvidbench/run_physvidbench_official_runner.py
