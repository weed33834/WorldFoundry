benchmark: physics-iq
description: Physics-IQ external benchmark contract manifest.
id: physics-iq
name: Physics-IQ
status: contract_ready
domain:
- physics
- solid-mechanics
- fluid-dynamics
- optics
- thermodynamics
- magnetism
task_type: image_to_video_physical_understanding_evaluation
input:
  modalities:
  - image
  keys:
  - prompt
  - prompt_id
  - generated_artifact_manifest
output:
  modalities:
  - video
  artifacts:
  - generated_video
evaluation_requirements:
  generated_artifacts:
  - generated_video
  metrics_source: official Physics-IQ scorer, dataset, and category annotations
  requires_official_runtime_execution: false
  runtime_source_dependency: false
  notes:
  - Source repositories and project pages are provenance only for this in-tree contract.
source_provenance:
  status: contract_ready
  official_repository:
    url: https://github.com/google-deepmind/physics-IQ-benchmark
    revision: 52e52a14d3a7284ae24d8aff98fe982ac7a60971
    provenance_only: true
  paper:
    url: https://arxiv.org/abs/2501.09038
  project_page:
    url: https://physics-iq.github.io/
tags:
- benchmark-zoo
- external-official
- physics-iq
- image-to-video
- physical-understanding
splits:
- standard
metrics:
  physics_iq_score:
    aggregation: mean
  solid_mechanics:
    aggregation: mean
  fluid_dynamics:
    aggregation: mean
  optics:
    aggregation: mean
  thermodynamics:
    aggregation: mean
  magnetism:
    aggregation: mean
  physics_iq_average:
    aggregation: mean
    primary: true
metadata:
  source_kind: benchmark_zoo
  benchmark_id: physics-iq
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id physics-iq --mode contract
    --output-dir tmp/benchmark_zoo/benchmark_contract/physics-iq --json
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:PhysicsIQContract
  official_runner_script: worldfoundry/evaluation/tasks/execution/runners/physics_iq/run_physics_iq_official_runner.py
  metric_evaluator_target: worldfoundry/evaluation/tasks/execution/runners/physics_iq/run_physics_iq_official_runner.py
  metric_protocol:
    official_definition: Physics-IQ compares generated 5-second continuations to real reference continuations using
      spatial IoU, weighted spatial IoU, spatiotemporal IoU, and MSE, normalized by physical variance between two real
      takes; the Physics-IQ score is clipped to 0-100%.
    official_results_fields:
    - physics_iq_score
    - physics_iq_average
    - v1_mse_<perspective>
    - spatiotemporal_iou_v1_<perspective>
    - spatial_iou_v1_<perspective>
    - weighted_spatial_iou_v1_<perspective>
    - variance_mse_<perspective>
    - variance_spatiotemporal_iou_<perspective>
    - variance_spatial_<perspective>
    - variance_weighted_spatial_<perspective>
    required_artifacts:
    - Physics-IQ dataset with testing videos and switch frames
    - descriptions.csv
    - generated videos with 0001_ to 0198_ prefixes and exactly 5 seconds
    - real and generated binary video masks
    - official per-scenario metric CSV
    official_metric_blocked_reason: asset_required
  prompt_suite:
    status: official_repo_data
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  runtime:
    kind: in_tree_official_runtime
    repo_url: https://github.com/google-deepmind/physics-IQ-benchmark.git
    revision: 52e52a14d3a7284ae24d8aff98fe982ac7a60971
    root: worldfoundry/evaluation/tasks/execution/runners/physics_iq
    root_env: WORLDFOUNDRY_PHYSICS_IQ_ROOT
    bundled_descriptions: worldfoundry/data/benchmarks/assets/physics-iq/descriptions/descriptions.csv
  release_status: experimental
  open_source_status: in_tree_runtime
  maturity: contract_ready
  official_benchmark_verified: false
  integration_evidence: true
  leaderboard_valid: false
  optional_base_model_dependencies:
  - grounded_depth_segmentation_stack
  requires:
  - bundled descriptions.csv or WORLDFOUNDRY_PHYSICS_IQ_DESCRIPTIONS override
  - WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  - official_results_path or WORLDFOUNDRY_PHYSICS_IQ_RESULTS_PATH for normalization-only runs
  blockers:
  - Leaderboard parity requires physics-IQ-benchmark dataset assets, 198 generated 5-second videos, and full upstream
    mask/scorer execution for full official run.
  data_refs:
    task_yaml: worldfoundry/data/benchmarks/tasks/external/physics-iq.yaml
    bundled_asset_paths:
    - worldfoundry/data/benchmarks/assets/physics-iq/descriptions/descriptions.csv
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:PhysicsIQContract
    runner_script_available: true
    task_yaml_available: true
    runtime_verified: true
    surface: physics_iq_official_in_tree
    normalizer_verified: false
  official_result_entrypoint: worldfoundry-eval zoo benchmark-run
  local_evaluator:
    target: worldfoundry/evaluation/tasks/execution/runners/physics_iq/run_physics_iq_official_runner.py
    status: implemented
    protocol: physics_iq_official_in_tree
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - physics-iq
  - --mode
  - official-validation
  - --official-results-path
  - <results_summary.csv>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  integration_status: integrated
  status: integrated
  run_command: PYTHONPATH=. "${WORLDFOUNDRY_UNIFIED_PYTHON:-python}"
    worldfoundry/evaluation/tasks/execution/runners/physics_iq/run_physics_iq_official_runner.py --run-official
    --generated-artifact-dir "${WORLDFOUNDRY_GENERATED_ARTIFACT_DIR}" --output-dir
    "${WORLDFOUNDRY_BENCHMARK_OUTPUT_DIR}" --json
  checkpoint_refs: []
tasks:
  physics_iq_standard:
    benchmark_name: physics-iq
    protocol: external_official_benchmark
    capability_track: image_to_video
    input_keys:
    - prompt
    - prompt_id
    - generated_artifact_manifest
    output_keys:
    - generated_video
    metric_ids:
    - physics_iq_score
    - solid_mechanics
    - fluid_dynamics
    - optics
    - thermodynamics
    - magnetism
    - physics_iq_average
    metric_groups:
    - physics_iq_metrics
    tags:
    - benchmark-zoo
    - external-official
    - physics-iq
    - image-to-video
    - physical-understanding
    metadata:
      source_kind: benchmark_zoo
      benchmark_id: physics-iq
      official_benchmark_verified: false
      integration_evidence: true
      leaderboard_valid: false
    dataset:
      status: bundled_prompt_descriptions_or_generated_artifacts
    runtime_requirements:
      bundled_descriptions: worldfoundry/data/benchmarks/assets/physics-iq/descriptions/descriptions.csv
      generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
      results_path_env: WORLDFOUNDRY_PHYSICS_IQ_RESULTS_PATH
    artifact_contract:
      required:
        generated_video:
          kind: video
    evaluation_protocol:
    - name: in_tree_physics_iq_evaluator
      metric_ids:
      - physics_iq_score
      - solid_mechanics
      - fluid_dynamics
      - optics
      - thermodynamics
      - magnetism
      - physics_iq_average
      evaluator_target: worldfoundry/evaluation/tasks/execution/runners/physics_iq/run_physics_iq_official_runner.py
      status: implemented
    - name: external_official_runner
      metric_ids:
      - physics_iq_score
      - solid_mechanics
      - fluid_dynamics
      - optics
      - thermodynamics
      - magnetism
      - physics_iq_average
      runner_target: worldfoundry.evaluation.tasks.contracts.external:PhysicsIQContract
      evaluator_target: worldfoundry.evaluation.tasks.execution.runners.physics_iq.run_physics_iq_official_runner:normalize_physics_iq_results
      runner_script: worldfoundry/evaluation/tasks/execution/runners/physics_iq/run_physics_iq_official_runner.py
      official_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id physics-iq --mode
        official-validation --official-results-path <official_results.json> --generated-artifact-dir <generated_videos>
        --output-dir <out> --json
