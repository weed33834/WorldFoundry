benchmark: ewmbench
name: EWMBench
description: Task manifest for embodied world model scene, motion, and semantic quality evaluation.
tags:
- benchmark-zoo
- external-official
- ewmbench
- embodied-world-model
- video-generation-quality
- action-conditioned-generation
splits:
- standard
metrics:
  scene_consistency:
    aggregation: mean
  motion_correctness:
    aggregation: mean
  semantic_alignment:
    aggregation: mean
  diversity:
    aggregation: mean
  ewmbench_average:
    aggregation: mean
    primary: true
metadata:
  source_kind: benchmark_zoo
  benchmark_id: ewmbench
  contract_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id ewmbench --mode contract --output-dir
    tmp/benchmark_zoo/benchmark_contract/ewmbench --json
  official_runner_target: worldfoundry.evaluation.tasks.contracts.external:EWMBenchContract
  official_runner_command: worldfoundry-eval zoo benchmark-run
  name: EWMBench
  domain:
  - embodied-world-model
  - scene-consistency
  - motion-correctness
  - semantic-alignment
  task_type: embodied_world_model_action_conditioned_video_evaluation
  status: in_tree_official_runtime_ready_full_upstream_pending
  maturity: contract_ready
  release_status: experimental
  open_source_status: in_tree_runtime
  official_benchmark_verified: false
  integration_evidence: true
  leaderboard_valid: false
  base_model_dependencies:
  - ewmbench_dataset_assets
  optional_base_model_dependencies:
  - spatial_perception_core_stack
  source_provenance:
    official_repo:
      url: https://github.com/AgibotTech/EWMBench
      verified_by: git ls-remote https://github.com/AgibotTech/EWMBench HEAD
      head_sha: 3a5531c0e6b6be51431251ed5617b9e48c852098
      role: provenance_only_not_runtime_dependency
    hf_dataset:
      repo_id: agibot-world/EWMBench
      verified_by: HEAD https://huggingface.co/api/datasets/agibot-world/EWMBench
      private: false
      gated: false
      license: cc-by-nc-sa-4.0
      role: provenance_only_not_runtime_dependency
    paper:
      url: https://arxiv.org/abs/2505.09694
    project_page:
      url: https://huggingface.co/datasets/agibot-world/EWMBench
  input_contract:
  - prompt
  - prompt_id
  - action_context
  - generated_artifact_manifest
  output_contract:
  - generated_video
  evaluation_requirements:
  - Use EWMBench scene, motion, semantic, and diversity evaluation setup.
  - Aggregate supplied official/rubric rows through the verified WorldFoundry benchmark-run entrypoint.
  requires:
  - bundled EWMBench runtime assets
  - WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  - WORLDFOUNDRY_EWMBENCH_RESULTS_PATH
  - official_results_path or official_results
  blockers:
  - Leaderboard parity requires official judge/checkpoint/API assets and full-suite normalized upstream result files.
  data_refs:
    task_yaml: worldfoundry/data/benchmarks/tasks/external/ewmbench.yaml
    in_tree_runtime_paths:
    - worldfoundry/evaluation/tasks/execution/runners/ewmbench/runtime/ewmbench
  official_runner_script: worldfoundry/evaluation/tasks/execution/runners/ewmbench/run_ewmbench_official_runner.py
  runner_availability:
    available: true
    runner_target: worldfoundry.evaluation.tasks.contracts.external:EWMBenchContract
    runner_script_available: true
    task_yaml_available: true
    runtime_verified: false
    surface: ewmbench_official_in_tree
    normalizer_verified: true
  artifact_layout:
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
    output_artifact: benchmark_scorecard
    filename_template: scorecard.json
  runtime:
    kind: in_tree_official_source
    root: worldfoundry/evaluation/tasks/execution/runners/ewmbench/runtime/ewmbench
    root_env: WORLDFOUNDRY_EWMBENCH_ROOT
    repo_url: https://github.com/AgibotTech/EWMBench.git
    revision: 3a5531c0e6b6be51431251ed5617b9e48c852098
    results_path_env: WORLDFOUNDRY_EWMBENCH_RESULTS_PATH
    generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
  metric_protocol:
    metric_ids:
    - scene_consistency
    - motion_correctness
    - semantic_alignment
    - diversity
    - ewmbench_average
    primary_metric: ewmbench_average
    local_deterministic_modes:
    - rubric_manifest
    - official_scorecard_normalization
    - artifact_presence_format
  local_evaluator:
    target: worldfoundry/evaluation/tasks/execution/runners/ewmbench/run_ewmbench_official_runner.py
    status: implemented
    protocol: official_result_normalization
    official_result_normalization:
      status: implemented
      input_keys:
      - official_results_path
      - official_results
      - WORLDFOUNDRY_EWMBENCH_RESULTS_PATH
      formats:
      - json
      - jsonl
      - csv
      provenance: normalizes caller-provided official outputs without executing upstream repos
      framework_verified: true
  official_result_entrypoint: worldfoundry-eval zoo benchmark-run
  runner:
    validation_command:
    - worldfoundry-eval
    - zoo
    - benchmark-run
    - --benchmark-id
    - ewmbench
    - --mode
    - official-validation
    - --official-results-path
    - <official_results.json>
    - --generated-artifact-dir
    - <generated_videos>
    - --output-dir
    - <out>
    - --json
    runtime:
      results_path_env: WORLDFOUNDRY_EWMBENCH_RESULTS_PATH
    official_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id ewmbench --mode official-validation
      --official-results-path <official_results.json> --generated-artifact-dir <generated_videos> --output-dir <out>
      --json
  validation_command:
  - worldfoundry-eval
  - zoo
  - benchmark-run
  - --benchmark-id
  - ewmbench
  - --mode
  - official-validation
  - --official-results-path
  - <official_results.json>
  - --generated-artifact-dir
  - <generated_videos>
  - --output-dir
  - <out>
  - --json
  integration_status: integrated
  checkpoint_refs: []
tasks:
  ewmbench_standard:
    benchmark_name: ewmbench
    protocol: external_official_benchmark
    capability_track: embodied_world_model
    schema_type: generated_artifact_set
    input_keys:
    - prompt
    - prompt_id
    - action_context
    - generated_artifact_manifest
    output_keys:
    - generated_video
    metric_ids:
    - scene_consistency
    - motion_correctness
    - semantic_alignment
    - diversity
    - ewmbench_average
    metric_groups:
    - ewmbench_metrics
    tags:
    - benchmark-zoo
    - external-official
    - ewmbench
    - embodied-world-model
    - video-generation-quality
    metadata:
      source_kind: benchmark_zoo
      benchmark_id: ewmbench
      domain:
      - embodied-world-model
      - scene-consistency
      task_type: embodied_world_model_action_conditioned_video_evaluation
      status: integrated
      artifact_contract:
        required:
          generated_video:
            kind: video
      evaluation_requirements:
      - Use EWMBench scene, motion, semantic, and diversity evaluation setup.
      - Aggregate supplied official/rubric rows through the verified WorldFoundry benchmark-run entrypoint.
      metric_protocol:
        metric_ids:
        - scene_consistency
        - motion_correctness
        - semantic_alignment
        - diversity
        - ewmbench_average
        primary_metric: ewmbench_average
        local_deterministic_modes:
        - rubric_manifest
        - official_scorecard_normalization
        - artifact_presence_format
      official_benchmark_verified: false
      integration_evidence: true
      leaderboard_valid: false
    dataset:
      status: official_hf_dataset_required
      hf_dataset_id: agibot-world/EWMBench
      split: standard
      source: provenance_only
    artifact_contract:
      required:
        generated_video:
          kind: video
    evaluation_protocol:
    - name: external_official_runner
      runner_target: worldfoundry.evaluation.tasks.contracts.external:EWMBenchContract
      runner_script: worldfoundry/evaluation/tasks/execution/runners/ewmbench/run_ewmbench_official_runner.py
      metric_ids:
      - scene_consistency
      - motion_correctness
      - semantic_alignment
      - diversity
      - ewmbench_average
      official_validation_command: worldfoundry-eval zoo benchmark-run --benchmark-id ewmbench --mode
        official-validation --official-results-path <official_results.json> --generated-artifact-dir <generated_videos>
        --output-dir <out> --json
      required_inputs:
      - official_results_path or official_results
      - generated_video artifacts for the official prompt/task suite
      - official upstream scorer or judge assets for leaderboard parity
      official_result_entrypoint: worldfoundry-eval zoo benchmark-run
    - name: in_tree_local_quality_evaluator
      metric_ids:
      - scene_consistency
      - motion_correctness
      - semantic_alignment
      - diversity
      - ewmbench_average
      evaluator_target: worldfoundry.evaluation.tasks.execution.runners.ewmbench.ewmbench_in_tree_evaluator:EwmbenchInTreeEvaluator
      status: available_for_structured_evidence
      metadata:
        scoring_modes:
        - rubric_manifest
        - official_scorecard_normalization
        - artifact_presence_format
        blocked_conditions:
        - official_detector_or_vlm_required when rubric/official score rows are absent
        required_evidence_artifacts:
        - generated_video or generated frame sequence for official EWMBench samples
        - rubric_manifest or official score rows keyed by EWMBench dimensions
        - official detector/VLM/foundation-model outputs for leaderboard parity
    runtime_requirements:
      in_tree_runtime: worldfoundry/evaluation/tasks/execution/runners/ewmbench/runtime/ewmbench
      generated_artifact_dir_env: WORLDFOUNDRY_GENERATED_ARTIFACT_DIR
      results_path_env: WORLDFOUNDRY_EWMBENCH_RESULTS_PATH
