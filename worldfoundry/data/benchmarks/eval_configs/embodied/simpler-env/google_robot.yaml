id: simpler_env_google_robot_eval
output_dir: ./results/simpler_env_google_robot_eval
model_id: external-policy-server
server:
  url: ws://localhost:8000
benchmarks:
  - id: pick_coke_can
    benchmark_id: simpler-env
    episodes_per_task: 24
    params:
      task_name: google_robot_pick_coke_can
  - id: pick_object
    benchmark_id: simpler-env
    episodes_per_task: 24
    params:
      task_name: google_robot_pick_object
  - id: move_near
    benchmark_id: simpler-env
    episodes_per_task: 24
    params:
      task_name: google_robot_move_near
  - id: open_drawer
    benchmark_id: simpler-env
    episodes_per_task: 24
    params:
      task_name: google_robot_open_drawer
  - id: close_drawer
    benchmark_id: simpler-env
    episodes_per_task: 24
    params:
      task_name: google_robot_close_drawer
  - id: place_in_closed_drawer
    benchmark_id: simpler-env
    episodes_per_task: 24
    params:
      task_name: google_robot_place_in_closed_drawer
metric_ids:
  - task_success
  - success_rate
