    env: WORLDFOUNDRY_ROBOTWIN_ROOT
  - id: public_simulator_assets
    kind: simulator_asset
    hf_dataset_id: TianxingChen/RoboTwin2.0
    path: ${WORLDFOUNDRY_HFD_DATASET_ROOT}/TianxingChen__RoboTwin2.0
    allow_patterns:
    - background_texture.zip
    - embodiments.zip
    - objects.zip
  - id: unified_dataset
    kind: dataset
    hf_dataset_id: lerobot/robotwin_unified
    path: ${WORLDFOUNDRY_HFD_DATASET_ROOT}/lerobot__robotwin_unified
    access: manual_license_review
  - id: task_split
    kind: dataset_split
    path: ${WORLDFOUNDRY_HFD_DATASET_ROOT}/TianxingChen__RoboTwin2.0
    split_env: WORLDFOUNDRY_ROBOTWIN_TASK_CONFIG
    default_split: demo_clean,demo_randomized
    allowed_splits:
    - demo_clean
    - demo_randomized
    - all_50_tasks
    required_for: official_rollout_execution
  - id: policy_checkpoints
    kind: checkpoint
    env: WORLDFOUNDRY_ROBOTWIN_POLICY_CHECKPOINT
    path: ${WORLDFOUNDRY_CKPT_DIR}/robotwin
    required_for: official_rollout_execution
  - id: official_results_dump
    kind: result_dump
    path: ${WORLDFOUNDRY_ARTIFACT_DIR}/runs/robotwin/eval_result
    env: WORLDFOUNDRY_ROBOTWIN_RESULTS_PATH
    note: May point directly to the upstream RoboTwin eval_result directory containing _result.txt files.
  - id: upstream_rollout_execution
    kind: upstream_rollout_execution
    depends_on:
    - official_repo
    - public_simulator_assets
    - unified_dataset
    - task_split
    - policy_checkpoints
    - official_results_dump
    required_for: leaderboard_evidence
    note: Run upstream RoboTwin policy evaluation in its SAPIEN/Curobo environment, then import eval_result.
