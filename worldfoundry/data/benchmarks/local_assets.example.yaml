schema_version: worldfoundry-local-assets-v1
description: Unified example manifest for local benchmark assets (Hugging Face datasets, checkpoints, simulator assets, and result dumps). Copy outside git, edit the ${WORLDFOUNDRY_*} placeholders, then set WORLDFOUNDRY_LOCAL_ASSET_MANIFEST. Dataset path lookup uses the same file via kind=dataset rows with hf_dataset_id.
policy:
  no_large_files_in_repo: true
  safe_auto_download_kinds:
  - dataset
  - checkpoint
  manual_kinds:
  - result_dump
  - simulator_asset
  - simulator_runtime
  note: Dataset rows with hf_dataset_id can be checked with the asset preparation tooling. Checkpoint rows with hf_model_id are
    download-plan hints only; official result dumps and simulator assets must be produced or staged outside git.
layout:
  datasets: ${WORLDFOUNDRY_DATA_DIR}/datasets
  hfd_datasets: ${WORLDFOUNDRY_HFD_DATASET_ROOT}
  checkpoints: ${WORLDFOUNDRY_CKPT_DIR}
  repos: ${WORLDFOUNDRY_CACHE_DIR}/repos
  manifests: ${WORLDFOUNDRY_CACHE_DIR}/manifests
  runs: ${WORLDFOUNDRY_ARTIFACT_DIR}/runs
benchmarks:
- id: worldmodelbench
  assets:
  - id: dataset
    kind: dataset
    hf_dataset_id: Efficient-Large-Model/worldmodelbench
    path: ${WORLDFOUNDRY_DATA_DIR}/datasets/Efficient-Large-Model__worldmodelbench
  - id: judge_checkpoint
    kind: checkpoint
    hf_model_id: Efficient-Large-Model/vila-ewm-qwen2-1.5b
    env: WORLDFOUNDRY_WORLDMODELBENCH_JUDGE
    path: ${WORLDFOUNDRY_CKPT_DIR}/Efficient-Large-Model__vila-ewm-qwen2-1.5b
- id: video-bench
  assets:
  - id: human_annotation
    kind: dataset
    hf_dataset_id: Video-Bench/Video-Bench_human_annotation
    path: ${WORLDFOUNDRY_DATA_DIR}/datasets/Video-Bench__Video-Bench_human_annotation
  - id: official_videos
    kind: dataset
    hf_dataset_id: Video-Bench/Video-Bench_videos
    path: ${WORLDFOUNDRY_DATA_DIR}/datasets/Video-Bench__Video-Bench_videos
- id: evalcrafter
  assets:
  - id: generated_video_dataset
    kind: dataset
    hf_dataset_id: RaphaelLiu/EvalCrafter_T2V_Dataset
    revision: d7e4823df49732e26762458ec98f6adbeb8b92d1
    path: ${WORLDFOUNDRY_DATA_DIR}/datasets/RaphaelLiu__EvalCrafter_T2V_Dataset
    env: WORLDFOUNDRY_EVALCRAFTER_DATASET_ROOT
    note: Pass an inner model directory containing 0000.mp4 through 0699.mp4 as WORLDFOUNDRY_GENERATED_ARTIFACT_DIR.
  - id: metric_checkpoints
    kind: checkpoint
    path: ${WORLDFOUNDRY_CKPT_DIR}/evalcrafter
    access: manual_upstream_metric_assets
    note: Stage DOVER, BLIP2, SDXL, Inception, VideoMAE, FlowNet2, VGG Face, and DeAOT assets per the EvalCrafter runtime profile.
  - id: official_results_dump
    kind: result_dump
    path: ${WORLDFOUNDRY_ARTIFACT_DIR}/runs/evalcrafter/official_results
    env: WORLDFOUNDRY_EVALCRAFTER_RESULTS_PATH
    prepare:
      command: mkdir -p ${WORLDFOUNDRY_ARTIFACT_DIR}/runs/evalcrafter/official_results
      note: Place upstream final_result.txt outputs here for normalizer-only imports; do not commit result dumps.
- id: worldscore
  assets:
  - id: dataset
    kind: dataset
    hf_dataset_id: Howieeeee/WorldScore
    path: ${WORLDFOUNDRY_DATA_DIR}/datasets/Howieeeee__WorldScore
- id: vchitect
  assets:
  - id: vbench_source
    kind: in_tree_source
    path: ${WORLDFOUNDRY_REPO_ROOT}/worldfoundry/evaluation/tasks/execution/runners/vbench/runtime
    optional_override_env: WORLDFOUNDRY_VBENCH_ROOT
  - id: vbench_plus_plus_source
    kind: in_tree_source
    path: ${WORLDFOUNDRY_REPO_ROOT}/worldfoundry/evaluation/tasks/execution/runners/vbench_plus_plus/runtime
    optional_override_env: WORLDFOUNDRY_VBENCH_PLUS_PLUS_ROOT
  - id: vbench2_source
    kind: in_tree_source
    path: ${WORLDFOUNDRY_REPO_ROOT}/worldfoundry/evaluation/tasks/execution/runners/vbench_2_0/runtime
    optional_override_env: WORLDFOUNDRY_VBENCH2_ROOT
  - id: metric_checkpoints
    kind: checkpoint_cache
    env: WORLDFOUNDRY_VBENCH_CACHE_DIR
    path: ${WORLDFOUNDRY_CACHE_DIR}/models/vbench
    note: Base VBench weights are downloaded by the WorldFoundry base-model planner or can be staged from an existing cache.
  - id: vbench2_metric_checkpoints
    kind: checkpoint_cache
    env: WORLDFOUNDRY_VBENCH2_CACHE_DIR
    path: ${WORLDFOUNDRY_CACHE_DIR}/models/vbench2
    note: VBench-2.0-only LLaVA/Qwen/YOLO/ArcFace/anomaly assets are downloaded or staged only for dimensions that need them.
  - id: vchitect_checkpoint
    kind: checkpoint
    hf_model_id: Vchitect/Vchitect-2.0-2B
    env: WORLDFOUNDRY_VCHITECT_CHECKPOINT_DIR
    path: ${WORLDFOUNDRY_CKPT_DIR}/Vchitect__Vchitect-2.0-2B
  - id: vbench2_sampled_videos
    kind: dataset
    hf_dataset_id: Vchitect/VBench-2.0_sampled_videos
    path: ${WORLDFOUNDRY_DATA_DIR}/datasets/Vchitect__VBench-2.0_sampled_videos
  - id: vbench2_human_annotation
    kind: dataset
    hf_dataset_id: Vchitect/VBench-2.0_human_annotation
    path: ${WORLDFOUNDRY_DATA_DIR}/datasets/Vchitect__VBench-2.0_human_annotation
  - id: vbench2_human_anomaly
    kind: dataset
    hf_dataset_id: Vchitect/VBench-2.0_human_anomaly
    path: ${WORLDFOUNDRY_DATA_DIR}/datasets/Vchitect__VBench-2.0_human_anomaly
- id: libero
  assets:
  - id: official_repo
    kind: repo
    repo_url: https://github.com/Lifelong-Robot-Learning/LIBERO
    path: ${WORLDFOUNDRY_CACHE_DIR}/repos/Lifelong-Robot-Learning--LIBERO
    env: WORLDFOUNDRY_LIBERO_ROOT
  - id: lerobot_dataset
    kind: dataset
    hf_dataset_id: lerobot/libero
    path: ${WORLDFOUNDRY_HFD_DATASET_ROOT}/lerobot__libero
    env: WORLDFOUNDRY_LIBERO_LEROBOT_DATASET_ROOT
  - id: official_dataset
    kind: dataset
    hf_dataset_id: yifengzhu-hf/LIBERO-datasets
    path: ${WORLDFOUNDRY_HFD_DATASET_ROOT}/yifengzhu-hf__LIBERO-datasets
    env: WORLDFOUNDRY_LIBERO_DATASETS_ROOT
    access: manual_license_review
  - id: dataset_split
    kind: dataset_split
    path: ${WORLDFOUNDRY_HFD_DATASET_ROOT}/yifengzhu-hf__LIBERO-datasets
    split_env: WORLDFOUNDRY_LIBERO_SUITE
    default_split: libero_10
    allowed_splits:
    - libero_spatial
    - libero_object
    - libero_goal
    - libero_10
    - libero_90
    required_for: official_rollout_execution
    note: Select the exact LIBERO suite used by the upstream policy rollout.
  - id: simulator_assets
    kind: simulator_asset
    path: ${WORLDFOUNDRY_DATA_DIR}/datasets/libero/simulator_assets
    note: Stage robosuite/MuJoCo assets and task definitions expected by the LIBERO checkout.
  - id: policy_checkpoint
    kind: checkpoint
    env: WORLDFOUNDRY_LIBERO_POLICY_CHECKPOINT
    path: ${WORLDFOUNDRY_CKPT_DIR}/openvla__openvla-7b-finetuned-libero-10
    required_for: official_rollout_execution
  - id: official_results_dump
    kind: result_dump
    path: ${WORLDFOUNDRY_ARTIFACT_DIR}/runs/libero/official_results
    env: WORLDFOUNDRY_LIBERO_RESULTS_PATH
    prepare:
      command: mkdir -p ${WORLDFOUNDRY_ARTIFACT_DIR}/runs/libero/official_results
      note: Place normalized upstream official result files here; do not commit result dumps.
  - id: upstream_rollout_execution
    kind: upstream_rollout_execution
    depends_on:
    - official_repo
    - official_dataset
    - dataset_split
    - simulator_assets
    - policy_checkpoint
    - official_results_dump
    required_for: leaderboard_evidence
    note: Run the official LIBERO evaluator in the upstream checkout, then import its result dump with benchmark-run --mode official-validation.
- id: libero-para
  assets:
  - id: official_repo
    kind: repo
    repo_url: https://github.com/cau-hai-lab/LIBERO-Para
    path: ${WORLDFOUNDRY_CACHE_DIR}/repos/cau-hai-lab--LIBERO-Para
    env: WORLDFOUNDRY_LIBERO_PARA_ROOT
  - id: official_dataset
    kind: dataset
    hf_dataset_id: HAI-Lab/LIBERO-Para
    path: ${WORLDFOUNDRY_HFD_DATASET_ROOT}/HAI-Lab__LIBERO-Para
    env: WORLDFOUNDRY_LIBERO_PARA_DATASET_ROOT
    access: manual_license_review
  - id: paraphrase_split
    kind: dataset_split
    path: ${WORLDFOUNDRY_HFD_DATASET_ROOT}/HAI-Lab__LIBERO-Para
    split_env: WORLDFOUNDRY_LIBERO_PARA_SPLIT
    default_split: paraphrase_eval
    allowed_splits:
    - paraphrase_eval
    - paraphrase_train
    - libero_10_para
    required_for: official_rollout_execution
    note: Keep the paraphrase split mapping fixed when comparing policies.
  - id: simulator_assets
    kind: simulator_asset
    path: ${WORLDFOUNDRY_DATA_DIR}/datasets/libero-para/simulator_assets
    note: Stage the LIBERO-compatible simulator assets expected by the LIBERO-Para checkout.
  - id: policy_checkpoint
