    path: ${WORLDFOUNDRY_ARTIFACT_DIR}/runs/libero-para/official_results
    env: WORLDFOUNDRY_LIBERO_PARA_RESULTS_PATH
  - id: upstream_rollout_execution
    kind: upstream_rollout_execution
    depends_on:
    - official_repo
    - official_dataset
    - paraphrase_split
    - simulator_assets
    - policy_checkpoint
    - official_results_dump
    required_for: leaderboard_evidence
    note: Run the upstream LIBERO-Para evaluator with the selected paraphrase split, then import the rollout result dump.
