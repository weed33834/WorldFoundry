[tool.setuptools_scm]

[tool.ruff]
target-version = "py310"
line-length = 120
extend-exclude = [
    "thirdparty",
    "cache",
    "tmp",
    "outputs",
    "runs",
    "benchmark_results",
    "inspatio_world_output",
    "docs/fumadocs/.next",
    "docs/fumadocs/node_modules",
    "docs/fumadocs/out",
    "apps",
    "worldfoundry/base_models",
    "worldfoundry/synthesis",
    "worldfoundry/representations",
]

[tool.ruff.lint]
select = [
    "E4",
    "E7",
    "E9",
    "F",
    "I",
]
ignore = [
    "E501",
]

[tool.pytest.ini_options]
testpaths = [
    "test/eval_core/test_api_contracts.py",
    "test/eval_core/test_metric_registry.py",
    "test/eval_core/test_task_yaml.py",
    "test/eval_core/test_run_manifest.py",
    "test/eval_core/test_public_namespace.py",
    "test/eval_core/test_video_quality_local_evaluator.py",
]
addopts = [
    "--strict-markers",
]
markers = [
    "unit: pure unit tests for deterministic local code paths without checkpoint, dataset, network, or external service dependencies.",
    "fast_eval_core: fast deterministic eval-core contract fixtures without checkpoint or external API dependencies.",
    "gpu: tests that require CUDA devices, model checkpoints, or GPU-backed inference runtimes.",
    "gated: tests that require private credentials, gated datasets, accepted licenses, or manually provisioned services.",
]

[tool.setuptools]
packages = { find = { where = ["."], include = ["worldfoundry*"], exclude = [
    "worldfoundry.pipelines.*.runtime*",
    "worldfoundry.synthesis.visual_generation.*.runtime*",
    "worldfoundry.synthesis.visual_generation.*.*_runtime*",
    "worldfoundry.synthesis.action_generation.*.runtime*",
    "worldfoundry.synthesis.action_generation.*.*_runtime*",
    "worldfoundry.representations.*.*_official*",
    "worldfoundry.base_models.*.*.third_party*",
    "worldfoundry.base_models.*.*.*_runtime.third_party*",
    "worldfoundry.base_models.*.*.*_runtime.submodules*",
    "worldfoundry.base_models.*.*.*_runtime.src*",
    "worldfoundry.base_models.*.*.*_runtime.*.src*",
    "worldfoundry.base_models.*.depth_anything",
    "worldfoundry.base_models.*.depth_anything.*",
    "worldfoundry.base_models.*.*.dvlt_runtime.src*",
    "worldfoundry.base_models.*.*.pixelsplat_full.src*",
    "worldfoundry.base_models.*.vggt.vggt",
    "worldfoundry.base_models.*.vggt.vggt.*",
    "worldfoundry.base_models.*.vggt_omega.vggt_omega",
    "worldfoundry.base_models.*.vggt_omega.vggt_omega.*",
    "worldfoundry.base_models.*.vggt_fantasy_world.vggt",
    "worldfoundry.base_models.*.vggt_fantasy_world.vggt.*",
    "worldfoundry.base_models.*.pixelsplat_runtime",
    "worldfoundry.base_models.*.gaussian_splatting.arguments",
    "worldfoundry.base_models.*.gaussian_splatting.scene",
    "worldfoundry.base_models.*.gaussian_splatting.gaussian_renderer",
    "worldfoundry.base_models.*.eastern_journalist.utils3d",
    "worldfoundry.base_models.*.eastern_journalist.utils3d.*",
    "worldfoundry.base_models.*.*_runtime",
    "worldfoundry.base_models.*.*_runtime.*",
] } }
include-package-data = true

[tool.setuptools.package-data]
"worldfoundry.cli" = [
    "assets/openenvision_logo.png",
    "tui_app.tcss",
]
"worldfoundry.data" = [
    "benchmarks/**/*.json",
    "benchmarks/**/*.jsonl",
    "benchmarks/**/*.csv",
    "benchmarks/**/*.txt",
    "benchmarks/**/*.yaml",
    "benchmarks/**/*.yml",
    "benchmarks/**/*.md",
    "models/**/*.yaml",
    "models/**/*.yml",
]
"worldfoundry.evaluation.tasks.execution.runners" = [
    "fetv/runtime/fetv_eval/**/*",
    "vmbench/runtime/official/**/*",
    "world_in_world/runtime/official/**/*",
]
"worldfoundry.base_models" = [
    "diffusion_model/diffsynth/tokenizer_configs/**/*",
    "perception_core/video_text/fetv_blip/**/*",
    "perception_core/video_quality/fetv_stylegan_v/**/*",
    "perception_core/general_perception/open_clip/bpe_simple_vocab_16e6.txt.gz",
    "perception_core/segment/sam3/assets/bpe_simple_vocab_16e6.txt.gz",
    "diffusion_model/video/cosmos3/UPSTREAM*.txt",
    "diffusion_model/video/cosmos3/diffusers_cosmos3/sample_args/*.json",
]
"worldfoundry.studio" = [
    "assets/**/*",
]
