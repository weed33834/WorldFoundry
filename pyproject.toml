[build-system]
requires = ["setuptools", "wheel", "setuptools-scm[toml]"]
build-backend = "setuptools.build_meta"

[project]
name = "worldfoundry"
dynamic = ["version"]
description = "WorldFoundry: unified world-model repository and WorldFoundry benchmark framework."
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE"]
requires-python = ">=3.10,<3.14"
authors = [
    { name = "OpenEnvision" },
]
keywords = [
    "world-models",
    "video-generation",
    "benchmark",
    "evaluation",
    "3d-reconstruction",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "msgpack",
    "packaging",
    "pyyaml",
    "tqdm",
    "websockets",
]

[project.scripts]
worldfoundry = "worldfoundry.cli:main"
worldfoundry-eval = "worldfoundry.cli:main"
worldfoundry-mcp = "worldfoundry.mcp:main"
worldfoundry-studio = "worldfoundry.studio.cli:main"
worldfoundry-tui = "worldfoundry.cli.tui:main"

